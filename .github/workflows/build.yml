name: Build & Test
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install -r requirements.txt || true
          pip install pytest pytest-asyncio pytest-cov
      - name: Run Python tests
        run: |
          python -m pytest tests/ -v --tb=short --co -q 2>/dev/null || true
          python -m pytest tests/ -v --tb=short -x || true

  build-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev libsqlcipher-dev
      - name: Build Rust extension
        working-directory: native
        run: cargo build --release --verbose
      - name: Run Rust tests
        working-directory: native
        run: cargo test --verbose || true

  build-wheel:
    needs: [test-python, build-rust]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install maturin
        run: pip install maturin
      - name: Build wheel
        run: maturin build --release --manifest-path native/Cargo.toml
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zenic-agents-wheel
          path: target/wheels/*.whl

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install linters
        run: pip install ruff mypy
      - name: Ruff check
        run: ruff check src/ --ignore=E501,F401,F811 --exit-zero
      - name: Type check
        run: python -m mypy src/ --ignore-missing-imports --no-error-summary || true
