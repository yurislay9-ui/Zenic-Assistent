name: CI

on:
  push:
    branches: [main, develop, 'v*']
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Verify critical imports
        run: |
          python -c "from src.core.shared.types import GoalType, OperationType, CriticalityLevel, RoutePath; print('Types OK')"
          python -c "from src.core.shared._version import ZENIC_VERSION, ZENIC_FULL_NAME; print(f'Version: {ZENIC_FULL_NAME}')"
          python -c "from src.core.shared.retry import with_retry; print('Shared retry OK')"
          python -c "from src.core.patterns.resilience.retry import with_retry, with_config_retry, RetryConfig; print('Patterns retry OK')"
          python -c "from src.core.agents_v2.resilience.retry import with_agent_retry, AgentRetryConfig; print('Agent retry OK')"

      - name: Run tests
        run: |
          pytest --tb=short -q --timeout=30

      - name: Run tests with coverage
        if: matrix.python-version == '3.12'
        run: |
          pytest --cov=src --cov-report=term-missing --cov-report=xml --timeout=30

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t zenic-agents:ci .
