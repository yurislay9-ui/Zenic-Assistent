# ============================================================
#  ZENIC-AGENTS - HTTP Server (HTTP-only mode)
#
#  This is the ACTIVE configuration for HTTP-only deployments.
#  When you obtain SSL certificates, replace this file with
#  the SSL configuration in zenic-ssl.conf.example.
#
#  The HTTP→HTTPS redirect is intentionally NOT enabled here
#  because there is no HTTPS server block to redirect to.
#  Enable it only after setting up SSL (see zenic-ssl.conf.example).
# ============================================================

server {
    listen 80 default_server;
    server_name _;

    # Let's Encrypt challenge (needed even in HTTP-only mode for cert generation)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # API proxy
    location / {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass http://zenic_app;
        proxy_http_version 1.1;

        # WebSocket support for streaming
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeouts for AI operations
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        # No buffering for streaming
        proxy_buffering off;
        proxy_cache off;
    }

    # Health and readiness (no rate limit)
    location ~ ^/(health|ready) {
        proxy_pass http://zenic_app;
        proxy_set_header Host $host;
    }

    # Metrics (consider restricting)
    location /metrics {
        proxy_pass http://zenic_app;
        proxy_set_header Host $host;
    }
}

