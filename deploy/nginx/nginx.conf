# ============================================================
#  ZENIC-AGENTS v16 - Nginx Configuration
#  Phase 3: VPS Deploy — Reverse Proxy + SSL Termination
#
#  Features:
#    - HTTP → HTTPS redirect
#    - SSL/TLS with Let's Encrypt
#    - WebSocket support (/v1/chat/completions streaming)
#    - Rate limiting at nginx level
#    - Security headers (HSTS, X-Frame-Options, CSP)
#    - Gzip compression
#    - Health check passthrough
#    - Static file caching
# ============================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging Format (JSON for structured logging) ────────
    log_format zenic_json escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"request":"$request",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time",'
            '"tenant_id":"$http_x_tenant_id",'
            '"user_agent":"$http_user_agent"'
        '}';

    access_log /var/log/nginx/access.log zenic_json;

    # ── Performance ─────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10M;

    # ── Gzip Compression ────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/xml
        text/xml
        application/x-yaml;

    # ── Rate Limiting Zones ─────────────────────────────────
    # Per-IP rate limiting (defense in depth — app also has TenantRateLimiter)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    # Note: 30r/s here is a coarse-grained DoS shield. The Python app enforces finer per-user/per-tenant quotas (30 RPM default).
    limit_req_zone $http_x_tenant_id zone=tenant_limit:10m rate=100r/s;

    # ── Security Headers ────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Upstream ────────────────────────────────────────────
    upstream zenic_app {
        server app:5000;
        keepalive 32;
    }

    # Include server configurations
    include /etc/nginx/conf.d/*.conf;
}
