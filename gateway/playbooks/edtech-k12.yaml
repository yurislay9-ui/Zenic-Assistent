apiVersion: playbook.zenic.dev/v1
kind: Playbook
metadata:
  id: edtech-k12
  name: "Educación K-12"
  name_en: "K-12 Education"
  industry: education
  sub_industry: k12
  version: "1.0.0"
  description: "Comprehensive student data protection and learning management automation for K-12 institutions, ensuring FERPA and COPPA compliance with automated parental consent workflows and educational analytics."
  compliance:
    - FERPA
    - COPPA
  icon: "📚"
  color: "#8B5CF6"
  labels:
    category: education
    criticality: medium
  author: "Zenic-Agents"
capabilities:
  - id: ferpa-directory-control
    name: "FERPA Directory Information Control"
    description: "Automated management of student directory information opt-out requests and disclosure tracking per FERPA Section 99.37."
    category: compliance
    autoEnabled: true
    riskLevel: high
  - id: coppa-parental-consent
    name: "COPPA Parental Consent Engine"
    description: "Digital parental consent workflow with age verification, consent tracking, and automatic data deletion for children under 13."
    category: compliance
    autoEnabled: true
    riskLevel: critical
  - id: student-data-encryption
    name: "Student Data Encryption"
    description: "End-to-end encryption of all personally identifiable student records at rest and in transit with FERPA-compliant key management."
    category: security
    autoEnabled: true
    riskLevel: high
  - id: learning-analytics-dashboard
    name: "Learning Analytics Dashboard"
    description: "Aggregated student performance analytics with de-identification pipelines ensuring FERPA-compliant data analysis and reporting."
    category: analytics
    autoEnabled: false
    riskLevel: low
  - id: attendance-grade-automation
    name: "Attendance & Grade Automation"
    description: "Automated attendance tracking, grade calculation, and report card generation with SIS integration and parent notification."
    category: automation
    autoEnabled: true
    riskLevel: low
  - id: edtech-app-vetting
    name: "EdTech App Vetting"
    description: "Automated privacy assessment and COPPA compliance checking for third-party educational applications before student data sharing."
    category: compliance
    autoEnabled: false
    riskLevel: medium
policies:
  - policyId: student_data_protection
    name: "Student Data Protection Policy"
    description: "Controls collection, storage, and sharing of student PII ensuring FERPA directory information and education record protections."
  - policyId: coppa_consent_enforcement
    name: "COPPA Consent Enforcement Policy"
    description: "Mandates verifiable parental consent before collecting personal information from children under 13 with data deletion guarantees."
  - policyId: data_access_restriction
    name: "Educational Data Access Restriction"
    description: "Restricts access to student records based on legitimate educational interest per FERPA school official exception requirements."
roi:
  baseline:
    manual_time_per_action_min: 20
    error_rate_pct: 7.0
    actions_per_month: 1800
    cost_per_error_usd: 95
    violations_per_year: 2
    penalty_per_violation_usd: 25000
  projected:
    automated_time_per_action_min: 4
    reduced_error_rate_pct: 1.5
    compliance_score_target: 94
    automation_rate_pct: 72
pricing:
  currency: USD
  starter:
    name: Starter
    price_usd: 49
    features:
      - "FERPA compliance basics"
      - "Up to 500 students"
      - "COPPA consent forms"
      - "Email support"
    limits:
      max_actions_month: 800
      max_users: 10
    recommended_for: "Small private schools"
  pro:
    name: Professional
    price_usd: 199
    features:
      - "Full FERPA & COPPA compliance"
      - "Up to 5,000 students"
      - "Learning analytics dashboard"
      - "SIS integration"
      - "EdTech app vetting"
      - "Priority support"
    limits:
      max_actions_month: 5000
      max_users: 50
    recommended_for: "School districts & charter networks"
  enterprise:
    name: Enterprise
    price_usd: 999
    features:
      - "Unlimited students"
      - "Multi-district analytics"
      - "Custom COPPA workflows"
      - "State reporting automation"
      - "Advanced threat protection"
      - "Dedicated success manager"
      - "24/7 support with SLA"
    limits:
      max_actions_month: unlimited
      max_users: unlimited
    recommended_for: "Large school districts & state education agencies"
onboarding:
  estimated_minutes: 20
  steps:
    - id: select-school-type
      title: "School Type"
      description: "Select your institution type for appropriate compliance defaults."
      type: selection
      field: school_type
      default_value: "public"
      required: true
      options:
        - value: "public"
          label: "Public School"
        - value: "private"
          label: "Private School"
        - value: "charter"
          label: "Charter School"
        - value: "district"
          label: "School District"
    - id: student-count-range
      title: "Student Population"
      description: "Select the approximate number of students to configure capacity and performance settings."
      type: selection
      field: student_count
      default_value: "500-2000"
      required: true
      options:
        - value: "under-500"
          label: "Under 500"
        - value: "500-2000"
          label: "500 - 2,000"
        - value: "2000-10000"
          label: "2,000 - 10,000"
        - value: "over-10000"
          label: "Over 10,000"
    - id: coppa-consent-confirm
      title: "COPPA Compliance"
      description: "Confirm that parental consent workflows will be enabled for all students under 13."
      type: confirmation
      field: coppa_enabled
      default_value: true
      required: true
    - id: sis-integration-select
      title: "SIS Integration"
      description: "Select your Student Information System for automatic data synchronization."
      type: selection
      field: sis_system
      default_value: "none"
      required: false
      options:
        - value: "powerschool"
          label: "PowerSchool"
        - value: "canvas"
          label: "Canvas"
        - value: "google_classroom"
          label: "Google Classroom"
        - value: "none"
          label: "None / Manual"
    - id: auto-ferpa-audit
      title: "FERPA Audit Trail"
      description: "Automatically enable FERPA-compliant audit trail for all student record access events."
      type: auto_config
      field: ferpa_audit_enabled
      default_value: true
      required: true
certification:
  status: unsigned
