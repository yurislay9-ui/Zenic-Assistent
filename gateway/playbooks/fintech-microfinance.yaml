apiVersion: playbook.zenic.dev/v1
kind: Playbook
metadata:
  id: fintech-microfinance
  name: "Plataforma de Microfinanzas"
  name_en: "Microfinance Platform"
  industry: financial_services
  sub_industry: microfinance
  version: "1.0.0"
  description: "End-to-end automation for microfinance operations including loan origination, AML/KYC screening, transaction monitoring, and regulatory reporting for PCI-DSS and SOX compliance."
  compliance:
    - PCI-DSS
    - AML/KYC
    - SOX
  icon: "💰"
  color: "#F59E0B"
  labels:
    category: financial_services
    criticality: critical
  author: "Zenic-Agents"
capabilities:
  - id: aml-kyc-screening
    name: "AML/KYC Automated Screening"
    description: "Real-time anti-money laundering and know-your-customer screening against OFAC, PEP, and adverse media databases with risk scoring."
    category: compliance
    autoEnabled: true
    riskLevel: critical
  - id: loan-origination-automation
    name: "Loan Origination Automation"
    description: "Automated micro-loan application processing with credit scoring, eligibility verification, and disbursement workflow orchestration."
    category: automation
    autoEnabled: true
    riskLevel: medium
  - id: pci-dss-transaction-monitor
    name: "PCI-DSS Transaction Monitor"
    description: "Continuous monitoring of payment transactions for PCI-DSS compliance with real-time cardholder data environment scanning and alerting."
    category: monitoring
    autoEnabled: true
    riskLevel: high
  - id: financial_transfer_control
    name: "Financial Transfer Control"
    description: "Dual-authorization and threshold-based controls for financial transfers with automated suspicious activity detection and flagging."
    category: security
    autoEnabled: true
    riskLevel: critical
  - id: regulatory-reporting-engine
    name: "Regulatory Reporting Engine"
    description: "Automated generation of SAR, CTR, and SOX compliance reports with scheduled submission to regulatory authorities."
    category: reporting
    autoEnabled: false
    riskLevel: high
  - id: portfolio-risk-analytics
    name: "Portfolio Risk Analytics"
    description: "Real-time portfolio risk assessment with concentration analysis, default probability modeling, and provisioning recommendations."
    category: analytics
    autoEnabled: false
    riskLevel: medium
  - id: client-onboarding-digital
    name: "Digital Client Onboarding"
    description: "Fully digital client onboarding with document verification, e-signature, biometric authentication, and automated risk classification."
    category: workflow
    autoEnabled: true
    riskLevel: low
  - id: sox-internal-controls
    name: "SOX Internal Controls"
    description: "Automated testing and monitoring of SOX key controls with evidence collection, deficiency tracking, and remediation workflow management."
    category: compliance
    autoEnabled: false
    riskLevel: high
policies:
  - policyId: financial_transfer_control
    name: "Financial Transfer Control Policy"
    description: "Enforces dual-authorization for transfers exceeding thresholds and blocks suspicious transactions pending review per AML requirements."
  - policyId: data_access_restriction
    name: "Financial Data Access Restriction"
    description: "Restricts access to sensitive financial data based on role, need-to-know, and transaction amount thresholds per SOX Section 404."
  - policyId: pci_cardholder_protection
    name: "Cardholder Data Protection Policy"
    description: "Mandates tokenization, encryption, and access controls for cardholder data environments per PCI-DSS Requirements 3 and 7."
  - policyId: aml_transaction_monitoring
    name: "AML Transaction Monitoring Policy"
    description: "Defines thresholds and patterns for suspicious activity detection with automated SAR filing triggers per BSA/AML requirements."
roi:
  baseline:
    manual_time_per_action_min: 45
    error_rate_pct: 6.2
    actions_per_month: 3800
    cost_per_error_usd: 320
    violations_per_year: 4
    penalty_per_violation_usd: 100000
  projected:
    automated_time_per_action_min: 6
    reduced_error_rate_pct: 0.8
    compliance_score_target: 97
    automation_rate_pct: 82
pricing:
  currency: USD
  starter:
    name: Starter
    price_usd: 99
    features:
      - "AML/KYC basic screening"
      - "Up to 500 loan applications/month"
      - "PCI-DSS transaction logs"
      - "Email support"
    limits:
      max_actions_month: 1000
      max_users: 5
    recommended_for: "Small microfinance institutions"
  pro:
    name: Professional
    price_usd: 399
    features:
      - "Full AML/KYC screening suite"
      - "Up to 5,000 loan applications/month"
      - "PCI-DSS compliance dashboard"
      - "SOX internal controls"
      - "Regulatory reporting (SAR/CTR)"
      - "Priority support"
    limits:
      max_actions_month: 6000
      max_users: 30
    recommended_for: "Growing microfinance platforms"
  enterprise:
    name: Enterprise
    price_usd: 1999
    features:
      - "Unlimited loan processing"
      - "Advanced fraud detection & analytics"
      - "Multi-jurisdiction compliance"
      - "Custom regulatory reporting"
      - "Portfolio risk analytics"
      - "Dedicated compliance team"
      - "24/7 support with SLA"
    limits:
      max_actions_month: unlimited
      max_users: unlimited
    recommended_for: "Large microfinance banks & fintechs"
onboarding:
  estimated_minutes: 35
  steps:
    - id: select-jurisdiction
      title: "Regulatory Jurisdiction"
      description: "Select your primary operating jurisdiction for compliance rule configuration."
      type: selection
      field: jurisdiction
      default_value: "us"
      required: true
      options:
        - value: "us"
          label: "United States"
        - value: "eu"
          label: "European Union"
        - value: "latam"
          label: "Latin America"
        - value: "apac"
          label: "Asia-Pacific"
    - id: configure-aml-thresholds
      title: "AML Monitoring Thresholds"
      description: "Set transaction amount thresholds that trigger enhanced due diligence and suspicious activity review."
      type: question
      field: aml_threshold_usd
      default_value: "5000"
      required: true
    - id: dual-auth-config
      title: "Dual Authorization"
      description: "Enable dual-authorization requirements for financial transfers exceeding defined thresholds."
      type: confirmation
      field: dual_auth_enabled
      default_value: true
      required: true
    - id: pci-scope-definition
      title: "PCI-DSS Scope"
      description: "Define your cardholder data environment scope for automated PCI-DSS compliance scanning."
      type: selection
      field: pci_scope
      default_value: "standard"
      required: true
      options:
        - value: "minimal"
          label: "Minimal (e-commerce only)"
        - value: "standard"
          label: "Standard (payment processing)"
        - value: "full"
          label: "Full (card issuance & processing)"
    - id: auto-transaction-monitor
      title: "Transaction Monitoring"
      description: "Automatically enable real-time transaction monitoring for PCI-DSS and AML compliance."
      type: auto_config
      field: transaction_monitoring_enabled
      default_value: true
      required: true
    - id: sar-filing-setup
      title: "SAR Filing Configuration"
      description: "Configure automatic Suspicious Activity Report generation and filing workflow."
      type: question
      field: sar_filing_contact
      default_value: ""
      required: false
certification:
  status: unsigned
