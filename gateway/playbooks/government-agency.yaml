apiVersion: playbook.zenic.dev/v1
kind: Playbook
metadata:
  id: government-agency
  name: "Agencia Gubernamental"
  name_en: "Government Agency"
  industry: government
  sub_industry: federal_agency
  version: "1.0.0"
  description: "Comprehensive government agency automation playbook with FedRAMP authorization, FISMA compliance, NIST SP 800-53 controls, and continuous monitoring for federal, state, and local government systems."
  compliance:
    - FedRAMP
    - FISMA
    - NIST
  icon: "🏛️"
  color: "#1D4ED8"
  labels:
    category: government
    criticality: critical
  author: "Zenic-Agents"
capabilities:
  - id: fedramp-authorization
    name: "FedRAMP Authorization"
    description: "Automated FedRAMP authorization package generation with POA&M management, security assessment, and continuous monitoring per NIST SP 800-37."
    category: compliance
    autoEnabled: true
    riskLevel: critical
  - id: fisma-compliance-engine
    name: "FISMA Compliance Engine"
    description: "Continuous FISMA compliance monitoring with NIST SP 800-53 control assessment, authorization boundary management, and annual review automation."
    category: compliance
    autoEnabled: true
    riskLevel: critical
  - id: nist-800-53-controls
    name: "NIST 800-53 Controls"
    description: "Automated implementation and assessment of NIST SP 800-53 security and privacy controls across low, moderate, and high impact baselines."
    category: compliance
    autoEnabled: true
    riskLevel: high
  - id: continuous-diagnostics
    name: "Continuous Diagnostics & Mitigation"
    description: "CDM program implementation with hardware/software asset tracking, vulnerability management, and configuration compliance monitoring per CDM DEF."
    category: monitoring
    autoEnabled: true
    riskLevel: high
  - id: foia-processing-automation
    name: "FOIA Processing Automation"
    description: "Automated Freedom of Information Act request processing with exemption review, redaction assistance, and response tracking within statutory deadlines."
    category: workflow
    autoEnabled: false
    riskLevel: medium
  - id: constituent-service-platform
    name: "Constituent Service Platform"
    description: "Multi-channel constituent service management with case tracking, escalation workflows, and performance analytics for public-facing services."
    category: automation
    autoEnabled: false
    riskLevel: low
  - id: authority-to-operate
    name: "Authority to Operate Management"
    description: "ATO lifecycle management with automated security plan generation, risk assessment, and authorization package assembly per RMF Step 6."
    category: compliance
    autoEnabled: true
    riskLevel: high
policies:
  - policyId: fedramp_access_control
    name: "FedRAMP Access Control Policy"
    description: "Enforces NIST AC controls with multi-factor authentication, session management, and least-privilege access per FedRAMP baseline requirements."
  - policyId: fisma_audit_logging
    name: "FISMA Audit Logging Policy"
    description: "Mandates comprehensive audit logging of all security-relevant events with tamper-proof storage and automated review per AU control family."
  - policyId: data_access_restriction
    name: "Government Data Access Restriction"
    description: "Controls access to CUI and classified information based on clearance level, need-to-know, and system authorization per NIST AC-3."
  - policyId: change_control_board
    name: "Change Control Board Policy"
    description: "Requires Change Control Board approval for all system changes in production environments with impact assessment and rollback procedures per CM-3."
roi:
  baseline:
    manual_time_per_action_min: 60
    error_rate_pct: 8.0
    actions_per_month: 2000
    cost_per_error_usd: 500
    violations_per_year: 4
    penalty_per_violation_usd: 250000
  projected:
    automated_time_per_action_min: 15
    reduced_error_rate_pct: 1.5
    compliance_score_target: 97
    automation_rate_pct: 65
pricing:
  currency: USD
  starter:
    name: Starter
    price_usd: 99
    features:
      - "NIST 800-53 basic assessment"
      - "FISMA compliance tracking"
      - "Up to 500 system components"
      - "Email support"
    limits:
      max_actions_month: 1000
      max_users: 15
    recommended_for: "Small government agencies"
  pro:
    name: Professional
    price_usd: 499
    features:
      - "Full FedRAMP & FISMA suite"
      - "NIST 800-53 all baselines"
      - "Continuous diagnostics"
      - "ATO management"
      - "FOIA processing"
      - "Priority support"
    limits:
      max_actions_month: 5000
      max_users: 100
    recommended_for: "State agencies & mid-size federal systems"
  enterprise:
    name: Enterprise
    price_usd: 2499
    features:
      - "Full FedRAMP authorization package"
      - "Multi-system ATO management"
      - "Constituent service platform"
      - "Custom NIST control mappings"
      - "Agency-wide reporting"
      - "Dedicated compliance officer"
      - "24/7 support with SLA"
    limits:
      max_actions_month: unlimited
      max_users: unlimited
    recommended_for: "Federal agencies & defense organizations"
onboarding:
  estimated_minutes: 40
  steps:
    - id: select-agency-level
      title: "Agency Level"
      description: "Select your government agency level for appropriate compliance baseline configuration."
      type: selection
      field: agency_level
      default_value: "federal"
      required: true
      options:
        - value: "federal"
          label: "Federal Agency"
        - value: "state"
          label: "State Agency"
        - value: "local"
          label: "Local Government"
        - value: "tribal"
          label: "Tribal Government"
    - id: system-impact-level
      title: "System Impact Level"
      description: "Select the FIPS 199 impact level for your primary system boundary."
      type: selection
      field: impact_level
      default_value: "moderate"
      required: true
      options:
        - value: "low"
          label: "Low Impact"
        - value: "moderate"
          label: "Moderate Impact"
        - value: "high"
          label: "High Impact"
    - id: fedramp-path
      title: "FedRAMP Path"
      description: "Select your FedRAMP authorization path."
      type: selection
      field: fedramp_path
      default_value: "agency"
      required: true
      options:
        - value: "agency"
          label: "Agency ATO"
        - value: "jab"
          label: "JAB Provisional Authorization"
        - value: "not_applicable"
          label: "Not Applicable"
    - id: system-boundary-count
      title: "System Boundaries"
      description: "Enter the number of system authorization boundaries to manage."
      type: question
      field: system_boundary_count
      default_value: "5"
      required: true
    - id: fisma-audit-confirm
      title: "FISMA Audit Logging"
      description: "Confirm that comprehensive FISMA-compliant audit logging will be enabled for all security-relevant events."
      type: confirmation
      field: fisma_audit_enabled
      default_value: true
      required: true
    - id: mfa-enforcement
      title: "MFA Enforcement"
      description: "Confirm that multi-factor authentication will be enforced for all system access."
      type: confirmation
      field: mfa_enabled
      default_value: true
      required: true
    - id: auto-continuous-monitoring
      title: "Continuous Monitoring"
      description: "Automatically enable CDM continuous monitoring for hardware/software assets and vulnerability scanning."
      type: auto_config
      field: cdm_enabled
      default_value: true
      required: true
    - id: poam-management
      title: "POA&M Management"
      description: "Provide the contact for Plan of Action and Milestones management and escalation."
      type: question
      field: poam_contact_email
      default_value: ""
      required: true
certification:
  status: unsigned
