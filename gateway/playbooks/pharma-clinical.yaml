apiVersion: playbook.zenic.dev/v1
kind: Playbook
metadata:
  id: pharma-clinical
  name: "Ensayos Clínicos Farmacéuticos"
  name_en: "Clinical Trials"
  industry: pharmaceutical
  sub_industry: clinical_trials
  version: "1.0.0"
  description: "End-to-end clinical trial automation playbook with FDA 21 CFR Part 11 electronic records compliance, GxP quality management, trial data integrity, and automated regulatory submission workflows."
  compliance:
    - FDA 21 CFR Part 11
    - GxP
  icon: "💊"
  color: "#DC2626"
  labels:
    category: pharmaceutical
    criticality: critical
  author: "Zenic-Agents"
capabilities:
  - id: cfr11-electronic-signatures
    name: "21 CFR Part 11 Electronic Signatures"
    description: "FDA-compliant electronic signature management with identity verification, signature manifest, audit trail linking, and authority delegation per Part 11.100-300."
    category: compliance
    autoEnabled: true
    riskLevel: critical
  - id: gxp-quality-management
    name: "GxP Quality Management"
    description: "Integrated GMP, GLP, GCP quality management with CAPA tracking, deviation handling, change control, and management review automation."
    category: compliance
    autoEnabled: true
    riskLevel: high
  - id: trial-data-integrity
    name: "Trial Data Integrity"
    description: "ALCOA+ data integrity enforcement with electronic record controls, source data verification, and automated data quality checks per ICH E6(R2)."
    category: security
    autoEnabled: true
    riskLevel: critical
  - id: patient-enrollment-automation
    name: "Patient Enrollment Automation"
    description: "Automated patient screening, eligibility verification, eConsent management, and enrollment tracking with site-level analytics and diversity monitoring."
    category: automation
    autoEnabled: true
    riskLevel: medium
  - id: safety-pharmacovigilance
    name: "Safety & Pharmacovigilance"
    description: "Automated adverse event processing, MedDRA coding, SAE reporting, and regulatory safety submission with CIOMS form generation."
    category: workflow
    autoEnabled: true
    riskLevel: critical
  - id: regulatory-submission-engine
    name: "Regulatory Submission Engine"
    description: "Automated eCTD compilation, submission formatting per ICH M4, regulatory agency portal submission, and lifecycle management."
    category: reporting
    autoEnabled: false
    riskLevel: high
  - id: clinical-analytics
    name: "Clinical Analytics"
    description: "Interim analysis dashboards, KPI tracking, site performance monitoring, and data review automation with blinded access controls."
    category: analytics
    autoEnabled: false
    riskLevel: medium
  - id: investigator-site-management
    name: "Investigator Site Management"
    description: "Site qualification, activation, monitoring visit scheduling, and site closure workflows with compliance tracking and document management."
    category: workflow
    autoEnabled: true
    riskLevel: low
policies:
  - policyId: electronic_record_integrity
    name: "Electronic Record Integrity Policy"
    description: "Enforces Part 11 electronic record controls including audit trails, record retention, and system validation documentation per 21 CFR 11.10."
  - policyId: clinical_data_access
    name: "Clinical Data Access Policy"
    description: "Controls access to blinded clinical data with role-based segregation preventing unblinding per ICH E9 and GCP Section 5.5."
  - policyId: safety_reporting_control
    name: "Safety Reporting Control Policy"
    description: "Mandates expedited SAE reporting within regulatory timelines with automated CIOMS generation and submission per ICH E2A."
  - policyId: gxp_change_control
    name: "GxP Change Control Policy"
    description: "Requires impact-assessed change control for validated systems with regression testing, revalidation, and regulatory notification per GMP 21 CFR 211.68."
roi:
  baseline:
    manual_time_per_action_min: 65
    error_rate_pct: 9.5
    actions_per_month: 1200
    cost_per_error_usd: 2500
    violations_per_year: 3
    penalty_per_violation_usd: 500000
  projected:
    automated_time_per_action_min: 15
    reduced_error_rate_pct: 1.5
    compliance_score_target: 98
    automation_rate_pct: 62
pricing:
  currency: USD
  starter:
    name: Starter
    price_usd: 99
    features:
      - "Part 11 electronic signatures"
      - "Up to 3 active studies"
      - "Basic GxP quality tracking"
      - "Email support"
    limits:
      max_actions_month: 500
      max_users: 10
    recommended_for: "Small biotech & CROs"
  pro:
    name: Professional
    price_usd: 499
    features:
      - "Full Part 11 & GxP compliance"
      - "Up to 20 active studies"
      - "Safety & pharmacovigilance"
      - "Patient enrollment automation"
      - "Site management"
      - "Priority support"
    limits:
      max_actions_month: 3000
      max_users: 50
    recommended_for: "Mid-size pharma companies"
  enterprise:
    name: Enterprise
    price_usd: 2499
    features:
      - "Unlimited studies"
      - "Regulatory submission engine"
      - "Clinical analytics suite"
      - "Multi-region compliance"
      - "Integrated safety database"
      - "Dedicated clinical systems specialist"
      - "24/7 support with SLA"
    limits:
      max_actions_month: unlimited
      max_users: unlimited
    recommended_for: "Large pharma & global CROs"
onboarding:
  estimated_minutes: 40
  steps:
    - id: select-organization-type
      title: "Organization Type"
      description: "Select your organization type for appropriate compliance configuration."
      type: selection
      field: org_type
      default_value: "pharma"
      required: true
      options:
        - value: "pharma"
          label: "Pharmaceutical Company"
        - value: "biotech"
          label: "Biotechnology Company"
        - value: "cro"
          label: "Contract Research Organization"
        - value: "academic"
          label: "Academic Medical Center"
    - id: trial-phase
      title: "Primary Trial Phase"
      description: "Select the primary clinical trial phase for workflow template configuration."
      type: selection
      field: trial_phase
      default_value: "phase3"
      required: true
      options:
        - value: "phase1"
          label: "Phase I"
        - value: "phase2"
          label: "Phase II"
        - value: "phase3"
          label: "Phase III"
        - value: "phase4"
          label: "Phase IV / Post-market"
        - value: "all"
          label: "All Phases"
    - id: active-study-count
      title: "Active Studies"
      description: "Enter the number of currently active clinical studies to manage."
      type: question
      field: active_studies
      default_value: "5"
      required: true
    - id: part11-esignature-confirm
      title: "Part 11 Electronic Signatures"
      description: "Confirm FDA 21 CFR Part 11 electronic signature controls will be enforced for all electronic records."
      type: confirmation
      field: part11_enabled
      default_value: true
      required: true
    - id: data-integrity-alcoa
      title: "ALCOA+ Data Integrity"
      description: "Confirm ALCOA+ data integrity principles will be enforced across all clinical data systems."
      type: confirmation
      field: alcoa_enabled
      default_value: true
      required: true
    - id: safety-reporting-config
      title: "Safety Reporting"
      description: "Configure expedited safety reporting timeline (hours) for Suspected Unexpected Serious Adverse Reactions."
      type: question
      field: susar_reporting_hours
      default_value: "24"
      required: true
    - id: auto-gxp-tracking
      title: "GxP Quality Tracking"
      description: "Automatically enable GxP quality management with CAPA tracking and deviation handling."
      type: auto_config
      field: gxp_tracking_enabled
      default_value: true
      required: true
certification:
  status: unsigned
