apiVersion: playbook.zenic.dev/v1
kind: Playbook
metadata:
  id: retail-ecommerce
  name: "Plataforma de Comercio Electrónico"
  name_en: "E-Commerce Platform"
  industry: ecommerce
  sub_industry: online_retail
  version: "1.0.0"
  description: "Comprehensive e-commerce automation covering PCI-DSS payment security, GDPR/CCPA consumer data privacy, order processing, and inventory management with real-time compliance monitoring."
  compliance:
    - PCI-DSS
    - GDPR
    - CCPA
  icon: "🛒"
  color: "#EC4899"
  labels:
    category: ecommerce
    criticality: high
  author: "Zenic-Agents"
capabilities:
  - id: pci-payment-security
    name: "PCI-DSS Payment Security"
    description: "Automated PCI-DSS compliance scanning for payment environments with tokenization, vulnerability assessments, and SAQ generation."
    category: security
    autoEnabled: true
    riskLevel: critical
  - id: gdpr-ccpa-privacy-engine
    name: "GDPR/CCPA Privacy Engine"
    description: "Unified privacy management for consumer data with consent collection, DSAR automation, data mapping, and right-to-deletion workflows."
    category: compliance
    autoEnabled: true
    riskLevel: high
  - id: order-processing-automation
    name: "Order Processing Automation"
    description: "End-to-end order lifecycle automation from cart to delivery with fraud detection, address verification, and carrier selection."
    category: automation
    autoEnabled: true
    riskLevel: low
  - id: inventory-sync-engine
    name: "Inventory Sync Engine"
    description: "Real-time inventory synchronization across multiple warehouses, marketplaces, and channels with automated reorder triggers."
    category: integration
    autoEnabled: true
    riskLevel: low
  - id: customer-data-platform
    name: "Customer Data Platform"
    description: "Unified customer profile management with purchase history, segmentation, and GDPR-compliant personalization consent tracking."
    category: analytics
    autoEnabled: false
    riskLevel: medium
  - id: return-refund-automation
    name: "Return & Refund Automation"
    description: "Automated return merchandise authorization, refund processing, and restocking workflows with configurable policy enforcement."
    category: workflow
    autoEnabled: true
    riskLevel: medium
  - id: sales-tax-compliance
    name: "Sales Tax Compliance"
    description: "Automated sales tax calculation, collection, and remittance across jurisdictions with nexus tracking and exemption management."
    category: compliance
    autoEnabled: false
    riskLevel: medium
policies:
  - policyId: pci_cardholder_protection
    name: "Cardholder Data Protection Policy"
    description: "Enforces tokenization, encryption, and strict access controls for payment card data per PCI-DSS Requirements 3, 4, and 7."
  - policyId: consumer_privacy_gdpr_ccpa
    name: "Consumer Privacy Policy"
    description: "Controls collection, processing, and retention of consumer personal data ensuring GDPR lawful basis and CCPA opt-out compliance."
  - policyId: data_access_restriction
    name: "E-Commerce Data Access Restriction"
    description: "Restricts access to customer PII and payment data based on role and business need per GDPR Article 32 and CCPA Section 1798.150."
  - policyId: refund_policy_enforcement
    name: "Refund Policy Enforcement"
    description: "Automated enforcement of return and refund policies with fraud detection, configurable approval thresholds, and compliance documentation."
roi:
  baseline:
    manual_time_per_action_min: 18
    error_rate_pct: 5.5
    actions_per_month: 12000
    cost_per_error_usd: 75
    violations_per_year: 3
    penalty_per_violation_usd: 35000
  projected:
    automated_time_per_action_min: 3
    reduced_error_rate_pct: 1.0
    compliance_score_target: 95
    automation_rate_pct: 85
pricing:
  currency: USD
  starter:
    name: Starter
    price_usd: 59
    features:
      - "PCI-DSS basic compliance"
      - "Up to 1,000 orders/month"
      - "GDPR/CCPA consent management"
      - "Email support"
    limits:
      max_actions_month: 2000
      max_users: 5
    recommended_for: "Small online stores"
  pro:
    name: Professional
    price_usd: 249
    features:
      - "Full PCI-DSS & privacy suite"
      - "Up to 15,000 orders/month"
      - "Inventory sync (3 channels)"
      - "Return & refund automation"
      - "Sales tax compliance"
      - "Priority support"
    limits:
      max_actions_month: 15000
      max_users: 20
    recommended_for: "Growing e-commerce businesses"
  enterprise:
    name: Enterprise
    price_usd: 1499
    features:
      - "Unlimited orders"
      - "Multi-marketplace integration"
      - "Advanced fraud analytics"
      - "Customer data platform"
      - "Custom privacy workflows"
      - "Dedicated commerce specialist"
      - "24/7 support with SLA"
    limits:
      max_actions_month: unlimited
      max_users: unlimited
    recommended_for: "Enterprise retailers & marketplace operators"
onboarding:
  estimated_minutes: 25
  steps:
    - id: select-store-type
      title: "Store Type"
      description: "Select your e-commerce platform for pre-built integration configuration."
      type: selection
      field: store_platform
      default_value: "shopify"
      required: true
      options:
        - value: "shopify"
          label: "Shopify"
        - value: "woocommerce"
          label: "WooCommerce"
        - value: "magento"
          label: "Magento"
        - value: "custom"
          label: "Custom Platform"
    - id: monthly-order-volume
      title: "Monthly Order Volume"
      description: "Select your approximate monthly order volume for capacity configuration."
      type: selection
      field: order_volume
      default_value: "1000-5000"
      required: true
      options:
        - value: "under-1000"
          label: "Under 1,000"
        - value: "1000-5000"
          label: "1,000 - 5,000"
        - value: "5000-20000"
          label: "5,000 - 20,000"
        - value: "over-20000"
          label: "Over 20,000"
    - id: pci-scope-confirm
      title: "PCI-DSS Scope"
      description: "Confirm your PCI-DSS compliance scope for payment environment monitoring setup."
      type: confirmation
      field: pci_compliance_enabled
      default_value: true
      required: true
    - id: gdpr-ccpa-toggle
      title: "Privacy Compliance"
      description: "Enable GDPR and CCPA consumer privacy compliance modules."
      type: confirmation
      field: privacy_compliance_enabled
      default_value: true
      required: true
    - id: return-policy-config
      title: "Return Policy"
      description: "Configure your default return and refund policy for automated enforcement."
      type: question
      field: return_policy_days
      default_value: "30"
      required: true
    - id: auto-order-monitoring
      title: "Order Monitoring"
      description: "Automatically enable real-time order processing monitoring and fraud detection."
      type: auto_config
      field: order_monitoring_enabled
      default_value: true
      required: true
certification:
  status: unsigned
