# ─── Zenic-Agents v3 — Data Protection Policy ────────────────────────
# Controls data access, processing, and retention with GDPR/HIPAA compliance.
# Philosophy: "IA never generates, only arbitrates YES/NO"

apiVersion: policy.zenic.dev/v1
kind: PolicyDocument

metadata:
  id: data_protection
  name: "Data Protection Policy"
  version: "1.3.0"
  description: |
    Controls data access, processing, and retention.
    Enforces GDPR and HIPAA compliance with consent checks,
    encryption requirements, and audit logging.
  compliance:
    GDPR: "5, 6, 17, 25, 30, 32, 35"
    HIPAA: "164.312(a), 164.312(b), 164.312(c), 164.312(e)"
  labels:
    category: data
    criticality: high
    scope: cross-cutting
  author: zenic-system

statements:
  - id: deny_without_consent
    effect: deny
    resource: "data/personal/*"
    action: "read"
    conditions:
      - field: consent_given
        operator: eq
        value: false
    priority: 100
    description: "Deny access to personal data without consent"

  - id: deny_unencrypted_pii
    effect: deny
    resource: "data/personal/*"
    action: "transmit"
    conditions:
      - field: encrypted
        operator: eq
        value: false
    priority: 95
    description: "Deny transmission of unencrypted PII"

  - id: enforce_retention_limit
    effect: deny
    resource: "data/personal/*"
    action: "retain"
    conditions:
      - field: retention_days
        operator: gt
        value: 365
    priority: 90
    description: "Deny retention of personal data beyond 365 days"

  - id: require_dpo_approval_bulk
    effect: conditional
    resource: "data/personal/*"
    action: "export"
    conditions:
      - field: record_count
        operator: gt
        value: 1000
    priority: 80
    requiredRole: data_protection_officer
    description: "Bulk export of personal data requires DPO approval"

  - id: allow_right_to_erasure
    effect: allow
    resource: "data/personal/*"
    action: "delete"
    conditions:
      - field: data_subject_request
        operator: eq
        value: true
    priority: 70
    description: "Allow data deletion upon subject request (GDPR Art. 17)"

  - id: audit_all_data_access
    effect: conditional
    resource: "data/*"
    action: "*"
    conditions:
      - field: audit_enabled
        operator: eq
        value: true
    priority: 20
    requiredRole: data_analyst
    description: "All data access must be audited"

  - id: deny_health_data_without_phi
    effect: deny
    resource: "data/health/*"
    action: "read"
    conditions:
      - field: phi_access_granted
        operator: eq
        value: false
    priority: 100
    description: "Deny access to health data without PHI authorization"

tests:
  - name: "Deny personal data without consent"
    resource: "data/personal/profile"
    action: "read"
    context:
      consent_given: false
    expected: denied
    expectedStatementId: deny_without_consent

  - name: "Deny unencrypted PII transmission"
    resource: "data/personal/email"
    action: "transmit"
    context:
      encrypted: false
    expected: denied
    expectedStatementId: deny_unencrypted_pii

  - name: "Deny retention beyond 365 days"
    resource: "data/personal/logs"
    action: "retain"
    context:
      retention_days: 400
    expected: denied
    expectedStatementId: enforce_retention_limit

  - name: "Bulk export requires DPO"
    resource: "data/personal/records"
    action: "export"
    context:
      record_count: 5000
    expected: conditional

  - name: "Allow erasure on subject request"
    resource: "data/personal/profile"
    action: "delete"
    context:
      data_subject_request: true
    expected: allowed

  - name: "Deny health data without PHI"
    resource: "data/health/records"
    action: "read"
    context:
      phi_access_granted: false
    expected: denied
