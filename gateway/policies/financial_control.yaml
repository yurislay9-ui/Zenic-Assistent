# ─── Zenic-Agents v3 — Financial Control Policy ───────────────────────
# Controls financial operations with PCI-DSS and SOX compliance mapping.
# Philosophy: "IA never generates, only arbitrates YES/NO"

apiVersion: policy.zenic.dev/v1
kind: PolicyDocument

metadata:
  id: financial_control
  name: "Financial Control Policy"
  version: "2.1.0"
  description: |
    Controls financial operations with compliance mapping.
    Blocks unauthorized transfers, enforces rate limits, and requires
    dual authorization for high-value operations.
  compliance:
    PCI-DSS: "1.2.3, 1.3.1, 3.4, 7.1, 7.2, 8.1, 10.1, 10.2"
    SOX: "302, 404"
    AML/KYC: "3.1, 4.1, 4.2"
  labels:
    category: financial
    criticality: high
    scope: enterprise
  author: zenic-system

statements:
  - id: deny_unauthorized_transfer
    effect: deny
    resource: "financial/transfer"
    action: "*"
    conditions:
      - field: approved
        operator: eq
        value: false
      - field: amount
        operator: gt
        value: 10000
    priority: 100
    description: "Block transfers > $10K without approval"

  - id: deny_all_unapproved_transfers
    effect: deny
    resource: "financial/transfer"
    action: "execute"
    conditions:
      - field: approved
        operator: eq
        value: false
    priority: 90
    description: "Block any unapproved transfer execution"

  - id: rate_limit_financial
    effect: conditional
    resource: "financial/*"
    action: "*"
    conditions:
      - field: requests_per_minute
        operator: lte
        value: 30
      - field: daily_amount
        operator: lte
        value: 100000
    priority: 50
    requiredRole: financial_operator
    description: "Rate-limited financial operations with operator role"

  - id: dual_auth_high_value
    effect: conditional
    resource: "financial/transfer"
    action: "execute"
    conditions:
      - field: amount
        operator: gt
        value: 50000
    priority: 80
    requiredRole: financial_manager
    description: "Dual authorization required for transfers > $50K"

  - id: allow_read_financial
    effect: allow
    resource: "financial/*"
    action: "read"
    priority: 10
    description: "Allow read access to financial data"

  - id: deny_modify_audit
    effect: deny
    resource: "financial/audit"
    action: "write"
    priority: 95
    description: "Never allow modifying financial audit records"

tests:
  - name: "Block unauthorized large transfer"
    resource: "financial/transfer"
    action: "execute"
    context:
      approved: false
      amount: 50000
    expected: denied
    expectedStatementId: deny_unauthorized_transfer

  - name: "Block unapproved small transfer"
    resource: "financial/transfer"
    action: "execute"
    context:
      approved: false
      amount: 100
    expected: denied

  - name: "Rate-limited operation requires operator role"
    resource: "financial/invoice"
    action: "create"
    context:
      requests_per_minute: 10
      daily_amount: 50000
    expected: conditional

  - name: "High-value transfer requires manager"
    resource: "financial/transfer"
    action: "execute"
    context:
      approved: true
      amount: 75000
    expected: conditional

  - name: "Allow read access to financial data"
    resource: "financial/report"
    action: "read"
    context: {}
    expected: allowed

  - name: "Deny audit modification"
    resource: "financial/audit"
    action: "write"
    context: {}
    expected: denied
