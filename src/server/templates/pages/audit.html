<!--
  Zenic-Agents Asistente — Audit Trail Page (Phase 7.4)
  Filterable audit log with DAG history and CSV/JSON export.
-->
{% extends "layouts/base.html" %}
{% block title %}Audit Trail — Zenic-Agents{% endblock %}

{% block content %}
<div x-data="auditData()">
  <!-- ── Filters ─────────────────────────────────── -->
  <div class="card mb-16">
    <div class="card-header">
      <span class="card-title">Filtros</span>
      <div class="flex gap-8">
        <button class="btn btn-sm" @click="exportAudit('csv')">Exportar CSV</button>
        <button class="btn btn-sm" @click="exportAudit('json')">Exportar JSON</button>
      </div>
    </div>
    <form @submit.prevent="loadAudit()">
      <div class="grid-3">
        <div class="form-group">
          <label class="form-label">Tipo Acción</label>
          <select x-model="filters.action_type" class="form-select">
            <option value="">Todas</option>
            <option value="email">Email</option>
            <option value="database">Base de Datos</option>
            <option value="http">HTTP</option>
            <option value="file">Archivo</option>
            <option value="notification">Notificación</option>
            <option value="schedule">Agendado</option>
            <option value="webhook">Webhook</option>
            <option value="transform">Transformación</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Veredicto</label>
          <select x-model="filters.verdict" class="form-select">
            <option value="">Todos</option>
            <option value="ALLOW">Permitido</option>
            <option value="CONFIRM">Confirmado</option>
            <option value="DENY">Denegado</option>
            <option value="RATE_LIMITED">Rate Limited</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Fecha Desde</label>
          <input type="date" x-model="filters.date_from" class="form-input">
        </div>
      </div>
      <div class="grid-3 mt-8">
        <div class="form-group">
          <label class="form-label">Usuario ID</label>
          <input type="number" x-model="filters.user_id" class="form-input" placeholder="Cualquiera">
        </div>
        <div class="form-group">
          <label class="form-label">Categoría</label>
          <select x-model="filters.category" class="form-select">
            <option value="">Todas</option>
            <option value="destructive">Destructiva</option>
            <option value="financial">Financiera</option>
            <option value="communication">Comunicación</option>
            <option value="system">Sistema</option>
          </select>
        </div>
        <div class="form-group" style="align-self: end;">
          <button type="submit" class="btn btn-primary w-full">Buscar</button>
        </div>
      </div>
    </form>
  </div>

  <!-- ── Results ─────────────────────────────────── -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">Resultados (<span x-text="totalResults"></span>)</span>
      <span class="htmx-indicator"><div class="spinner"></div></span>
    </div>
    <div id="audit-results" class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Timestamp</th>
            <th>Acción</th>
            <th>Operación</th>
            <th>Executor</th>
            <th>Veredicto</th>
            <th>Risk</th>
            <th>Usuario</th>
          </tr>
        </thead>
        <tbody>
          <template x-for="entry in entries" :key="entry.entry_id">
            <tr>
              <td class="text-xs text-muted" x-text="formatDate(entry.timestamp)"></td>
              <td x-text="entry.action_type"></td>
              <td x-text="entry.operation"></td>
              <td x-text="entry.executor_class"></td>
              <td>
                <span class="badge-status" :class="verdictClass(entry.verdict)" x-text="entry.verdict"></span>
              </td>
              <td>
                <span class="text-sm" :class="entry.risk_score > 0.7 ? 'negative' : ''"
                      x-text="(entry.risk_score * 100).toFixed(0) + '%'"></span>
              </td>
              <td x-text="entry.user_id || '-'"></td>
            </tr>
          </template>
        </tbody>
      </table>
      <div class="flex-between mt-16" x-show="totalResults > pageSize">
        <span class="text-sm text-muted">
          Página <span x-text="page + 1"></span> de <span x-text="Math.ceil(totalResults / pageSize)"></span>
        </span>
        <div class="flex gap-8">
          <button class="btn btn-sm" @click="prevPage()" :disabled="page === 0">Anterior</button>
          <button class="btn btn-sm" @click="nextPage()" :disabled="page >= Math.ceil(totalResults / pageSize) - 1">Siguiente</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
function auditData() {
  return {
    entries: [], totalResults: 0, page: 0, pageSize: 50,
    filters: { action_type: '', verdict: '', date_from: '', user_id: '', category: '' },

    init() { this.loadAudit(); },

    async loadAudit() {
      const params = new URLSearchParams({ page: this.page, page_size: this.pageSize, ...this.filters });
      try {
        const r = await fetch('/htmx/audit/entries?' + params);
        if (r.ok) { const d = await r.json(); this.entries = d.entries || []; this.totalResults = d.total || 0; }
      } catch (e) { console.error('Audit load error', e); }
    },

    verdictClass(v) {
      return { ALLOW: 'badge-success', CONFIRM: 'badge-info', DENY: 'badge-danger', RATE_LIMITED: 'badge-warning' }[v] || 'badge-info';
    },

    formatDate(ts) {
      if (!ts) return '--';
      return new Date(ts * 1000).toLocaleString('es');
    },

    prevPage() { if (this.page > 0) { this.page--; this.loadAudit(); } },
    nextPage() { this.page++; this.loadAudit(); },

    async exportAudit(format) {
      const params = new URLSearchParams({ format, ...this.filters });
      window.location.href = '/htmx/audit/export?' + params;
    },
  };
}
</script>
{% endblock %}
