<!--
  Zenic-Agents Asistente — CRM Page (Phase 7.1)
  Client relationship management with contact tracking.
-->
{% extends "layouts/base.html" %}
{% block title %}CRM — Zenic-Agents{% endblock %}

{% block content %}
<div x-data="crmData()">
  <div class="metric-grid">
    <div class="metric-card"><span class="metric-label">Clientes</span><span class="metric-value" x-text="stats.total_clients">--</span></div>
    <div class="metric-card"><span class="metric-label">Activos</span><span class="metric-value" x-text="stats.active_clients">--</span></div>
    <div class="metric-card"><span class="metric-label">Facturas Totales</span><span class="metric-value" x-text="stats.total_invoices">--</span></div>
    <div class="metric-card"><span class="metric-label">Pendiente Cobro</span><span class="metric-value" x-text="'$' + stats.pending_amount">--</span></div>
  </div>

  <div class="card">
    <div class="card-header">
      <span class="card-title">Clientes</span>
      <div class="flex gap-8">
        <input type="text" x-model="search" @input="loadClients()" class="form-input" placeholder="Buscar..." style="width: 200px;">
        <button class="btn btn-sm btn-primary" @click="showAdd = !showAdd">+ Cliente</button>
      </div>
    </div>
    <div x-show="showAdd" x-transition class="mb-16" style="padding:16px;border:1px solid var(--color-border);border-radius:var(--radius);">
      <form @submit.prevent="addClient()">
        <div class="grid-3">
          <div class="form-group"><label class="form-label">Nombre</label><input type="text" x-model="newClient.name" class="form-input"></div>
          <div class="form-group"><label class="form-label">Email</label><input type="email" x-model="newClient.email" class="form-input"></div>
          <div class="form-group"><label class="form-label">Teléfono</label><input type="tel" x-model="newClient.phone" class="form-input"></div>
        </div>
        <div class="grid-2 mt-8">
          <div class="form-group"><label class="form-label">Empresa</label><input type="text" x-model="newClient.company" class="form-input"></div>
          <div class="form-group"><label class="form-label">Notas</label><input type="text" x-model="newClient.notes" class="form-input"></div>
        </div>
        <button type="submit" class="btn btn-primary mt-8">Guardar</button>
      </form>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Nombre</th><th>Email</th><th>Empresa</th><th>Facturas</th><th>Estado</th><th>Acciones</th></tr></thead>
        <tbody>
          <template x-for="c in clients" :key="c.id">
            <tr>
              <td x-text="c.name"></td>
              <td x-text="c.email"></td>
              <td x-text="c.company || '-'"></td>
              <td x-text="c.invoice_count ?? 0"></td>
              <td><span class="badge-status" :class="c.active ? 'badge-success' : 'badge-danger'" x-text="c.active ? 'Activo' : 'Inactivo'"></span></td>
              <td><button class="btn btn-sm" @click="viewClient(c.id)">Ver</button></td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>
  </div>
</div>
<script>
function crmData() {
  return {
    clients: [], stats: { total_clients: 0, active_clients: 0, total_invoices: 0, pending_amount: '0' },
    showAdd: false, search: '', newClient: { name: '', email: '', phone: '', company: '', notes: '' },
    init() { this.loadClients(); this.loadStats(); },
    async loadClients() { try { const r = await fetch('/htmx/crm/clients?search=' + encodeURIComponent(this.search)); if(r.ok) this.clients = await r.json(); } catch(e){} },
    async loadStats() { try { const r = await fetch('/htmx/crm/stats'); if(r.ok) this.stats = await r.json(); } catch(e){} },
    async addClient() { await fetch('/htmx/crm/add', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(this.newClient) }); this.showAdd=false; this.loadClients(); this.loadStats(); },
    viewClient(id) { window.location.href = '/app/crm/' + id; },
  };
}
</script>
{% endblock %}
