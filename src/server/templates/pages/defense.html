<!--
  Zenic-Agents Asistente — Defense Status Page (Phase 7.1)
  Defense in Depth status dashboard (admin only).
-->
{% extends "layouts/base.html" %}
{% block title %}Defensa — Zenic-Agents{% endblock %}

{% block content %}
<div x-data="defenseData()">
  <div class="card mb-16">
    <div class="card-header">
      <span class="card-title">Estado Defense in Depth</span>
      <span class="badge-status" :class="overallScore >= 80 ? 'badge-success' : overallScore >= 40 ? 'badge-warning' : 'badge-danger'"
            x-text="'Score: ' + overallScore + '/100'"></span>
    </div>
    <div class="metric-grid mt-8">
      <template x-for="layer in layers" :key="layer.id">
        <div class="metric-card" style="cursor:default;">
          <span class="metric-label" x-text="'Capa ' + layer.id + ': ' + layer.name"></span>
          <div class="flex-between mt-8">
            <span class="badge-status" :class="layer.active ? 'badge-success' : 'badge-danger'"
                  x-text="layer.active ? 'Activa' : 'Inactiva'"></span>
            <span class="text-xs text-muted" x-text="layer.detail"></span>
          </div>
        </div>
      </template>
    </div>
  </div>

  <div class="card mb-16">
    <div class="card-header"><span class="card-title">Recomendaciones</span></div>
    <ul style="list-style: none; padding: 0;">
      <template x-for="rec in recommendations" :key="rec">
        <li class="text-sm" style="padding: 8px 0; border-bottom: 1px solid var(--color-border);">
          ⚠ <span x-text="rec"></span>
        </li>
      </template>
    </ul>
  </div>

  <div class="card">
    <div class="card-header"><span class="card-title">Modo del Sistema</span></div>
    <div id="mode-status" hx-get="/htmx/defense/mode" hx-trigger="load, every 30s" hx-swap="innerHTML">
      <p class="text-muted text-sm">Cargando estado...</p>
    </div>
  </div>
</div>
<script>
function defenseData() {
  return {
    overallScore: 0, layers: [], recommendations: [],
    init() { this.loadStatus(); },
    async loadStatus() {
      try {
        const r = await fetch('/htmx/defense/status');
        if (r.ok) {
          const d = await r.json();
          this.overallScore = d.overall_score ?? 0;
          this.recommendations = d.recommendations || [];
          this.layers = [
            { id: 1, name: 'Anti-Tampering', active: d.layer1?.monitoring_active ?? false, detail: d.layer1?.detection_count + ' detecciones' },
            { id: 2, name: 'Binary Hardening', active: d.layer2?.level !== 'none', detail: 'Nivel: ' + (d.layer2?.level || 'none') },
            { id: 3, name: 'Encryption', active: d.layer3?.level !== 'none', detail: d.layer3?.level || 'none' },
            { id: 4, name: 'Integrity', active: (d.layer4?.baselines_count ?? 0) > 0, detail: (d.layer4?.baselines_count ?? 0) + ' baselines' },
            { id: 5, name: 'Licensing', active: d.layer5?.license_valid ?? false, detail: d.layer5?.tier || 'none' },
            { id: 6, name: 'Server Secrets', active: d.layer6?.server_url !== 'not configured', detail: d.layer6?.within_grace_period ? 'Grace period' : (d.layer6?.server_url || 'N/A') },
          ];
        }
      } catch(e) { console.error('Defense status error', e); }
    },
  };
}
</script>
{% endblock %}
