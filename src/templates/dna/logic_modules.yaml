  - id: "whatsapp_send"
    domain: "messaging"
    description: "Envía un mensaje de texto o plantilla a través de la API de WhatsApp Business"
    code_block: |
      import httpx
      from typing import Optional, Dict, Any

      async def whatsapp_send(phone_number: str, message: str, api_token: str, phone_number_id: str, template: Optional[Dict[str, Any]] = None) -> Dict[str, Any]:
          """Send a WhatsApp message via the Business API."""
          url = f"https://graph.facebook.com/v18.0/{phone_number_id}/messages"
          headers = {"Authorization": f"Bearer {api_token}", "Content-Type": "application/json"}
          payload = {"messaging_product": "whatsapp", "to": phone_number}
          if template:
              payload["type"] = "template"
              payload["template"] = template
          else:
              payload["type"] = "text"
              payload["text"] = {"body": message}
          async with httpx.AsyncClient() as client:
              resp = await client.post(url, json=payload, headers=headers, timeout=30.0)
              resp.raise_for_status()
              return resp.json()
    dependencies: ["httpx"]
    verification_rule: "message_id_returned"
    inputs: ["phone_number:str", "message:str", "api_token:str", "phone_number_id:str", "template:Optional[Dict[str,Any]]"]
    outputs: ["response:Dict[str,Any]"]

  - id: "email_send"
    domain: "messaging"
    description: "Envía un correo electrónico con soporte para HTML, archivos adjuntos y destinatarios en copia"
    code_block: |
      import asyncio
      import aiosmtplib
      from email.mime.multipart import MIMEMultipart
      from email.mime.text import MIMEText
      from email.mime.base import MIMEBase
      from email import encoders
      from typing import List, Optional

      async def email_send(to: List[str], subject: str, body: str, smtp_host: str, smtp_port: int, smtp_user: str, smtp_pass: str, html: bool = False, cc: Optional[List[str]] = None, attachments: Optional[List[bytes]] = None) -> str:
          """Send an email via SMTP with optional HTML and attachments."""
          msg = MIMEMultipart()
          msg["From"] = smtp_user
          msg["To"] = ", ".join(to)
          msg["Subject"] = subject
          if cc:
              msg["Cc"] = ", ".join(cc)
          msg.attach(MIMEText(body, "html" if html else "plain"))
          if attachments:
              for i, data in enumerate(attachments):
                  part = MIMEBase("application", "octet-stream")
                  part.set_payload(data)
                  encoders.encode_base64(part)
                  part.add_header("Content-Disposition", f"attachment; filename=attach_{i}")
                  msg.attach(part)
          result = await aiosmtplib.send(msg, hostname=smtp_host, port=smtp_port, username=smtp_user, password=smtp_pass, use_tls=True)
          return result[1] if isinstance(result, tuple) else str(result)
    dependencies: ["aiosmtplib"]
    verification_rule: "smtp_accepted"
    inputs: ["to:List[str]", "subject:str", "body:str", "smtp_host:str", "smtp_port:int", "smtp_user:str", "smtp_pass:str", "html:bool", "cc:Optional[List[str]]", "attachments:Optional[List[bytes]]"]
    outputs: ["status:str"]

  - id: "telegram_notify"
    domain: "messaging"
    description: "Envía una notificación a un chat de Telegram mediante un bot con soporte de parse_mode"
    code_block: |
      import httpx
      from typing import Optional, Dict, Any

      async def telegram_notify(bot_token: str, chat_id: str, message: str, parse_mode: Optional[str] = "HTML") -> Dict[str, Any]:
          """Send a notification message to a Telegram chat via bot."""
          url = f"https://api.telegram.org/bot{bot_token}/sendMessage"
          payload = {"chat_id": chat_id, "text": message}
          if parse_mode:
              payload["parse_mode"] = parse_mode
          async with httpx.AsyncClient() as client:
              resp = await client.post(url, json=payload, timeout=30.0)
              resp.raise_for_status()
              return resp.json()
    dependencies: ["httpx"]
    verification_rule: "ok_field_true"
    inputs: ["bot_token:str", "chat_id:str", "message:str", "parse_mode:Optional[str]"]
    outputs: ["response:Dict[str,Any]"]

  - id: "sms_send"
    domain: "messaging"
    description: "Envía un SMS a través de un proveedor como Twilio con validación de número de teléfono"
    code_block: |
      import httpx
      from typing import Dict, Any

      async def sms_send(to: str, body: str, account_sid: str, auth_token: str, from_number: str) -> Dict[str, Any]:
          """Send an SMS via Twilio REST API."""
          url = f"https://api.twilio.com/2010-04-01/Accounts/{account_sid}/Messages.json"
