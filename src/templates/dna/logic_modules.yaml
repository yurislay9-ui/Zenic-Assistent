  - id: "metrics_calculate"
    domain: "analytics"
    description: "Calcula métricas agregadas (suma, promedio, min, max, conteo) sobre una lista de valores numéricos"
    code_block: |
      from typing import List, Dict, Any, Optional
      import statistics

      def metrics_calculate(values: List[float], metric_names: Optional[List[str]] = None) -> Dict[str, Any]:
          """Calculate aggregate metrics over a list of numeric values."""
          if not values:
              return {"count": 0}
          all_metrics = {"count": len(values), "sum": sum(values), "mean": statistics.mean(values), "median": statistics.median(values), "min": min(values), "max": max(values), "stdev": statistics.stdev(values) if len(values) > 1 else 0.0}
          if metric_names:
              return {k: v for k, v in all_metrics.items() if k in metric_names}
          return all_metrics
    dependencies: []
    verification_rule: "mean_within_range"
    inputs: ["values:List[float]", "metric_names:Optional[List[str]]"]
    outputs: ["metrics:Dict[str,Any]"]

  - id: "report_generate"
    domain: "analytics"
    description: "Genera un informe estructurado con secciones, datos tabulares y resumen ejecutivo"
    code_block: |
      from datetime import datetime, timezone
      from typing import Dict, Any, List
      import uuid

      def report_generate(title: str, sections: List[Dict[str, Any]], summary: str, metadata: Optional[Dict[str, str]] = None) -> Dict[str, Any]:
          """Generate a structured report with sections and executive summary."""
