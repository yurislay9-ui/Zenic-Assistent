    description: "Valida un contrato verificando cláusulas obligatorias, firmas y fechas de vigencia"
    code_block: |
      from datetime import datetime
      from typing import Dict, Any, List

      def contract_validate(contract: Dict[str, Any], required_clauses: List[str] = None, required_signatures: List[str] = None) -> Dict[str, Any]:
          """Validate a contract checking mandatory clauses, signatures, and effective dates."""
          if required_clauses is None:
              required_clauses = ["parties", "consideration", "term", "governing_law"]
          if required_signatures is None:
              required_signatures = ["party_a", "party_b"]
          issues = []
          present_clauses = contract.get("clauses", {})
          missing_clauses = [c for c in required_clauses if c not in present_clauses]
          if missing_clauses:
              issues.append({"type": "missing_clause", "details": missing_clauses})
          signatures = contract.get("signatures", {})
          missing_sigs = [s for s in required_signatures if s not in signatures or not signatures[s]]
          if missing_sigs:
              issues.append({"type": "missing_signature", "details": missing_sigs})
          effective = contract.get("effective_date")
          if effective:
              eff_date = effective if isinstance(effective, datetime) else datetime.fromisoformat(effective)
              if eff_date > datetime.now(eff_date.tzinfo):
                  issues.append({"type": "not_yet_effective", "date": str(effective)})
          return {"valid": len(issues) == 0, "issues": issues}
    dependencies: []
    verification_rule: "missing_clause_flagged"
    inputs: ["contract:Dict[str,Any]", "required_clauses:List[str]", "required_signatures:List[str]"]
    outputs: ["result:Dict[str,Any]"]

