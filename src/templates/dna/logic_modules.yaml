  - id: "grade_calculate"
    domain: "education"
    description: "Calcula la calificación final de un estudiante ponderando componentes evaluativos con redondeo configurable"
    code_block: |
      from typing import Dict, Any, List

      def grade_calculate(grades: Dict[str, float], weight_scheme: Dict[str, float], scale: str = "100", round_to: int = 1) -> Dict[str, Any]:
          """Calculate a weighted final grade from component grades and a weight scheme."""
          total_weight = sum(weight_scheme.values())
          if abs(total_weight - 1.0) > 0.01:
              return {"success": False, "error": "weights_do_not_sum_to_1", "total_weight": total_weight}
          weighted_sum = 0.0
          breakdown = []
          for component, grade in grades.items():
              weight = weight_scheme.get(component, 0.0)
              contribution = grade * weight
              weighted_sum += contribution
              breakdown.append({"component": component, "grade": grade, "weight": weight, "contribution": round(contribution, round_to)})
          final_grade = round(weighted_sum, round_to)
          letter = "A" if final_grade >= 90 else "B" if final_grade >= 80 else "C" if final_grade >= 70 else "D" if final_grade >= 60 else "F"
          return {"success": True, "final_grade": final_grade, "letter_grade": letter, "breakdown": breakdown}
    dependencies: []
    verification_rule: "weights_sum_to_one"
    inputs: ["grades:Dict[str,float]", "weight_scheme:Dict[str,float]", "scale:str", "round_to:int"]
    outputs: ["result:Dict[str,Any]"]

