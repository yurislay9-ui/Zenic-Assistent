  # ===========================================================================
  # 1. SECURITY (5 modules)
  # ===========================================================================
  - id: "jwt_create"
    domain: "security"
    description: "Genera un token JWT firmado con claims personalizados y tiempo de expiración configurable"
    code_block: |
      import jwt
      from datetime import datetime, timedelta, timezone
      from typing import Any, Dict

      def jwt_create(payload: Dict[str, Any], secret: str, algorithm: str = "HS256", expires_minutes: int = 60) -> str:
          """Create a signed JWT token with expiration."""
          payload_copy = payload.copy()
          payload_copy["exp"] = datetime.now(timezone.utc) + timedelta(minutes=expires_minutes)
          payload_copy["iat"] = datetime.now(timezone.utc)
          token = jwt.encode(payload_copy, secret, algorithm=algorithm)
          return token
    dependencies: ["PyJWT"]
    verification_rule: "token_decodable"
    inputs: ["payload:Dict[str,Any]", "secret:str", "algorithm:str", "expires_minutes:int"]
    outputs: ["token:str"]

  - id: "jwt_verify"
    domain: "security"
    description: "Verifica y decodifica un token JWT, validando firma y expiración"
    code_block: |
      import jwt
      from typing import Any, Dict, Optional

      def jwt_verify(token: str, secret: str, algorithms: list = None, audience: Optional[str] = None) -> Dict[str, Any]:
          """Verify and decode a JWT token, raising on invalid/expired tokens."""
          if algorithms is None:
              algorithms = ["HS256"]
          decoded = jwt.decode(token, secret, algorithms=algorithms, audience=audience)
          return decoded
    dependencies: ["PyJWT"]
    verification_rule: "expired_token_raises"
    inputs: ["token:str", "secret:str", "algorithms:list", "audience:Optional[str]"]
    outputs: ["decoded:Dict[str,Any]"]

  - id: "password_hash"
    domain: "security"
    description: "Hashea una contraseña usando bcrypt con salt automático y verifica contra un hash existente"
    code_block: |
      import bcrypt

      def password_hash(password: str, rounds: int = 12) -> str:
          """Hash a password with bcrypt and auto-generated salt."""
          salt = bcrypt.gensalt(rounds=rounds)
          hashed = bcrypt.hashpw(password.encode("utf-8"), salt)
          return hashed.decode("utf-8")

      def password_verify(password: str, hashed: str) -> bool:
          """Verify a plaintext password against a bcrypt hash."""
          return bcrypt.checkpw(password.encode("utf-8"), hashed.encode("utf-8"))
    dependencies: ["bcrypt"]
    verification_rule: "hash_roundtrip"
    inputs: ["password:str", "rounds:int"]
    outputs: ["hashed:str"]

  - id: "api_key_validate"
    domain: "security"
    description: "Valida una clave API contra un almacén de claves, verificando prefijo, longitud, revocación y expiración"
    code_block: |
      import hashlib
      from datetime import datetime, timezone
      from typing import Dict, Optional

      def api_key_validate(api_key: str, key_store: Dict[str, Dict], prefix: str = "zk_") -> Dict[str, any]:
          """Validate an API key against a key store with prefix, revocation, and expiry checks."""
          if not api_key.startswith(prefix):
              return {"valid": False, "reason": "invalid_prefix"}
          key_hash = hashlib.sha256(api_key.encode()).hexdigest()
          record = key_store.get(key_hash)
          if record is None:
              return {"valid": False, "reason": "not_found"}
          if record.get("revoked", False):
              return {"valid": False, "reason": "revoked"}
          if record.get("expires_at") and datetime.now(timezone.utc) > record["expires_at"]:
              return {"valid": False, "reason": "expired"}
          return {"valid": True, "scopes": record.get("scopes", [])}
    dependencies: []
    verification_rule: "invalid_key_rejected"
    inputs: ["api_key:str", "key_store:Dict[str,Dict]", "prefix:str"]
    outputs: ["result:Dict[str,any]"]

  - id: "rbac_check"
    domain: "security"
    description: "Verifica si un usuario con roles dados tiene permiso para realizar una acción sobre un recurso según reglas RBAC"
    code_block: |
      from typing import Dict, List, Set

      def rbac_check(user_roles: List[str], action: str, resource: str, rbac_policy: Dict[str, Dict[str, Set[str]]]) -> bool:
          """Check if any of the user's roles permit the action on the resource."""
          for role in user_roles:
              role_permissions = rbac_policy.get(role, {})
              allowed_actions = role_permissions.get(resource, set())
              if action in allowed_actions or "*" in allowed_actions:
                  return True
          return False
    dependencies: []
    verification_rule: "unauthorized_denied"
    inputs: ["user_roles:List[str]", "action:str", "resource:str", "rbac_policy:Dict[str,Dict[str,Set[str]]]"]
    outputs: ["authorized:bool"]

