  - id: "prescription_validate"
    domain: "healthcare"
    description: "Valida una prescripción verificando dosis, interacciones medicamentosas y restricciones del paciente"
    code_block: |
      from typing import Dict, Any, List

      def prescription_validate(prescription: Dict[str, Any], patient: Dict[str, Any], drug_database: Dict[str, Dict[str, Any]]) -> Dict[str, Any]:
          """Validate a prescription checking dosage, interactions, and patient restrictions."""
          warnings = []
          errors = []
          for med in prescription.get("medications", []):
              drug_info = drug_database.get(med["drug_name"])
              if not drug_info:
                  errors.append(f"unknown_drug:{med['drug_name']}")
                  continue
              if med["dosage"] > drug_info.get("max_dosage", float("inf")):
                  errors.append(f"overdose:{med['drug_name']}")
              for allergy in patient.get("allergies", []):
                  if allergy.lower() in drug_info.get("allergen_tags", []):
                      errors.append(f"allergy_conflict:{med['drug_name']}")
              for existing_med in patient.get("current_medications", []):
                  if existing_med in drug_info.get("interactions", []):
