    code_block: |
      from typing import Dict, Any, List

      def appointment_triage(symptoms: List[str], vitals: Dict[str, float], triage_rules: Dict[str, Any] = None) -> Dict[str, Any]:
          """Triage a medical appointment based on symptoms and vitals to determine urgency."""
          if triage_rules is None:
              triage_rules = {"critical_symptoms": ["chest_pain", "difficulty_breathing", "unconscious"], "critical_vitals": {"heart_rate_max": 130, "heart_rate_min": 40, "systolic_max": 180, "temperature_max": 39.5}}
          urgency = "routine"
          reasons = []
          for symptom in symptoms:
              if symptom in triage_rules.get("critical_symptoms", []):
                  urgency = "emergency"
                  reasons.append(f"critical_symptom:{symptom}")
          hr = vitals.get("heart_rate", 70)
          if hr > triage_rules["critical_vitals"]["heart_rate_max"] or hr < triage_rules["critical_vitals"]["heart_rate_min"]:
              urgency = "urgent" if urgency != "emergency" else urgency
              reasons.append(f"abnormal_heart_rate:{hr}")
          if vitals.get("temperature", 37.0) > triage_rules["critical_vitals"]["temperature_max"]:
              urgency = "urgent" if urgency != "emergency" else urgency
              reasons.append(f"high_fever:{vitals['temperature']}")
          return {"urgency": urgency, "reasons": reasons, "symptoms": symptoms, "vitals": vitals}
    dependencies: []
    verification_rule: "critical_symptom_emergency"
    inputs: ["symptoms:List[str]", "vitals:Dict[str,float]", "triage_rules:Dict[str,Any]"]
