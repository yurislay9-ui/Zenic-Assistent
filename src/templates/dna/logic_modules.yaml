      from typing import Dict, Any, Optional, List

      def crud_create(collection: Dict[str, Dict[str, Any]], data: Dict[str, Any], required_fields: Optional[List[str]] = None, schema: Optional[Dict[str, type]] = None) -> Dict[str, Any]:
          """Create a record in a collection with validation, timestamps, and generated ID."""
          if required_fields:
              missing = [f for f in required_fields if f not in data]
              if missing:
                  return {"success": False, "error": f"missing_fields:{missing}"}
          if schema:
              for field, expected_type in schema.items():
                  if field in data and not isinstance(data[field], expected_type):
                      return {"success": False, "error": f"type_mismatch:{field}"}
          record_id = str(uuid.uuid4())
          record = {"id": record_id, **data, "created_at": datetime.now(timezone.utc).isoformat(), "updated_at": datetime.now(timezone.utc).isoformat()}
          collection[record_id] = record
          return {"success": True, "record": record}
    dependencies: []
