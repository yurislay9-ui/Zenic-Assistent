  - id: "stripe_charge"
    domain: "payments"
    description: "Crea un cargo en Stripe usando un payment method o token con manejo de errores de tarjeta"
    code_block: |
      import stripe
      from typing import Dict, Any, Optional

      def stripe_charge(amount: int, currency: str, payment_method_id: str, customer_id: Optional[str] = None, metadata: Optional[Dict[str, str]] = None, stripe_api_key: str = "") -> Dict[str, Any]:
          """Create a Stripe payment intent and confirm it."""
          stripe.api_key = stripe_api_key
          params: Dict[str, Any] = {"amount": amount, "currency": currency, "payment_method": payment_method_id, "confirm": True, "automatic_payment_methods": {"enabled": True}}
          if customer_id:
              params["customer"] = customer_id
          if metadata:
              params["metadata"] = metadata
          intent = stripe.PaymentIntent.create(**params)
          return {"id": intent.id, "status": intent.status, "amount": intent.amount}
    dependencies: ["stripe"]
    verification_rule: "payment_succeeded"
    inputs: ["amount:int", "currency:str", "payment_method_id:str", "customer_id:Optional[str]", "metadata:Optional[Dict[str,str]]", "stripe_api_key:str"]
    outputs: ["result:Dict[str,Any]"]

  - id: "paypal_process"
    domain: "payments"
    description: "Procesa un pago a través de la API REST de PayPal con autenticación OAuth2"
    code_block: |
      import httpx
      from typing import Dict, Any

      async def paypal_process(order_id: str, client_id: str, client_secret: str, sandbox: bool = True) -> Dict[str, Any]:
          """Capture an approved PayPal order via REST API."""
          base_url = "https://api-m.sandbox.paypal.com" if sandbox else "https://api-m.paypal.com"
          async with httpx.AsyncClient() as client:
              token_resp = await client.post(f"{base_url}/v1/oauth2/token", data={"grant_type": "client_credentials"}, auth=(client_id, client_secret), timeout=30.0)
              token_resp.raise_for_status()
              access_token = token_resp.json()["access_token"]
              headers = {"Authorization": f"Bearer {access_token}", "Content-Type": "application/json"}
              capture_resp = await client.post(f"{base_url}/v2/checkout/orders/{order_id}/capture", headers=headers, timeout=30.0)
              capture_resp.raise_for_status()
              return capture_resp.json()
    dependencies: ["httpx"]
    verification_rule: "order_completed"
    inputs: ["order_id:str", "client_id:str", "client_secret:str", "sandbox:bool"]
    outputs: ["response:Dict[str,Any]"]

  - id: "refund_process"
    domain: "payments"
    description: "Procesa un reembolso total o parcial contra una transacción existente con razón opcional"
    code_block: |
      import stripe
      from typing import Dict, Any, Optional

      def refund_process(payment_intent_id: str, amount: Optional[int] = None, reason: Optional[str] = None, stripe_api_key: str = "") -> Dict[str, Any]:
          """Issue a full or partial refund against a Stripe PaymentIntent."""
          stripe.api_key = stripe_api_key
          params: Dict[str, Any] = {"payment_intent": payment_intent_id}
          if amount is not None:
              params["amount"] = amount
          if reason:
              params["reason"] = reason
          refund = stripe.Refund.create(**params)
          return {"id": refund.id, "status": refund.status, "amount": refund.amount}
    dependencies: ["stripe"]
    verification_rule: "refund_status_succeeded"
    inputs: ["payment_intent_id:str", "amount:Optional[int]", "reason:Optional[str]", "stripe_api_key:str"]
    outputs: ["result:Dict[str,Any]"]

  - id: "invoice_generate"
    domain: "payments"
    description: "Genera una factura en PDF con líneas de detalle, impuestos y totales calculados"
    code_block: |
      from datetime import datetime, timezone
      from typing import List, Dict, Any
      import uuid

      def invoice_generate(seller: Dict[str, str], buyer: Dict[str, str], line_items: List[Dict[str, Any]], tax_rate: float = 0.0, currency: str = "USD") -> Dict[str, Any]:
          """Generate an invoice data structure with computed totals."""
          subtotal = sum(item["quantity"] * item["unit_price"] for item in line_items)
          tax_amount = round(subtotal * tax_rate, 2)
          total = round(subtotal + tax_amount, 2)
          invoice = {"invoice_id": f"INV-{uuid.uuid4().hex[:8].upper()}", "created_at": datetime.now(timezone.utc).isoformat(), "seller": seller, "buyer": buyer, "line_items": line_items, "subtotal": subtotal, "tax_rate": tax_rate, "tax_amount": tax_amount, "total": total, "currency": currency, "status": "pending"}
          return invoice
    dependencies: []
    verification_rule: "totals_consistent"
    inputs: ["seller:Dict[str,str]", "buyer:Dict[str,str]", "line_items:List[Dict[str,Any]]", "tax_rate:float", "currency:str"]
    outputs: ["invoice:Dict[str,Any]"]

