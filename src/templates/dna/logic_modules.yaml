      from typing import Dict, Any, List

      def vital_alert(patient_id: str, vitals: Dict[str, float], thresholds: Dict[str, Dict[str, float]]) -> List[Dict[str, Any]]:
          """Generate alerts when patient vitals exceed defined critical thresholds."""
          alerts = []
          for vital_name, value in vitals.items():
              rules = thresholds.get(vital_name)
              if not rules:
                  continue
              if "min" in rules and value < rules["min"]:
                  alerts.append({"patient_id": patient_id, "vital": vital_name, "value": value, "direction": "low", "threshold": rules["min"], "severity": "critical" if value < rules.get("critical_min", rules["min"]) else "warning"})
              if "max" in rules and value > rules["max"]:
                  alerts.append({"patient_id": patient_id, "vital": vital_name, "value": value, "direction": "high", "threshold": rules["max"], "severity": "critical" if value > rules.get("critical_max", rules["max"]) else "warning"})
          return alerts
    dependencies: []
