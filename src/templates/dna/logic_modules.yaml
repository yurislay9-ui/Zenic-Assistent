  - id: "dashboard_aggregate"
    domain: "analytics"
    description: "Agrega múltiples fuentes de datos en un formato unificado para visualización en dashboard"
    code_block: |
      from typing import Dict, Any, List

      def dashboard_aggregate(data_sources: Dict[str, List[Dict[str, Any]]], key_field: str, value_fields: List[str]) -> Dict[str, Any]:
          """Aggregate multiple data sources into a unified dashboard format keyed by key_field."""
          unified = {}
          for source_name, records in data_sources.items():
              for record in records:
                  key = record.get(key_field)
                  if key not in unified:
                      unified[key] = {key_field: key}
                  for vf in value_fields:
                      col_name = f"{source_name}_{vf}"
                      unified[key][col_name] = record.get(vf)
          return {"key_field": key_field, "records": list(unified.values()), "source_count": len(data_sources)}
    dependencies: []
    verification_rule: "all_sources_merged"
    inputs: ["data_sources:Dict[str,List[Dict[str,Any]]]", "key_field:str", "value_fields:List[str]"]
    outputs: ["dashboard:Dict[str,Any]"]

