    code_block: |
      from datetime import datetime, timedelta, timezone
      from typing import Dict, Any, List

      def deadline_track(deadlines: List[Dict[str, Any]], warning_days: int = 7, reference_date: datetime = None) -> Dict[str, Any]:
          """Track legal deadlines, compute remaining days, and flag upcoming ones."""
          if reference_date is None:
              reference_date = datetime.now(timezone.utc)
          tracked = []
          upcoming = []
          overdue = []
          for dl in deadlines:
              due = dl["due_date"] if isinstance(dl["due_date"], datetime) else datetime.fromisoformat(dl["due_date"])
              remaining = (due - reference_date).days
              entry = {**dl, "remaining_days": remaining, "status": "overdue" if remaining < 0 else "upcoming" if remaining <= warning_days else "on_track"}
              tracked.append(entry)
              if remaining < 0:
                  overdue.append(entry)
              elif remaining <= warning_days:
                  upcoming.append(entry)
          return {"total": len(tracked), "overdue_count": len(overdue), "upcoming_count": len(upcoming), "tracked": tracked}
    dependencies: []
    verification_rule: "overdue_detected"
    inputs: ["deadlines:List[Dict[str,Any]]", "warning_days:int", "reference_date:datetime"]
    outputs: ["result:Dict[str,Any]"]

