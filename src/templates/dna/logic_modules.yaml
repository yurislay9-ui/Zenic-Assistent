  - id: "stock_check"
    domain: "inventory"
    description: "Verifica el nivel de stock de un producto en uno o múltiples almacenes"
    code_block: |
      from typing import Dict, Any, List

      def stock_check(product_id: str, warehouse_inventory: Dict[str, Dict[str, Any]], warehouses: List[str] = None) -> Dict[str, Any]:
          """Check stock levels for a product across specified warehouses."""
          if warehouses is None:
              warehouses = list(warehouse_inventory.keys())
          total_quantity = 0
          details = {}
          for wh in warehouses:
              products = warehouse_inventory.get(wh, {})
              qty = products.get(product_id, {}).get("quantity", 0)
              details[wh] = qty
              total_quantity += qty
          return {"product_id": product_id, "total_quantity": total_quantity, "by_warehouse": details, "in_stock": total_quantity > 0}
    dependencies: []
    verification_rule: "quantity_non_negative"
    inputs: ["product_id:str", "warehouse_inventory:Dict[str,Dict[str,Any]]", "warehouses:List[str]"]
    outputs: ["result:Dict[str,Any]"]

  - id: "reorder_alert"
    domain: "inventory"
    description: "Genera alertas de reorden cuando el stock cae por debajo del umbral mínimo definido"
    code_block: |
      from typing import Dict, Any, List

      def reorder_alert(inventory: Dict[str, Dict[str, Any]], default_threshold: int = 10) -> List[Dict[str, Any]]:
          """Generate reorder alerts for items below their minimum threshold."""
          alerts = []
          for product_id, data in inventory.items():
              quantity = data.get("quantity", 0)
              threshold = data.get("reorder_threshold", default_threshold)
              if quantity <= threshold:
                  alerts.append({"product_id": product_id, "current_quantity": quantity, "reorder_threshold": threshold, "deficit": threshold - quantity, "priority": "critical" if quantity == 0 else "warning"})
          return alerts
    dependencies: []
    verification_rule: "all_below_threshold_alerted"
    inputs: ["inventory:Dict[str,Dict[str,Any]]", "default_threshold:int"]
    outputs: ["alerts:List[Dict[str,Any]]"]

  - id: "warehouse_update"
    domain: "inventory"
    description: "Actualiza el inventario de un almacén aplicando transacciones de entrada y salida de stock"
    code_block: |
      from typing import Dict, Any, List
      from datetime import datetime, timezone

      def warehouse_update(warehouse_inventory: Dict[str, int], transactions: List[Dict[str, Any]]) -> Dict[str, Any]:
          """Apply stock transactions (in/out) to warehouse inventory and return updated state."""
          updated = warehouse_inventory.copy()
          applied = []
          for txn in transactions:
              product_id = txn["product_id"]
              delta = txn["quantity"]
              new_qty = updated.get(product_id, 0) + delta
              if new_qty < 0:
                  applied.append({"product_id": product_id, "status": "rejected", "reason": "insufficient_stock"})
                  continue
              updated[product_id] = new_qty
              applied.append({"product_id": product_id, "status": "applied", "new_quantity": new_qty})
          return {"updated_inventory": updated, "transactions_applied": applied, "timestamp": datetime.now(timezone.utc).isoformat()}
    dependencies: []
    verification_rule: "no_negative_stock"
    inputs: ["warehouse_inventory:Dict[str,int]", "transactions:List[Dict[str,Any]]"]
    outputs: ["result:Dict[str,Any]"]

