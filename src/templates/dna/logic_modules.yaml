    code_block: |
      import uuid
      from datetime import datetime, timezone
      from typing import Dict, Any, List

      def inspection_schedule(property_id: str, inspector_id: str, requested_time: str, inspector_availability: Dict[str, List[str]], property_availability: Dict[str, List[str]], duration_minutes: int = 60) -> Dict[str, Any]:
          """Schedule a property inspection checking inspector and property availability."""
          date_str = requested_time[:10]
          inspector_busy = inspector_availability.get(inspector_id, [])
          if requested_time in inspector_busy:
              return {"success": False, "reason": "inspector_unavailable"}
          property_busy = property_availability.get(property_id, [])
          if requested_time in property_busy:
              return {"success": False, "reason": "property_unavailable"}
          inspection_id = f"INS-{uuid.uuid4().hex[:8].upper()}"
          return {"success": True, "inspection_id": inspection_id, "property_id": property_id, "inspector_id": inspector_id, "scheduled_time": requested_time, "duration_minutes": duration_minutes, "status": "scheduled", "created_at": datetime.now(timezone.utc).isoformat()}
