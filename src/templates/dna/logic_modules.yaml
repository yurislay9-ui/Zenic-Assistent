    code_block: |
      from typing import Dict, Any

      def interest_calculate(principal: float, annual_rate: float, periods: int, compounding: str = "monthly") -> Dict[str, Any]:
          """Calculate simple or compound interest over a number of periods."""
          freq_map = {"annually": 1, "semi_annually": 2, "quarterly": 4, "monthly": 12, "daily": 365}
          n = freq_map.get(compounding, 12)
          rate_per_period = annual_rate / n
          total_periods = periods * n
          compound_amount = principal * (1 + rate_per_period) ** total_periods
          compound_interest = compound_amount - principal
          simple_interest = principal * annual_rate * periods
          return {"principal": principal, "annual_rate": annual_rate, "periods": periods, "compounding": compounding, "compound_interest": round(compound_interest, 2), "compound_amount": round(compound_amount, 2), "simple_interest": round(simple_interest, 2)}
    dependencies: []
