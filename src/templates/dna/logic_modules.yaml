  - id: "route_optimize"
    domain: "logistics"
    description: "Optimiza la ruta de entrega usando el algoritmo del vecino más cercano para múltiples paradas"
    code_block: |
      import math
      from typing import List, Dict, Any

      def route_optimize(locations: List[Dict[str, float]], start_index: int = 0) -> Dict[str, Any]:
          """Optimize delivery route using nearest-neighbor heuristic for multiple stops."""
          if len(locations) <= 1:
              return {"route": locations, "total_distance": 0.0, "stops": len(locations)}
          unvisited = set(range(len(locations)))
          route_indices = [start_index]
          unvisited.discard(start_index)
          total_distance = 0.0
          current = start_index
          while unvisited:
              nearest = min(unvisited, key=lambda i: math.hypot(locations[i]["lat"] - locations[current]["lat"], locations[i]["lng"] - locations[current]["lng"]))
              dist = math.hypot(locations[nearest]["lat"] - locations[current]["lat"], locations[nearest]["lng"] - locations[current]["lng"])
              total_distance += dist
              route_indices.append(nearest)
              unvisited.discard(nearest)
              current = nearest
          return {"route_indices": route_indices, "route": [locations[i] for i in route_indices], "total_distance": round(total_distance, 2), "stops": len(route_indices)}
    dependencies: []
    verification_rule: "all_locations_visited"
    inputs: ["locations:List[Dict[str,float]]", "start_index:int"]
    outputs: ["result:Dict[str,Any]"]

