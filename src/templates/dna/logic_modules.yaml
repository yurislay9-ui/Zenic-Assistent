    domain: "hospitality"
    description: "Procesa el check-in de un huésped asignando habitación, verificando reserva y generando llave"
    code_block: |
      import uuid
      from datetime import datetime, timezone
      from typing import Dict, Any, Optional

      def guest_checkin(reservation_id: str, guest_data: Dict[str, Any], reservation_db: Dict[str, Dict[str, Any]], assigned_room: Optional[str] = None) -> Dict[str, Any]:
          """Process guest check-in: verify reservation, assign room, and generate key code."""
          reservation = reservation_db.get(reservation_id)
          if not reservation:
              return {"success": False, "reason": "reservation_not_found"}
          if reservation.get("status") != "confirmed":
              return {"success": False, "reason": f"invalid_status:{reservation.get('status')}"}
          room = assigned_room or reservation.get("room_number", f"RM-{uuid.uuid4().hex[:4]}")
          key_code = uuid.uuid4().hex[:8].upper()
          checkin = {"success": True, "reservation_id": reservation_id, "guest_name": guest_data.get("name", ""), "room": room, "key_code": key_code, "checked_in_at": datetime.now(timezone.utc).isoformat(), "status": "checked_in"}
          return checkin
    dependencies: []
    verification_rule: "invalid_reservation_rejected"
    inputs: ["reservation_id:str", "guest_data:Dict[str,Any]", "reservation_db:Dict[str,Dict[str,Any]]", "assigned_room:Optional[str]"]
    outputs: ["checkin:Dict[str,Any]"]

