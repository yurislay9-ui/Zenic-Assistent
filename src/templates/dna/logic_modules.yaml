  - id: "property_list"
    domain: "realestate"
    description: "Lista propiedades inmobiliarias con filtros por precio, ubicación, tipo y características"
    code_block: |
      from typing import Dict, Any, List, Optional

      def property_list(properties: List[Dict[str, Any]], filters: Optional[Dict[str, Any]] = None, sort_by: str = "price", sort_order: str = "asc", limit: int = 20) -> Dict[str, Any]:
          """List properties with filtering by price, location, type, and features."""
          if filters is None:
              filters = {}
          results = properties[:]
          if "min_price" in filters:
              results = [p for p in results if p.get("price", 0) >= filters["min_price"]]
          if "max_price" in filters:
              results = [p for p in results if p.get("price", 0) <= filters["max_price"]]
          if "property_type" in filters:
              results = [p for p in results if p.get("type") == filters["property_type"]]
          if "location" in filters:
              results = [p for p in results if filters["location"].lower() in p.get("location", "").lower()]
          if "min_bedrooms" in filters:
              results = [p for p in results if p.get("bedrooms", 0) >= filters["min_bedrooms"]]
          reverse = sort_order == "desc"
          results.sort(key=lambda p: p.get(sort_by, 0), reverse=reverse)
          return {"total": len(results), "returned": len(results[:limit]), "properties": results[:limit]}
    dependencies: []
    verification_rule: "filters_applied"
    inputs: ["properties:List[Dict[str,Any]]", "filters:Optional[Dict[str,Any]]", "sort_by:str", "sort_order:str", "limit:int"]
    outputs: ["result:Dict[str,Any]"]

  - id: "mortgage_calculate"
    domain: "realestate"
    description: "Calcula la cuota mensual de una hipoteca con tasa fija, impuestos y seguro incluidos"
    code_block: |
      from typing import Dict, Any

      def mortgage_calculate(principal: float, annual_rate: float, term_years: int, annual_tax: float = 0.0, annual_insurance: float = 0.0) -> Dict[str, Any]:
          """Calculate monthly mortgage payment including principal, interest, tax, and insurance."""
          monthly_rate = annual_rate / 12
          n_payments = term_years * 12
          if monthly_rate == 0:
              pi_payment = principal / n_payments
          else:
              pi_payment = principal * (monthly_rate * (1 + monthly_rate) ** n_payments) / ((1 + monthly_rate) ** n_payments - 1)
          monthly_tax = annual_tax / 12
          monthly_insurance = annual_insurance / 12
          total_payment = pi_payment + monthly_tax + monthly_insurance
          return {"principal_interest": round(pi_payment, 2), "monthly_tax": round(monthly_tax, 2), "monthly_insurance": round(monthly_insurance, 2), "total_monthly": round(total_payment, 2), "total_paid_over_term": round(total_payment * n_payments, 2), "total_interest": round(pi_payment * n_payments - principal, 2)}
    dependencies: []
    verification_rule: "total_gt_principal_interest"
    inputs: ["principal:float", "annual_rate:float", "term_years:int", "annual_tax:float", "annual_insurance:float"]
    outputs: ["result:Dict[str,Any]"]

  - id: "inspection_schedule"
