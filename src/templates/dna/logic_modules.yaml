  - id: "migration_run"
    domain: "data"
    description: "Ejecuta una migración de datos aplicando transformaciones secuenciales con tracking de versión"
    code_block: |
      from typing import Dict, Any, List, Callable

      def migration_run(data: Dict[str, Any], migrations: List[Dict[str, Any]], current_version: int = 0) -> Dict[str, Any]:
          """Run sequential data migrations from current_version to latest."""
          result = data.copy()
          applied = []
          for migration in sorted(migrations, key=lambda m: m["version"]):
              if migration["version"] > current_version:
                  transform: Callable = migration["transform"]
                  result = transform(result)
                  applied.append({"version": migration["version"], "name": migration.get("name", "")})
          return {"data": result, "migrations_applied": applied, "new_version": max((m["version"] for m in applied), default=current_version)}
    dependencies: []
    verification_rule: "idempotent_re_run"
    inputs: ["data:Dict[str,Any]", "migrations:List[Dict[str,Any]]", "current_version:int"]
    outputs: ["result:Dict[str,Any]"]

  - id: "backup_execute"
    domain: "data"
    description: "Ejecuta un respaldo de datos serializándolos y almacenándolos con compresión y metadata de versión"
    code_block: |
      import json
      import gzip
      import uuid
      from datetime import datetime, timezone
      from typing import Dict, Any

      def backup_execute(data: Dict[str, Any], backup_store: Dict[str, bytes], compress: bool = True) -> Dict[str, Any]:
          """Serialize, optionally compress, and store a data backup with metadata."""
          backup_id = f"bkp-{uuid.uuid4().hex[:8]}"
          serialized = json.dumps(data, default=str).encode("utf-8")
          if compress:
              stored = gzip.compress(serialized)
          else:
              stored = serialized
          backup_store[backup_id] = stored
          metadata = {"backup_id": backup_id, "created_at": datetime.now(timezone.utc).isoformat(), "original_size": len(serialized), "stored_size": len(stored), "compressed": compress, "record_count": len(data)}
          return {"success": True, "metadata": metadata}
    dependencies: []
    verification_rule: "restorable_from_backup"
    inputs: ["data:Dict[str,Any]", "backup_store:Dict[str,bytes]", "compress:bool"]
    outputs: ["result:Dict[str,Any]"]

