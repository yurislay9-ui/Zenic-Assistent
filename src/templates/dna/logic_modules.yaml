          order_id = f"ORD-{uuid.uuid4().hex[:10].upper()}"
          order = {"order_id": order_id, "items": cart["items"], "totals": cart.get("totals", {}), "payment": {"method": payment_method["type"], "last4": payment_method.get("last4", "")}, "shipping_address": shipping_address, "status": "confirmed", "created_at": datetime.now(timezone.utc).isoformat()}
          return {"success": True, "order": order}
    dependencies: []
