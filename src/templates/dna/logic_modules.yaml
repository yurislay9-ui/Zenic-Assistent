  - id: "appointment_create"
    domain: "scheduling"
    description: "Crea una cita verificando disponibilidad del recurso y duración en minutos"
    code_block: |
      from datetime import datetime, timezone, timedelta
      from typing import Dict, Any, Optional

      def appointment_create(resource_id: str, user_id: str, start_time: datetime, duration_minutes: int, existing_bookings: list, metadata: Optional[Dict[str, Any]] = None) -> Dict[str, Any]:
          """Create an appointment after checking basic availability."""
          end_time = start_time + timedelta(minutes=duration_minutes)
          for booking in existing_bookings:
              b_start = booking["start_time"]
              b_end = booking["end_time"]
              if booking["resource_id"] == resource_id and start_time < b_end and end_time > b_start:
                  return {"success": False, "reason": "time_conflict", "conflict_with": booking.get("id")}
          import uuid
          appointment = {"id": f"apt-{uuid.uuid4().hex[:8]}", "resource_id": resource_id, "user_id": user_id, "start_time": start_time.isoformat(), "end_time": end_time.isoformat(), "duration_minutes": duration_minutes, "status": "confirmed", "metadata": metadata or {}}
          return {"success": True, "appointment": appointment}
    dependencies: []
    verification_rule: "conflict_rejected"
    inputs: ["resource_id:str", "user_id:str", "start_time:datetime", "duration_minutes:int", "existing_bookings:list", "metadata:Optional[Dict[str,Any]]"]
    outputs: ["result:Dict[str,Any]"]

  - id: "calendar_collision_check"
    domain: "scheduling"
    description: "Detecta colisiones entre un rango de tiempo propuesto y eventos existentes en un calendario"
    code_block: |
      from datetime import datetime
      from typing import List, Dict, Any

      def calendar_collision_check(proposed_start: datetime, proposed_end: datetime, events: List[Dict[str, Any]]) -> List[Dict[str, Any]]:
          """Return all events that collide with the proposed time range."""
          collisions = []
          for event in events:
              ev_start = event["start_time"] if isinstance(event["start_time"], datetime) else datetime.fromisoformat(event["start_time"])
              ev_end = event["end_time"] if isinstance(event["end_time"], datetime) else datetime.fromisoformat(event["end_time"])
              if proposed_start < ev_end and proposed_end > ev_start:
                  collisions.append(event)
          return collisions
    dependencies: []
    verification_rule: "no_false_positives"
    inputs: ["proposed_start:datetime", "proposed_end:datetime", "events:List[Dict[str,Any]]"]
    outputs: ["collisions:List[Dict[str,Any]]"]

  - id: "reminder_schedule"
    domain: "scheduling"
    description: "Programa recordatorios antes de una cita usando offsets de tiempo personalizables"
    code_block: |
      from datetime import datetime, timedelta
      from typing import List, Dict, Any

      def reminder_schedule(appointment_time: datetime, offsets_minutes: List[int], channel: str = "email", user_id: str = "") -> List[Dict[str, Any]]:
          """Generate reminder scheduled times from an appointment and offset list."""
          reminders = []
          for offset in offsets_minutes:
              reminder_time = appointment_time - timedelta(minutes=offset)
              reminders.append({"user_id": user_id, "appointment_time": appointment_time.isoformat(), "reminder_time": reminder_time.isoformat(), "offset_minutes": offset, "channel": channel, "status": "scheduled"})
          return reminders
    dependencies: []
    verification_rule: "reminders_before_appointment"
    inputs: ["appointment_time:datetime", "offsets_minutes:List[int]", "channel:str", "user_id:str"]
    outputs: ["reminders:List[Dict[str,Any]]"]

  - id: "cancellation_policy"
    domain: "scheduling"
    description: "Evalúa la política de cancelación y calcula penalización según antelación de la cancelación"
    code_block: |
      from datetime import datetime, timedelta
      from typing import Dict, Any, Optional

      def cancellation_policy(appointment_time: datetime, cancellation_time: datetime, policy_rules: Optional[Dict[str, Any]] = None) -> Dict[str, Any]:
          """Evaluate cancellation policy and compute penalty based on lead time."""
          if policy_rules is None:
              policy_rules = {"free_cutoff_hours": 24, "penalty_rate": 0.5, "no_show_rate": 1.0}
          hours_before = (appointment_time - cancellation_time).total_seconds() / 3600
          if hours_before >= policy_rules["free_cutoff_hours"]:
              return {"allowed": True, "penalty": 0.0, "reason": "within_free_window"}
          elif hours_before > 0:
              return {"allowed": True, "penalty": policy_rules["penalty_rate"], "reason": "late_cancellation"}
          else:
              return {"allowed": False, "penalty": policy_rules["no_show_rate"], "reason": "no_show"}
    dependencies: []
    verification_rule: "penalty_within_bounds"
    inputs: ["appointment_time:datetime", "cancellation_time:datetime", "policy_rules:Optional[Dict[str,Any]]"]
    outputs: ["result:Dict[str,Any]"]

  # ===========================================================================
  # 5. INVENTORY (3 modules)
