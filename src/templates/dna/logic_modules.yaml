    description: "Ejecuta el flujo OAuth2 Authorization Code intercambiando el código por tokens de acceso"
    code_block: |
      import httpx
      from typing import Dict, Any

      async def oauth2_flow(authorization_code: str, client_id: str, client_secret: str, redirect_uri: str, token_url: str) -> Dict[str, Any]:
          """Exchange an OAuth2 authorization code for access and refresh tokens."""
          payload = {"grant_type": "authorization_code", "code": authorization_code, "client_id": client_id, "client_secret": client_secret, "redirect_uri": redirect_uri}
          async with httpx.AsyncClient() as client:
              resp = await client.post(token_url, data=payload, timeout=30.0)
              resp.raise_for_status()
              token_data = resp.json()
              return {"access_token": token_data.get("access_token"), "refresh_token": token_data.get("refresh_token"), "token_type": token_data.get("token_type", "Bearer"), "expires_in": token_data.get("expires_in")}
    dependencies: ["httpx"]
    verification_rule: "access_token_returned"
    inputs: ["authorization_code:str", "client_id:str", "client_secret:str", "redirect_uri:str", "token_url:str"]
    outputs: ["tokens:Dict[str,Any]"]

  - id: "session_manage"
    domain: "auth"
    description: "Gestiona sesiones de usuario: crear, validar, refrescar y destruir con metadata configurable"
    code_block: |
      import uuid
      from datetime import datetime, timedelta, timezone
      from typing import Dict, Any, Optional

      def session_manage(action: str, session_store: Dict[str, Dict[str, Any]], user_id: str = "", session_id: str = "", ttl_minutes: int = 120, metadata: Optional[Dict[str, Any]] = None) -> Dict[str, Any]:
          """Create, validate, refresh, or destroy a user session."""
          if action == "create":
              sid = str(uuid.uuid4())
              session_store[sid] = {"user_id": user_id, "created_at": datetime.now(timezone.utc).isoformat(), "expires_at": (datetime.now(timezone.utc) + timedelta(minutes=ttl_minutes)).isoformat(), "metadata": metadata or {}}
              return {"action": "created", "session_id": sid}
          elif action == "validate":
              session = session_store.get(session_id)
              if not session:
                  return {"action": "validate", "valid": False, "reason": "not_found"}
              if datetime.now(timezone.utc) > datetime.fromisoformat(session["expires_at"]):
                  del session_store[session_id]
                  return {"action": "validate", "valid": False, "reason": "expired"}
              return {"action": "validate", "valid": True, "user_id": session["user_id"]}
          elif action == "destroy":
              session_store.pop(session_id, None)
              return {"action": "destroyed", "session_id": session_id}
          return {"action": action, "error": "unknown_action"}
    dependencies: []
    verification_rule: "expired_session_invalid"
    inputs: ["action:str", "session_store:Dict[str,Dict[str,Any]]", "user_id:str", "session_id:str", "ttl_minutes:int", "metadata:Optional[Dict[str,Any]]"]
    outputs: ["result:Dict[str,Any]"]

