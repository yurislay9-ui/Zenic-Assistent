  - id: "donation_process"
    domain: "nonprofit"
    description: "Procesa una donación registrándola, generando recibo y actualizando métricas de campaña"
    code_block: |
      import uuid
      from datetime import datetime, timezone
      from typing import Dict, Any, Optional

      def donation_process(donor_id: str, amount: float, campaign_id: str, payment_method: str, campaign_store: Dict[str, Dict[str, Any]], is_recurring: bool = False) -> Dict[str, Any]:
          """Process a donation: register it, generate receipt, and update campaign metrics."""
          donation_id = f"DON-{uuid.uuid4().hex[:8].upper()}"
          receipt_number = f"RCPT-{uuid.uuid4().hex[:10].upper()}"
          campaign = campaign_store.get(campaign_id, {})
          current_total = campaign.get("raised", 0.0)
          goal = campaign.get("goal", 0.0)
          campaign_store[campaign_id] = {**campaign, "raised": current_total + amount}
          new_total = current_total + amount
          return {"success": True, "donation_id": donation_id, "donor_id": donor_id, "amount": amount, "campaign_id": campaign_id, "payment_method": payment_method, "is_recurring": is_recurring, "receipt_number": receipt_number, "campaign_progress": round(new_total / goal * 100, 1) if goal > 0 else 0, "donated_at": datetime.now(timezone.utc).isoformat()}
    dependencies: []
    verification_rule: "campaign_total_updated"
    inputs: ["donor_id:str", "amount:float", "campaign_id:str", "payment_method:str", "campaign_store:Dict[str,Dict[str,Any]]", "is_recurring:bool"]
    outputs: ["result:Dict[str,Any]"]

  - id: "volunteer_assign"
    domain: "nonprofit"
    description: "Asigna voluntarios a tareas basándose en habilidades, disponibilidad y necesidad de la tarea"
    code_block: |
      from typing import Dict, Any, List

      def volunteer_assign(volunteers: List[Dict[str, Any]], tasks: List[Dict[str, Any]], max_tasks_per_volunteer: int = 3) -> Dict[str, Any]:
          """Assign volunteers to tasks based on skills matching, availability, and capacity."""
          assignments = []
          volunteer_load = {v["id"]: 0 for v in volunteers}
          for task in sorted(tasks, key=lambda t: t.get("priority", 5)):
              required_skills = set(task.get("required_skills", []))
              best_volunteer = None
              best_match = 0
              for vol in volunteers:
                  if volunteer_load[vol["id"]] >= max_tasks_per_volunteer:
                      continue
                  if task.get("time_slot") and task["time_slot"] not in vol.get("availability", []):
                      continue
                  vol_skills = set(vol.get("skills", []))
                  match_count = len(required_skills & vol_skills)
                  if match_count > best_match:
                      best_match = match_count
                      best_volunteer = vol
              if best_volunteer:
                  assignments.append({"task_id": task["id"], "task_name": task.get("name", ""), "volunteer_id": best_volunteer["id"], "volunteer_name": best_volunteer.get("name", ""), "skill_match": best_match})
                  volunteer_load[best_volunteer["id"]] += 1
          unassigned = [t["id"] for t in tasks if t["id"] not in [a["task_id"] for a in assignments]]
          return {"assigned_count": len(assignments), "unassigned_count": len(unassigned), "assignments": assignments, "unassigned_tasks": unassigned}
    dependencies: []
    verification_rule: "skills_matched"
    inputs: ["volunteers:List[Dict[str,Any]]", "tasks:List[Dict[str,Any]]", "max_tasks_per_volunteer:int"]
    outputs: ["result:Dict[str,Any]"]

  - id: "grant_track"
    domain: "nonprofit"
    description: "Rastrea subvenciones y becas monitoreando plazos, requisitos de informe y estado de desembolso"
    code_block: |
      from datetime import datetime, timezone
      from typing import Dict, Any, List

      def grant_track(grants: List[Dict[str, Any]], reference_date: datetime = None) -> Dict[str, Any]:
          """Track grants monitoring deadlines, reporting requirements, and disbursement status."""
          if reference_date is None:
              reference_date = datetime.now(timezone.utc)
          tracked = []
          total_awarded = 0.0
          total_disbursed = 0.0
          for grant in grants:
              awarded = grant.get("amount_awarded", 0)
              disbursed = grant.get("amount_disbursed", 0)
              total_awarded += awarded
              total_disbursed += disbursed
              deadline = grant.get("report_deadline")
              deadline_status = "on_track"
              if deadline:
                  dl = deadline if isinstance(deadline, datetime) else datetime.fromisoformat(deadline)
                  days_left = (dl - reference_date).days
                  deadline_status = "overdue" if days_left < 0 else "due_soon" if days_left <= 14 else "on_track"
              tracked.append({"grant_id": grant["id"], "funder": grant.get("funder", ""), "awarded": awarded, "disbursed": disbursed, "remaining": awarded - disbursed, "report_deadline_status": deadline_status, "status": grant.get("status", "active")})
          return {"total_grants": len(grants), "total_awarded": total_awarded, "total_disbursed": total_disbursed, "disbursement_rate": round(total_disbursed / total_awarded * 100, 1) if total_awarded > 0 else 0, "grants": tracked}
    dependencies: []
    verification_rule: "overdue_deadline_flagged"
    inputs: ["grants:List[Dict[str,Any]]", "reference_date:datetime"]
    outputs: ["result:Dict[str,Any]"]
