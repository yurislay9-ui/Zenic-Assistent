    code_block: |
      import uuid
      from datetime import datetime, timezone
      from typing import Dict, Any, Optional

      def reservation_manage(action: str, guest_id: str, room_type: str, check_in: str, check_out: str, existing_reservations: Dict[str, Dict[str, Any]], room_inventory: Dict[str, int], modification: Optional[Dict[str, Any]] = None) -> Dict[str, Any]:
          """Create, modify, or cancel a hotel reservation with availability validation."""
          if action == "create":
              available = room_inventory.get(room_type, 0)
              occupied = sum(1 for r in existing_reservations.values() if r["room_type"] == room_type and r["status"] == "confirmed" and not (check_out <= r["check_in"] or check_in >= r["check_out"]))
              if occupied >= available:
                  return {"success": False, "reason": "no_availability"}
              res_id = f"RES-{uuid.uuid4().hex[:8].upper()}"
              return {"success": True, "reservation_id": res_id, "guest_id": guest_id, "room_type": room_type, "check_in": check_in, "check_out": check_out, "status": "confirmed"}
          elif action == "cancel":
              res_id = modification.get("reservation_id", "") if modification else ""
              if res_id in existing_reservations:
                  return {"success": True, "reservation_id": res_id, "status": "cancelled"}
              return {"success": False, "reason": "not_found"}
          return {"success": False, "reason": "unknown_action"}
    dependencies: []
    verification_rule: "no_double_booking"
    inputs: ["action:str", "guest_id:str", "room_type:str", "check_in:str", "check_out:str", "existing_reservations:Dict[str,Dict[str,Any]]", "room_inventory:Dict[str,int]", "modification:Optional[Dict[str,Any]]"]
