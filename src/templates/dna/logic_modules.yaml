  - id: "shipping_estimate"
    domain: "ecommerce"
    description: "Estima costos y tiempos de envío basándose en peso, dimensiones, origen y destino"
    code_block: |
      from typing import Dict, Any, List

      def shipping_estimate(weight_kg: float, dimensions_cm: Dict[str, float], origin: str, destination: str, carriers: List[Dict[str, Any]] = None) -> List[Dict[str, Any]]:
          """Estimate shipping costs and delivery times from available carriers."""
          if carriers is None:
              carriers = [{"name": "standard", "rate_per_kg": 5.0, "base_days": 7}, {"name": "express", "rate_per_kg": 12.0, "base_days": 3}]
          volume = dimensions_cm.get("length", 1) * dimensions_cm.get("width", 1) * dimensions_cm.get("height", 1)
          volumetric_weight = volume / 5000
          billable_weight = max(weight_kg, volumetric_weight)
          estimates = []
          for carrier in carriers:
              cost = round(billable_weight * carrier["rate_per_kg"], 2)
              estimates.append({"carrier": carrier["name"], "estimated_cost": cost, "estimated_days": carrier["base_days"], "billable_weight_kg": round(billable_weight, 2)})
          return estimates
    dependencies: []
    verification_rule: "volumetric_weight_applied"
    inputs: ["weight_kg:float", "dimensions_cm:Dict[str,float]", "origin:str", "destination:str", "carriers:List[Dict[str,Any]]"]
    outputs: ["estimates:List[Dict[str,Any]]"]

  - id: "tax_calculate"
    domain: "ecommerce"
    description: "Calcula impuestos aplicables basándose en jurisdicción, categoría de producto y reglas fiscales"
    code_block: |
      from typing import Dict, Any, List

      def tax_calculate(amount: float, jurisdiction: str, product_category: str, tax_rules: Dict[str, Dict[str, Any]], exemptions: List[str] = None) -> Dict[str, Any]:
          """Calculate applicable taxes based on jurisdiction, product category, and tax rules."""
          if exemptions and product_category in exemptions:
              return {"total_tax": 0.0, "effective_rate": 0.0, "breakdown": [], "exempt": True}
          rules = tax_rules.get(jurisdiction, {})
          rate = rules.get(product_category, rules.get("default", 0.0))
          tax_amount = round(amount * rate, 2)
          breakdown = [{"jurisdiction": jurisdiction, "category": product_category, "rate": rate, "amount": tax_amount}]
          return {"total_tax": tax_amount, "effective_rate": rate, "breakdown": breakdown, "exempt": False}
    dependencies: []
    verification_rule: "exempt_category_zero_tax"
    inputs: ["amount:float", "jurisdiction:str", "product_category:str", "tax_rules:Dict[str,Dict[str,Any]]", "exemptions:List[str]"]
    outputs: ["result:Dict[str,Any]"]

