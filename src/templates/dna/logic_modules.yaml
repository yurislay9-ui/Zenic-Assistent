  - id: "credit_score"
    domain: "finance"
    description: "Calcula un score crediticio basado en factores de pago, utilización, antigüedad y consultas"
    code_block: |
      from typing import Dict, Any

      def credit_score(factors: Dict[str, Any]) -> Dict[str, Any]:
          """Calculate a credit score from payment history, utilization, age, and inquiries."""
          payment_weight = 0.35
          utilization_weight = 0.30
          age_weight = 0.15
          inquiries_weight = 0.10
          mix_weight = 0.10
          payment_score = factors.get("on_time_payment_rate", 1.0) * 850
          utilization = factors.get("credit_utilization", 0.0)
          utilization_score = max(0, (1 - utilization) * 850)
          age_score = min(factors.get("credit_age_months", 0) / 240, 1.0) * 850
          inquiries = factors.get("recent_inquiries", 0)
          inquiries_score = max(0, 850 - inquiries * 30)
          mix_score = min(factors.get("credit_mix_types", 0) / 4, 1.0) * 850
          raw = (payment_score * payment_weight + utilization_score * utilization_weight + age_score * age_weight + inquiries_score * inquiries_weight + mix_score * mix_weight)
          score = max(300, min(850, int(raw)))
          rating = "excellent" if score >= 750 else "good" if score >= 700 else "fair" if score >= 650 else "poor"
          return {"score": score, "rating": rating, "factors": factors}
    dependencies: []
    verification_rule: "score_between_300_850"
    inputs: ["factors:Dict[str,Any]"]
    outputs: ["result:Dict[str,Any]"]

  - id: "amortization_schedule"
    domain: "finance"
    description: "Genera una tabla de amortización para un préstamo con pagos mensuales fijos"
    code_block: |
      from typing import List, Dict, Any

      def amortization_schedule(principal: float, annual_rate: float, term_months: int) -> Dict[str, Any]:
          """Generate an amortization schedule for a fixed-rate loan."""
          monthly_rate = annual_rate / 12
          if monthly_rate == 0:
              monthly_payment = principal / term_months
          else:
              monthly_payment = principal * (monthly_rate * (1 + monthly_rate) ** term_months) / ((1 + monthly_rate) ** term_months - 1)
          schedule = []
          balance = principal
          for month in range(1, term_months + 1):
              interest = round(balance * monthly_rate, 2)
              principal_paid = round(monthly_payment - interest, 2)
              balance = round(balance - principal_paid, 2)
              if balance < 0:
                  balance = 0
              schedule.append({"month": month, "payment": round(monthly_payment, 2), "principal": principal_paid, "interest": interest, "balance": balance})
          return {"monthly_payment": round(monthly_payment, 2), "total_paid": round(monthly_payment * term_months, 2), "total_interest": round(monthly_payment * term_months - principal, 2), "schedule": schedule}
    dependencies: []
    verification_rule: "final_balance_zero"
    inputs: ["principal:float", "annual_rate:float", "term_months:int"]
    outputs: ["result:Dict[str,Any]"]

  - id: "transaction_reconcile"
    domain: "finance"
    description: "Concilia transacciones internas con extractos bancarios identificando discrepancias"
    code_block: |
      from typing import List, Dict, Any
      from decimal import Decimal

      def transaction_reconcile(internal_transactions: List[Dict[str, Any]], bank_statements: List[Dict[str, Any]], tolerance: float = 0.01) -> Dict[str, Any]:
          """Reconcile internal transactions against bank statements within a tolerance."""
          matched = []
          unmatched_internal = []
          unmatched_bank = list(bank_statements)
          for txn in internal_transactions:
              found = False
              for i, bank_txn in enumerate(unmatched_bank):
                  if txn.get("reference") == bank_txn.get("reference") and abs(Decimal(str(txn["amount"])) - Decimal(str(bank_txn["amount"]))) <= Decimal(str(tolerance)):
                      matched.append({"internal": txn, "bank": bank_txn})
                      unmatched_bank.pop(i)
                      found = True
                      break
              if not found:
                  unmatched_internal.append(txn)
          return {"matched_count": len(matched), "unmatched_internal_count": len(unmatched_internal), "unmatched_bank_count": len(unmatched_bank), "unmatched_internal": unmatched_internal, "unmatched_bank": unmatched_bank}
    dependencies: []
    verification_rule: "all_matched_when_consistent"
    inputs: ["internal_transactions:List[Dict[str,Any]]", "bank_statements:List[Dict[str,Any]]", "tolerance:float"]
    outputs: ["reconciliation:Dict[str,Any]"]

