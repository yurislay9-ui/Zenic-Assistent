  - id: "lead_score"
    domain: "crm"
    description: "Calcula la puntuación de un lead basándose en atributos demográficos y comportamentales"
    code_block: |
      from typing import Dict, Any

      def lead_score(lead: Dict[str, Any], scoring_model: Dict[str, float]) -> Dict[str, Any]:
          """Score a lead based on weighted demographic and behavioral attributes."""
          total_score = 0.0
          breakdown = {}
          for attribute, weight in scoring_model.items():
              value = lead.get(attribute, 0)
              if isinstance(value, bool):
                  value = 1.0 if value else 0.0
              score_contribution = float(value) * weight
              breakdown[attribute] = score_contribution
              total_score += score_contribution
          grade = "A" if total_score >= 80 else "B" if total_score >= 60 else "C" if total_score >= 40 else "D"
          return {"lead_id": lead.get("id"), "score": round(total_score, 2), "grade": grade, "breakdown": breakdown}
    dependencies: []
    verification_rule: "score_within_bounds"
    inputs: ["lead:Dict[str,Any]", "scoring_model:Dict[str,float]"]
    outputs: ["result:Dict[str,Any]"]

  - id: "pipeline_advance"
    domain: "crm"
    description: "Avanza un deal en el pipeline de ventas validando criterios de transición entre etapas"
    code_block: |
      from typing import Dict, Any, List, Optional

      def pipeline_advance(deal: Dict[str, Any], target_stage: str, pipeline_stages: List[str], transition_rules: Optional[Dict[str, Dict[str, Any]]] = None) -> Dict[str, Any]:
          """Advance a deal to a target pipeline stage if transition rules are satisfied."""
          current_stage = deal.get("stage", pipeline_stages[0])
          if current_stage not in pipeline_stages or target_stage not in pipeline_stages:
              return {"success": False, "reason": "invalid_stage"}
          current_idx = pipeline_stages.index(current_stage)
          target_idx = pipeline_stages.index(target_stage)
          if target_idx <= current_idx:
              return {"success": False, "reason": "cannot_move_backward"}
          if transition_rules and target_stage in transition_rules:
              rules = transition_rules[target_stage]
              for field, required_value in rules.get("required_fields", {}).items():
                  if deal.get(field) != required_value:
                      return {"success": False, "reason": f"missing_requirement:{field}"}
          return {"success": True, "previous_stage": current_stage, "new_stage": target_stage, "stages_advanced": target_idx - current_idx}
    dependencies: []
    verification_rule: "backward_rejected"
    inputs: ["deal:Dict[str,Any]", "target_stage:str", "pipeline_stages:List[str]", "transition_rules:Optional[Dict[str,Dict[str,Any]]]"]
    outputs: ["result:Dict[str,Any]"]

  - id: "contact_merge"
    domain: "crm"
    description: "Fusiona dos contactos del CRM resolviendo conflictos con estrategia configurable (prefer_new, prefer_old, merge_all)"
    code_block: |
      from typing import Dict, Any

      def contact_merge(primary: Dict[str, Any], secondary: Dict[str, Any], strategy: str = "prefer_new") -> Dict[str, Any]:
          """Merge two CRM contacts using a conflict-resolution strategy."""
          merged = primary.copy()
          all_keys = set(list(primary.keys()) + list(secondary.keys()))
          for key in all_keys:
              p_val = primary.get(key)
              s_val = secondary.get(key)
              if p_val is None and s_val is not None:
                  merged[key] = s_val
              elif p_val is not None and s_val is not None and p_val != s_val:
                  if strategy == "prefer_new":
                      merged[key] = s_val
                  elif strategy == "prefer_old":
                      merged[key] = p_val
                  elif strategy == "merge_all":
                      merged[key] = [p_val, s_val] if not isinstance(p_val, list) else p_val + [s_val]
          merged["merged_from"] = secondary.get("id")
          merged["merge_strategy"] = strategy
          return merged
    dependencies: []
    verification_rule: "no_data_loss"
    inputs: ["primary:Dict[str,Any]", "secondary:Dict[str,Any]", "strategy:str"]
    outputs: ["merged:Dict[str,Any]"]
