# logic_modules — Communication Modules (Notifications, Ecommerce)

modules:
  # ===========================================================================
  # 10. NOTIFICATIONS (3 modules)
  # ===========================================================================
  - id: "push_send"
    domain: "notifications"
    description: "Envía una notificación push a un dispositivo mediante Firebase Cloud Messaging"
    code_block: |
      import httpx
      from typing import Dict, Any, Optional

      async def push_send(device_token: str, title: str, body: str, server_key: str, data: Optional[Dict[str, str]] = None) -> Dict[str, Any]:
          """Send a push notification via Firebase Cloud Messaging."""
          url = "https://fcm.googleapis.com/fcm/send"
          headers = {"Authorization": f"key={server_key}", "Content-Type": "application/json"}
          payload = {"to": device_token, "notification": {"title": title, "body": body}}
          if data:
              payload["data"] = data
          async with httpx.AsyncClient() as client:
              resp = await client.post(url, json=payload, headers=headers, timeout=30.0)
              resp.raise_for_status()
              return resp.json()
    dependencies: ["httpx"]
    verification_rule: "success_count_positive"
    inputs: ["device_token:str", "title:str", "body:str", "server_key:str", "data:Optional[Dict[str,str]]"]
    outputs: ["response:Dict[str,Any]"]

  - id: "in_app_notify"
    domain: "notifications"
    description: "Crea una notificación in-app para un usuario con prioridad, categoría y estado de lectura"
    code_block: |
      import uuid
      from datetime import datetime, timezone
      from typing import Dict, Any, Optional

      def in_app_notify(user_id: str, notification_type: str, message: str, priority: str = "normal", category: str = "general", action_url: Optional[str] = None) -> Dict[str, Any]:
          """Create an in-app notification for a user with priority and read status."""
          notification = {"id": str(uuid.uuid4()), "user_id": user_id, "type": notification_type, "message": message, "priority": priority, "category": category, "action_url": action_url, "read": False, "created_at": datetime.now(timezone.utc).isoformat()}
          return notification
    dependencies: []
    verification_rule: "unread_by_default"
    inputs: ["user_id:str", "notification_type:str", "message:str", "priority:str", "category:str", "action_url:Optional[str]"]
    outputs: ["notification:Dict[str,Any]"]

  - id: "digest_compile"
    domain: "notifications"
    description: "Compila un resumen periódico de notificaciones agrupándolas por categoría y prioridad"
    code_block: |
      from typing import List, Dict, Any
      from collections import defaultdict

      def digest_compile(notifications: List[Dict[str, Any]], group_by: str = "category") -> Dict[str, Any]:
          """Compile a digest of notifications grouped by a specified field."""
          groups = defaultdict(list)
          unread_count = 0
          for notif in notifications:
              key = notif.get(group_by, "ungrouped")
              groups[key].append(notif)
              if not notif.get("read", False):
                  unread_count += 1
          digest = {}
          for group_key, items in groups.items():
              digest[group_key] = {"count": len(items), "unread": sum(1 for i in items if not i.get("read", False)), "items": items}
          return {"total": len(notifications), "unread_total": unread_count, "groups": dict(digest)}
    dependencies: []
    verification_rule: "counts_consistent"
    inputs: ["notifications:List[Dict[str,Any]]", "group_by:str"]
    outputs: ["digest:Dict[str,Any]"]

  # ===========================================================================
  # 11. ECOMMERCE (4 modules)
  # ===========================================================================
  - id: "cart_calculate"
    domain: "ecommerce"
    description: "Calcula los totales del carrito incluyendo subtotal, impuestos, descuentos y total final"
    code_block: |
      from typing import List, Dict, Any, Optional

      def cart_calculate(items: List[Dict[str, Any]], tax_rate: float = 0.0, discount_code: Optional[Dict[str, Any]] = None, shipping_cost: float = 0.0) -> Dict[str, Any]:
          """Calculate cart totals including subtotal, tax, discounts, and final total."""
          subtotal = sum(item["price"] * item["quantity"] for item in items)
          discount_amount = 0.0
          if discount_code:
              if discount_code.get("type") == "percentage":
                  discount_amount = subtotal * (discount_code["value"] / 100)
              elif discount_code.get("type") == "fixed":
                  discount_amount = min(discount_code["value"], subtotal)
          taxable = subtotal - discount_amount
          tax_amount = round(taxable * tax_rate, 2)
          total = round(taxable + tax_amount + shipping_cost, 2)
          return {"subtotal": round(subtotal, 2), "discount": round(discount_amount, 2), "tax": tax_amount, "shipping": shipping_cost, "total": total, "item_count": sum(i["quantity"] for i in items)}
    dependencies: []
    verification_rule: "total_equals_components"
    inputs: ["items:List[Dict[str,Any]]", "tax_rate:float", "discount_code:Optional[Dict[str,Any]]", "shipping_cost:float"]
    outputs: ["totals:Dict[str,Any]"]

  - id: "checkout_process"
    domain: "ecommerce"
    description: "Procesa el checkout validando inventario, aplicando pagos y creando la orden"
    code_block: |
      import uuid
      from datetime import datetime, timezone
      from typing import Dict, Any, List, Optional

      def checkout_process(cart: Dict[str, Any], payment_method: Dict[str, Any], shipping_address: Dict[str, str], inventory_check: Optional[Dict[str, int]] = None) -> Dict[str, Any]:
          """Process checkout: validate inventory, create order, and confirm payment."""
          if inventory_check:
              for item in cart.get("items", []):
                  available = inventory_check.get(item["product_id"], 0)
                  if available < item["quantity"]:
                      return {"success": False, "reason": "insufficient_inventory", "product_id": item["product_id"]}
          order_id = f"ORD-{uuid.uuid4().hex[:10].upper()}"
          order = {"order_id": order_id, "items": cart["items"], "totals": cart.get("totals", {}), "payment": {"method": payment_method["type"], "last4": payment_method.get("last4", "")}, "shipping_address": shipping_address, "status": "confirmed", "created_at": datetime.now(timezone.utc).isoformat()}
          return {"success": True, "order": order}
    dependencies: []
    verification_rule: "order_id_generated"
    inputs: ["cart:Dict[str,Any]", "payment_method:Dict[str,Any]", "shipping_address:Dict[str,str]", "inventory_check:Optional[Dict[str,int]]"]
    outputs: ["result:Dict[str,Any]"]

  - id: "shipping_estimate"
    domain: "ecommerce"
    description: "Estima costos y tiempos de envío basándose en peso, dimensiones, origen y destino"
    code_block: |
      from typing import Dict, Any, List

      def shipping_estimate(weight_kg: float, dimensions_cm: Dict[str, float], origin: str, destination: str, carriers: List[Dict[str, Any]] = None) -> List[Dict[str, Any]]:
          """Estimate shipping costs and delivery times from available carriers."""
          if carriers is None:
              carriers = [{"name": "standard", "rate_per_kg": 5.0, "base_days": 7}, {"name": "express", "rate_per_kg": 12.0, "base_days": 3}]
          volume = dimensions_cm.get("length", 1) * dimensions_cm.get("width", 1) * dimensions_cm.get("height", 1)
          volumetric_weight = volume / 5000
          billable_weight = max(weight_kg, volumetric_weight)
          estimates = []
          for carrier in carriers:
              cost = round(billable_weight * carrier["rate_per_kg"], 2)
              estimates.append({"carrier": carrier["name"], "estimated_cost": cost, "estimated_days": carrier["base_days"], "billable_weight_kg": round(billable_weight, 2)})
          return estimates
    dependencies: []
    verification_rule: "volumetric_weight_applied"
    inputs: ["weight_kg:float", "dimensions_cm:Dict[str,float]", "origin:str", "destination:str", "carriers:List[Dict[str,Any]]"]
    outputs: ["estimates:List[Dict[str,Any]]"]

  - id: "tax_calculate"
    domain: "ecommerce"
    description: "Calcula impuestos aplicables basándose en jurisdicción, categoría de producto y reglas fiscales"
    code_block: |
      from typing import Dict, Any, List

      def tax_calculate(amount: float, jurisdiction: str, product_category: str, tax_rules: Dict[str, Dict[str, Any]], exemptions: List[str] = None) -> Dict[str, Any]:
          """Calculate applicable taxes based on jurisdiction, product category, and tax rules."""
          if exemptions and product_category in exemptions:
              return {"total_tax": 0.0, "effective_rate": 0.0, "breakdown": [], "exempt": True}
          rules = tax_rules.get(jurisdiction, {})
          rate = rules.get(product_category, rules.get("default", 0.0))
          tax_amount = round(amount * rate, 2)
          breakdown = [{"jurisdiction": jurisdiction, "category": product_category, "rate": rate, "amount": tax_amount}]
          return {"total_tax": tax_amount, "effective_rate": rate, "breakdown": breakdown, "exempt": False}
    dependencies: []
    verification_rule: "exempt_category_zero_tax"
    inputs: ["amount:float", "jurisdiction:str", "product_category:str", "tax_rules:Dict[str,Dict[str,Any]]", "exemptions:List[str]"]
    outputs: ["result:Dict[str,Any]"]
