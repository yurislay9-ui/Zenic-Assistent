  - id: "contract_validate"
    domain: "legal"
    description: "Valida un contrato verificando cláusulas obligatorias, firmas y fechas de vigencia"
    code_block: |
      from datetime import datetime
      from typing import Dict, Any, List

      def contract_validate(contract: Dict[str, Any], required_clauses: List[str] = None, required_signatures: List[str] = None) -> Dict[str, Any]:
          """Validate a contract checking mandatory clauses, signatures, and effective dates."""
          if required_clauses is None:
              required_clauses = ["parties", "consideration", "term", "governing_law"]
          if required_signatures is None:
              required_signatures = ["party_a", "party_b"]
          issues = []
          present_clauses = contract.get("clauses", {})
          missing_clauses = [c for c in required_clauses if c not in present_clauses]
          if missing_clauses:
              issues.append({"type": "missing_clause", "details": missing_clauses})
          signatures = contract.get("signatures", {})
          missing_sigs = [s for s in required_signatures if s not in signatures or not signatures[s]]
          if missing_sigs:
              issues.append({"type": "missing_signature", "details": missing_sigs})
          effective = contract.get("effective_date")
          if effective:
              eff_date = effective if isinstance(effective, datetime) else datetime.fromisoformat(effective)
              if eff_date > datetime.now(eff_date.tzinfo):
                  issues.append({"type": "not_yet_effective", "date": str(effective)})
          return {"valid": len(issues) == 0, "issues": issues}
    dependencies: []
    verification_rule: "missing_clause_flagged"
    inputs: ["contract:Dict[str,Any]", "required_clauses:List[str]", "required_signatures:List[str]"]
    outputs: ["result:Dict[str,Any]"]

  - id: "deadline_track"
    domain: "legal"
    description: "Rastrea plazos legales calculando fechas límite y alertando sobre vencimientos próximos"
    code_block: |
      from datetime import datetime, timedelta, timezone
      from typing import Dict, Any, List

      def deadline_track(deadlines: List[Dict[str, Any]], warning_days: int = 7, reference_date: datetime = None) -> Dict[str, Any]:
          """Track legal deadlines, compute remaining days, and flag upcoming ones."""
          if reference_date is None:
              reference_date = datetime.now(timezone.utc)
          tracked = []
          upcoming = []
          overdue = []
          for dl in deadlines:
              due = dl["due_date"] if isinstance(dl["due_date"], datetime) else datetime.fromisoformat(dl["due_date"])
              remaining = (due - reference_date).days
              entry = {**dl, "remaining_days": remaining, "status": "overdue" if remaining < 0 else "upcoming" if remaining <= warning_days else "on_track"}
              tracked.append(entry)
              if remaining < 0:
                  overdue.append(entry)
              elif remaining <= warning_days:
                  upcoming.append(entry)
          return {"total": len(tracked), "overdue_count": len(overdue), "upcoming_count": len(upcoming), "tracked": tracked}
    dependencies: []
    verification_rule: "overdue_detected"
    inputs: ["deadlines:List[Dict[str,Any]]", "warning_days:int", "reference_date:datetime"]
    outputs: ["result:Dict[str,Any]"]

  - id: "compliance_check"
    domain: "legal"
    description: "Verifica el cumplimiento de regulaciones específicas contra un conjunto de datos de la organización"
    code_block: |
      from typing import Dict, Any, List

      def compliance_check(organization_data: Dict[str, Any], regulations: List[Dict[str, Any]]) -> Dict[str, Any]:
          """Check organizational data against regulatory compliance requirements."""
          violations = []
          compliant_items = []
          for reg in regulations:
              reg_id = reg["id"]
              checks = reg.get("checks", [])
              reg_violations = []
              for check in checks:
                  field = check["field"]
                  condition = check["condition"]
                  value = organization_data.get(field)
                  if condition == "required" and not value:
                      reg_violations.append({"field": field, "issue": "missing_required"})
                  elif condition == "min_length" and value and len(str(value)) < check["value"]:
                      reg_violations.append({"field": field, "issue": f"below_min_length:{check['value']}"})
                  elif condition == "one_of" and value not in check["values"]:
                      reg_violations.append({"field": field, "issue": f"invalid_value"})
              if reg_violations:
                  violations.append({"regulation_id": reg_id, "issues": reg_violations})
              else:
                  compliant_items.append(reg_id)
          return {"compliant": len(violations) == 0, "violations": violations, "compliant_regulations": compliant_items}
    dependencies: []
    verification_rule: "missing_required_flagged"
    inputs: ["organization_data:Dict[str,Any]", "regulations:List[Dict[str,Any]]"]
    outputs: ["result:Dict[str,Any]"]

