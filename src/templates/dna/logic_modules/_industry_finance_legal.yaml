  - id: "route_optimize"
    domain: "logistics"
    description: "Optimiza la ruta de entrega usando el algoritmo del vecino más cercano para múltiples paradas"
    code_block: |
      import math
      from typing import List, Dict, Any

      def route_optimize(locations: List[Dict[str, float]], start_index: int = 0) -> Dict[str, Any]:
          """Optimize delivery route using nearest-neighbor heuristic for multiple stops."""
          if len(locations) <= 1:
              return {"route": locations, "total_distance": 0.0, "stops": len(locations)}
          unvisited = set(range(len(locations)))
          route_indices = [start_index]
          unvisited.discard(start_index)
          total_distance = 0.0
          current = start_index
          while unvisited:
              nearest = min(unvisited, key=lambda i: math.hypot(locations[i]["lat"] - locations[current]["lat"], locations[i]["lng"] - locations[current]["lng"]))
              dist = math.hypot(locations[nearest]["lat"] - locations[current]["lat"], locations[nearest]["lng"] - locations[current]["lng"])
              total_distance += dist
              route_indices.append(nearest)
              unvisited.discard(nearest)
              current = nearest
          return {"route_indices": route_indices, "route": [locations[i] for i in route_indices], "total_distance": round(total_distance, 2), "stops": len(route_indices)}
    dependencies: []
    verification_rule: "all_locations_visited"
    inputs: ["locations:List[Dict[str,float]]", "start_index:int"]
    outputs: ["result:Dict[str,Any]"]

  - id: "shipment_track"
    domain: "logistics"
    description: "Rastrea un envío devolviendo su estado actual, ubicación e historial de eventos"
    code_block: |
      from typing import Dict, Any, List, Optional

      def shipment_track(tracking_id: str, shipment_database: Dict[str, Dict[str, Any]]) -> Dict[str, Any]:
          """Track a shipment returning current status, location, and event history."""
          shipment = shipment_database.get(tracking_id)
          if not shipment:
              return {"found": False, "tracking_id": tracking_id}
          events = shipment.get("events", [])
          latest_event = events[-1] if events else None
          return {"found": True, "tracking_id": tracking_id, "status": shipment.get("status", "unknown"), "carrier": shipment.get("carrier", ""), "origin": shipment.get("origin"), "destination": shipment.get("destination"), "latest_event": latest_event, "event_count": len(events), "estimated_delivery": shipment.get("estimated_delivery")}
    dependencies: []
    verification_rule: "unknown_tracking_not_found"
    inputs: ["tracking_id:str", "shipment_database:Dict[str,Dict[str,Any]]"]
    outputs: ["tracking:Dict[str,Any]"]

  - id: "delivery_confirm"
    domain: "logistics"
    description: "Confirma la entrega de un envío registrando fecha, ubicación y firma o evidencia"
    code_block: |
      from datetime import datetime, timezone
      from typing import Dict, Any, Optional

      def delivery_confirm(tracking_id: str, delivered_by: str, delivery_location: Dict[str, float], signature: Optional[str] = None, photo_evidence: Optional[str] = None, notes: str = "") -> Dict[str, Any]:
          """Confirm delivery of a shipment with timestamp, location, and evidence."""
          confirmation = {"tracking_id": tracking_id, "status": "delivered", "delivered_at": datetime.now(timezone.utc).isoformat(), "delivered_by": delivered_by, "delivery_location": delivery_location, "signature": signature, "photo_evidence": photo_evidence, "notes": notes, "confirmed": True}
          return confirmation
    dependencies: []
    verification_rule: "status_is_delivered"
    inputs: ["tracking_id:str", "delivered_by:str", "delivery_location:Dict[str,float]", "signature:Optional[str]", "photo_evidence:Optional[str]", "notes:str"]
    outputs: ["confirmation:Dict[str,Any]"]

