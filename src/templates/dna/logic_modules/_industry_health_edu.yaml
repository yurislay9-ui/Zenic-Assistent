  # 13. EDUCATION (3 modules)
  # ===========================================================================
  - id: "enrollment_process"
    domain: "education"
    description: "Procesa la matrícula de un estudiante verificando prerequisitos, cupo y generando el registro"
    code_block: |
      import uuid
      from datetime import datetime, timezone
      from typing import Dict, Any, List

      def enrollment_process(student: Dict[str, Any], course: Dict[str, Any], completed_courses: List[str], enrollment_capacity: Dict[str, int]) -> Dict[str, Any]:
          """Process a student enrollment checking prerequisites and capacity."""
          prerequisites = course.get("prerequisites", [])
          unmet = [p for p in prerequisites if p not in completed_courses]
          if unmet:
              return {"success": False, "reason": "prerequisites_unmet", "missing": unmet}
          course_id = course["id"]
          current_enrolled = enrollment_capacity.get(f"{course_id}_enrolled", 0)
          max_capacity = enrollment_capacity.get(f"{course_id}_max", 0)
          if current_enrolled >= max_capacity:
              return {"success": False, "reason": "course_full"}
          enrollment_id = f"ENR-{uuid.uuid4().hex[:8].upper()}"
          return {"success": True, "enrollment_id": enrollment_id, "student_id": student["id"], "course_id": course_id, "enrolled_at": datetime.now(timezone.utc).isoformat(), "status": "active"}
    dependencies: []
    verification_rule: "prerequisite_unmet_rejected"
    inputs: ["student:Dict[str,Any]", "course:Dict[str,Any]", "completed_courses:List[str]", "enrollment_capacity:Dict[str,int]"]
    outputs: ["result:Dict[str,Any]"]

  - id: "grade_calculate"
    domain: "education"
    description: "Calcula la calificación final de un estudiante ponderando componentes evaluativos con redondeo configurable"
    code_block: |
      from typing import Dict, Any, List

      def grade_calculate(grades: Dict[str, float], weight_scheme: Dict[str, float], scale: str = "100", round_to: int = 1) -> Dict[str, Any]:
          """Calculate a weighted final grade from component grades and a weight scheme."""
          total_weight = sum(weight_scheme.values())
          if abs(total_weight - 1.0) > 0.01:
              return {"success": False, "error": "weights_do_not_sum_to_1", "total_weight": total_weight}
          weighted_sum = 0.0
          breakdown = []
          for component, grade in grades.items():
              weight = weight_scheme.get(component, 0.0)
              contribution = grade * weight
              weighted_sum += contribution
              breakdown.append({"component": component, "grade": grade, "weight": weight, "contribution": round(contribution, round_to)})
          final_grade = round(weighted_sum, round_to)
          letter = "A" if final_grade >= 90 else "B" if final_grade >= 80 else "C" if final_grade >= 70 else "D" if final_grade >= 60 else "F"
          return {"success": True, "final_grade": final_grade, "letter_grade": letter, "breakdown": breakdown}
    dependencies: []
    verification_rule: "weights_sum_to_one"
    inputs: ["grades:Dict[str,float]", "weight_scheme:Dict[str,float]", "scale:str", "round_to:int"]
    outputs: ["result:Dict[str,Any]"]

  - id: "certificate_generate"
    domain: "education"
    description: "Genera un certificado de finalización verificable con código único y datos del curso"
    code_block: |
      import uuid
      from datetime import datetime, timezone
      from typing import Dict, Any

      def certificate_generate(student_name: str, course_name: str, completion_date: str, issuer: str, grade: str = "") -> Dict[str, Any]:
          """Generate a completion certificate with a unique verification code."""
          cert_id = f"CERT-{uuid.uuid4().hex[:12].upper()}"
          verification_code = uuid.uuid4().hex
          certificate = {"certificate_id": cert_id, "verification_code": verification_code, "student_name": student_name, "course_name": course_name, "completion_date": completion_date, "grade": grade, "issuer": issuer, "issued_at": datetime.now(timezone.utc).isoformat(), "status": "valid"}
          return certificate
    dependencies: []
    verification_rule: "verification_code_unique"
    inputs: ["student_name:str", "course_name:str", "completion_date:str", "issuer:str", "grade:str"]
    outputs: ["certificate:Dict[str,Any]"]
