  - id: "reservation_manage"
    domain: "hospitality"
    description: "Gestiona reservas hoteleras: crear, modificar y cancelar con validación de disponibilidad"
    code_block: |
      import uuid
      from datetime import datetime, timezone
      from typing import Dict, Any, Optional

      def reservation_manage(action: str, guest_id: str, room_type: str, check_in: str, check_out: str, existing_reservations: Dict[str, Dict[str, Any]], room_inventory: Dict[str, int], modification: Optional[Dict[str, Any]] = None) -> Dict[str, Any]:
          """Create, modify, or cancel a hotel reservation with availability validation."""
          if action == "create":
              available = room_inventory.get(room_type, 0)
              occupied = sum(1 for r in existing_reservations.values() if r["room_type"] == room_type and r["status"] == "confirmed" and not (check_out <= r["check_in"] or check_in >= r["check_out"]))
              if occupied >= available:
                  return {"success": False, "reason": "no_availability"}
              res_id = f"RES-{uuid.uuid4().hex[:8].upper()}"
              return {"success": True, "reservation_id": res_id, "guest_id": guest_id, "room_type": room_type, "check_in": check_in, "check_out": check_out, "status": "confirmed"}
          elif action == "cancel":
              res_id = modification.get("reservation_id", "") if modification else ""
              if res_id in existing_reservations:
                  return {"success": True, "reservation_id": res_id, "status": "cancelled"}
              return {"success": False, "reason": "not_found"}
          return {"success": False, "reason": "unknown_action"}
    dependencies: []
    verification_rule: "no_double_booking"
    inputs: ["action:str", "guest_id:str", "room_type:str", "check_in:str", "check_out:str", "existing_reservations:Dict[str,Dict[str,Any]]", "room_inventory:Dict[str,int]", "modification:Optional[Dict[str,Any]]"]
    outputs: ["result:Dict[str,Any]"]

  - id: "room_availability"
    domain: "hospitality"
    description: "Consulta la disponibilidad de habitaciones por tipo y rango de fechas"
    code_block: |
      from typing import Dict, Any, List

      def room_availability(room_inventory: Dict[str, int], reservations: List[Dict[str, Any]], check_in: str, check_out: str) -> Dict[str, Any]:
          """Check room availability by type for a given date range."""
          availability = {}
          for room_type, total in room_inventory.items():
              occupied = sum(1 for r in reservations if r.get("room_type") == room_type and r.get("status") == "confirmed" and not (check_out <= r["check_in"] or check_in >= r["check_out"]))
              available = total - occupied
              availability[room_type] = {"total": total, "occupied": occupied, "available": available, "can_book": available > 0}
          return {"check_in": check_in, "check_out": check_out, "availability": availability}
    dependencies: []
    verification_rule: "availability_non_negative"
    inputs: ["room_inventory:Dict[str,int]", "reservations:List[Dict[str,Any]]", "check_in:str", "check_out:str"]
    outputs: ["result:Dict[str,Any]"]

  - id: "guest_checkin"
    domain: "hospitality"
    description: "Procesa el check-in de un huésped asignando habitación, verificando reserva y generando llave"
    code_block: |
      import uuid
      from datetime import datetime, timezone
      from typing import Dict, Any, Optional

      def guest_checkin(reservation_id: str, guest_data: Dict[str, Any], reservation_db: Dict[str, Dict[str, Any]], assigned_room: Optional[str] = None) -> Dict[str, Any]:
          """Process guest check-in: verify reservation, assign room, and generate key code."""
          reservation = reservation_db.get(reservation_id)
          if not reservation:
              return {"success": False, "reason": "reservation_not_found"}
          if reservation.get("status") != "confirmed":
              return {"success": False, "reason": f"invalid_status:{reservation.get('status')}"}
          room = assigned_room or reservation.get("room_number", f"RM-{uuid.uuid4().hex[:4]}")
          key_code = uuid.uuid4().hex[:8].upper()
          checkin = {"success": True, "reservation_id": reservation_id, "guest_name": guest_data.get("name", ""), "room": room, "key_code": key_code, "checked_in_at": datetime.now(timezone.utc).isoformat(), "status": "checked_in"}
          return checkin
    dependencies: []
    verification_rule: "invalid_reservation_rejected"
    inputs: ["reservation_id:str", "guest_data:Dict[str,Any]", "reservation_db:Dict[str,Dict[str,Any]]", "assigned_room:Optional[str]"]
    outputs: ["checkin:Dict[str,Any]"]

