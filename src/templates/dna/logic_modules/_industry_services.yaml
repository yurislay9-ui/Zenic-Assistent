  - id: "content_publish"
    domain: "media"
    description: "Publica contenido verificando estado de revisión, programación y metadatos requeridos"
    code_block: |
      import uuid
      from datetime import datetime, timezone
      from typing import Dict, Any, Optional

      def content_publish(content: Dict[str, Any], review_status: str = "approved", scheduled_time: Optional[str] = None, required_metadata: Optional[list] = None) -> Dict[str, Any]:
          """Publish content after verifying review status, scheduling, and required metadata."""
          if review_status != "approved":
              return {"success": False, "reason": f"not_approved:{review_status}"}
          if required_metadata:
              missing = [m for m in required_metadata if m not in content.get("metadata", {})]
              if missing:
                  return {"success": False, "reason": f"missing_metadata:{missing}"}
          publish_time = scheduled_time or datetime.now(timezone.utc).isoformat()
          content_id = content.get("id", f"PUB-{uuid.uuid4().hex[:8].upper()}")
          return {"success": True, "content_id": content_id, "status": "published", "published_at": publish_time, "is_scheduled": scheduled_time is not None}
    dependencies: []
    verification_rule: "unapproved_rejected"
    inputs: ["content:Dict[str,Any]", "review_status:str", "scheduled_time:Optional[str]", "required_metadata:Optional[list]"]
    outputs: ["result:Dict[str,Any]"]

  - id: "comment_moderate"
    domain: "media"
    description: "Modera comentarios aplicando reglas de contenido prohibido, spam y filtros de longitud"
    code_block: |
      from typing import Dict, Any, List

      def comment_moderate(comment: Dict[str, Any], blocked_words: List[str] = None, max_length: int = 1000, min_length: int = 1, spam_patterns: List[str] = None) -> Dict[str, Any]:
          """Moderate a comment against blocked words, length rules, and spam patterns."""
          if blocked_words is None:
              blocked_words = []
          if spam_patterns is None:
              spam_patterns = []
          text = comment.get("text", "")
          reasons = []
          if len(text) < min_length:
              reasons.append("too_short")
          if len(text) > max_length:
              reasons.append("too_long")
          text_lower = text.lower()
          found_blocked = [w for w in blocked_words if w.lower() in text_lower]
          if found_blocked:
              reasons.append(f"blocked_word:{found_blocked}")
          found_spam = [p for p in spam_patterns if p.lower() in text_lower]
          if found_spam:
              reasons.append(f"spam_pattern:{found_spam}")
          status = "rejected" if reasons else "approved"
          return {"comment_id": comment.get("id"), "status": status, "reasons": reasons}
    dependencies: []
    verification_rule: "blocked_word_rejected"
    inputs: ["comment:Dict[str,Any]", "blocked_words:List[str]", "max_length:int", "min_length:int", "spam_patterns:List[str]"]
    outputs: ["moderation:Dict[str,Any]"]

  - id: "subscription_manage"
    domain: "media"
    description: "Gestiona suscripciones de contenido: crear, actualizar plan, cancelar y verificar acceso"
    code_block: |
      from datetime import datetime, timedelta, timezone
      from typing import Dict, Any, Optional

      def subscription_manage(action: str, user_id: str, plan: str, subscription_store: Dict[str, Dict[str, Any]], billing_cycle_days: int = 30, new_plan: Optional[str] = None) -> Dict[str, Any]:
          """Manage media subscriptions: create, upgrade/downgrade, cancel, and verify access."""
          sub = subscription_store.get(user_id)
          if action == "create":
              sub = {"user_id": user_id, "plan": plan, "status": "active", "started_at": datetime.now(timezone.utc).isoformat(), "expires_at": (datetime.now(timezone.utc) + timedelta(days=billing_cycle_days)).isoformat()}
              subscription_store[user_id] = sub
              return {"action": "created", "subscription": sub}
          elif action == "update_plan":
              if not sub or sub.get("status") != "active":
                  return {"action": "update_plan", "success": False, "reason": "no_active_subscription"}
              old_plan = sub["plan"]
              sub["plan"] = new_plan or plan
              return {"action": "updated", "old_plan": old_plan, "new_plan": sub["plan"]}
          elif action == "cancel":
              if sub:
                  sub["status"] = "cancelled"
                  sub["cancelled_at"] = datetime.now(timezone.utc).isoformat()
              return {"action": "cancelled", "user_id": user_id}
          return {"action": action, "success": False, "reason": "unknown_action"}
    dependencies: []
    verification_rule: "cancelled_has_no_access"
    inputs: ["action:str", "user_id:str", "plan:str", "subscription_store:Dict[str,Dict[str,Any]]", "billing_cycle_days:int", "new_plan:Optional[str]"]
    outputs: ["result:Dict[str,Any]"]

