# ============================================================================
# professional_glossary.yaml — El Pulidor del Escritor
# ============================================================================
# Transforma jerga técnica en lenguaje corporativo de élite.
# El agente WRITER utiliza estas reglas para que el cliente sienta que
# trata con una empresa Fortune 500, no con un robot.
#
# Todo el contenido está en español — lenguaje orientado al cliente.
# ============================================================================

transformation_rules:

  # ==========================================================================
  # SECCIÓN 1: technical_to_corporate (50+ transformaciones)
  # ==========================================================================
  technical_to_corporate:
    - from: "bot"
      to: "Asistente de Gestión Automatizada"
      context: "Cuando se refiere al agente o sistema automatizado de interacción con el usuario"

    - from: "database"
      to: "Repositorio Central de Información"
      context: "Al mencionar almacenamiento estructurado de datos empresariales"

    - from: "api_error"
      to: "Incidencia en el Protocolo de Comunicación Externo"
      context: "Cuando un servicio externo o integración presenta fallos de comunicación"

    - from: "script"
      to: "Módulo de Automatización Inteligente"
      context: "Al describir código ejecutable que realiza tareas automatizadas"

    - from: "cache"
      to: "Sistema de Acceso Rápido a Información"
      context: "Cuando se habla de almacenamiento temporal para optimizar velocidad de respuesta"

    - from: "backup"
      to: "Respaldo Redundante de Continuidad Operativa"
      context: "Al referirse a copias de seguridad y planes de recuperación"

    - from: "cron_job"
      to: "Programador de Tareas Periódicas"
      context: "Cuando se describen procesos programados que se ejecutan automáticamente"

    - from: "webhook"
      to: "Punto de Integración en Tiempo Real"
      context: "Al mencionar notificaciones automatizadas entre sistemas"

    - from: "bug"
      to: "Oportunidad de Mejora Detectada"
      context: "Cuando se informa de errores o defectos en el sistema ante el cliente"

    - from: "refactor"
      to: "Optimización Estructural del Sistema"
      context: "Al describir mejoras internas del código que no cambian funcionalidad visible"

    - from: "server"
      to: "Infraestructura de Procesamiento Centralizada"
      context: "Cuando se hace referencia al hardware o servicio que aloja la solución"

    - from: "deployment"
      to: "Puesta en Producción de la Solución"
      context: "Al describir el proceso de liberar una nueva versión del sistema"

    - from: "log"
      to: "Registro de Actividad Operativa"
      context: "Cuando se menciona el seguimiento de eventos del sistema"

    - from: "firewall"
      to: "Barrera de Seguridad Perimetral"
      context: "Al referirse a protecciones de red y filtrado de tráfico"

    - from: "load_balancer"
      to: "Distribuidor Inteligente de Carga de Trabajo"
      context: "Cuando se describe el sistema que distribuye tráfico entre múltiples servidores"

    - from: "endpoint"
      to: "Punto de Acceso de Servicio"
      context: "Al mencionar URLs o interfaces de comunicación entre sistemas"

    - from: "token"
      to: "Credencial de Autenticación Digital"
      context: "Cuando se habla de tokens de sesión o autorización"

    - from: "queue"
      to: "Sistema de Gestión Ordenada de Solicitudes"
      context: "Al describir colas de mensajes o procesamiento secuencial"

    - from: "latency"
      to: "Tiempo de Respuesta Operativo"
      context: "Cuando se menciona el retardo en la comunicación entre sistemas"

    - from: "downtime"
      to: "Periodo de Mantenimiento Programado"
      context: "Al informar sobre interrupciones del servicio, ya sean planificadas o no"

    - from: "uptime"
      to: "Disponibilidad Continua del Servicio"
      context: "Cuando se reporta el tiempo que el sistema está operativo"

    - from: "debug"
      to: "Proceso de Diagnóstico y Resolución Técnica"
      context: "Al describir la investigación y corrección de incidencias"

    - from: "patch"
      to: "Actualización Correctiva de Seguridad"
      context: "Cuando se aplican correcciones específicas al sistema"

    - from: "rollback"
      to: "Reversión Controlada a Versión Estable Anterior"
      context: "Al describir la vuelta a una versión previa tras una incidencia"

    - from: "scalability"
      to: "Capacidad de Expansión Adaptativa"
      context: "Cuando se habla del crecimiento del sistema según la demanda"

    - from: "payload"
      to: "Contenido Estructurado de la Transacción"
      context: "Al referirse a los datos transportados en una petición o respuesta"

    - from: "middleware"
      to: "Capa Intermedia de Procesamiento de Negocio"
      context: "Cuando se describe software que conecta diferentes componentes del sistema"

    - from: "timeout"
      to: "Límite de Tiempo de Espera Operativa Excedido"
      context: "Al informar que una operación ha superado el tiempo máximo permitido"

    - from: "rate_limit"
      to: "Política de Uso Responsable del Servicio"
      context: "Cuando se describen límites de uso para proteger el rendimiento"

    - from: "SSH"
      to: "Canal de Acceso Seguro Administrativo"
      context: "Al mencionar acceso remoto seguro a servidores"

    - from: "SSL/TLS"
      to: "Certificación de Comunicaciones Cifradas"
      context: "Cuando se habla de cifrado de comunicaciones"

    - from: "docker"
      to: "Entorno de Ejecución Aislado y Reproducible"
      context: "Al describir contenedores y virtualización a nivel de aplicación"

    - from: "kubernetes"
      to: "Orquestador de Infraestructura Automatizada"
      context: "Cuando se menciona la gestión de contenedores a escala"

    - from: "CI/CD"
      to: "Flujo de Integración y Entrega Continua"
      context: "Al describir pipelines de despliegue automatizado"

    - from: "microservice"
      to: "Componente de Servicio Independiente y Especializado"
      context: "Cuando se habla de arquitectura distribuida en servicios"

    - from: "repository"
      to: "Archivo Centralizado de Control de Versiones"
      context: "Al referirse al repositorio de código fuente"

    - from: "merge_conflict"
      to: "Divergencia en la Integración de Cambios Concurrentes"
      context: "Cuando se describen conflictos al unir código de diferentes fuentes"

    - from: "iteration"
      to: "Ciclo de Desarrollo Iterativo"
      context: "Al hablar de sprints o ciclos de trabajo"

    - from: "schema"
      to: "Estructura Formal de Datos"
      context: "Cuando se menciona la definición de estructura de base de datos o API"

    - from: "index"
      to: "Mecanismo de Búsqueda Optimizada"
      context: "Al describir índices de base de datos para acelerar consultas"

    - from: "migration"
      to: "Transición Estructurada de Datos entre Versiones"
      context: "Cuando se realizan cambios en la estructura de datos"

    - from: "webhook_retry"
      to: "Reintento Automático de Integración en Tiempo Real"
      context: "Al describir el mecanismo de reintento ante fallos en webhooks"

    - from: "sdk"
      to: "Kit de Desarrollo de Integración Empresarial"
      context: "Cuando se menciona el kit de herramientas para desarrolladores"

    - from: "error_stack"
      to: "Trazabilidad Detallada de la Incidencia"
      context: "Al referirse al stack trace ante errores"

    - from: "thread"
      to: "Flujo de Procesamiento Concurrente"
      context: "Cuando se describen hilos de ejecución paralela"

    - from: "memory_leak"
      to: "Degradación Progresiva de Recursos del Sistema"
      context: "Al informar sobre fugas de memoria que afectan el rendimiento"

    - from: "deadlock"
      to: "Bloqueo Mutuo de Procesos Concurrentes"
      context: "Cuando dos o más procesos se bloquean mutuamente"

    - from: "benchmark"
      to: "Evaluación Comparativa de Rendimiento"
      context: "Al describir pruebas de rendimiento del sistema"

    - from: "dependency"
      to: "Componente Integrado de Terceros"
      context: "Cuando se menciona una librería o paquete externo"

    - from: "ping"
      to: "Verificación de Disponibilidad de Servicio"
      context: "Al comprobar si un sistema responde correctamente"

    - from: "DNS"
      to: "Sistema de Resolución de Nombres de Dominio"
      context: "Cuando se habla de traducción de dominios a direcciones IP"

    - from: "VPN"
      to: "Red Privada Virtual de Acceso Seguro"
      context: "Al describir conexiones cifradas de red privada"

    - from: "OAuth"
      to: "Protocolo de Autorización Delegada Segura"
      context: "Cuando se menciona autenticación mediante terceros"

    - from: "CRUD"
      to: "Operaciones de Gestión Integral de Registros"
      context: "Al describir operaciones básicas de creación, lectura, actualización y eliminación"

    - from: "websocket"
      to: "Canal de Comunicación Bidireccional Persistente"
      context: "Cuando se habla de comunicación en tiempo real entre cliente y servidor"

    - from: "hash"
      to: "Huella Digital Criptográfica de Verificación"
      context: "Al describir funciones de hash para integridad de datos"

    - from: "encryption"
      to: "Cifrado de Protección de Información Sensible"
      context: "Cuando se menciona la codificación de datos para protección"

  # ==========================================================================
  # SECCIÓN 2: error_messages (20+ mensajes pulidos)
  # ==========================================================================
  error_messages:
    - original: "Connection refused"
      polished: "El servicio solicitado se encuentra temporalmente en proceso de mantenimiento. Nuestro equipo técnico ha sido notificado y trabajará en restablecer la conexión a la brevedad."
      severity: "warning"

    - original: "404 Not Found"
      polished: "El recurso solicitado no se encuentra disponible en este momento. Verifique la información proporcionada e intente nuevamente. Si el problema persiste, contacte a su ejecutivo de cuenta."
      severity: "error"

    - original: "500 Internal Server Error"
      polished: "Hemos detectado una incidencia técnica interna. Nuestro equipo de operaciones trabaja activamente en su resolución. Disculpe las molestias ocasionadas."
      severity: "error"

    - original: "503 Service Unavailable"
      polished: "El servicio se encuentra temporalmente no disponible debido a tareas de mantenimiento programado. La operativa se restablecerá próximamente. Agradecemos su comprensión."
      severity: "warning"

    - original: "502 Bad Gateway"
      polished: "Se ha producido una interrupción en la comunicación entre nuestros servicios. Nuestro equipo de infraestructura está verificando la conectividad para restaurar la operatividad."
      severity: "error"

    - original: "401 Unauthorized"
      polished: "Las credenciales proporcionadas no han podido ser verificadas. Por favor, confirme sus datos de acceso e intente nuevamente. Si el inconveniente persiste, contacte al administrador de su cuenta."
      severity: "warning"

    - original: "403 Forbidden"
      polished: "Su perfil actual no cuenta con los permisos necesarios para acceder a este recurso. Contacte a su administrador para solicitar las autorizaciones correspondientes."
      severity: "warning"

    - original: "429 Too Many Requests"
      polished: "Se ha superado el volumen de solicitudes permitido para su cuenta. Por favor, espere unos momentos antes de reintentar la operación."
      severity: "warning"

    - original: "408 Request Timeout"
      polished: "La operación ha excedido el tiempo máximo de espera establecido. Verifique su conexión e intente nuevamente. Si el problema continúa, nuestro equipo de soporte está a su disposición."
      severity: "warning"

    - original: "400 Bad Request"
      polished: "Los datos proporcionados no cumplen con el formato requerido. Revise la información ingresada y asegúrese de completar todos los campos obligatorios correctamente."
      severity: "warning"

    - original: "Database connection failed"
      polished: "No se ha podido establecer conexión con el Repositorio Central de Información. Nuestro equipo técnico ha sido alertado y trabaja en restaurar la disponibilidad del servicio."
      severity: "error"

    - original: "Out of memory"
      polished: "El sistema ha alcanzado su capacidad máxima de procesamiento temporal. Nuestro equipo de infraestructura está escalando los recursos para restaurar la operatividad óptima."
      severity: "error"

    - original: "Permission denied"
      polished: "Su perfil de usuario no dispone de las autorizaciones necesarias para completar esta acción. Póngase en contacto con el administrador de su organización para gestionar los permisos correspondientes."
      severity: "warning"

    - original: "Rate limit exceeded"
      polished: "Se ha alcanzado el límite de uso establecido por la Política de Uso Responsable del Servicio. Su acceso será restablecido automáticamente en breve."
      severity: "info"

    - original: "SSL certificate error"
      polished: "Hemos detectado una incidencia en la certificación de comunicaciones cifradas. Por seguridad, la conexión ha sido protegida. Nuestro equipo de seguridad trabaja en su resolución."
      severity: "error"

    - original: "Disk space full"
      polished: "El sistema de almacenamiento ha alcanzado su capacidad máxima. Se han iniciado los protocolos de expansión de capacidad para garantizar la continuidad operativa."
      severity: "error"

    - original: "DNS resolution failed"
      polished: "No se ha podido resolver la dirección del servicio solicitado. Nuestro equipo de infraestructura está verificando la configuración de red para restaurar el acceso."
      severity: "error"

    - original: "Migration failed"
      polished: "La Transición Estructurada de Datos ha encontrado una incidencia. Se ha activado el protocolo de integridad para garantizar la consistencia de la información. Nuestro equipo le mantendrá informado."
      severity: "error"

    - original: "Webhook delivery failed"
      polished: "No se ha podido completar la notificación en tiempo real al sistema integrado. El sistema reintentará automáticamente la entrega. Si la incidencia persiste, nuestro equipo de integración le asistirá."
      severity: "warning"

    - original: "Invalid API key"
      polished: "La credencial de integración proporcionada no es válida o ha expirado. Por favor, verifique sus credenciales de acceso en el panel de administración o solicite unas nuevas a nuestro equipo de soporte."
      severity: "warning"

    - original: "CORS error"
      polished: "La solicitud no ha sido autorizada por las políticas de seguridad de origen cruzado. Nuestro equipo de configuración revisará los permisos de acceso para habilitar la integración."
      severity: "warning"

    - original: "File not found"
      polished: "El documento solicitado no se encuentra disponible en el sistema. Verifique la ubicación del archivo y asegúrese de que no haya sido movido o eliminado."
      severity: "warning"

    - original: "Session expired"
      polished: "Su sesión ha expirado por motivos de seguridad. Por favor, inicie sesión nuevamente para continuar con sus operaciones. Sus datos han sido protegidos automáticamente."
      severity: "info"

    - original: "Validation error"
      polished: "Los datos ingresados no cumplen con las reglas de validación establecidas. Revise los campos señalados y corrija la información según las indicaciones proporcionadas."
      severity: "warning"

  # ==========================================================================
  # SECCIÓN 3: status_descriptions (15+ estados)
  # ==========================================================================
  status_descriptions:
    - technical: "deploying"
      client_facing: "Desplegando la solución en el entorno productivo"

    - technical: "running"
      client_facing: "Operación activa y funcionando dentro de parámetros óptimos"

    - technical: "stopped"
      client_facing: "Servicio temporalmente suspendido según configuración establecida"

    - technical: "error"
      client_facing: "Se ha detectado una incidencia que requiere atención. El equipo técnico ha sido notificado"

    - technical: "pending"
      client_facing: "Proceso en espera de procesamiento según el orden establecido"

    - technical: "completed"
      client_facing: "Operación finalizada exitosamente dentro de los parámetros esperados"

    - technical: "failed"
      client_facing: "La operación no ha podido completarse satisfactoriamente. Se ha iniciado el protocolo de resolución"

    - technical: "scaling_up"
      client_facing: "Expandiendo la capacidad del sistema para atender la demanda actual"

    - technical: "scaling_down"
      client_facing: "Optimizando los recursos del sistema según los niveles de uso actuales"

    - technical: "initializing"
      client_facing: "Preparando los componentes del servicio para su puesta en marcha"

    - technical: "maintenance"
      client_facing: "El servicio se encuentra en periodo de mantenimiento preventivo para garantizar su óptimo funcionamiento"

    - technical: "degraded"
      client_facing: "El servicio opera con funcionalidad reducida. Nuestro equipo trabaja en restaurar la operatividad completa"

    - technical: "migrating"
      client_facing: "Ejecutando la transición estructurada de datos entre versiones del sistema"

    - technical: "syncing"
      client_facing: "Sincronizando la información entre los componentes del sistema para garantizar consistencia"

    - technical: "queued"
      client_facing: "Solicitud registrada y en espera de procesamiento según la prioridad asignada"

    - technical: "rollback"
      client_facing: "Restaurando la versión estable anterior del sistema como medida de precaución"

    - technical: "health_check"
      client_facing: "Realizando verificación integral del estado operativo del servicio"

    - technical: "rebooting"
      client_facing: "Reiniciando los componentes del servicio para aplicar las últimas actualizaciones"

  # ==========================================================================
  # SECCIÓN 4: feature_descriptions (20+ características)
  # ==========================================================================
  feature_descriptions:
    - technical: "JWT Authentication"
      marketing: "Sistema de Autenticación Segura con Tokens de Sesión"
      benefit: "Protección avanzada de credenciales con renovación automática y gestión segura de sesiones de usuario"

    - technical: "Role-Based Access Control"
      marketing: "Gestión Granular de Permisos y Roles Organizacionales"
      benefit: "Control preciso sobre quién accede a qué información, garantizando la segregación de funciones y el cumplimiento normativo"

    - technical: "Real-time Notifications"
      marketing: "Sistema de Alertas y Notificaciones en Tiempo Real"
      benefit: "Información inmediata sobre eventos relevantes para la toma oportuna de decisiones"

    - technical: "Automated Backups"
      marketing: "Respaldo Automático de Continuidad Operativa"
      benefit: "Protección permanente de su información crítica con recuperación garantizada ante cualquier contingencia"

    - technical: "Audit Logging"
      marketing: "Trazabilidad Completa de Operaciones del Sistema"
      benefit: "Registro detallado de todas las acciones para cumplimiento regulatorio y transparencia operativa"

    - technical: "API Rate Limiting"
      marketing: "Política Inteligente de Gestión de Tráfico"
      benefit: "Protección contra sobrecargas que garantiza la disponibilidad y estabilidad del servicio para todos los usuarios"

    - technical: "Data Encryption at Rest"
      marketing: "Cifrado Avanzado de Información Almacenada"
      benefit: "Protección de datos sensibles incluso en el almacenamiento, cumpliendo con los más altos estándares de seguridad"

    - technical: "End-to-End Encryption"
      marketing: "Cifrado Integral de Extremo a Extremo"
      benefit: "Garantía de que la información solo es accesible por los interlocutores autorizados, sin posibilidad de interceptación"

    - technical: "Auto-scaling"
      marketing: "Escalabilidad Adaptativa Automática"
      benefit: "El sistema se ajusta automáticamente a la demanda, garantizando rendimiento óptimo sin intervención manual"

    - technical: "Multi-tenant Architecture"
      marketing: "Arquitectura Multiorganizacional Segura"
      benefit: "Aislamiento completo de datos entre organizaciones con infraestructura compartida para máxima eficiencia"

    - technical: "CI/CD Pipeline"
      marketing: "Flujo de Entrega Continua y Calidad Asegurada"
      benefit: "Actualizaciones rápidas y seguras con verificación automatizada de calidad antes de llegar a producción"

    - technical: "Webhook Integrations"
      marketing: "Ecosistema de Integraciones en Tiempo Real"
      benefit: "Conexión instantánea con sus herramientas empresariales para automatización de flujos de trabajo"

    - technical: "Full-text Search"
      marketing: "Motor de Búsqueda Avanzada de Contenido"
      benefit: "Localización inmediata de información relevante en todo el repositorio corporativo con resultados precisos"

    - technical: "Two-Factor Authentication"
      marketing: "Verificación de Identidad en Dos Pasos"
      benefit: "Capa adicional de seguridad que protege el acceso incluso si las credenciales son comprometidas"

    - technical: "SSO Integration"
      marketing: "Acceso Unificado Corporativo (Single Sign-On)"
      benefit: "Inicio de sesión único para todas las aplicaciones, eliminando la fricción y mejorando la seguridad"

    - technical: "Dashboard Analytics"
      marketing: "Panel de Análisis e Inteligencia de Negocio"
      benefit: "Visualización en tiempo real de indicadores clave para la toma estratégica de decisiones"

    - technical: "Custom Workflows"
      marketing: "Flujos de Trabajo Personalizables"
      benefit: "Adaptación del sistema a sus procesos de negocio existentes sin necesidad de cambios organizacionales"

    - technical: "Data Export/Import"
      marketing: "Gestión de Intercambio de Información Estructurada"
      benefit: "Portabilidad total de sus datos en formatos estándar, garantizando soberanía sobre su información"

    - technical: "Uptime Monitoring"
      marketing: "Supervisión Continua de Disponibilidad del Servicio"
      benefit: "Detección proactiva de incidencias antes de que impacten sus operaciones, con alertas inmediatas"

    - technical: "Version Control"
      marketing: "Control de Versiones y Gestión de Cambios"
      benefit: "Historial completo de modificaciones con capacidad de revertir a cualquier estado anterior"

    - technical: "Scheduled Reports"
      marketing: "Informes Automáticos Periódicos"
      benefit: "Generación y distribución automática de reportes según la frecuencia y destinatarios configurados"

    - technical: "Offline Mode"
      marketing: "Modalidad de Operación sin Conexión"
      benefit: "Continuidad del trabajo incluso sin conectividad, con sincronización automática al recuperar el acceso"

    - technical: "Multi-language Support"
      marketing: "Soporte Multilingüe Empresarial"
      benefit: "Experiencia localizada para equipos globales, respetando las preferencias idiomáticas de cada usuario"

  # ==========================================================================
  # SECCIÓN 5: communication_templates (10+ plantillas)
  # ==========================================================================
  communication_templates:
    # --- EMAILS ---
    - type: "email"
      occasion: "Bienvenida a un nuevo cliente tras la contratación del servicio"
      template: |
        Estimado/a {nombre_cliente},

        Es un placer darle la bienvenida a {nombre_servicio}. A partir de este momento, su cuenta se encuentra activa y lista para operar.

        A continuación, le compartimos los datos de acceso a su plataforma:
        • Portal de acceso: {url_portal}
        • Usuario asignado: {usuario}
        • Guía de inicio: {url_guia}

        Su ejecutivo de cuenta, {nombre_ejecutivo}, estará a su disposición para acompañarle en cada paso de la implementación. Puede contactarle directamente en {email_ejecutivo}.

        Nuestro equipo de soporte técnico está disponible de lunes a viernes, de 9:00 a 18:00 horas, a través de {email_soporte} o {telefono_soporte}.

        Quedamos a su entera disposición para cualquier consulta.

        Atentamente,
        El equipo de {nombre_empresa}
      tone: "formal"

    - type: "email"
      occasion: "Notificación de entrega de proyecto o hito completado"
      template: |
        Estimado/a {nombre_cliente},

        Nos complace informarle que el hito "{nombre_hito}" del proyecto "{nombre_proyecto}" ha sido completado exitosamente según las especificaciones acordadas.

        Detalles de la entrega:
        • Fecha de entrega: {fecha_entrega}
        • Componentes entregados: {componentes}
        • Documentación asociada: {url_documentacion}
        • Entorno de revisión: {url_entorno}

        Invitamos a su equipo a revisar los entregables y compartirnos cualquier observación o solicitud de ajuste antes del {fecha_feedback}.

        Para cualquier consulta técnica sobre la entrega, su interlocutor designado es {nombre_contacto_tecnico} ({email_contacto_tecnico}).

        Quedamos a su disposición.

        Saludos cordiales,
        {nombre_remitente}
        {cargo_remitente} — {nombre_empresa}
      tone: "formal"

    - type: "email"
      occasion: "Notificación de incidencia técnica que afecta al cliente"
      template: |
        Estimado/a {nombre_cliente},

        Le informamos que hemos detectado una incidencia técnica que podría afectar el servicio {servicio_afectado}. Nuestro equipo de operaciones ha sido alertado inmediatamente y trabaja activamente en su resolución.

        Detalles de la incidencia:
        • Componente afectado: {componente_afectado}
        • Hora de detección: {hora_deteccion}
        • Impacto estimado: {impacto_estimado}
        • Estado actual: En proceso de resolución

        Nos comprometemos a mantenerle informado sobre el avance de la situación. Le enviaremos una actualización en un plazo máximo de {plazo_actualizacion}.

        Si tiene alguna pregunta o necesita asistencia adicional, no dude en contactarnos a {email_soporte} o al {telefono_soporte}.

        Lamentamos los inconvenientes que esto pueda ocasionar y agradecemos su comprensión.

        Atentamente,
        Equipo de Operaciones — {nombre_empresa}
      tone: "professional"

    - type: "email"
      occasion: "Resolución de incidencia y restablecimiento del servicio"
      template: |
        Estimado/a {nombre_cliente},

        Nos complace confirmarle que la incidencia reportada previamente en el servicio {servicio_afectado} ha sido resuelta exitosamente. Todas las funcionalidades se encuentran operativas dentro de los parámetros habituales.

        Resumen de la resolución:
        • Hora de restablecimiento: {hora_resolucion}
        • Duración total de la incidencia: {duracion_incidencia}
        • Medidas adoptadas: {medidas_adoptadas}
        • Acciones preventivas implementadas: {acciones_preventivas}

        Nuestro equipo ha implementado las medidas necesarias para prevenir situaciones similares en el futuro. Si observa cualquier comportamiento inusual, le rogamos nos lo comunique de inmediato.

        Agradecemos su paciencia y comprensión durante este episodio.

        Saludos cordiales,
        Equipo de Operaciones — {nombre_empresa}
      tone: "professional"

    - type: "email"
      occasion: "Notificación de mantenimiento programado"
      template: |
        Estimado/a {nombre_cliente},

        Le informamos sobre un mantenimiento preventivo programado que afectará al servicio {servicio_afectado}, necesario para garantizar la continuidad y calidad operativa.

        Detalles del mantenimiento:
        • Fecha programada: {fecha_mantenimiento}
        • Ventana de mantenimiento: {hora_inicio} a {hora_fin}
        • Duración estimada: {duracion_estimada}
        • Servicios involucrados: {servicios_involucrados}
        • Impacto esperado: {impacto_esperado}

        Recomendamos planificar sus operaciones considerando esta ventana de mantenimiento. Nuestro equipo trabajará para minimizar el tiempo de indisponibilidad.

        En caso de requerir asistencia antes o durante el mantenimiento, puede contactarnos en {email_soporte}.

        Agradecemos su comprensión y colaboración.

        Atentamente,
        Equipo de Infraestructura — {nombre_empresa}
      tone: "formal"

