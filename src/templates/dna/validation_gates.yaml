# ============================================================================
# validation_gates.yaml — The Quality Judge
# ============================================================================
# Used by the ASSEMBLER agent to validate code before delivery.
# If code fails any gate, it is REJECTED and sent back for correction.
# Descriptions in Spanish; technical IDs and rules in English.
# ============================================================================

global_checks:

  # ── SECURITY (8 checks) ──────────────────────────────────────────────────
  - id: "no_hardcoded_secrets"
    category: "security"
    rule: "Prohibir secretos, claves API, tokens o contraseñas codificados directamente en el fuente"
    action: "Escanear el código fuente con detección de patrones de secretos y comparar contra el vault de credenciales"
    severity: "critical"
    auto_fix: true
    fix_strategy: "Extraer el secreto a una variable de entorno y reemplazar la ocurrencia con os.environ.get('KEY') o el mecanismo de vault configurado"
    pattern: "(?i)(password|api_key|secret|token|private_key)\\s*[:=]\\s*['\"][^'\"]{8,}['\"]"

  - id: "no_sql_injection"
    category: "security"
    rule: "Prohibir concatenación de cadenas en consultas SQL; usar siempre parámetros preparados"
    action: "Analizar AST para detectar concatenaciones o interpolaciones dentro de llamadas a execute/query SQL"
    severity: "critical"
    auto_fix: true
    fix_strategy: "Reemplazar la concatenación con parámetros preparados (?) y pasar los valores como tupla al execute"
    pattern: "(execute|query)\\s*\\(\\s*f['\"]|\\+\\s*['\"]\\s*SELECT|\\+\\s*['\"]\\s*INSERT|\\+\\s*['\"]\\s*UPDATE|\\+\\s*['\"]\\s*DELETE"

  - id: "no_eval_usage"
    category: "security"
    rule: "Prohibir el uso de eval(), exec() o constructores dinámicos que ejecuten código arbitrario"
    action: "Buscar referencias directas a eval, exec, Function() y similares en el AST"
    severity: "critical"
    auto_fix: false
    fix_strategy: "Requiere refactor manual: reemplazar con ast.literal_eval, mapeos de funciones permitidas o parsers seguros"
    pattern: "\\b(eval|exec)\\s*\\(|new\\s+Function\\s*\\("

  - id: "https_enforcement"
    category: "security"
    rule: "Exigir HTTPS para todas las comunicaciones externas; prohibir HTTP plano para datos sensibles"
    action: "Verificar que todas las URLs de conexión y configuraciones de cliente usen https://"
    severity: "critical"
    auto_fix: true
    fix_strategy: "Reemplazar http:// por https:// en URLs de configuración y añadir validación de esquema en runtime"
    pattern: "http://(?!localhost|127\\.0\\.0\\.1|0\\.0\\.0\\.0)"

  - id: "input_sanitization"
    category: "security"
    rule: "Toda entrada de usuario debe ser sanitizada y validada antes de su uso"
    action: "Verificar que cada punto de entrada (endpoint, función pública) aplique validación antes de procesar datos"
    severity: "critical"
    auto_fix: false
    fix_strategy: "Agregar esquema de validación (Pydantic/Joi/Zod) en el punto de entrada y rechazar datos no conformes"
    pattern: ""

  - id: "csrf_protection"
    category: "security"
    rule: "Protección CSRF obligatoria en todos los formularios y endpoints de mutación stateful"
    action: "Verificar presencia de tokens CSRF en POST/PUT/DELETE/PATCH de sesiones autenticadas"
    severity: "warning"
    auto_fix: true
    fix_strategy: "Inyectar middleware CSRF que genere y valide tokens automáticamente en formularios y headers"
    pattern: ""

  - id: "rate_limiting"
    category: "security"
    rule: "Todos los endpoints públicos deben tener límite de tasa para prevenir abuso"
    action: "Verificar configuración de rate limiting en cada ruta/middleware expuesto públicamente"
    severity: "warning"
    auto_fix: true
    fix_strategy: "Agregar decorador o middleware de rate limiting con configuración por defecto (100 req/min por IP)"
    pattern: ""

  - id: "secure_headers"
    category: "security"
    rule: "Configurar headers de seguridad HTTP: X-Content-Type-Options, X-Frame-Options, CSP, Strict-Transport-Security"
    action: "Inspeccionar la configuración del servidor/middleware para verificar los headers de seguridad"
    severity: "warning"
    auto_fix: true
    fix_strategy: "Agregar middleware de headers seguros con valores recomendados: nosniff, DENY, default-src 'self', max-age=31536000"
    pattern: ""

  # ── QUALITY (8 checks) ───────────────────────────────────────────────────
  - id: "all_async_in_try_except"
    category: "quality"
    rule: "Toda llamada async debe estar envuelta en try/except para manejar errores de manera explícita"
    action: "Recorrer el AST buscando awaits que no estén dentro de un bloque try/except"
    severity: "critical"
    auto_fix: true
    fix_strategy: "Envolver la llamada await en un bloque try/except con logging del error y manejo apropiado"
    pattern: ""

  - id: "no_bare_except"
    category: "quality"
    rule: "Prohibir except sin tipo específico; siempre capturar excepciones concretas"
    action: "Buscar cláusulas except vacías o except: sin clase de excepción en el AST"
    severity: "critical"
    auto_fix: true
    fix_strategy: "Reemplazar except: con except Exception as e: como mínimo, o mejor aún, con la excepción específica esperada"
    pattern: "except\\s*:"

  - id: "type_hints_required"
    category: "quality"
    rule: "Todas las funciones públicas deben tener type hints en parámetros y retorno"
    action: "Verificar en el AST que cada función/método público tenga anotaciones de tipo completas"
    severity: "warning"
    auto_fix: true
    fix_strategy: "Inferir tipos a partir de usages y agregar stubs de tipo; si no se puede inferir, usar Any como placeholder"
    pattern: ""

  - id: "no_magic_numbers"
    category: "quality"
    rule: "Prohibir números literales sin nombre en la lógica de negocio; deben ser constantes nombradas"
    action: "Buscar literales numéricos sueltos en expresiones condicionales y de cálculo"
    severity: "warning"
    auto_fix: true
    fix_strategy: "Extraer el número a una constante con nombre descriptivo en la parte superior del módulo o clase"
    pattern: ""

  - id: "function_complexity_max_10"
    category: "quality"
    rule: "La complejidad ciclomática de cualquier función no debe exceder 10"
    action: "Calcular la complejidad ciclomática de cada función mediante análisis AST"
    severity: "critical"
    auto_fix: false
    fix_strategy: "Requiere refactor manual: descomponer la función en sub-funciones más pequeñas con responsabilidad única"
    pattern: ""

  - id: "no_global_state"
    category: "quality"
    rule: "Prohibir variables globales mutables; el estado debe ser encapsulado en clases o inyectado"
    action: "Buscar asignaciones a variables a nivel de módulo fuera de bloques if __name__ o constantes"
    severity: "warning"
    auto_fix: false
    fix_strategy: "Encapsular el estado en una clase singleton o contenedor de inyección de dependencias"
    pattern: ""

  - id: "immutable_config"
    category: "quality"
    rule: "Los objetos de configuración deben ser inmutables una vez cargados"
    action: "Verificar que las clases/objetos de config no expongan setters o atributos modificables después de la inicialización"
    severity: "warning"
    auto_fix: true
    fix_strategy: "Usar dataclass(frozen=True) o NamedTuple para la configuración; eliminar setters"
    pattern: ""

  - id: "error_messages_user_friendly"
    category: "quality"
    rule: "Los mensajes de error dirigidos al usuario deben ser comprensibles, sin exponer detalles internos ni stack traces"
    action: "Revisar que los mensajes en respuestas de error al cliente no contengan nombres de clases de excepción, rutas de archivo o trazas"
    severity: "warning"
    auto_fix: true
    fix_strategy: "Mapear excepciones internas a mensajes amigables mediante un error handler centralizado que traduzca códigos a mensajes"
    pattern: ""

  # ── PERFORMANCE (5 checks) ───────────────────────────────────────────────
  - id: "no_n_plus_1_queries"
    category: "performance"
    rule: "Prohibir consultas N+1; usar eager loading o batch fetching para relaciones"
    action: "Detectar bucles que contengan llamadas a base de datos dentro de iteraciones sobre resultados previos"
    severity: "critical"
    auto_fix: true
    fix_strategy: "Reemplazar con select_related/prefetch_related (ORM) o JOIN en la consulta original"
    pattern: ""

  - id: "pagination_required_for_lists"
    category: "performance"
    rule: "Todo endpoint que retorne listas debe implementar paginación obligatoria"
    action: "Verificar que los endpoints GET de colecciones acepten y apliquen parámetros de paginación (limit/offset o cursor)"
    severity: "critical"
    auto_fix: true
    fix_strategy: "Agregar parámetros de paginación por defecto (limit=50, offset=0) y aplicar en la consulta de base de datos"
    pattern: ""

  - id: "caching_for_frequent_reads"
    category: "performance"
    rule: "Las operaciones de lectura frecuentes deben implementar caching con TTL apropiado"
    action: "Identificar endpoints de lectura con alto tráfico y verificar presencia de capa de caché"
    severity: "warning"
    auto_fix: true
    fix_strategy: "Agregar decorador de caché con TTL configurable (Redis/Memcached) alrededor de la función de lectura"
    pattern: ""

  - id: "connection_pooling"
    category: "performance"
    rule: "Todas las conexiones a bases de datos y servicios externos deben usar pooling"
    action: "Verificar que la configuración de conexión incluya pool_size, max_overflow y parámetros de reciclaje"
    severity: "critical"
    auto_fix: true
    fix_strategy: "Configurar SQLAlchemy pool_size=10, max_overflow=20 o equivalente; nunca crear conexiones ad-hoc"
    pattern: ""

  - id: "async_for_io_operations"
    category: "performance"
    rule: "Operaciones de I/O (red, disco, DB) deben ser async para no bloquear el event loop"
    action: "Detectar llamadas sincrónicas de I/O dentro de handlers async (requests, urllib, file.read síncrono)"
    severity: "warning"
    auto_fix: true
    fix_strategy: "Reemplazar la librería síncrona con su equivalente async (httpx, aiofiles, async DB driver)"
    pattern: ""

  # ── DOCUMENTATION (4 checks) ─────────────────────────────────────────────
  - id: "every_function_docstring"
    category: "documentation"
    rule: "Cada función/método público debe tener docstring con descripción, parámetros y retorno"
    action: "Verificar presencia y completitud de docstrings en todas las funciones públicas del AST"
    severity: "warning"
    auto_fix: true
    fix_strategy: "Generar stub de docstring con formato estándar (Google/NumPy) incluyendo placeholders para descripción, args y returns"
    pattern: ""

  - id: "api_endpoint_documented"
    category: "documentation"
    rule: "Cada endpoint de API debe tener documentación OpenAPI/Swagger con esquemas de request y response"
    action: "Verificar que cada ruta tenga docstring o decorador con summary, description, response schemas"
    severity: "critical"
    auto_fix: true
    fix_strategy: "Agregar decorador o docstring con esquemas Pydantic de request/response para auto-generar documentación OpenAPI"
    pattern: ""

  - id: "readme_exists"
    category: "documentation"
    rule: "Cada módulo/servicio debe tener un README.md con descripción, instalación, uso y contribución"
    action: "Verificar existencia de README.md en la raíz de cada módulo con secciones mínimas"
    severity: "warning"
    auto_fix: false
    fix_strategy: "Requiere creación manual: generar template de README con secciones estándar para que el desarrollador complete"
    pattern: ""

  - id: "config_documented"
    category: "documentation"
    rule: "Todas las variables de configuración deben estar documentadas con tipo, valor por defecto y descripción"
    action: "Verificar que cada variable en .env.example o config schema tenga descripción y tipo"
    severity: "warning"
    auto_fix: true
    fix_strategy: "Agregar comentarios descriptivos al .env.example y type hints al schema de configuración"
    pattern: ""

  # ── ARCHITECTURE (5 checks) ──────────────────────────────────────────────
  - id: "dependency_injection"
    category: "architecture"
    rule: "Las dependencias deben ser inyectadas, no instanciadas dentro de la clase consumidora"
    action: "Verificar que las clases no instancien directamente servicios externos sino los reciban por constructor o parámetro"
    severity: "warning"
    auto_fix: false
    fix_strategy: "Refactor para recibir dependencias por constructor; usar un contenedor DI si está disponible"
    pattern: ""

  - id: "single_responsibility"
    category: "architecture"
    rule: "Cada módulo/clase debe tener una sola razón para cambiar; máximo 5 métodos públicos por clase"
    action: "Contar métodos públicos por clase y analizar la cohesión funcional del módulo"
    severity: "warning"
    auto_fix: false
    fix_strategy: "Dividir la clase en clases más pequeñas agrupando métodos por responsabilidad afin"
    pattern: ""

  - id: "no_circular_imports"
    category: "architecture"
    rule: "Prohibir importaciones circulares entre módulos; usar interfaces o eventos para desacoplar"
    action: "Construir grafo de dependencias y detectar ciclos en imports estáticos"
    severity: "critical"
    auto_fix: true
    fix_strategy: "Extraer la lógica compartida a un tercer módulo o usar importaciones lazy dentro de funciones"
    pattern: ""

  - id: "env_config_not_hardcoded"
    category: "architecture"
    rule: "La configuración específica del entorno (URLs, puertos, flags) debe venir de variables de entorno, no del código"
    action: "Buscar literales de configuración (URLs, puertos, timeouts) incrustados en el código fuente"
    severity: "critical"
    auto_fix: true
    fix_strategy: "Mover el valor a una variable de entorno con default razonable y referencia en config"
    pattern: ""

  - id: "proper_error_hierarchy"
    category: "architecture"
    rule: "Las excepciones deben seguir una jerarquía base del dominio; prohibir lanzar Exception genérica"
    action: "Verificar que todas las raise statements usen subclases de la excepción base del proyecto"
    severity: "warning"
    auto_fix: true
    fix_strategy: "Reemplazar raise Exception(msg) con raise <DomainError>(msg) de la jerarquía apropiada"
    pattern: "raise\\s+Exception\\("


  # ── COMPLIANCE (3 checks) ────────────────────────────────────────────────
  - id: "pii_encryption_at_rest"
    category: "compliance"
    rule: "Los datos de identificación personal (PII) deben estar cifrados en reposo en la base de datos"
    action: "Verificar que los campos PII (nombre, email, teléfono, SSN) usen columnas cifradas o encryption en ORM"
    severity: "critical"
    auto_fix: false
    fix_strategy: "Habilitar cifrado a nivel de columna usando la librería de cifrado del proyecto y migrar datos existentes"
    pattern: ""

  - id: "audit_log_for_mutations"
    category: "compliance"
    rule: "Toda operación de creación, actualización o eliminación debe generar un registro de auditoría inmutable"
    action: "Verificar que los endpoints de mutación y servicios de escritura emitan eventos de auditoría"
    severity: "critical"
    auto_fix: true
    fix_strategy: "Agregar decorador o middleware de auditoría que registre actor, acción, entidad, timestamp y diff"
    pattern: ""

  - id: "data_retention_policy"
    category: "compliance"
    rule: "Cada tipo de dato debe tener una política de retención definida con fecha de expiración automática"
    action: "Verificar que las tablas/colecciones con datos sensibles tengan configuración de TTL o job de purga"
    severity: "warning"
    auto_fix: false
    fix_strategy: "Definir políticas de retención en el manifiesto de datos y configurar TTL index o cron job de purga"


# ============================================================================
# DOMAIN-SPECIFIC CHECKS
# 3-5 checks per domain for all 20 domains
# ============================================================================

domain_specific_checks:

  # ── 1. HEALTHCARE ─────────────────────────────────────────────────────────
  - domain: "healthcare"
    checks:
      - id: "hipaa_compliance"
        rule: "Cumplimiento HIPAA: controles de acceso, logging y protección de PHI (Protected Health Information)"
        action: "Verificar que el acceso a datos de salud requiera autenticación, autorización por rol y logging de acceso"
        severity: "critical"
        applies_to: ["patient_records", "medical_reports", "prescription_services"]

      - id: "patient_data_encryption"
        rule: "Los registros de pacientes deben estar cifrados en tránsito (TLS 1.2+) y en reposo (AES-256)"
        action: "Validar configuración TLS del servicio y cifrado de columnas con datos de pacientes"
        severity: "critical"
        applies_to: ["patient_records", "lab_results", "imaging_systems"]

      - id: "audit_trail_required"
        rule: "Cada acceso o modificación a datos de pacientes debe generar traza de auditoría con identidad del usuario"
        action: "Verificar que el sistema registre quién, cuándo y qué accedió/modificó en datos clínicos"
        severity: "critical"
        applies_to: ["patient_records", "ehr_systems", "billing_services"]

      - id: "minimum_necessary_access"
        rule: "Principio de mínimo necesario: los usuarios solo acceden al subconjunto de PHI que necesitan para su función"
        action: "Revisar que las reglas de autorización segmenten el acceso a datos clínicos por rol y necesidad"
        severity: "critical"
        applies_to: ["access_control", "ehr_systems", "patient_portal"]

      - id: "phi_export_restrictions"
        rule: "La exportación de PHI debe requerir autorización explícita y registro de la descarga"
        action: "Verificar que las funciones de exportación/reportes de datos de pacientes requieran aprobación y log"
        severity: "warning"
        applies_to: ["reporting_services", "data_export", "analytics"]

  # ── 2. FINANCE ────────────────────────────────────────────────────────────
  - domain: "finance"
    checks:
      - id: "pci_dss_compliance"
        rule: "Cumplimiento PCI-DSS: prohibir almacenamiento de números de tarjeta; usar tokenización"
        action: "Escanea código y DB para detectar números de tarjeta almacenados; verificar uso de pasarela tokenizada"
        severity: "critical"
        applies_to: ["payment_processing", "billing_services", "wallet_services"]

      - id: "transaction_immutability"
        rule: "Las transacciones financieras son inmutables: solo se permiten compensaciones (reversals), nunca borrado"
        action: "Verificar que las tablas de transacciones no tengan DELETE habilitado y que las actualizaciones creen registros de compensación"
        severity: "critical"
        applies_to: ["transaction_services", "ledger_systems", "settlement_services"]

      - id: "dual_approval_large_amounts"
        rule: "Transacciones por encima del umbral configurado requieren aprobación dual antes de ejecución"
        action: "Verificar que el flujo de transacciones exija second_factor/approval para montos mayores al límite"
        severity: "critical"
        applies_to: ["transfer_services", "payment_processing", "wire_transfer"]

      - id: "reconciliation_mechanism"
        rule: "Cada módulo financiero debe implementar conciliación automática diaria entre registros internos y externos"
        action: "Verificar existencia de job/proceso de conciliación que compare balances y alerte discrepancias"
        severity: "warning"
        applies_to: ["ledger_systems", "banking_integration", "settlement_services"]

      - id: "fractional_cent_handling"
        rule: "Los cálculos monetarios deben usar precisión decimal fija; prohibir punto flotante para dinero"
        action: "Detectar uso de float/double en campos monetarios; exigir Decimal o entero en centavos"
        severity: "critical"
        applies_to: ["transaction_services", "pricing_engine", "tax_calculation"]

  # ── 3. EDUCATION ──────────────────────────────────────────────────────────
  - domain: "education"
    checks:
      - id: "ferpa_compliance"
        rule: "Cumplimiento FERPA: los registros educativos solo son accesibles por el estudiante y personal autorizado"
        action: "Verificar que las APIs de registros estudiantiles apliquen control de acceso basado en FERPA"
        severity: "critical"
        applies_to: ["student_records", "grade_systems", "enrollment_services"]

      - id: "student_data_privacy"
        rule: "Los datos de estudiantes menores de 13 requieren consentimiento parental verificable (COPPA)"
        action: "Verificar flujo de consentimiento parental antes de permitir acceso a datos de menores"
        severity: "critical"
        applies_to: ["student_portal", "learning_management", "assessment_systems"]

      - id: "grade_immutability"
        rule: "Las calificaciones publicadas son inmutables; cambios requieren proceso formal de apelación"
        action: "Verificar que las tablas de calificaciones solo acepten INSERT y UPDATE via proceso de apelación auditado"
        severity: "critical"
        applies_to: ["grade_systems", "transcript_services", "assessment_systems"]

      - id: "academic_integrity_monitoring"
        rule: "Las entregas deben pasar por verificación de integridad académica (plagio, IA) antes de aceptarse"
        action: "Verificar integración con servicio de detección de similitud en el flujo de submission"
        severity: "warning"
        applies_to: ["assignment_systems", "assessment_systems", "learning_management"]

  # ── 4. E-COMMERCE ─────────────────────────────────────────────────────────
  - domain: "ecommerce"
    checks:
      - id: "price_tampering_prevention"
        rule: "El precio enviado al checkout debe validarse contra el catálogo del servidor; nunca confiar en el cliente"
        action: "Verificar que el backend re-consulte el precio antes de crear la orden de pago"
        severity: "critical"
        applies_to: ["cart_services", "checkout_services", "pricing_engine"]

      - id: "inventory_atomic_reservation"
        rule: "La reserva de inventario debe ser atómica (lock o versionado) para prevenir overselling"
        action: "Verificar que la reducción de stock use optimistic locking o SELECT FOR UPDATE"
        severity: "critical"
        applies_to: ["inventory_services", "order_management", "warehouse_systems"]

      - id: "order_state_machine"
        rule: "Los pedidos deben seguir una máquina de estados estricta; prohibir transiciones inválidas"
        action: "Validar que cada transición de estado del pedido esté dentro de las permitidas por el state machine"
        severity: "critical"
        applies_to: ["order_management", "fulfillment_services", "return_services"]

      - id: "cart_abandonment_tracking"
        rule: "Los carritos abandonados deben ser detectados y seguidos para recuperación sin retener datos de pago"
        action: "Verificar que el sistema identifique carritos inactivos y limpie datos de tarjeta después de timeout"
        severity: "warning"
        applies_to: ["cart_services", "marketing_automation", "analytics"]

      - id: "tax_calculation_compliance"
        rule: "El cálculo de impuestos debe usar el servicio de tax compliance configurado; prohibir cálculos manuales"
        action: "Verificar que las funciones de cálculo de tax deleguen al servicio externo (Avalara/TaxJar)"
        severity: "critical"
        applies_to: ["checkout_services", "pricing_engine", "invoice_services"]

  # ── 5. LEGAL ──────────────────────────────────────────────────────────────
  - domain: "legal"
    checks:
      - id: "attorney_client_privilege"
        rule: "Las comunicaciones abogado-cliente deben estar aisladas con cifrado extremo a extremo"
        action: "Verificar que los canales de comunicación legal usen E2EE y acceso restringido por privilegio"
        severity: "critical"
        applies_to: ["case_management", "communication_systems", "document_vault"]

      - id: "document_version_immutability"
        rule: "Las versiones de documentos legales son inmutables; toda edición crea una nueva versión"
        action: "Verificar que el sistema de documentos use versionado append-only sin permitir modificación de versiones previas"
        severity: "critical"
        applies_to: ["document_management", "contract_services", "compliance_tracking"]

      - id: "conflict_of_interest_check"
        rule: "Cada nuevo caso debe pasar por verificación de conflicto de intereses antes de ser aceptado"
        action: "Verificar que el flujo de creación de caso incluya paso obligatorio de conflict check"
        severity: "critical"
        applies_to: ["case_management", "client_onboarding", "conflict_check_services"]

      - id: "statute_of_limitations_tracking"
        rule: "El sistema debe rastrear fechas de prescripción y alertar antes del vencimiento"
        action: "Verificar que los eventos con deadlines legales tengan cálculo automático de prescripción y alertas"
        severity: "warning"
        applies_to: ["case_management", "deadline_tracking", "calendar_services"]

  # ── 6. GOVERNMENT ─────────────────────────────────────────────────────────
  - domain: "government"
    checks:
      - id: "foia_compliance"
        rule: "Los sistemas deben poder responder solicitudes FOIA extrayendo datos no exentos eficientemente"
        action: "Verificar que los datos tengan metadata de clasificación y existan APIs de exportación para solicitudes FOIA"
        severity: "critical"
        applies_to: ["records_management", "public_portals", "data_repositories"]

      - id: "classified_data_handling"
        rule: "Los datos clasificados deben seguir controles de seguridad según su nivel (Unclassified/Secret/Top Secret)"
        action: "Verificar que los datos marcados como clasificados tengan los controles de acceso y cifrado correspondientes"
        severity: "critical"
        applies_to: ["classified_systems", "records_management", "communication_systems"]

      - id: "multi_factor_authentication_mandatory"
        rule: "Todos los accesos a sistemas gubernamentales requieren autenticación multifactor"
        action: "Verificar que la configuración de auth exija MFA sin excepción para todos los roles"
        severity: "critical"
        applies_to: ["access_control", "citizen_portals", "internal_systems"]

      - id: "accessibility_wcag"
        rule: "Las interfaces públicas deben cumplir WCAG 2.1 AA para accesibilidad universal"
        action: "Ejecutar auditoría de accesibilidad automatizada (axe-core) y verificar cumplimiento de criterios AA"
        severity: "warning"
        applies_to: ["public_portals", "citizen_services", "information_systems"]

      - id: "public_records_retention"
        rule: "Los registros públicos deben conservarse según la política de retención estipulada por ley"
        action: "Verificar configuración de retención y que no existan procesos de purga prematura de registros públicos"
        severity: "critical"
        applies_to: ["records_management", "archive_systems", "data_repositories"]

  # ── 7. REAL_ESTATE ────────────────────────────────────────────────────────
  - domain: "real_estate"
    checks:
      - id: "fair_housing_compliance"
        rule: "Cumplimiento de Fair Housing Act: prohibir filtrado por raza, religión, género, familia u origen nacional"
        action: "Verificar que los filtros de búsqueda y algoritmos de recomendación excluyan campos protegidos"
        severity: "critical"
        applies_to: ["property_listings", "search_services", "recommendation_engine"]

      - id: "escrow_transaction_integrity"
        rule: "Los fondos en depósito (escrow) deben estar en cuenta segregada y solo liberarse con condiciones verificadas"
        action: "Verificar que el flujo de escrow use cuentas segregadas y requiera verificación antes de release"
        severity: "critical"
        applies_to: ["transaction_services", "escrow_services", "closing_services"]

      - id: "disclosure_document_tracking"
        rule: "Todos los documentos de divulgación obligatoria deben ser rastreados con firma y fecha del receptor"
        action: "Verificar que el sistema registre recepción, firma y fecha de cada disclosure requerido"
        severity: "warning"
        applies_to: ["disclosure_services", "document_management", "compliance_tracking"]

      - id: "property_valuation_audit"
        rule: "Las valoraciones de propiedad deben ser auditables con metodología y fuente de datos documentadas"
        action: "Verificar que cada valuación guarde referencia a la metodología, comparables y fuente de datos usada"
        severity: "warning"
        applies_to: ["valuation_services", "appraisal_systems", "market_analytics"]

  # ── 8. MANUFACTURING ──────────────────────────────────────────────────────
  - domain: "manufacturing"
    checks:
      - id: "iso_9001_traceability"
        rule: "Trazabilidad ISO 9001: cada producto debe rastrearse desde materia prima hasta entrega final"
        action: "Verificar que los registros de producción vinculen lotes de entrada con lotes de salida"
        severity: "critical"
        applies_to: ["production_tracking", "quality_control", "supply_chain"]

      - id: "safety_compliance_osha"
        rule: "Cumplimiento OSHA: los procedimientos de seguridad deben estar documentados y accesibles en cada estación"
        action: "Verificar que cada estación de trabajo tenga documentos de seguridad asociados y actualizados"
        severity: "critical"
        applies_to: ["safety_systems", "workstation_management", "incident_reporting"]

      - id: "bom_version_control"
        rule: "Las listas de materiales (BOM) deben tener control de versiones; cambios requieren aprobación de ingeniería"
        action: "Verificar que las BOMs usen versionado y que cambios pasen por flujo de aprobación de ingeniería"
        severity: "critical"
        applies_to: ["bom_management", "engineering_change", "production_planning"]

      - id: "quality_inspection_required"
        rule: "Cada lote de producción debe pasar por inspección de calidad antes de liberación"
        action: "Verificar que el flujo de producción incluya gate de inspección obligatorio antes del paso de liberación"
        severity: "critical"
        applies_to: ["quality_control", "production_tracking", "warehouse_systems"]

      - id: "calibration_tracking"
        rule: "Los instrumentos de medición deben tener certificados de calibración vigentes"
        action: "Verificar que cada instrumento en uso tenga calibración no vencida; bloquear uso si está vencida"
        severity: "warning"
        applies_to: ["equipment_management", "quality_control", "maintenance_systems"]

  # ── 9. LOGISTICS ──────────────────────────────────────────────────────────
  - domain: "logistics"
    checks:
      - id: "shipment_tracking_real_time"
        rule: "Cada envío debe tener tracking en tiempo real con actualizaciones de estado en cada checkpoint"
        action: "Verificar que el sistema de envíos registre eventos en cada punto de la cadena logística"
        severity: "critical"
        applies_to: ["shipment_services", "fleet_management", "warehouse_systems"]

      - id: "hazardous_material_handling"
        rule: "Los materiales peligrosos deben seguir protocolos DOT/IATA con documentación y etiquetado completo"
        action: "Verificar que los envíos con materiales peligrosos tengan los documentos y etiquetas requeridos"
        severity: "critical"
        applies_to: ["shipment_services", "compliance_tracking", "label_services"]

      - id: "delivery_proof_required"
        rule: "Toda entrega debe tener prueba de entrega (POD) digital con firma o foto antes de cerrar el envío"
        action: "Verificar que el cierre de envío requiera evidencia de POD almacenada"
        severity: "critical"
        applies_to: ["delivery_services", "last_mile", "shipment_services"]

      - id: "route_optimization_fuel_compliance"
        rule: "Las rutas deben cumplir regulaciones de horas de servicio (HOS) del conductor"
        action: "Verificar que el motor de rutas respete límites de conducción y descanso obligatorio"
        severity: "warning"
        applies_to: ["route_optimization", "fleet_management", "driver_management"]

  # ── 10. ENERGY ─────────────────────────────────────────────────────────────
  - domain: "energy"
    checks:
      - id: "nerc_cip_compliance"
        rule: "Cumplimiento NERC CIP: los sistemas cibernéticos críticos deben tener controles de acceso y monitoreo"
        action: "Verificar que los sistemas SCADA y de control tengan controles CIP implementados y auditados"
        severity: "critical"
        applies_to: ["scada_systems", "grid_operations", "plant_management"]

      - id: "meter_data_integrity"
        rule: "Los datos de medición deben ser inmutables una vez registrados; correcciones crean registros aparte"
        action: "Verificar que las lecturas de medidores sean append-only y las correcciones sean registros separados"
        severity: "critical"
        applies_to: ["metering_systems", "billing_services", "data_acquisition"]

      - id: "safety_interlock_verification"
        rule: "Los sistemas de seguridad (interlocks) deben verificarse periódicamente y registrar resultado"
        action: "Verificar que existan jobs de verificación de interlocks con logging de resultados"
        severity: "critical"
        applies_to: ["safety_systems", "plant_management", "maintenance_systems"]

      - id: "carbon_emission_reporting"
        rule: "Las emisiones de carbono deben calcularse y reportarse según estándares GHG Protocol"
        action: "Verificar que los cálculos de emisiones usen factores del GHG Protocol y generen reportes auditables"
        severity: "warning"
        applies_to: ["sustainability_reporting", "emissions_tracking", "compliance_tracking"]

  # ── 11. AGRICULTURE ────────────────────────────────────────────────────────
  - domain: "agriculture"
    checks:
      - id: "pesticide_application_records"
        rule: "Cada aplicación de agroquímicos debe registrarse con tipo, dosis, fecha, applicator y zona"
        action: "Verificar que el sistema exija registro completo antes de permitir registro de aplicación"
        severity: "critical"
        applies_to: ["crop_management", "chemical_tracking", "compliance_services"]

      - id: "organic_certification_tracking"
        rule: "Los productos orgánicos deben mantener trazabilidad de prácticas orgánicas sin brechas"
        action: "Verificar cadena continua de certificaciones y prácticas orgánicas desde siembra hasta empaque"
        severity: "critical"
        applies_to: ["certification_services", "crop_management", "supply_chain"]

      - id: "food_safety_traceability"
        rule: "Trazabilidad FSMA: capaz de rastrear producto un paso adelante y un paso atrás en 24 horas"
        action: "Verificar que las APIs de trazabilidad respondan consultas de upstream/downstream en tiempo aceptable"
        severity: "critical"
        applies_to: ["traceability_systems", "food_safety", "supply_chain"]

      - id: "water_usage_monitoring"
        rule: "El uso de agua debe monitorearse y cumplir con derechos de agua asignados"
        action: "Verificar que el sistema de riego registre consumo y alerte al acercarse al límite de asignación"
        severity: "warning"
        applies_to: ["irrigation_systems", "resource_management", "compliance_services"]

  # ── 12. INSURANCE ─────────────────────────────────────────────────────────
  - domain: "insurance"
    checks:
      - id: "claim_fraud_detection"
        rule: "Los claims deben pasar por modelo de detección de fraude antes de aprobación"
        action: "Verificar que el pipeline de claims incluya paso de scoring de fraude obligatorio"
        severity: "critical"
        applies_to: ["claims_processing", "underwriting_services", "fraud_detection"]

      - id: "policy_document_immutability"
        rule: "Los documentos de póliza emitidos son inmutables; cambios generan endoso (endorsement) con versión"
        action: "Verificar que las pólizas usen versionado y las modificaciones creen endosos vinculados"
        severity: "critical"
        applies_to: ["policy_management", "document_services", "endorsement_services"]

      - id: "actuarial_data_accuracy"
        rule: "Los datos actuariales usados en cálculos de prima deben validarse contra fuente autorizada"
        action: "Verificar que los inputs de modelos actuariales tengan validación de fuente y checksum"
        severity: "critical"
        applies_to: ["pricing_engine", "underwriting_services", "actuarial_systems"]

      - id: "regulatory_filing_completeness"
        rule: "Los filings regulatorios deben incluir todos los campos requeridos por la jurisdicción antes de envío"
        action: "Verificar que el sistema valide completitud contra el schema regulatorio antes de permitir filing"
        severity: "warning"
        applies_to: ["compliance_tracking", "regulatory_filing", "reporting_services"]

  # ── 13. TELECOM ───────────────────────────────────────────────────────────
  - domain: "telecom"
    checks:
      - id: "lawful_intercept_capability"
        rule: "Los sistemas deben soportar interceptación legal (CALEA) con interfaz autorizada y auditada"
        action: "Verificar existencia de interfaz LI con control de acceso restrictivo y logging de uso"
        severity: "critical"
        applies_to: ["core_network", "subscriber_management", "lawful_intercept"]

      - id: "e911_location_accuracy"
        rule: "Las llamadas de emergencia deben proporcionar ubicación precisa según estándares FCC E911"
        action: "Verificar que el sistema de emergencias incluya mecanismo de ubicación con precisión requerida"
        severity: "critical"
        applies_to: ["emergency_services", "location_services", "voip_systems"]

      - id: "number_portability_compliance"
        rule: "El proceso de portabilidad numérica debe cumplir con regulaciones locales y completarse en plazo"
        action: "Verificar que el flujo de portabilidad cumpla timelines regulados y genere notificaciones requeridas"
        severity: "critical"
        applies_to: ["number_portability", "subscriber_management", "billing_services"]

      - id: "network_sla_monitoring"
        rule: "Los SLAs de red deben monitorearse continuamente con alertas automáticas ante violaciones"
        action: "Verificar que existan métricas de SLA con thresholds y alertas configuradas"
        severity: "warning"
        applies_to: ["network_operations", "monitoring_systems", "customer_services"]

      - id: "call_detail_record_retention"
        rule: "Los CDRs deben conservarse según período regulado y ser inmutables una vez generados"
        action: "Verificar inmutabilidad y retención configurada de registros de detalle de llamadas"
        severity: "critical"
        applies_to: ["billing_services", "cdr_systems", "compliance_tracking"]

  # ── 14. MEDIA ─────────────────────────────────────────────────────────────
  - domain: "media"
    checks:
      - id: "dmca_takedown_process"
        rule: "Debe existir proceso automatizado para recibir y procesar notificaciones DMCA de retiro de contenido"
        action: "Verificar que exista endpoint de notificación DMCA y flujo de procesamiento con timestamps"
        severity: "critical"
        applies_to: ["content_management", "user_generated_content", "legal_compliance"]

      - id: "content_rights_verification"
        rule: "Todo contenido publicado debe tener verificación de derechos de uso antes de distribución"
        action: "Verificar que el pipeline de publicación incluya gate de verificación de licencia/derechos"
        severity: "critical"
        applies_to: ["content_management", "distribution_services", "licensing_systems"]

      - id: "age_gating_for_restricted_content"
        rule: "El contenido restringido por edad debe requerir verificación de edad antes de acceso"
        action: "Verificar que las rutas de contenido restringido exijan age verification gate"
        severity: "critical"
        applies_to: ["content_delivery", "streaming_services", "user_management"]

      - id: "coppa_children_data"
        rule: "Los datos de niños menores de 13 requieren consentimiento parental verificable (COPPA)"
        action: "Verificar que el registro de menores incluya flujo de consentimiento parental"
        severity: "critical"
        applies_to: ["user_management", "content_delivery", "analytics_systems"]

  # ── 15. TRANSPORTATION ────────────────────────────────────────────────────
  - domain: "transportation"
    checks:
      - id: "vehicle_safety_inspection"
        rule: "Los vehículos deben tener inspección de seguridad vigente antes de ser asignados a rutas"
        action: "Verificar que la asignación de vehículo valide inspección vigente; bloquear si vencida"
        severity: "critical"
        applies_to: ["fleet_management", "vehicle_tracking", "maintenance_systems"]

      - id: "passenger_manifest_accuracy"
        rule: "El manifiesto de pasajeros debe ser exacto y estar disponible antes de la partida"
        action: "Verificar que el sistema genere manifiesto final con check-in cerrado antes de departure"
        severity: "critical"
        applies_to: ["booking_systems", "passenger_services", "safety_systems"]

      - id: "driver_hours_of_service"
        rule: "Cumplimiento de horas de servicio: los conductores no deben exceder límites de conducción continua"
        action: "Verificar que el sistema de despacho valide HOS antes de asignar viajes y alerte violaciones"
        severity: "critical"
        applies_to: ["driver_management", "dispatch_systems", "compliance_tracking"]

      - id: "accessibility_ada_compliance"
        rule: "Los servicios de transporte deben cumplir ADA con opciones de accesibilidad disponibles"
        action: "Verificar que el sistema ofrezca y rastree opciones de accesibilidad en reservas y vehículos"
        severity: "warning"
        applies_to: ["booking_systems", "vehicle_tracking", "customer_services"]

  # ── 16. HOSPITALITY ───────────────────────────────────────────────────────
  - domain: "hospitality"
    checks:
      - id: "pci_booking_compliance"
        rule: "Los datos de tarjeta de reserva deben manejarse conforme PCI-DSS; prohibir almacenamiento de CVV"
        action: "Verificar que el sistema de reservas no almacene CVV y use tokenización para datos de tarjeta"
        severity: "critical"
        applies_to: ["reservation_systems", "payment_processing", "guest_services"]

      - id: "guest_data_minimization"
        rule: "Solo recopilar datos de huéspedes necesarios para la operación; eliminar después del período de retención"
        action: "Verificar que los formularios y APIs de registro solo pidan campos necesarios y exista política de purga"
        severity: "warning"
        applies_to: ["guest_services", "crm_systems", "marketing_automation"]

      - id: "overbooking_prevention"
        rule: "El sistema debe prevenir overbooking mediante control de inventario en tiempo real"
        action: "Verificar que las reservas usen locks u optimistic concurrency en el inventario de habitaciones"
        severity: "critical"
        applies_to: ["reservation_systems", "inventory_management", "revenue_management"]

      - id: "health_safety_compliance"
        rule: "Cumplimiento de normativas de salud y seguridad local (HACCP para alimentos, sanitización)"
        action: "Verificar que existan registros de cumplimiento de sanitización y manejo de alimentos"
        severity: "warning"
        applies_to: ["food_beverage", "housekeeping_systems", "compliance_tracking"]

  # ── 17. RETAIL ────────────────────────────────────────────────────────────
  - domain: "retail"
    checks:
      - id: "pos_transaction_integrity"
        rule: "Las transacciones POS deben ser atómicas; no permitir ventas parciales o inconsistencias"
        action: "Verificar que las transacciones POS usen transacciones de BD y rollback en caso de error"
        severity: "critical"
        applies_to: ["pos_systems", "transaction_services", "payment_processing"]

      - id: "return_refund_audit_trail"
        rule: "Toda devolución/reembolso debe tener traza de auditoría con motivo, autorización y monto"
        action: "Verificar que el flujo de devoluciones genere registro de auditoría completo"
        severity: "critical"
        applies_to: ["return_services", "refund_processing", "compliance_tracking"]

      - id: "loyalty_points_atomicity"
        rule: "La acumulación y redención de puntos de lealtad debe ser atómica y consistente"
        action: "Verificar que las operaciones de puntos usen transacciones y balances idempotentes"
        severity: "critical"
        applies_to: ["loyalty_systems", "customer_services", "promotion_engine"]

      - id: "pricing_consistency_omnichannel"
        rule: "Los precios deben ser consistentes entre todos los canales (tienda, web, app) en tiempo real"
        action: "Verificar que los servicios de precio usen fuente única de verdad con caché invalidado"
        severity: "warning"
        applies_to: ["pricing_engine", "product_services", "catalog_systems"]

  # ── 18. CONSTRUCTION ──────────────────────────────────────────────────────
  - domain: "construction"
    checks:
      - id: "permit_verification"
        rule: "Los permisos de construcción deben estar verificados y vigentes antes de iniciar cualquier obra"
        action: "Verificar que el sistema valide permisos vigentes antes de permitir inicio de fase de construcción"
        severity: "critical"
        applies_to: ["project_management", "permit_services", "compliance_tracking"]

      - id: "safety_incident_reporting"
        rule: "Todo incidente de seguridad debe reportarse dentro de 24 horas con detalles completos"
        action: "Verificar que el sistema de incidentes tenga timestamps y campos obligatorios no vacíos"
        severity: "critical"
        applies_to: ["safety_systems", "incident_reporting", "hr_services"]

      - id: "change_order_approval"
        rule: "Los cambios de alcance (change orders) requieren aprobación formal antes de ejecución"
        action: "Verificar que las modificaciones al scope pasen por flujo de aprobación con firma digital"
        severity: "critical"
        applies_to: ["project_management", "contract_services", "cost_management"]

      - id: "structural_calculation_versioning"
        rule: "Los cálculos estructurales deben tener control de versiones y solo la versión aprobada dirige la obra"
        action: "Verificar que los documentos de ingeniería usen versionado con marca de versión aprobada"
        severity: "critical"
        applies_to: ["engineering_services", "document_management", "quality_control"]

  # ── 19. PHARMACEUTICAL ────────────────────────────────────────────────────
  - domain: "pharmaceutical"
    checks:
