        rule: "Los sistemas GxP deben tener validación documentada, procedimientos operativos y control de cambios"
        action: "Verificar que exista documentación de validación, SOPs vinculados y proceso de change control"
        severity: "critical"
        applies_to: ["quality_systems", "manufacturing_execution", "laboratory_systems"]

  # ── 20. AUTOMOTIVE ────────────────────────────────────────────────────────
  - domain: "automotive"
    checks:
      - id: "iso_26262_functional_safety"
        rule: "Los sistemas de seguridad funcional deben cumplir ISO 26262 con ASIL apropiado"
        action: "Verificar que los componentes de seguridad tengan documentación ASIL y tests conforme al nivel"
