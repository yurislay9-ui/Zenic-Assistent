niche:
  name: "agri_marketplace"
  domain: "agriculture"
  subdomain: "agricultural_marketplace"
  description: "Plataforma de marketplace agrícola para la conexión entre productores y compradores, gestión de listados de productos, pedidos, certificaciones de calidad, transporte y reseñas con pagos integrados"
  scale: "medium"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - stripe_payments
    - email_smtp
    - notification_manager
    - inventory_tracker
    - invoice_calculator
    - crud_service
    - report_generator
    - pdf_generator
  variables:
    project_name: "agri_marketplace"
    app_name: "AgriMarketplace"
    template_type: "niche"
    db_name: "agri_marketplace.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Product"
    fields:
      - "id:uuid"
      - "name:str"
      - "category:str"
      - "subcategory:str"
      - "unit:str"
      - "unit_weight_kg:float"
      - "origin:str"
      - "season:str"
      - "shelf_life_days:int"
      - "storage_conditions:str"
      - "certifications:json"
      - "status:str"

  - name: "Seller"
    fields:
      - "id:uuid"
      - "business_name:str"
      - "contact_name:str"
      - "email:str"
      - "phone:str"
      - "address:str"
      - "city:str"
      - "country:str"
      - "tax_id:str"
      - "rating:float"
      - "verified:bool"
      - "status:str"

  - name: "Buyer"
    fields:
      - "id:uuid"
      - "business_name:str"
      - "contact_name:str"
      - "email:str"
      - "phone:str"
      - "address:str"
      - "city:str"
      - "country:str"
      - "tax_id:str"
      - "buyer_type:str"
      - "status:str"

  - name: "Listing"
    fields:
      - "id:uuid"
      - "product_id:uuid"
      - "seller_id:uuid"
      - "title:str"
      - "description:str"
      - "price_per_unit:float"
      - "currency:str"
      - "available_quantity:float"
      - "minimum_order:float"
      - "harvest_date:date"
      - "location:str"
      - "images:json"
      - "status:str"

  - name: "Order"
    fields:
      - "id:uuid"
      - "order_number:str"
      - "buyer_id:uuid"
      - "listing_id:uuid"
      - "seller_id:uuid"
      - "quantity:float"
      - "unit_price:float"
      - "total_amount:float"
      - "currency:str"
      - "status:str"
      - "order_date:datetime"
      - "delivery_date:date"
      - "payment_status:str"

  - name: "QualityCert"
    fields:
      - "id:uuid"
      - "seller_id:uuid"
      - "product_id:uuid"
      - "cert_type:str"
      - "cert_number:str"
      - "issuing_body:str"
      - "issue_date:date"
      - "expiry_date:date"
      - "scope:str"
      - "document_path:str"
      - "status:str"

  - name: "Transport"
    fields:
      - "id:uuid"
      - "order_id:uuid"
      - "carrier:str"
      - "vehicle_type:str"
      - "driver_name:str"
      - "driver_phone:str"
      - "origin:str"
      - "destination:str"
      - "pickup_date:datetime"
      - "eta:datetime"
      - "temperature_controlled:bool"
      - "status:str"

  - name: "Review"
    fields:
      - "id:uuid"
      - "order_id:uuid"
      - "reviewer_id:uuid"
      - "reviewer_type:str"
      - "rating:int"
      - "quality_rating:int"
      - "delivery_rating:int"
      - "comment:str"
      - "response:str"
      - "created_at:datetime"
      - "status:str"

workflow:
  typical_paths:
    - "Publicación de listado → Búsqueda por comprador → Solicitud de pedido → Pago → Confirmación del vendedor → Organización de transporte → Entrega → Calificación"
    - "Registro de vendedor → Verificación → Carga de certificaciones → Publicación de productos → Gestión de pedidos → Envío → Cobro"
    - "Verificación de certificado → Aprobación → Asociación a producto/listado → Vigencia → Renovación → Auditoría"
  triggers:
    - "order_placed:Notificación al vendedor cuando un comprador realiza un pedido"
    - "payment_confirmed:Aviso al vendedor para proceder con el envío tras confirmación de pago"
    - "listing_expiring:Aviso al vendedor cuando un listado está próximo a expirar"
    - "quality_cert_expiring:Alerta de certificación de calidad próxima a vencer para renovación"
    - "delivery_completed:Notificación al comprador para calificar la experiencia de compra"

features:
  core:
    - "Marketplace con búsqueda y filtros por producto, ubicación y certificación"
    - "Gestión de listados de productos con precios y disponibilidad"
    - "Procesamiento de pedidos con flujo de aprobación"
    - "Pagos integrados con Stripe"
    - "Sistema de calificaciones y reseñas entre compradores y vendedores"
  advanced:
    - "Verificación de vendedores con validación de identidad y documentos"
    - "Gestión de certificaciones de calidad con vigencia y renovación"
    - "Cálculo automático de facturas con impuestos según jurisdicción"
    - "Dashboard de ventas y métricas de desempeño para vendedores"
    - "Sistema de mensajería entre comprador y vendedor"
  optional:
    - "Integración con logística de cadena de frío"
    - "Subastas y precios dinámicos basados en oferta y demanda"
    - "Módulo de cumplimiento de seguridad alimentaria"
    - "API para integración con sistemas ERP de compradores mayoristas"
    - "Reportes de trazabilidad de producto de finca a mesa"

risk_assessment:
  data_sensitivity: "medium"
  compliance: [GDPR, Food Safety]
  backup_frequency: "daily"
  access_control: "rbac"
  audit_trail: true
