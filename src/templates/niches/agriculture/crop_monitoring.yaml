niche:
  name: "crop_monitoring"
  domain: "agriculture"
  subdomain: "crop_monitoring"
  description: "Sistema de monitoreo de cultivos con integración de sensores IoT, análisis de lecturas ambientales, alertas inteligentes, gestión de tratamientos y datos meteorológicos para la toma de decisiones agrícolas"
  scale: "medium"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - data_analyzer
    - notification_manager
    - webhook_server
    - crud_service
    - report_generator
    - email_smtp
  variables:
    project_name: "crop_monitoring"
    app_name: "CropMonitoring"
    template_type: "niche"
    db_name: "crop_monitoring.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Field"
    fields:
      - "id:uuid"
      - "name:str"
      - "farm_id:uuid"
      - "area_hectares:float"
      - "crop_type:str"
      - "variety:str"
      - "planting_date:date"
      - "growth_stage:str"
      - "boundary:json"
      - "elevation_m:float"
      - "status:str"

  - name: "Sensor"
    fields:
      - "id:uuid"
      - "field_id:uuid"
      - "code:str"
      - "type:str"
      - "manufacturer:str"
      - "measurements:json"
      - "installation_date:date"
      - "last_calibration:date"
      - "battery_level:float"
      - "transmission_interval_min:int"
      - "status:str"

  - name: "Reading"
    fields:
      - "id:uuid"
      - "sensor_id:uuid"
      - "field_id:uuid"
      - "metric:str"
      - "value:float"
      - "unit:str"
      - "timestamp:datetime"
      - "quality_flag:str"
      - "anomaly:bool"
      - "source:str"

  - name: "Alert"
    fields:
      - "id:uuid"
      - "field_id:uuid"
      - "sensor_id:uuid"
      - "type:str"
      - "severity:str"
      - "metric:str"
      - "threshold:float"
      - "current_value:float"
      - "message:str"
      - "triggered_at:datetime"
      - "status:str"

  - name: "Crop"
    fields:
      - "id:uuid"
      - "name:str"
      - "variety:str"
      - "growth_stages:json"
      - "optimal_temp_min:float"
      - "optimal_temp_max:float"
      - "optimal_humidity_min:float"
      - "optimal_humidity_max:float"
      - "water_need_mm_day:float"
      - "disease_susceptibility:json"
      - "status:str"

  - name: "Treatment"
    fields:
      - "id:uuid"
      - "field_id:uuid"
      - "crop_id:uuid"
      - "type:str"
      - "product:str"
      - "dose_per_hectare:float"
      - "unit:str"
      - "application_date:date"
      - "applied_by:str"
      - "weather_conditions:json"
      - "effectiveness:str"
      - "status:str"

  - name: "Weather"
    fields:
      - "id:uuid"
      - "field_id:uuid"
      - "timestamp:datetime"
      - "temperature_c:float"
      - "humidity_pct:float"
      - "wind_speed_kmh:float"
      - "wind_direction:str"
      - "rainfall_mm:float"
      - "solar_radiation:float"
      - "source:str"

  - name: "Forecast"
    fields:
      - "id:uuid"
      - "field_id:uuid"
      - "forecast_date:date"
      - "temperature_min:float"
      - "temperature_max:float"
      - "humidity_pct:float"
      - "rain_probability_pct:float"
      - "rainfall_mm:float"
      - "wind_speed_kmh:float"
      - "source:str"
      - "retrieved_at:datetime"

workflow:
  typical_paths:
    - "Lectura de sensor → Evaluación contra umbrales → Generación de alerta (si aplica) → Notificación al agricultor → Decisión de tratamiento → Aplicación → Registro de efectividad"
    - "Pronóstico meteorológico → Evaluación de riesgo para cultivo → Alerta preventiva → Ajuste de plan de riego/tratamiento → Registro de acciones tomadas"
    - "Detección de anomalía → Análisis de datos históricos → Diagnóstico → Recomendación de tratamiento → Aplicación → Monitoreo post-tratamiento"
  triggers:
    - "sensor_threshold_exceeded:Alerta automática cuando una lectura supera los umbrales óptimos del cultivo"
    - "sensor_offline:Aviso cuando un sensor deja de transmitir datos más del tiempo esperado"
    - "weather_alert_received:Notificación ante pronóstico de condiciones adversas (helada, tormenta, sequía)"
    - "anomaly_detected:Alerta ante patrón anómalo detectado por análisis de datos"
    - "treatment_reminder:Recordatorio de tratamiento programado basado en etapa de crecimiento"

features:
  core:
    - "Monitoreo en tiempo real de sensores de campo (temperatura, humedad, suelo)"
    - "Alertas inteligentes basadas en umbrales y condiciones del cultivo"
    - "Gestión de tratamientos fitosanitarios con registro de aplicación"
    - "Integración de datos meteorológicos y pronósticos"
    - "Dashboard de salud del cultivo por campo"
  advanced:
    - "Detección de anomalías con análisis estadístico de lecturas"
    - "Modelos predictivos de enfermedad basados en condiciones ambientales"
    - "Recomendaciones automáticas de riego basadas en datos de sensores"
    - "Webhooks para integración con plataformas IoT externas"
    - "Análisis de tendencias de crecimiento por campo y temporada"
  optional:
    - "Integración con imágenes de dron y satélite (NDVI)"
    - "Módulo de conteo y estimación de rendimiento por visión artificial"
    - "Integración con sistemas de riego automatizado"
    - "Análisis de estrés hídrico con imágenes térmicas"
    - "Modelos de fenología para predicción de etapas de crecimiento"

risk_assessment:
  data_sensitivity: "low"
  compliance: [GDPR]
  backup_frequency: "daily"
  access_control: "basic"
  audit_trail: false
