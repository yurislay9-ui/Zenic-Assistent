niche:
  name: "farm_management"
  domain: "agriculture"
  subdomain: "farm_management"
  description: "Sistema de gestión integral de fincas y explotaciones agrícolas para el control de campos, cultivos, plantaciones, cosechas, equipos, trabajadores y gastos operativos"
  scale: "medium"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - inventory_tracker
    - task_scheduler
    - report_generator
    - crud_service
    - notification_manager
    - pdf_generator
    - email_smtp
  variables:
    project_name: "farm_management"
    app_name: "FarmManagement"
    template_type: "niche"
    db_name: "farm_management.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Farm"
    fields:
      - "id:uuid"
      - "name:str"
      - "location:str"
      - "latitude:float"
      - "longitude:float"
      - "total_area_hectares:float"
      - "usable_area_hectares:float"
      - "owner:str"
      - "climate_zone:str"
      - "soil_type:str"
      - "status:str"

  - name: "Field"
    fields:
      - "id:uuid"
      - "farm_id:uuid"
      - "name:str"
      - "area_hectares:float"
      - "soil_type:str"
      - "irrigation_type:str"
      - "current_crop_id:uuid"
      - "boundary:json"
      - "ph_level:float"
      - "organic_matter_pct:float"
      - "status:str"

  - name: "Crop"
    fields:
      - "id:uuid"
      - "name:str"
      - "variety:str"
      - "category:str"
      - "growing_season:str"
      - "expected_yield_per_hectare:float"
      - "water_requirement_mm:float"
      - "nitrogen_req_kg:float"
      - "planting_depth_cm:float"
      - "days_to_maturity:int"
      - "status:str"

  - name: "Planting"
    fields:
      - "id:uuid"
      - "field_id:uuid"
      - "crop_id:uuid"
      - "planting_date:date"
      - "expected_harvest_date:date"
      - "seed_quantity_kg:float"
      - "seed_variety:str"
      - "method:str"
      - "row_spacing_cm:float"
      - "plant_spacing_cm:float"
      - "status:str"

  - name: "Harvest"
    fields:
      - "id:uuid"
      - "planting_id:uuid"
      - "field_id:uuid"
      - "crop_id:uuid"
      - "harvest_date:date"
      - "yield_tons:float"
      - "yield_per_hectare:float"
      - "quality_grade:str"
      - "moisture_pct:float"
      - "storage_location:str"
      - "status:str"

  - name: "Equipment"
    fields:
      - "id:uuid"
      - "name:str"
      - "type:str"
      - "brand:str"
      - "model:str"
      - "year:int"
      - "serial_number:str"
      - "purchase_date:date"
      - "hour_meter:float"
      - "status:str"
      - "current_location:str"

  - name: "Worker"
    fields:
      - "id:uuid"
      - "first_name:str"
      - "last_name:str"
      - "role:str"
      - "phone:str"
      - "hire_date:date"
      - "daily_rate:float"
      - "skills:json"
      - "assigned_field_id:uuid"
      - "status:str"

  - name: "Expense"
    fields:
      - "id:uuid"
      - "farm_id:uuid"
      - "category:str"
      - "description:str"
      - "amount:float"
      - "currency:str"
      - "date:date"
      - "supplier:str"
      - "receipt_path:str"
      - "approved_by:uuid"
      - "status:str"

workflow:
  typical_paths:
    - "Planificación de temporada → Selección de cultivo → Preparación del campo → Plantación → Monitoreo → Cosecha → Registro de rendimiento → Almacenamiento"
    - "Asignación de equipo → Programación de tarea → Ejecución → Registro de horas → Mantenimiento → Disponibilidad"
    - "Registro de gasto → Clasificación por categoría → Aprobación → Pago → Reporte de costos por campo/cultivo"
  triggers:
    - "planting_date_approaching:Recordatorio de fecha de plantación próxima para preparación del campo"
    - "harvest_window_open:Aviso cuando la ventana de cosecha está próxima según días a madurez"
    - "equipment_maintenance_due:Alerta de mantenimiento de equipo basada en horas de uso"
    - "expense_budget_exceeded:Notificación cuando los gastos de una categoría superan el presupuesto"
    - "field_task_overdue:Aviso de tarea de campo no completada en la fecha programada"

features:
  core:
    - "Gestión de fincas con múltiples campos y superficies"
    - "Planificación y seguimiento de plantaciones por campo y cultivo"
    - "Registro de cosechas con rendimiento y calidad"
    - "Control de inventario de insumos y equipos"
    - "Gestión de trabajadores y asignación de tareas"
  advanced:
    - "Análisis de rentabilidad por cultivo y campo"
    - "Calendario agrícola con alertas de ventana de plantación y cosecha"
    - "Dashboard de gastos operativos por categoría y campo"
    - "Historial de rendimiento por campo para análisis de productividad"
  optional:
    - "Integración con estaciones meteorológicas locales"
    - "Módulo de certificación orgánica y trazabilidad"
    - "Aplicación móvil para registro de campo offline"
    - "Análisis de suelo con recomendaciones de fertilización"
    - "Mapeo GIS de campos con imágenes satelitales"

risk_assessment:
  data_sensitivity: "low"
  compliance: [GDPR]
  backup_frequency: "daily"
  access_control: "basic"
  audit_trail: false
