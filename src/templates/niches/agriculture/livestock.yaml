niche:
  name: "livestock"
  domain: "agriculture"
  subdomain: "livestock_management"
  description: "Sistema de gestión de ganado para el registro individual de animales, control sanitario, alimentación, vacunación, pesaje, localización y gestión de ventas con cumplimiento normativo de bienestar animal"
  scale: "medium"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - inventory_tracker
    - notification_manager
    - task_scheduler
    - crud_service
    - report_generator
    - pdf_generator
    - email_smtp
  variables:
    project_name: "livestock"
    app_name: "Livestock"
    template_type: "niche"
    db_name: "livestock.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Animal"
    fields:
      - "id:uuid"
      - "tag_number:str"
      - "electronic_id:str"
      - "name:str"
      - "species:str"
      - "breed_id:uuid"
      - "gender:str"
      - "birth_date:date"
      - "origin:str"
      - "status:str"
      - "location_id:uuid"
      - "mother_id:uuid"
      - "father_id:uuid"

  - name: "Breed"
    fields:
      - "id:uuid"
      - "name:str"
      - "species:str"
      - "origin:str"
      - "characteristics:json"
      - "average_weight_kg:float"
      - "maturity_age_months:int"
      - "purpose:str"
      - "status:str"

  - name: "HealthRecord"
    fields:
      - "id:uuid"
      - "animal_id:uuid"
      - "date:datetime"
      - "type:str"
      - "diagnosis:str"
      - "treatment:str"
      - "veterinarian:str"
      - "medication:str"
      - "dosage:str"
      - "follow_up_date:date"
      - "status:str"

  - name: "Feeding"
    fields:
      - "id:uuid"
      - "animal_id:uuid"
      - "date:date"
      - "feed_type:str"
      - "quantity_kg:float"
      - "cost:float"
      - "supplier:str"
      - "nutrients:json"
      - "feeding_group:str"
      - "notes:str"

  - name: "Vaccination"
    fields:
      - "id:uuid"
      - "animal_id:uuid"
      - "vaccine:str"
      - "dose_number:int"
      - "application_date:date"
      - "next_dose_date:date"
      - "applied_by:str"
      - "batch_number:str"
      - "manufacturer:str"
      - "adverse_reaction:bool"
      - "status:str"

  - name: "Weight"
    fields:
      - "id:uuid"
      - "animal_id:uuid"
      - "weight_kg:float"
      - "measurement_date:date"
      - "method:str"
      - "gain_since_last_kg:float"
      - "average_daily_gain_g:float"
      - "body_condition_score:float"
      - "measured_by:str"

  - name: "Location"
    fields:
      - "id:uuid"
      - "name:str"
      - "type:str"
      - "capacity:int"
      - "current_occupancy:int"
      - "area_sqm:float"
      - "pasture_type:str"
      - "facilities:json"
      - "status:str"

  - name: "Sale"
    fields:
      - "id:uuid"
      - "animal_id:uuid"
      - "buyer:str"
      - "sale_date:date"
      - "weight_at_sale_kg:float"
      - "price_per_kg:float"
      - "total_amount:float"
      - "currency:str"
      - "purpose:str"
      - "transport_id:str"
      - "status:str"

workflow:
  typical_paths:
    - "Registro de animal → Asignación de ubicación → Plan de alimentación → Programa de vacunación → Monitoreo de peso → Evaluación de salud → Venta o reproducción"
    - "Programación de vacunación → Notificación → Aplicación → Registro → Seguimiento de reacción adversa → Próxima dosis"
    - "Pesaje periódico → Cálculo de ganancia diaria → Evaluación de desempeño → Ajuste de alimentación → Decisión de venta"
  triggers:
    - "vaccination_due:Recordatorio de vacunación próxima según calendario"
    - "health_check_overdue:Aviso cuando un animal no ha tenido revisión sanitaria en el período definido"
    - "weight_below_expected:Alerta cuando la ganancia de peso está por debajo del rango esperado para la raza"
    - "location_capacity_exceeded:Notificación cuando una ubicación supera su capacidad máxima"
    - "medication_withdrawal_period:Alerta cuando finaliza el período de retiro de medicación antes de venta"

features:
  core:
    - "Registro individual de animales con identificación electrónica"
    - "Historial sanitario completo por animal"
    - "Programa de vacunación con calendario y seguimiento"
    - "Registro de pesaje con cálculo de ganancia diaria"
    - "Gestión de ubicaciones y pastoreo"
  advanced:
    - "Curvas de crecimiento por raza con comparativas"
    - "Análisis de eficiencia alimenticia (conversión alimento/peso)"
    - "Dashboard de salud del hato con indicadores clave"
    - "Genealogía y trazabilidad parental"
    - "Gestión de lotes por grupo de edad y producción"
  optional:
    - "Integración con básculas electrónicas y lectores RFID"
    - "Módulo de reproducción con gestión de monta y gestación"
    - "Rastreo GPS de animales en pastoreo extensivo"
    - "Reportes de bienestar animal para certificaciones"
    - "Análisis económico por animal con punto de equilibrio"

risk_assessment:
  data_sensitivity: "low"
  compliance: [GDPR, Animal Welfare]
  backup_frequency: "daily"
  access_control: "basic"
  audit_trail: false
