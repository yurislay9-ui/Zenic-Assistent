niche:
  name: "car_rental"
  domain: "automotive"
  subdomain: "rental_services"
  description: "Sistema de gestión para empresas de alquiler de vehículos que administra reservas, flota, pagos, seguros, daños, localizaciones y relaciones con clientes."
  scale: "medium"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - stripe_payments
    - email_smtp
    - invoice_calculator
    - inventory_tracker
    - notification_manager
    - pdf_generator
    - crud_service
    - report_generator
    - backup_restore
  variables:
    project_name: "car_rental"
    app_name: "CarRental"
    template_type: "niche"
    db_name: "car_rental.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Vehicle"
    fields:
      - "vehicle_id:uuid"
      - "vin:str"
      - "make:str"
      - "model:str"
      - "year:int"
      - "color:str"
      - "license_plate:str"
      - "vehicle_type:str"
      - "transmission:str"
      - "seats:int"
      - "daily_rate:float"
      - "status:str"
      - "location_id:uuid"
      - "mileage:int"

  - name: "Customer"
    fields:
      - "customer_id:uuid"
      - "first_name:str"
      - "last_name:str"
      - "email:str"
      - "phone:str"
      - "address:str"
      - "driver_license:str"
      - "license_expiry:date"
      - "date_of_birth:date"
      - "registration_date:date"
      - "status:str"
      - "total_rentals:int"

  - name: "Rental"
    fields:
      - "rental_id:uuid"
      - "vehicle_id:uuid"
      - "customer_id:uuid"
      - "pickup_location_id:uuid"
      - "return_location_id:uuid"
      - "pickup_datetime:datetime"
      - "return_datetime:datetime"
      - "actual_return_datetime:datetime"
      - "daily_rate:float"
      - "total_amount:float"
      - "status:str"
      - "odometer_out:int"
      - "odometer_in:int"

  - name: "Reservation"
    fields:
      - "reservation_id:uuid"
      - "customer_id:uuid"
      - "vehicle_type:str"
      - "pickup_location_id:uuid"
      - "return_location_id:uuid"
      - "pickup_datetime:datetime"
      - "return_datetime:datetime"
      - "estimated_total:float"
      - "status:str"
      - "created_date:datetime"
      - "notes:str"
      - "confirmation_code:str"

  - name: "Payment"
    fields:
      - "payment_id:uuid"
      - "rental_id:uuid"
      - "customer_id:uuid"
      - "amount:float"
      - "currency:str"
      - "payment_method:str"
      - "transaction_id:str"
      - "payment_type:str"
      - "payment_date:datetime"
      - "status:str"
      - "refund_amount:float"

  - name: "Damage"
    fields:
      - "damage_id:uuid"
      - "rental_id:uuid"
      - "vehicle_id:uuid"
      - "description:str"
      - "damage_type:str"
      - "severity:str"
      - "reported_date:datetime"
      - "repair_cost:float"
      - "insurance_covered:bool"
      - "customer_charged:float"
      - "status:str"
      - "photo_path:str"

  - name: "Insurance"
    fields:
      - "insurance_id:uuid"
      - "rental_id:uuid"
      - "policy_type:str"
      - "coverage_level:str"
      - "daily_cost:float"
      - "deductible:float"
      - "max_coverage:float"
      - "provider:str"
      - "policy_number:str"
      - "status:str"
      - "description:str"

  - name: "Location"
    fields:
      - "location_id:uuid"
      - "name:str"
      - "address:str"
      - "city:str"
      - "country:str"
      - "location_lat:float"
      - "location_lon:float"
      - "phone:str"
      - "operating_hours:str"
      - "vehicle_capacity:int"
      - "status:str"

workflow:
  typical_paths:
    - "Búsqueda de disponibilidad → Reserva → Confirmación → Recogida del vehículo → Inspección de salida → Uso → Devolución → Inspección de entrada → Facturación final → Cierre"
    - "Reserva online → Pago con tarjeta → Confirmación por email → Check-in en localización → Asignación de vehículo → Alquiler → Devolución → Cargo adicional si aplica"
    - "Reporte de daño → Inspección → Valoración del costo → Verificación de cobertura de seguro → Cargo al cliente si corresponde → Reparación → Actualización de estado del vehículo"
  triggers:
    - "reservation_confirmed:Envío de confirmación y detalles al cliente tras reservar"
    - "pickup_reminder:Recordatorio al cliente antes de la fecha de recogida del vehículo"
    - "return_approaching:Aviso al cliente cuando se acerca la fecha y hora de devolución"
    - "overdue_return:Alerta cuando un vehículo no ha sido devuelto en la fecha y hora acordadas"
    - "vehicle_available:Notificación cuando un vehículo devuelto está listo para nueva asignación"

features:
  core:
    - "Sistema de reservas con verificación de disponibilidad en tiempo real por localización y tipo de vehículo"
    - "Gestión de flota con seguimiento de estado, ubicación y disponibilidad por localización"
    - "Procesamiento de pagos con integración Stripe incluyendo depósitos de seguridad y cargos adicionales"
    - "Gestión de seguros con múltiples niveles de cobertura y cálculo automático de costos"
    - "Registro e inspección de daños con documentación fotográfica y seguimiento de reparaciones"
    - "Gestión multi-localización con transferencias de vehículos entre sucursales"
  advanced:
    - "Optimización de asignación de vehículos basada en previsión de demanda por localización y fecha"
    - "Análisis de rentabilidad por vehículo, tipo y localización con costos operativos"
    - "Detección de patrones de fraude en reservas y devoluciones"
    - "Precios dinámicos basados en demanda, temporada y disponibilidad"
  optional:
    - "Check-in y check-out digital con verificación de identidad y firma electrónica"
    - "Integración con sistemas de llaves inteligentes y acceso sin llave al vehículo"
    - "Programa de fidelización con puntos y categorías de cliente"
    - "Módulo de venta de vehículos usados de flota con valoración automática"

risk_assessment:
  data_sensitivity: "high"
  compliance:
    - "PCI-DSS"
    - "GDPR"
  backup_frequency: "daily"
  access_control: "basic"
  audit_trail: true
