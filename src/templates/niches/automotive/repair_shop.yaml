niche:
  name: "repair_shop"
  domain: "automotive"
  subdomain: "vehicle_maintenance"
  description: "Sistema de gestión para talleres mecánicos que administra órdenes de trabajo, inventario de repuestos, citas, facturación, seguimiento de mecánicos y historial de servicio de vehículos."
  scale: "small"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - email_smtp
    - invoice_calculator
    - inventory_tracker
    - notification_manager
    - task_scheduler
    - pdf_generator
    - crud_service
    - report_generator
    - backup_restore
  variables:
    project_name: "repair_shop"
    app_name: "RepairShop"
    template_type: "niche"
    db_name: "repair_shop.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Vehicle"
    fields:
      - "vehicle_id:uuid"
      - "vin:str"
      - "make:str"
      - "model:str"
      - "year:int"
      - "color:str"
      - "license_plate:str"
      - "mileage:int"
      - "engine_type:str"
      - "transmission:str"
      - "owner_id:uuid"

  - name: "Customer"
    fields:
      - "customer_id:uuid"
      - "first_name:str"
      - "last_name:str"
      - "email:str"
      - "phone:str"
      - "address:str"
      - "city:str"
      - "registration_date:date"
      - "preferred_contact:str"
      - "status:str"

  - name: "WorkOrder"
    fields:
      - "work_order_id:uuid"
      - "vehicle_id:uuid"
      - "customer_id:uuid"
      - "mechanic_id:uuid"
      - "description:str"
      - "diagnosis:str"
      - "priority:str"
      - "status:str"
      - "created_date:datetime"
      - "estimated_completion:datetime"
      - "completed_date:datetime"
      - "total_cost:float"

  - name: "Service"
    fields:
      - "service_id:uuid"
      - "work_order_id:uuid"
      - "name:str"
      - "description:str"
      - "category:str"
      - "labor_hours:float"
      - "labor_rate:float"
      - "labor_cost:float"
      - "status:str"
      - "mechanic_id:uuid"

  - name: "Part"
    fields:
      - "part_id:uuid"
      - "sku:str"
      - "name:str"
      - "description:str"
      - "category:str"
      - "manufacturer:str"
      - "unit_price:float"
      - "cost_price:float"
      - "quantity_in_stock:int"
      - "reorder_level:int"
      - "compatible_models:str"

  - name: "Mechanic"
    fields:
      - "mechanic_id:uuid"
      - "first_name:str"
      - "last_name:str"
      - "email:str"
      - "phone:str"
      - "specialization:str"
      - "certification:str"
      - "hire_date:date"
      - "hourly_rate:float"
      - "status:str"
      - "current_workload:int"

  - name: "Invoice"
    fields:
      - "invoice_id:uuid"
      - "work_order_id:uuid"
      - "customer_id:uuid"
      - "labor_total:float"
      - "parts_total:float"
      - "tax:float"
      - "discount:float"
      - "total:float"
      - "status:str"
      - "issued_date:date"
      - "due_date:date"
      - "payment_method:str"

  - name: "Appointment"
    fields:
      - "appointment_id:uuid"
      - "customer_id:uuid"
      - "vehicle_id:uuid"
      - "service_type:str"
      - "scheduled_date:date"
      - "scheduled_time:time"
      - "estimated_duration:int"
      - "assigned_mechanic:str"
      - "status:str"
      - "notes:str"

workflow:
  typical_paths:
    - "Cita del cliente → Recepción del vehículo → Inspección inicial → Creación de orden de trabajo → Diagnóstico → Presupuesto → Aprobación del cliente → Reparación → Facturación → Entrega"
    - "Orden de trabajo → Identificación de repuestos → Verificación de inventario → Solicitud de pedido si falta → Reparación → Actualización de inventario → Cierre"
    - "Solicitud de cita → Verificación de disponibilidad → Asignación de mecánico → Confirmación al cliente → Ejecución del servicio → Seguimiento post-servicio"
  triggers:
    - "appointment_reminder:Recordatorio automático al cliente antes de la cita programada"
    - "work_order_update:Notificación al cliente cuando cambia el estado de su orden de trabajo"
    - "low_stock:Alerta cuando el inventario de un repuesto cae por debajo del nivel mínimo de reorden"
    - "invoice_overdue:Aviso cuando una factura supera la fecha de vencimiento sin pago"
    - "service_completion:Notificación automática al cliente cuando su vehículo está listo para entrega"

features:
  core:
    - "Gestión de órdenes de trabajo con seguimiento completo desde recepción hasta entrega"
    - "Control de inventario de repuestos con alertas de reposición y seguimiento de costos"
    - "Programación de citas con verificación de disponibilidad de mecánicos por especialidad"
    - "Facturación detallada con desglose de mano de obra, repuestos, impuestos y descuentos"
    - "Historial completo de servicio por vehículo con registro de todas las intervenciones"
    - "Portal del cliente con consulta de estado de reparaciones e historial"
  advanced:
    - "Estimación automática de tiempos de reparación basada en tipo de servicio y modelo"
    - "Optimización de asignación de mecánicos por especialidad y carga de trabajo actual"
    - "Análisis de rentabilidad por tipo de servicio, mecánico y categoría de vehículo"
    - "Predicción de demanda de repuestos basada en historial de servicios y estacionalidad"
  optional:
    - "Integración con proveedores de repuestos para pedidos automáticos"
    - "Módulo de gestión de garantías con seguimiento de reclamos y coberturas"
    - "App móvil para mecánicos con asignación de trabajos y actualización en tiempo real"
    - "Integración con sistemas de diagnóstico vehicular OBD-II"

risk_assessment:
  data_sensitivity: "medium"
  compliance:
    - "GDPR"
  backup_frequency: "daily"
  access_control: "basic"
  audit_trail: true
