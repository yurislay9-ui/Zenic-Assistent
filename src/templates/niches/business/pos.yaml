niche:
  name: "pos"
  domain: "business"
  subdomain: "retail"
  description: "Sistema de punto de venta para gestión de productos, ventas, artículos de venta, cajeros, turnos, pagos, devoluciones y descuentos con control de inventario en tiempo real"
  scale: "medium"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - invoice_calculator
    - inventory_tracker
    - pdf_generator
    - crud_service
    - report_generator
    - backup_restore
    - email_smtp
  variables:
    project_name: "pos"
    app_name: "POS"
    template_type: "retail"
    db_name: "pos.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Product"
    fields:
      - "sku:str"
      - "name:str"
      - "description:text"
      - "category:str"
      - "unit_price:float"
      - "cost_price:float"
      - "tax_rate:float"
      - "barcode:str"
      - "unit:str"
      - "track_stock:bool"
      - "active:bool"
      - "image_url:str"

  - name: "Sale"
    fields:
      - "sale_number:str"
      - "cashier_id:int"
      - "shift_id:int"
      - "subtotal:float"
      - "tax_amount:float"
      - "discount_amount:float"
      - "total:float"
      - "payment_method:str"
      - "status:str"
      - "customer_name:str"
      - "sale_date:datetime"
      - "receipt_path:str"

  - name: "SaleItem"
    fields:
      - "sale_id:int"
      - "product_id:int"
      - "quantity:float"
      - "unit_price:float"
      - "discount_pct:float"
      - "tax_rate:float"
      - "line_total:float"
      - "returned_quantity:float"

  - name: "Cashier"
    fields:
      - "first_name:str"
      - "last_name:str"
      - "code:str"
      - "pin_encrypted:str"
      - "role:str"
      - "status:str"
      - "terminal_id:int"
      - "hire_date:date"
      - "email:str"
      - "permissions:json"

  - name: "Shift"
    fields:
      - "cashier_id:int"
      - "terminal_id:int"
      - "start_time:datetime"
      - "end_time:datetime"
      - "opening_cash:float"
      - "closing_cash:float"
      - "expected_cash:float"
      - "cash_difference:float"
      - "total_sales:float"
      - "transaction_count:int"
      - "status:str"

  - name: "Payment"
    fields:
      - "sale_id:int"
      - "method:str"
      - "amount:float"
      - "reference:str"
      - "card_last_four:str"
      - "authorization_code:str"
      - "status:str"
      - "processed_at:datetime"
      - "terminal_id:int"

  - name: "Return"
    fields:
      - "sale_id:int"
      - "cashier_id:int"
      - "reason:str"
      - "items:json"
      - "total_refund:float"
      - "refund_method:str"
      - "status:str"
      - "approved_by:str"
      - "processed_at:datetime"
      - "notes:text"

  - name: "Discount"
    fields:
      - "name:str"
      - "type:str"
      - "value:float"
      - "applies_to:str"
      - "product_ids:json"
      - "category_ids:json"
      - "min_purchase:float"
      - "start_date:date"
      - "end_date:date"
      - "active:bool"
      - "usage_limit:int"
      - "usage_count:int"

workflow:
  typical_paths:
    - "Iniciar turno → Abrir caja → Escanear productos → Aplicar descuentos → Calcular total → Procesar pago → Imprimir recibo → Actualizar inventario"
    - "Solicitar devolución → Verificar venta original → Inspeccionar producto → Aprobar/rechazar → Procesar reembolso → Reintegrar al inventario"
    - "Iniciar turno → Registrar ventas → Cerrar turno → Contar caja → Conciliar diferencias → Generar reporte de turno"
  triggers:
    - "sale_completed:Actualizar inventario en tiempo real y generar recibo al completar una venta"
    - "low_stock_alert:Notificar al encargado cuando un producto cae por debajo del stock mínimo"
    - "shift_ending:Alertar al cajero cuando el turno está próximo a cerrar para preparación de arqueo"
    - "return_requested:Notificar al supervisor cuando se solicita una devolución que requiere aprobación"
    - "cash_shortage:Alertar al gerente cuando la diferencia de caja supera el umbral permitido"

features:
  core:
    - "Procesamiento rápido de ventas con escaneo de código de barras y búsqueda de productos"
    - "Gestión de múltiples métodos de pago: efectivo, tarjeta, móvil, gift cards"
    - "Control de turnos con apertura, cierre y arqueo de caja automático"
    - "Sistema de devoluciones con verificación de ticket y reembolso flexible"
    - "Gestión de descuentos por producto, categoría y monto mínimo de compra"
    - "Actualización de inventario en tiempo real con cada transacción"
  advanced:
    - "Modo offline con sincronización automática al recuperar conexión"
    - "Sistema de fidelización de clientes con puntos y recompensas"
    - "Análisis de ventas por hora, categoría y cajero con heatmaps de actividad"
    - "Gestión de combinaciones y promociones (2x1, bundle, compra mínima)"
    - "Dashboard gerencial con métricas de rendimiento en tiempo real"
  optional:
    - "Integración con terminales de pago y PIN pads para transacciones EMV"
    - "Impresión de recibos térmicos con diseño personalizable y código QR"
    - "Display para cliente con muestra de productos y total"
    - "Módulo de gift cards con gestión de saldo y recarga"
    - "Integración con sistemas de contabilidad y ERP para conciliación automática"

risk_assessment:
  data_sensitivity: "high"
  compliance: [PCI-DSS]
  backup_frequency: "hourly"
  access_control: "basic"
  audit_trail: true
