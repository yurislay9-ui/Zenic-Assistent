niche:
  name: "procurement"
  domain: "business"
  subdomain: "purchasing"
  description: "Sistema de compras y aprovisionamiento para gestión de requisiciones, órdenes de compra, proveedores, cotizaciones, contratos, entregas, facturas y aprobaciones con control presupuestario"
  scale: "medium"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - rbac
    - email_smtp
    - invoice_calculator
    - notification_manager
    - crud_service
    - report_generator
    - pdf_generator
    - backup_restore
    - task_scheduler
  variables:
    project_name: "procurement"
    app_name: "Procurement"
    template_type: "purchasing"
    db_name: "procurement.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Requisition"
    fields:
      - "number:str"
      - "requestor_id:int"
      - "department:str"
      - "priority:str"
      - "status:str"
      - "items:json"
      - "estimated_cost:float"
      - "budget_code:str"
      - "justification:text"
      - "required_by:date"
      - "submitted_at:datetime"
      - "approved_by:str"

  - name: "PurchaseOrder"
    fields:
      - "po_number:str"
      - "requisition_id:int"
      - "supplier_id:int"
      - "status:str"
      - "items:json"
      - "subtotal:float"
      - "tax_amount:float"
      - "total:float"
      - "payment_terms:str"
      - "delivery_date:date"
      - "shipping_address:json"
      - "approved_by:str"
      - "created_at:datetime"

  - name: "Supplier"
    fields:
      - "name:str"
      - "code:str"
      - "contact_name:str"
      - "email:str"
      - "phone:str"
      - "address:json"
      - "tax_id:str"
      - "payment_terms:str"
      - "rating:float"
      - "categories:json"
      - "certifications:json"
      - "active:bool"

  - name: "Quote"
    fields:
      - "requisition_id:int"
      - "supplier_id:int"
      - "items:json"
      - "subtotal:float"
      - "tax_amount:float"
      - "total:float"
      - "valid_until:date"
      - "delivery_days:int"
      - "terms:text"
      - "status:str"
      - "submitted_at:datetime"
      - "selected:bool"

  - name: "Contract"
    fields:
      - "supplier_id:int"
      - "title:str"
      - "type:str"
      - "value:float"
      - "start_date:date"
      - "end_date:date"
      - "terms:text"
      - "sla:json"
      - "status:str"
      - "document_path:str"
      - "renewal_option:bool"
      - "approved_by:str"

  - name: "Delivery"
    fields:
      - "purchase_order_id:int"
      - "supplier_id:int"
      - "expected_date:date"
      - "actual_date:date"
      - "status:str"
      - "items_received:json"
      - "quality_check:bool"
      - "discrepancies:text"
      - "received_by:str"
      - "notes:text"

  - name: "Invoice"
    fields:
      - "purchase_order_id:int"
      - "supplier_id:int"
      - "invoice_number:str"
      - "issue_date:date"
      - "due_date:date"
      - "subtotal:float"
      - "tax_amount:float"
      - "total:float"
      - "status:str"
      - "three_way_match:bool"
      - "payment_status:str"

  - name: "Approval"
    fields:
      - "entity_type:str"
      - "entity_id:int"
      - "approver_id:int"
      - "level:int"
      - "status:str"
      - "comments:text"
      - "submitted_at:datetime"
      - "responded_at:datetime"
      - "amount:float"

workflow:
  typical_paths:
    - "Crear requisición → Aprobar → Solicitar cotizaciones → Evaluar propuestas → Seleccionar proveedor → Emitir orden de compra → Recibir entrega → Conciliar factura"
    - "Negociar contrato → Revisar términos → Aprobar → Firmar → Monitorear cumplimiento → Renovar/vencer"
    - "Recibir entrega → Verificar calidad → Actualizar inventario → Recibir factura → Three-way match → Autorizar pago"
  triggers:
    - "requisition_submitted:Notificar al aprobador del departamento cuando se envía una nueva requisición"
    - "quote_comparison_ready:Alertar al comprador cuando se han recibido todas las cotizaciones solicitadas para comparación"
    - "po_approval_required:Enviar solicitud de aprobación al gerente cuando la orden de compra supera el monto de auto-aprobación"
    - "delivery_received:Iniciar proceso de verificación y three-way match al registrar la recepción de mercancía"
    - "contract_expiring:Notificar al equipo de compras 60 días antes del vencimiento de un contrato para renovación"

features:
  core:
    - "Gestión de requisiciones con flujo de aprobación jerárquico por monto y departamento"
    - "Solicitudes de cotización a múltiples proveedores con comparación lado a lado"
    - "Órdenes de compra con seguimiento completo desde emisión hasta recepción"
    - "Evaluación de proveedores con rating, certificaciones y historial de cumplimiento"
    - "Three-way match automático entre orden de compra, recepción y factura"
    - "Gestión de contratos con seguimiento de SLA, renovaciones y vencimientos"
  advanced:
    - "Análisis de gasto por categoría, proveedor y departamento con benchmarking"
    - "Motor de aprobaciones configurable con reglas por monto, categoría y urgencia"
    - "Evaluación de desempeño de proveedores con scorecards automatizados"
    - "Catálogo de productos aprobados con precios negociados y contratos marco"
    - "Dashboard de compras con métricas de ahorro, lead time y cumplimiento de entrega"
  optional:
    - "Portal de proveedores con acceso a órdenes, facturación y estado de pagos"
    - "Integración con sistemas de e-procurement y catálogos externos"
    - "Subastas inversas para competición entre proveedores en tiempo real"
    - "API para integración con ERP y sistemas de contabilidad"
    - "Módulo de sostenibilidad con evaluación de proveedores por criterios ESG"

risk_assessment:
  data_sensitivity: "medium"
  compliance: [SOX, GDPR]
  backup_frequency: "daily"
  access_control: "rbac"
  audit_trail: true
