niche:
  name: "design_studio"
  domain: "creative"
  subdomain: "graphic_design"
  description: "Sistema de gestión para estudios de diseño con administración de proyectos, clientes, activos creativos, revisiones, briefs, facturación y líneas temporales de entrega."
  scale: "small"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - email_smtp
    - pdf_generator
    - invoice_calculator
    - notification_manager
    - crud_service
    - report_generator
    - backup_restore
  variables:
    project_name: "design_studio"
    app_name: "DesignStudio"
    template_type: "niche"
    db_name: "design_studio.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Project"
    fields:
      - "name:str"
      - "description:text"
      - "client_id:int"
      - "status:str"
      - "priority:str"
      - "budget:float"
      - "spent:float"
      - "start_date:date"
      - "deadline:date"
      - "completed_at:datetime"
      - "created_at:datetime"
  - name: "Client"
    fields:
      - "company_name:str"
      - "contact_name:str"
      - "email:str"
      - "phone:str"
      - "address:str"
      - "industry:str"
      - "website:str"
      - "notes:text"
      - "is_active:bool"
      - "created_at:datetime"
  - name: "Asset"
    fields:
      - "project_id:int"
      - "filename:str"
      - "filepath:str"
      - "file_type:str"
      - "file_size:int"
      - "version:int"
      - "uploaded_by:int"
      - "thumbnail:str"
      - "tags:json"
      - "created_at:datetime"
  - name: "Revision"
    fields:
      - "asset_id:int"
      - "project_id:int"
      - "version_number:int"
      - "feedback:text"
      - "status:str"
      - "requested_by:int"
      - "requested_at:datetime"
      - "resolved_at:datetime"
      - "created_at:datetime"
  - name: "Brief"
    fields:
      - "project_id:int"
      - "title:str"
      - "objectives:text"
      - "target_audience:str"
      - "brand_guidelines:json"
      - "deliverables:json"
      - "constraints:text"
      - "approved_by_client:bool"
      - "created_at:datetime"
      - "updated_at:datetime"
  - name: "Invoice"
    fields:
      - "project_id:int"
      - "client_id:int"
      - "invoice_number:str"
      - "items:json"
      - "subtotal:float"
      - "tax:float"
      - "total:float"
      - "status:str"
      - "due_date:date"
      - "created_at:datetime"
  - name: "Timeline"
    fields:
      - "project_id:int"
      - "milestone:str"
      - "description:text"
      - "start_date:date"
      - "end_date:date"
      - "status:str"
      - "assigned_to:int"
      - "order_index:int"
      - "created_at:datetime"
  - name: "Deliverable"
    fields:
      - "project_id:int"
      - "name:str"
      - "format:str"
      - "asset_id:int"
      - "status:str"
      - "delivered_at:datetime"
      - "accepted_by_client:bool"
      - "client_feedback:text"
      - "created_at:datetime"

workflow:
  typical_paths:
    - "Cliente envía brief → Equipo revisa → Crea proyecto → Define timeline → Asigna diseñadores → Produce entregables"
    - "Diseñador sube activo → Cliente revisa → Solicita revisión → Diseñador modifica → Cliente aprueba"
    - "Proyecto completado → Se generan entregables finales → Se emite factura → Cliente paga → Se cierra proyecto"
  triggers:
    - "brief_submitted:Notificar al equipo de diseño sobre nuevo brief recibido para revisión"
    - "revision_requested:Alertar al diseñador asignado sobre solicitud de cambios del cliente"
    - "invoice_overdue:Notificar al cliente y al equipo sobre factura vencida sin pago"
    - "deadline_approaching:Alertar al equipo cuando un hito del proyecto está próximo a vencer"

features:
  core:
    - "Gestión de proyectos con tablero Kanban y seguimiento de estado"
    - "Sistema de briefs con plantillas y aprobación del cliente"
    - "Biblioteca de activos con versionado y etiquetado"
    - "Sistema de revisiones con feedback estructurado y comparación de versiones"
    - "Facturación automática con cálculo de impuestos y seguimiento de pagos"
  advanced:
    - "Generación de facturas en PDF con branding del estudio"
    - "Dashboard de reportes con métricas de rentabilidad y utilización por proyecto"
    - "Sistema de timelines con diagrama de Gantt interactivo"
    - "Backup automático de activos y datos del proyecto con restauración selectiva"
  optional:
    - "Portal del cliente con vista de proyecto, revisiones y facturación"
    - "Integración con herramientas de diseño como Figma y Adobe Creative Cloud"
    - "Sistema de plantillas de proyecto para tipos de trabajo recurrentes"
    - "Time tracking integrado con facturación por horas"

risk_assessment:
  data_sensitivity: "medium"
  compliance:
    - GDPR
  backup_frequency: "daily"
  access_control: "basic"
  audit_trail: true
