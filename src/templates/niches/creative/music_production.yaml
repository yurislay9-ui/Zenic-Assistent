niche:
  name: "music_production"
  domain: "creative"
  subdomain: "audio_production"
  description: "Plataforma de gestión de producción musical con administración de pistas, artistas, álbumes, sesiones de grabación, contratos, regalías, samples y licencias de uso."
  scale: "small"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - email_smtp
    - pdf_generator
    - invoice_calculator
    - crud_service
    - report_generator
    - backup_restore
  variables:
    project_name: "music_production"
    app_name: "MusicProduction"
    template_type: "niche"
    db_name: "music_production.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Track"
    fields:
      - "title:str"
      - "album_id:int"
      - "duration:int"
      - "bpm:int"
      - "key_signature:str"
      - "genre:str"
      - "audio_file:str"
      - "waveform:str"
      - "isrc_code:str"
      - "status:str"
      - "created_at:datetime"
  - name: "Artist"
    fields:
      - "stage_name:str"
      - "real_name:str"
      - "email:str"
      - "bio:text"
      - "avatar:str"
      - "genre:str"
      - "label:str"
      - "social_links:json"
      - "is_active:bool"
      - "created_at:datetime"
  - name: "Album"
    fields:
      - "title:str"
      - "artist_id:int"
      - "cover_art:str"
      - "release_date:date"
      - "genre:str"
      - "label:str"
      - "track_count:int"
      - "total_duration:int"
      - "status:str"
      - "created_at:datetime"
  - name: "Session"
    fields:
      - "track_id:int"
      - "studio:str"
      - "engineer:str"
      - "scheduled_at:datetime"
      - "duration:int"
      - "type:str"
      - "notes:text"
      - "status:str"
      - "cost:float"
      - "created_at:datetime"
  - name: "Contract"
    fields:
      - "artist_id:int"
      - "type:str"
      - "parties:json"
      - "terms:text"
      - "royalty_split:json"
      - "advance:float"
      - "start_date:date"
      - "end_date:date"
      - "status:str"
      - "signed_at:datetime"
  - name: "Royalty"
    fields:
      - "track_id:int"
      - "artist_id:int"
      - "period:str"
      - "streams:int"
      - "downloads:int"
      - "revenue:float"
      - "percentage:float"
      - "amount_due:float"
      - "status:str"
      - "created_at:datetime"
  - name: "Sample"
    fields:
      - "name:str"
      - "source:str"
      - "original_artist:str"
      - "duration:float"
      - "filepath:str"
      - "clearance_status:str"
      - "license_type:str"
      - "is_cleared:bool"
      - "tags:json"
      - "created_at:datetime"
  - name: "License"
    fields:
      - "track_id:int"
      - "licensee:str"
      - "type:str"
      - "territory:str"
      - "duration_months:int"
      - "fee:float"
      - "restrictions:text"
      - "status:str"
      - "issued_at:datetime"
      - "expires_at:datetime"

workflow:
  typical_paths:
    - "Artista crea pista → Programa sesión de grabación → Graba y mezcla → Masteriza → Publica en álbum"
    - "Productor registra sample → Verifica derechos → Obtiene clearance → Incorpora a pista → Licencia documentada"
    - "Pista publicada → Se acumulan reproducciones → Se calculan regalías → Se generan pagos → Reporte emitido"
  triggers:
    - "session_scheduled:Notificar al artista e ingeniero sobre sesión de grabación programada"
    - "royalty_calculated:Enviar resumen de regalías al artista cuando se completa el cálculo del período"
    - "license_expiring:Alertar sobre licencias próximas a expirar para renovación o retiro de contenido"
    - "contract_ready:Notificar a las partes cuando un contrato está listo para firma"

features:
  core:
    - "Gestión de pistas con metadatos técnicos (BPM, tonalidad, ISRC)"
    - "Administración de artistas con perfiles y contratos vinculados"
    - "Sistema de sesiones de grabación con calendario de estudio"
    - "Cálculo y distribución de regalías con splits configurables"
    - "Gestión de licencias de uso con territorios y restricciones"
  advanced:
    - "Generación de contratos y reportes de regalías en PDF"
    - "Dashboard de reportes con ingresos por pista, álbum y artista"
    - "Sistema de clearance de samples con seguimiento de estado"
    - "Backup automático de archivos de audio y metadatos del proyecto"
  optional:
    - "Integración con plataformas de distribución como DistroKid y TuneCore"
    - "Reproductor de audio integrado con visualización de forma de onda"
    - "Colaboración en tiempo real con notas por pista y versión"
    - "Sistema de catálogo para licenciamiento de música para terceros"

risk_assessment:
  data_sensitivity: "medium"
  compliance:
    - GDPR
    - DMCA
  backup_frequency: "daily"
  access_control: "basic"
  audit_trail: true
