niche:
  name: "digital_products"
  domain: "ecommerce"
  subdomain: "digital_products"
  description: "Plataforma de venta de productos digitales que gestiona catálogos de software, e-books, música y otros archivos descargables, con licenciamiento, control de descargas y protección de contenido."
  scale: "medium"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - stripe_payments
    - email_smtp
    - pdf_generator
    - notification_manager
    - crud_service
    - report_generator
  variables:
    project_name: "digital_products"
    app_name: "DigitalProducts"
    template_type: "ecommerce"
    db_name: "digital_products.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Product"
    fields:
      - "id:uuid"
      - "title:str"
      - "description:text"
      - "price:decimal"
      - "file_url:str"
      - "file_size:bigint"
      - "file_type:str"
      - "category_id:uuid"
      - "thumbnail_url:str"
      - "version:str"
      - "status:str"
      - "created_at:datetime"
  - name: "Customer"
    fields:
      - "id:uuid"
      - "user_id:uuid"
      - "full_name:str"
      - "email:str"
      - "total_purchases:int"
      - "total_spent:decimal"
      - "status:str"
      - "country:str"
      - "created_at:datetime"
  - name: "Purchase"
    fields:
      - "id:uuid"
      - "customer_id:uuid"
      - "product_id:uuid"
      - "amount:decimal"
      - "payment_id:str"
      - "status:str"
      - "purchased_at:datetime"
      - "refunded:bool"
      - "refund_reason:str"
      - "created_at:datetime"
  - name: "License"
    fields:
      - "id:uuid"
      - "purchase_id:uuid"
      - "customer_id:uuid"
      - "product_id:uuid"
      - "license_key:str"
      - "type:str"
      - "max_activations:int"
      - "current_activations:int"
      - "expires_at:datetime"
      - "status:str"
      - "created_at:datetime"
  - name: "Download"
    fields:
      - "id:uuid"
      - "purchase_id:uuid"
      - "customer_id:uuid"
      - "product_id:uuid"
      - "ip_address:str"
      - "user_agent:str"
      - "download_url:str"
      - "status:str"
      - "downloaded_at:datetime"
      - "expires_at:datetime"
  - name: "Review"
    fields:
      - "id:uuid"
      - "purchase_id:uuid"
      - "product_id:uuid"
      - "customer_id:uuid"
      - "rating:int"
      - "comment:text"
      - "status:str"
      - "created_at:datetime"
  - name: "Category"
    fields:
      - "id:uuid"
      - "name:str"
      - "slug:str"
      - "description:text"
      - "parent_id:uuid"
      - "icon:str"
      - "sort_order:int"
      - "active:bool"
      - "created_at:datetime"

workflow:
  typical_paths:
    - "Cliente explora catálogo → Selecciona producto digital → Realiza pago → Recibe licencia y enlace de descarga → Descarga el archivo → Deja reseña"
    - "Administrador sube producto digital → Configura tipo de licencia → Establece precio → Publica en catálogo → Gestiona versiones"
    - "Cliente activa licencia → Sistema verifica activaciones → Notificación si excede límite → Opción de upgrade o compra adicional"
  triggers:
    - "purchase_completed:se activa cuando un cliente completa la compra de un producto digital"
    - "license_activated:se activa al activar una licencia en un dispositivo"
    - "download_requested:se activa cuando un cliente solicita descargar un archivo"
    - "review_submitted:se activa cuando un cliente envía una reseña de un producto"
    - "license_expired:se activa cuando una licencia llega a su fecha de vencimiento"

features:
  core:
    - "Catálogo de productos digitales con filtrado por categoría y tipo de archivo"
    - "Generación automática de claves de licencia únicas por compra"
    - "Sistema de descargas seguras con enlaces temporales y expiración"
    - "Control de activaciones de licencia con límites configurables"
    - "Procesamiento de pagos con Stripe y entrega instantánea del producto"
    - "Sistema de reseñas y calificaciones para productos digitales"
  advanced:
    - "Gestión de versiones de productos con actualizaciones automáticas"
    - "Protección de contenido con marcas de agua digitales y DRM"
    - "Reportes de ventas, descargas y métricas de uso por producto"
    - "Generación de facturas y recibos en PDF para cada compra"
    - "Sistema de reembolsos con revocación automática de licencias"
  optional:
    - "Programa de afiliados para promoción de productos digitales"
    - "Integración con plataformas de distribución de terceros"
    - "Sistema de cupones y descuentos por tiempo limitado"
    - "Bundles y paquetes de productos combinados"
    - "Notificaciones de nuevas versiones a clientes existentes"

risk_assessment:
  data_sensitivity: "medium"
  compliance:
    - "GDPR"
    - "DMCA"
  backup_frequency: "daily"
  access_control: "basic"
  audit_trail: true
