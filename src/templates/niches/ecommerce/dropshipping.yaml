niche:
  name: "dropshipping"
  domain: "ecommerce"
  subdomain: "dropshipping"
  description: "Sistema de comercio electrónico dropshipping que gestiona productos de proveedores externos, pedidos automatizados, envíos directos y cálculo de márgenes de ganancia sin necesidad de inventario propio."
  scale: "medium"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - stripe_payments
    - email_smtp
    - notification_manager
    - inventory_tracker
    - invoice_calculator
    - crud_service
    - report_generator
  variables:
    project_name: "dropshipping"
    app_name: "Dropshipping"
    template_type: "ecommerce"
    db_name: "dropshipping.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Product"
    fields:
      - "id:uuid"
      - "title:str"
      - "description:text"
      - "retail_price:decimal"
      - "cost_price:decimal"
      - "supplier_id:uuid"
      - "sku:str"
      - "images:json"
      - "status:str"
      - "weight:float"
      - "category:str"
      - "created_at:datetime"
  - name: "Supplier"
    fields:
      - "id:uuid"
      - "name:str"
      - "contact_email:str"
      - "phone:str"
      - "api_endpoint:str"
      - "api_key:str"
      - "lead_time_days:int"
      - "shipping_cost:decimal"
      - "rating:float"
      - "status:str"
      - "country:str"
  - name: "Order"
    fields:
      - "id:uuid"
      - "customer_id:uuid"
      - "supplier_id:uuid"
      - "product_id:uuid"
      - "quantity:int"
      - "retail_total:decimal"
      - "cost_total:decimal"
      - "status:str"
      - "supplier_order_id:str"
      - "payment_id:str"
      - "created_at:datetime"
      - "updated_at:datetime"
  - name: "Shipment"
    fields:
      - "id:uuid"
      - "order_id:uuid"
      - "supplier_id:uuid"
      - "tracking_number:str"
      - "carrier:str"
      - "status:str"
      - "estimated_delivery:date"
      - "shipped_at:datetime"
      - "delivered_at:datetime"
      - "shipping_address:json"
  - name: "Customer"
    fields:
      - "id:uuid"
      - "full_name:str"
      - "email:str"
      - "phone:str"
      - "shipping_address:json"
      - "total_orders:int"
      - "total_spent:decimal"
      - "status:str"
      - "created_at:datetime"
  - name: "Profit"
    fields:
      - "id:uuid"
      - "order_id:uuid"
      - "revenue:decimal"
      - "cost:decimal"
      - "shipping_cost:decimal"
      - "transaction_fee:decimal"
      - "net_profit:decimal"
      - "margin_percent:decimal"
      - "calculated_at:datetime"
  - name: "Return"
    fields:
      - "id:uuid"
      - "order_id:uuid"
      - "customer_id:uuid"
      - "reason:str"
      - "description:text"
      - "status:str"
      - "refund_amount:decimal"
      - "images:json"
      - "created_at:datetime"
      - "resolved_at:datetime"

workflow:
  typical_paths:
    - "Importar productos de proveedores → Cliente realiza pedido → Pago procesado → Orden enviada al proveedor → Proveedor envía directamente al cliente → Seguimiento de envío actualizado"
    - "Sincronización de inventario con proveedores → Detección de stock bajo → Notificación automática → Actualización de disponibilidad en tienda"
    - "Cálculo de ganancias por pedido → Reporte de márgenes → Análisis de rentabilidad por proveedor y producto"
  triggers:
    - "order_placed:se activa cuando un cliente completa una compra"
    - "supplier_order_confirmed:se activa al confirmar la orden con el proveedor"
    - "shipment_updated:se activa cuando el proveedor actualiza el estado del envío"
    - "return_requested:se activa cuando un cliente solicita una devolución"
    - "inventory_synced:se activa al sincronizar el inventario con los proveedores"

features:
  core:
    - "Gestión de catálogo de productos sincronizado con múltiples proveedores"
    - "Procesamiento automatizado de pedidos hacia proveedores"
    - "Cálculo automático de márgenes de ganancia por producto y pedido"
    - "Seguimiento de envíos con integración a APIs de transportistas"
    - "Gestión de devoluciones con flujo de reembolso integrado"
  advanced:
    - "Sincronización automática de inventario con proveedores en tiempo real"
    - "Reglas de precios dinámicos basados en costos y márgenes objetivo"
    - "Reportes de rentabilidad por proveedor, producto y período"
    - "Sistema de calificación y evaluación de rendimiento de proveedores"
    - "Gestión automatizada de facturas y comprobantes de compra-venta"
  optional:
    - "Importación masiva de productos desde CSV o API de proveedores"
    - "Alertas de stock bajo y productos discontinuados"
    - "Integración con plataformas de marketplace externas"
    - "Herramientas de optimización SEO para productos"
    - "Dashboard de métricas clave con KPIs de rentabilidad"

risk_assessment:
  data_sensitivity: "medium"
  compliance:
    - "PCI-DSS"
    - "GDPR"
  backup_frequency: "daily"
  access_control: "rbac"
  audit_trail: true
