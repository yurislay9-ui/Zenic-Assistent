niche:
  name: "food_delivery"
  domain: "ecommerce"
  subdomain: "food_delivery"
  description: "Plataforma de delivery de comida que conecta restaurantes con clientes y repartidores, gestionando menús, pedidos, entregas en tiempo real, pagos y calificaciones del servicio."
  scale: "large"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - stripe_payments
    - email_smtp
    - notification_manager
    - task_scheduler
    - crud_service
    - report_generator
    - pdf_generator
  variables:
    project_name: "food_delivery"
    app_name: "FoodDelivery"
    template_type: "ecommerce"
    db_name: "food_delivery.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Restaurant"
    fields:
      - "id:uuid"
      - "name:str"
      - "description:text"
      - "address:json"
      - "phone:str"
      - "email:str"
      - "cuisine_type:str"
      - "rating:float"
      - "delivery_radius_km:float"
      - "operating_hours:json"
      - "status:str"
      - "created_at:datetime"
  - name: "MenuItem"
    fields:
      - "id:uuid"
      - "restaurant_id:uuid"
      - "name:str"
      - "description:text"
      - "price:decimal"
      - "category:str"
      - "image_url:str"
      - "preparation_time_min:int"
      - "available:bool"
      - "allergens:json"
      - "calories:int"
      - "sort_order:int"
  - name: "Order"
    fields:
      - "id:uuid"
      - "customer_id:uuid"
      - "restaurant_id:uuid"
      - "driver_id:uuid"
      - "items:json"
      - "subtotal:decimal"
      - "delivery_fee:decimal"
      - "total:decimal"
      - "status:str"
      - "payment_id:str"
      - "notes:text"
      - "created_at:datetime"
  - name: "Customer"
    fields:
      - "id:uuid"
      - "user_id:uuid"
      - "full_name:str"
      - "email:str"
      - "phone:str"
      - "delivery_address:json"
      - "total_orders:int"
      - "total_spent:decimal"
      - "status:str"
      - "created_at:datetime"
  - name: "Driver"
    fields:
      - "id:uuid"
      - "user_id:uuid"
      - "full_name:str"
      - "phone:str"
      - "vehicle_type:str"
      - "license_plate:str"
      - "current_location:json"
      - "rating:float"
      - "total_deliveries:int"
      - "status:str"
      - "verified:bool"
  - name: "Delivery"
    fields:
      - "id:uuid"
      - "order_id:uuid"
      - "driver_id:uuid"
      - "pickup_address:json"
      - "delivery_address:json"
      - "status:str"
      - "estimated_time_min:int"
      - "picked_up_at:datetime"
      - "delivered_at:datetime"
      - "route:json"
      - "created_at:datetime"
  - name: "Payment"
    fields:
      - "id:uuid"
      - "order_id:uuid"
      - "customer_id:uuid"
      - "amount:decimal"
      - "delivery_fee:decimal"
      - "tip:decimal"
      - "total:decimal"
      - "stripe_payment_id:str"
      - "status:str"
      - "method:str"
      - "created_at:datetime"
  - name: "Rating"
    fields:
      - "id:uuid"
      - "order_id:uuid"
      - "customer_id:uuid"
      - "restaurant_rating:int"
      - "driver_rating:int"
      - "comment:text"
      - "created_at:datetime"

workflow:
  typical_paths:
    - "Cliente busca restaurantes → Explora menú → Agrega items al carrito → Realiza pedido y paga → Restaurante recibe y prepara → Repartidor recoge → Entrega al cliente → Calificación del servicio"
    - "Repartidor se conecta → Recibe asignación de entrega → Navega al restaurante → Recoge pedido → Navega al cliente → Confirma entrega → Recibe calificación"
    - "Restaurante registra menú → Gestiona disponibilidad de items → Recibe pedidos → Actualiza estado de preparación → Notifica al repartidor"
  triggers:
    - "order_placed:se activa cuando un cliente realiza un pedido"
    - "order_accepted:se activa cuando el restaurante acepta el pedido"
    - "driver_assigned:se activa al asignar un repartidor al pedido"
    - "delivery_picked_up:se activa cuando el repartidor recoge el pedido del restaurante"
    - "delivery_completed:se activa cuando el repartidor entrega el pedido al cliente"

features:
  core:
    - "Catálogo de restaurantes con menús dinámicos y gestión de disponibilidad"
    - "Sistema de pedidos con seguimiento en tiempo real del estado"
    - "Asignación inteligente de repartidores basada en ubicación y disponibilidad"
    - "Procesamiento de pagos con Stripe incluyendo propinas para repartidores"
    - "Sistema de calificación dual para restaurante y repartidor"
    - "Notificaciones push para actualizaciones de estado del pedido"
  advanced:
    - "Estimación de tiempo de entrega basada en distancia, tráfico y tiempo de preparación"
    - "Programación de pedidos anticipados con fecha y hora de entrega"
    - "Reportes operativos de ventas por restaurante, tiempos de entrega y satisfacción"
    - "Gestión de zonas de cobertura y radios de entrega por restaurante"
    - "Generación de facturas y comprobantes fiscales en PDF"
  optional:
    - "Sistema de cupones y promociones por restaurante o plataforma"
    - "Programa de fidelidad con puntos por pedidos realizados"
    - "Chat en tiempo real entre cliente, restaurante y repartidor"
    - "Soporte para pedidos grupales y división de cuenta"
    - "Integración con sistemas POS de restaurantes"

risk_assessment:
  data_sensitivity: "medium"
  compliance:
    - "PCI-DSS"
    - "GDPR"
    - "Food Safety"
  backup_frequency: "hourly"
  access_control: "rbac"
  audit_trail: true
