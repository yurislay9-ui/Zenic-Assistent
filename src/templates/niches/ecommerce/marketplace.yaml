niche:
  name: "marketplace"
  domain: "ecommerce"
  subdomain: "marketplace"
  description: "Plataforma de comercio electrónico tipo marketplace que conecta múltiples vendedores con compradores, gestionando catálogos de productos, comisiones, disputas y reseñas en un entorno escalable y seguro."
  scale: "large"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - rbac
    - stripe_payments
    - email_smtp
    - notification_manager
    - pdf_generator
    - crud_service
    - report_generator
    - backup_restore
  variables:
    project_name: "marketplace"
    app_name: "Marketplace"
    template_type: "ecommerce"
    db_name: "marketplace.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Product"
    fields:
      - "id:uuid"
      - "title:str"
      - "description:text"
      - "price:decimal"
      - "stock:int"
      - "category_id:uuid"
      - "seller_id:uuid"
      - "status:str"
      - "images:json"
      - "sku:str"
      - "weight:float"
      - "created_at:datetime"
  - name: "Seller"
    fields:
      - "id:uuid"
      - "user_id:uuid"
      - "store_name:str"
      - "description:text"
      - "rating:float"
      - "total_sales:int"
      - "commission_rate:decimal"
      - "status:str"
      - "bank_info:json"
      - "verified:bool"
      - "joined_at:datetime"
  - name: "Buyer"
    fields:
      - "id:uuid"
      - "user_id:uuid"
      - "full_name:str"
      - "email:str"
      - "phone:str"
      - "shipping_address:json"
      - "total_orders:int"
      - "total_spent:decimal"
      - "status:str"
      - "created_at:datetime"
  - name: "Order"
    fields:
      - "id:uuid"
      - "buyer_id:uuid"
      - "seller_id:uuid"
      - "product_id:uuid"
      - "quantity:int"
      - "total_amount:decimal"
      - "status:str"
      - "shipping_address:json"
      - "tracking_number:str"
      - "payment_id:str"
      - "created_at:datetime"
      - "updated_at:datetime"
  - name: "Review"
    fields:
      - "id:uuid"
      - "order_id:uuid"
      - "product_id:uuid"
      - "buyer_id:uuid"
      - "rating:int"
      - "comment:text"
      - "images:json"
      - "status:str"
      - "created_at:datetime"
  - name: "Category"
    fields:
      - "id:uuid"
      - "name:str"
      - "slug:str"
      - "description:text"
      - "parent_id:uuid"
      - "icon:str"
      - "sort_order:int"
      - "active:bool"
      - "created_at:datetime"
  - name: "Commission"
    fields:
      - "id:uuid"
      - "seller_id:uuid"
      - "order_id:uuid"
      - "amount:decimal"
      - "rate:decimal"
      - "status:str"
      - "period:str"
      - "calculated_at:datetime"
      - "paid_at:datetime"
  - name: "Dispute"
    fields:
      - "id:uuid"
      - "order_id:uuid"
      - "buyer_id:uuid"
      - "seller_id:uuid"
      - "reason:str"
      - "description:text"
      - "evidence:json"
      - "status:str"
      - "resolution:str"
      - "admin_id:uuid"
      - "created_at:datetime"
      - "resolved_at:datetime"

workflow:
  typical_paths:
    - "Vendedor registra productos → Comprador busca y selecciona → Añade al carrito → Realiza pago → Vendedor envía producto → Comprador recibe y deja reseña"
    - "Comprador inicia disputa → Administrador revisa evidencia → Resolución y reembolso si aplica → Comisión ajustada"
    - "Administrador configura categorías y comisiones → Vendedores se registran y verifican → Sistema calcula comisiones periódicamente → Reportes generados"
  triggers:
    - "order_placed:se activa cuando un comprador completa una orden"
    - "payment_received:se activa al confirmarse el pago del comprador"
    - "dispute_opened:se activa cuando un comprador abre una disputa"
    - "commission_calculated:se activa al calcular la comisión del vendedor"
    - "review_submitted:se activa cuando un comprador envía una reseña"

features:
  core:
    - "Gestión multi-vendedor con perfiles de tienda independientes"
    - "Catálogo de productos con categorías jerárquicas y búsqueda avanzada"
    - "Sistema de pagos con Stripe y cálculo automático de comisiones"
    - "Gestión de órdenes con seguimiento de envío en tiempo real"
    - "Sistema de reseñas y calificaciones para productos y vendedores"
    - "Panel de administración con control de acceso basado en roles"
  advanced:
    - "Sistema de disputas con flujo de resolución y gestión de evidencia"
    - "Motor de comisiones dinámico con reglas por categoría y vendedor"
    - "Reportes analíticos de ventas, comisiones y rendimiento de vendedores"
    - "Verificación de identidad de vendedores con documentos"
    - "Notificaciones multicanal para eventos críticos de la plataforma"
  optional:
    - "Sistema de cupones y promociones a nivel marketplace"
    - "Integración con servicios de logística de terceros"
    - "Chat en tiempo real entre comprador y vendedor"
    - "Programa de fidelidad para compradores frecuentes"
    - "API pública para integración con sistemas externos"

risk_assessment:
  data_sensitivity: "high"
  compliance:
    - "PCI-DSS"
    - "GDPR"
  backup_frequency: "hourly"
  access_control: "rbac"
  audit_trail: true
