niche:
  name: "subscription"
  domain: "ecommerce"
  subdomain: "subscription"
  description: "Plataforma de comercio por suscripción que gestiona planes recurrentes, ciclos de facturación, pagos automáticos, control de uso de beneficios y renovaciones con integración completa de Stripe."
  scale: "medium"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - stripe_payments
    - email_smtp
    - notification_manager
    - invoice_calculator
    - crud_service
    - report_generator
    - pdf_generator
  variables:
    project_name: "subscription"
    app_name: "Subscription"
    template_type: "ecommerce"
    db_name: "subscription.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Plan"
    fields:
      - "id:uuid"
      - "name:str"
      - "description:text"
      - "price:decimal"
      - "billing_cycle:str"
      - "trial_days:int"
      - "features:json"
      - "limits:json"
      - "active:bool"
      - "sort_order:int"
      - "created_at:datetime"
  - name: "Subscriber"
    fields:
      - "id:uuid"
      - "user_id:uuid"
      - "full_name:str"
      - "email:str"
      - "phone:str"
      - "current_plan_id:uuid"
      - "status:str"
      - "trial_ends_at:datetime"
      - "subscribed_at:datetime"
      - "cancelled_at:datetime"
      - "created_at:datetime"
  - name: "Payment"
    fields:
      - "id:uuid"
      - "subscriber_id:uuid"
      - "subscription_id:uuid"
      - "amount:decimal"
      - "currency:str"
      - "stripe_payment_id:str"
      - "status:str"
      - "method:str"
      - "attempt_count:int"
      - "created_at:datetime"
      - "completed_at:datetime"
  - name: "Subscription"
    fields:
      - "id:uuid"
      - "subscriber_id:uuid"
      - "plan_id:uuid"
      - "status:str"
      - "current_period_start:date"
      - "current_period_end:date"
      - "cancel_at_period_end:bool"
      - "stripe_subscription_id:str"
      - "started_at:datetime"
      - "ended_at:datetime"
      - "created_at:datetime"
  - name: "Benefit"
    fields:
      - "id:uuid"
      - "plan_id:uuid"
      - "name:str"
      - "description:text"
      - "type:str"
      - "value:json"
      - "limit:int"
      - "active:bool"
      - "sort_order:int"
      - "created_at:datetime"
  - name: "Usage"
    fields:
      - "id:uuid"
      - "subscriber_id:uuid"
      - "benefit_id:uuid"
      - "quantity_used:int"
      - "limit:int"
      - "period_start:date"
      - "period_end:date"
      - "recorded_at:datetime"
  - name: "Invoice"
    fields:
      - "id:uuid"
      - "subscriber_id:uuid"
      - "subscription_id:uuid"
      - "payment_id:uuid"
      - "amount:decimal"
      - "tax:decimal"
      - "total:decimal"
      - "status:str"
      - "invoice_number:str"
      - "due_date:date"
      - "pdf_url:str"
      - "created_at:datetime"
  - name: "Renewal"
    fields:
      - "id:uuid"
      - "subscription_id:uuid"
      - "subscriber_id:uuid"
      - "plan_id:uuid"
      - "renewal_date:date"
      - "amount:decimal"
      - "status:str"
      - "attempted:bool"
      - "succeeded:bool"
      - "processed_at:datetime"
      - "created_at:datetime"

workflow:
  typical_paths:
    - "Visitante consulta planes → Se registra como suscriptor → Selecciona plan → Período de prueba → Primer cobro → Renovación automática periódica"
    - "Suscriptor consume beneficios → Sistema registra uso → Verificación de límites → Notificación de límite alcanzado → Opción de upgrade de plan"
    - "Suscriptor solicita cancelación → Período de gracia hasta fin de ciclo → Factura final generada → Acceso revocado al vencimiento"
  triggers:
    - "subscription_created:se activa al crear una nueva suscripción"
    - "payment_processed:se activa cuando se procesa un pago recurrente"
    - "renewal_due:se activa cuando una suscripción está próxima a renovarse"
    - "usage_limit_reached:se activa cuando un suscriptor alcanza el límite de uso de un beneficio"
    - "subscription_cancelled:se activa al cancelar una suscripción"

features:
  core:
    - "Gestión de planes con ciclos de facturación personalizables (mensual, trimestral, anual)"
    - "Procesamiento de pagos recurrentes con Stripe Billing"
    - "Control de uso de beneficios con límites por período de facturación"
    - "Generación automática de facturas en PDF con detalle de cobros"
    - "Sistema de períodos de prueba con conversión automática a pago"
    - "Gestión de renovaciones con reintentos automáticos de cobro fallido"
  advanced:
    - "Prorrateo inteligente para upgrades y downgrades de planes"
    - "Dunning management con flujos de recuperación de pagos fallidos"
    - "Reportes de MRR, churn rate, LTV y métricas de suscripción"
    - "Migración de planes sin interrupción del servicio al suscriptor"
    - "Cupones y descuentos aplicables a suscripciones nuevas y existentes"
  optional:
    - "Integración con webhooks de Stripe para sincronización en tiempo real"
    - "Portal de autoservicio para que suscriptores gestionen su suscripción"
    - "Programa de afiliados para referidos de nuevos suscriptores"
    - "Analíticas avanzadas de comportamiento de suscriptores"
    - "Soporte para múltiples monedas y localización fiscal"

risk_assessment:
  data_sensitivity: "high"
  compliance:
    - "PCI-DSS"
    - "GDPR"
  backup_frequency: "hourly"
  access_control: "rbac"
  audit_trail: true
