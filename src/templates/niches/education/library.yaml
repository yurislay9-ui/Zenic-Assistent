niche:
  name: "library"
  domain: "education"
  subdomain: "library_management"
  description: "Sistema de gestión de biblioteca que administra el catálogo de libros, miembros, préstamos, reservas, multas y reportes de uso de la colección bibliotecaria"
  scale: "medium"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - email_smtp
    - notification_manager
    - crud_service
    - report_generator
    - pdf_generator
    - backup_restore
  variables:
    project_name: "library"
    app_name: "Library"
    template_type: "education"
    db_name: "library.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Book"
    fields:
      - "id:uuid"
      - "title:str"
      - "isbn:str"
      - "publication_year:int"
      - "edition:str"
      - "language:str"
      - "pages:int"
      - "category_id:uuid"
      - "publisher_id:uuid"
      - "total_copies:int"
      - "available_copies:int"
      - "shelf_location:str"
      - "description:str"
      - "cover_url:str"
  - name: "Member"
    fields:
      - "id:uuid"
      - "first_name:str"
      - "last_name:str"
      - "email:str"
      - "phone:str"
      - "member_type:str"
      - "membership_date:date"
      - "expiry_date:date"
      - "max_loans:int"
      - "status:str"
      - "address:str"
  - name: "Loan"
    fields:
      - "id:uuid"
      - "book_id:uuid"
      - "member_id:uuid"
      - "loan_date:date"
      - "due_date:date"
      - "return_date:date"
      - "status:str"
      - "renewal_count:int"
      - "max_renewals:int"
      - "notes:str"
  - name: "Reservation"
    fields:
      - "id:uuid"
      - "book_id:uuid"
      - "member_id:uuid"
      - "reservation_date:date"
      - "status:str"
      - "priority:int"
      - "notified_at:datetime"
      - "expiry_date:date"
      - "notes:str"
  - name: "Fine"
    fields:
      - "id:uuid"
      - "loan_id:uuid"
      - "member_id:uuid"
      - "amount:decimal"
      - "reason:str"
      - "days_overdue:int"
      - "daily_rate:decimal"
      - "status:str"
      - "issued_at:datetime"
      - "paid_at:datetime"
  - name: "Category"
    fields:
      - "id:uuid"
      - "name:str"
      - "code:str"
      - "description:str"
      - "parent_id:uuid"
      - "is_active:bool"
      - "created_at:datetime"
  - name: "Author"
    fields:
      - "id:uuid"
      - "first_name:str"
      - "last_name:str"
      - "biography:str"
      - "nationality:str"
      - "birth_year:int"
      - "avatar_url:str"
      - "is_active:bool"
  - name: "Publisher"
    fields:
      - "id:uuid"
      - "name:str"
      - "address:str"
      - "phone:str"
      - "email:str"
      - "website:str"
      - "country:str"
      - "is_active:bool"

workflow:
  typical_paths:
    - "Miembro busca libro en el catálogo, lo reserva si no está disponible o solicita préstamo si hay copias"
    - "Bibliotecario registra préstamo, establece fecha de devolución y gestiona renovaciones"
    - "Sistema calcula multas por retraso, envía recordatorios y genera reportes de uso"
  triggers:
    - "book_due_soon:Enviar recordatorio por correo al miembro 3 días antes de la fecha de devolución"
    - "book_overdue:Calcular multa diaria y notificar al miembro sobre devolución atrasada"
    - "reservation_available:Notificar al miembro que el libro reservado está disponible para préstamo"
    - "membership_expiring:Alertar al miembro sobre la próxima expiración de su membresía"

features:
  core:
    - "Catálogo de libros con búsqueda avanzada por título, autor, ISBN y categoría"
    - "Sistema de préstamos con control de disponibilidad y fechas de devolución"
    - "Gestión de reservas con cola de espera y notificación automática de disponibilidad"
    - "Cálculo automático de multas por devolución atrasada con tasas configurables"
    - "Administración de miembros con tipos de membresía y límites de préstamo"
  advanced:
    - "Reportes estadísticos de uso, préstamos populares y rotación de inventario"
    - "Generación de listas de inventario y reportes de estado de colección en PDF"
    - "Sistema de notificaciones por correo para recordatorios y alertas de disponibilidad"
    - "Respaldo y restauración del catálogo con historial de cambios"
  optional:
    - "Integración con sistemas de código de barras y escáner para préstamos rápidos"
    - "Catálogo digital con acceso público y búsqueda en línea"
    - "Soporte para recursos digitales (e-books, audiolibros) con préstamo digital"
    - "Módulo de adquisiciones y sugerencias de nuevos títulos por miembros"

risk_assessment:
  data_sensitivity: "low"
  compliance:
    - GDPR
  backup_frequency: "daily"
  access_control: "basic"
  audit_trail: false
