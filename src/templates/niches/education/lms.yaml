niche:
  name: "lms"
  domain: "education"
  subdomain: "learning_management"
  description: "Sistema de gestión del aprendizaje para administrar cursos, estudiantes, instructores y seguimiento de progreso académico en plataformas educativas"
  scale: "large"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - rbac
    - notification_manager
    - email_smtp
    - pdf_generator
    - crud_service
    - data_analyzer
    - report_generator
  variables:
    project_name: "lms"
    app_name: "LMS"
    template_type: "education"
    db_name: "lms.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Student"
    fields:
      - "id:uuid"
      - "first_name:str"
      - "last_name:str"
      - "email:str"
      - "enrollment_date:date"
      - "status:str"
      - "avatar_url:str"
      - "phone:str"
      - "date_of_birth:date"
      - "address:str"
  - name: "Course"
    fields:
      - "id:uuid"
      - "title:str"
      - "description:str"
      - "category:str"
      - "level:str"
      - "duration_hours:int"
      - "thumbnail_url:str"
      - "is_published:bool"
      - "price:decimal"
      - "created_at:datetime"
      - "updated_at:datetime"
  - name: "Module"
    fields:
      - "id:uuid"
      - "course_id:uuid"
      - "title:str"
      - "description:str"
      - "order_index:int"
      - "is_published:bool"
      - "estimated_duration:int"
      - "created_at:datetime"
  - name: "Lesson"
    fields:
      - "id:uuid"
      - "module_id:uuid"
      - "title:str"
      - "content_type:str"
      - "content_url:str"
      - "duration_minutes:int"
      - "order_index:int"
      - "is_preview:bool"
      - "is_published:bool"
      - "created_at:datetime"
  - name: "Enrollment"
    fields:
      - "id:uuid"
      - "student_id:uuid"
      - "course_id:uuid"
      - "enrolled_at:datetime"
      - "status:str"
      - "completion_percentage:float"
      - "last_accessed:datetime"
      - "certificate_issued:bool"
  - name: "Progress"
    fields:
      - "id:uuid"
      - "student_id:uuid"
      - "lesson_id:uuid"
      - "completed:bool"
      - "time_spent:int"
      - "last_position:int"
      - "completed_at:datetime"
      - "score:float"
  - name: "Grade"
    fields:
      - "id:uuid"
      - "student_id:uuid"
      - "course_id:uuid"
      - "assessment_type:str"
      - "score:decimal"
      - "max_score:decimal"
      - "weight:float"
      - "graded_at:datetime"
      - "feedback:str"
      - "graded_by:uuid"
  - name: "Instructor"
    fields:
      - "id:uuid"
      - "first_name:str"
      - "last_name:str"
      - "email:str"
      - "bio:str"
      - "specialization:str"
      - "avatar_url:str"
      - "rating:float"
      - "total_courses:int"
      - "joined_at:datetime"

workflow:
  typical_paths:
    - "Estudiante se registra, explora catálogo de cursos, se insscribe y completa lecciones con seguimiento de progreso"
    - "Instructor crea curso con módulos y lecciones, publica contenido y evalúa estudiantes"
    - "Administrador genera reportes de rendimiento, certificados y analíticas de finalización"
  triggers:
    - "student_enrolled:Enviar notificación de bienvenida y correo de confirmación al estudiante"
    - "lesson_completed:Actualizar progreso del estudiante y verificar si el módulo está completo"
    - "course_completed:Generar certificado PDF y notificar al estudiante e instructor"
    - "grade_submitted:Notificar al estudiante sobre nueva calificación y actualizar promedio del curso"
    - "course_published:Notificar a estudiantes interesados sobre nuevo curso disponible"

features:
  core:
    - "Gestión completa de cursos con módulos y lecciones ordenadas"
    - "Seguimiento de progreso estudiantil en tiempo real"
    - "Sistema de calificaciones y evaluaciones con ponderaciones"
    - "Portal de instructor con herramientas de creación de contenido"
    - "Generación de certificados de finalización en PDF"
    - "Dashboard de administración con métricas clave"
  advanced:
    - "Analíticas avanzadas de aprendizaje y retención estudiantil"
    - "Sistema de notificaciones push y por correo electrónico"
    - "Reportes personalizados de rendimiento académico por curso"
    - "Control de acceso basado en roles (estudiante, instructor, administrador)"
  optional:
    - "Integración con videoconferencia para clases en vivo"
    - "Foros de discusión y colaboración entre estudiantes"
    - "Gamificación con insignias y tablas de clasificación"
    - "Soporte para contenido SCORM y xAPI"

risk_assessment:
  data_sensitivity: "medium"
  compliance:
    - FERPA
    - GDPR
  backup_frequency: "daily"
  access_control: "rbac"
  audit_trail: true
