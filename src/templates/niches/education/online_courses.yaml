niche:
  name: "online_courses"
  domain: "education"
  subdomain: "elearning"
  description: "Plataforma de cursos en línea que permite crear, comercializar y consumir contenido educativo digital con soporte para video, evaluaciones y certificaciones"
  scale: "large"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - stripe_payments
    - email_smtp
    - pdf_generator
    - notification_manager
    - crud_service
    - data_analyzer
  variables:
    project_name: "online_courses"
    app_name: "OnlineCourses"
    template_type: "education"
    db_name: "online_courses.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Student"
    fields:
      - "id:uuid"
      - "first_name:str"
      - "last_name:str"
      - "email:str"
      - "password_hash:str"
      - "avatar_url:str"
      - "bio:str"
      - "preferred_language:str"
      - "timezone:str"
      - "registered_at:datetime"
      - "status:str"
  - name: "Course"
    fields:
      - "id:uuid"
      - "title:str"
      - "subtitle:str"
      - "description:str"
      - "instructor_id:uuid"
      - "category:str"
      - "level:str"
      - "price:decimal"
      - "discount_price:decimal"
      - "thumbnail_url:str"
      - "preview_video_url:str"
      - "language:str"
      - "is_published:bool"
      - "published_at:datetime"
  - name: "VideoLesson"
    fields:
      - "id:uuid"
      - "course_id:uuid"
      - "section_id:uuid"
      - "title:str"
      - "video_url:str"
      - "duration_seconds:int"
      - "order_index:int"
      - "is_preview:bool"
      - "transcript:str"
      - "resources_url:str"
      - "created_at:datetime"
  - name: "Quiz"
    fields:
      - "id:uuid"
      - "course_id:uuid"
      - "lesson_id:uuid"
      - "title:str"
      - "description:str"
      - "passing_score:float"
      - "max_attempts:int"
      - "time_limit_minutes:int"
      - "is_published:bool"
      - "order_index:int"
      - "created_at:datetime"
  - name: "Certificate"
    fields:
      - "id:uuid"
      - "student_id:uuid"
      - "course_id:uuid"
      - "certificate_code:str"
      - "issued_at:datetime"
      - "pdf_url:str"
      - "student_name:str"
      - "course_title:str"
      - "instructor_name:str"
      - "verification_url:str"
  - name: "Payment"
    fields:
      - "id:uuid"
      - "student_id:uuid"
      - "course_id:uuid"
      - "amount:decimal"
      - "currency:str"
      - "payment_method:str"
      - "stripe_charge_id:str"
      - "status:str"
      - "refund_amount:decimal"
      - "paid_at:datetime"
  - name: "Review"
    fields:
      - "id:uuid"
      - "student_id:uuid"
      - "course_id:uuid"
      - "rating:int"
      - "comment:str"
      - "is_verified:bool"
      - "helpful_count:int"
      - "created_at:datetime"
      - "updated_at:datetime"

workflow:
  typical_paths:
    - "Estudiante se registra, explora cursos disponibles, compra acceso y consume lecciones en video con seguimiento de progreso"
    - "Instructor crea curso con lecciones en video y cuestionarios, establece precio y publica en el marketplace"
    - "Estudiante completa curso, genera certificado y deja reseña; instructor recibe notificación de pago"
  triggers:
    - "course_purchased:Registrar pago vía Stripe, habilitar acceso al curso y enviar correo de confirmación"
    - "quiz_submitted:Calificar cuestionario automáticamente, registrar resultado y notificar al estudiante"
    - "course_completed:Generar certificado PDF, enviar por correo y solicitar reseña del curso"
    - "payment_refunded:Revocar acceso al curso y notificar al estudiante e instructor"

features:
  core:
    - "Marketplace de cursos con búsqueda, filtros y categorización"
    - "Reproductor de video con seguimiento de progreso y reanudación"
    - "Sistema de cuestionarios con calificación automática"
    - "Procesamiento de pagos con Stripe y gestión de reembolsos"
    - "Generación de certificados verificables en PDF"
    - "Sistema de reseñas y calificaciones por curso"
  advanced:
    - "Analíticas de engagement estudiantil y tasas de finalización"
    - "Sistema de notificaciones por correo y push para recordatorios de aprendizaje"
    - "Gestión de descuentos y cupones promocionales"
  optional:
    - "Soporte para subtítulos y traducciones de contenido"
    - "Programa de afiliados para promoción de cursos"
    - "Integración con redes sociales para compartir logros"
    - "Modo offline para consumo de contenido sin conexión"

risk_assessment:
  data_sensitivity: "medium"
  compliance:
    - GDPR
    - PCI-DSS
  backup_frequency: "daily"
  access_control: "basic"
  audit_trail: true
