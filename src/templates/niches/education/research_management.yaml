niche:
  name: "research_management"
  domain: "education"
  subdomain: "academic_research"
  description: "Sistema de gestión de investigación académica que administra investigadores, proyectos, publicaciones, subvenciones, conjuntos de datos y experimentos con seguimiento de citas"
  scale: "medium"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - rbac
    - data_analyzer
    - report_generator
    - pdf_generator
    - crud_service
    - email_smtp
    - backup_restore
  variables:
    project_name: "research_management"
    app_name: "ResearchManagement"
    template_type: "education"
    db_name: "research_management.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Researcher"
    fields:
      - "id:uuid"
      - "first_name:str"
      - "last_name:str"
      - "email:str"
      - "orcid_id:str"
      - "institution:str"
      - "department:str"
      - "specialization:str"
      - "h_index:int"
      - "total_publications:int"
      - "avatar_url:str"
      - "status:str"
  - name: "Project"
    fields:
      - "id:uuid"
      - "title:str"
      - "description:str"
      - "principal_investigator_id:uuid"
      - "co_investigators:str"
      - "status:str"
      - "start_date:date"
      - "end_date:date"
      - "funding_amount:decimal"
      - "funding_source:str"
      - "keywords:str"
      - "progress_percentage:float"
  - name: "Publication"
    fields:
      - "id:uuid"
      - "title:str"
      - "project_id:uuid"
      - "authors:str"
      - "journal:str"
      - "doi:str"
      - "publication_date:date"
      - "type:str"
      - "volume:str"
      - "issue:str"
      - "pages:str"
      - "abstract:str"
      - "pdf_url:str"
  - name: "Grant"
    fields:
      - "id:uuid"
      - "title:str"
      - "funding_agency:str"
      - "amount:decimal"
      - "currency:str"
      - "project_id:uuid"
      - "principal_investigator_id:uuid"
      - "status:str"
      - "start_date:date"
      - "end_date:date"
      - "description:str"
      - "deliverables:str"
  - name: "Dataset"
    fields:
      - "id:uuid"
      - "title:str"
      - "project_id:uuid"
      - "description:str"
      - "format:str"
      - "size_mb:float"
      - "access_level:str"
      - "license:str"
      - "doi:str"
      - "upload_date:date"
      - "storage_url:str"
      - "version:str"
  - name: "Experiment"
    fields:
      - "id:uuid"
      - "project_id:uuid"
      - "title:str"
      - "hypothesis:str"
      - "methodology:str"
      - "status:str"
      - "started_at:datetime"
      - "completed_at:datetime"
      - "results_summary:str"
      - "dataset_id:uuid"
      - "conducted_by:uuid"
  - name: "Citation"
    fields:
      - "id:uuid"
      - "publication_id:uuid"
      - "cited_publication_id:uuid"
      - "context:str"
      - "citation_type:str"
      - "created_at:datetime"

workflow:
  typical_paths:
    - "Investigador crea propuesta de proyecto, solicita subvención, ejecuta experimentos y publica resultados"
    - "Comité revisa solicitudes de subvención, aprueba fondos y monitorea progreso del proyecto"
    - "Investigador registra publicaciones, vincula conjuntos de datos y realiza seguimiento de citas"
  triggers:
    - "grant_submitted:Notificar al comité de revisión sobre nueva solicitud de subvención"
    - "project_milestone_reached:Actualizar progreso del proyecto y notificar a la agencia financiera"
    - "publication_submitted:Vincular publicación al proyecto, actualizar conteo y notificar coautores"
    - "dataset_uploaded:Registrar DOI del conjunto de datos y notificar a colaboradores del proyecto"
    - "experiment_completed:Generar resumen de resultados, vincular conjunto de datos y actualizar estado del proyecto"

features:
  core:
    - "Gestión completa de proyectos de investigación con seguimiento de progreso"
    - "Registro y organización de publicaciones con integración DOI"
    - "Administración de subvenciones con seguimiento de fondos y entregables"
    - "Repositorio de conjuntos de datos con control de acceso y versionado"
    - "Seguimiento de citas entre publicaciones con análisis de impacto"
  advanced:
    - "Analíticas de productividad investigativa con métricas H-index y factor de impacto"
    - "Generación de reportes de progreso de proyectos y uso de fondos en PDF"
    - "Control de acceso basado en roles para datos sensibles de investigación"
    - "Respaldo y restauración de datos de investigación con historial de versiones"
  optional:
    - "Integración con ORCID para sincronización de perfiles de investigadores"
    - "Módulo de revisión por pares para evaluación de publicaciones"
    - "Soporte para protocolos de experimentos reproducibles"
    - "Exportación de datos en formatos estándar para repositorios institucionales"

risk_assessment:
  data_sensitivity: "high"
  compliance:
    - GDPR
    - ORCID
  backup_frequency: "daily"
  access_control: "rbac"
  audit_trail: true
