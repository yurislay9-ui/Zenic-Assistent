niche:
  name: "scholarship"
  domain: "education"
  subdomain: "financial_aid"
  description: "Sistema de gestión de becas y ayuda financiera que administra solicitantes, programas de becas, aplicaciones, revisiones, adjudicaciones y documentos de soporte"
  scale: "medium"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - rbac
    - email_smtp
    - notification_manager
    - pdf_generator
    - crud_service
    - report_generator
    - backup_restore
  variables:
    project_name: "scholarship"
    app_name: "Scholarship"
    template_type: "education"
    db_name: "scholarship.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Applicant"
    fields:
      - "id:uuid"
      - "first_name:str"
      - "last_name:str"
      - "email:str"
      - "phone:str"
      - "date_of_birth:date"
      - "address:str"
      - "institution:str"
      - "gpa:decimal"
      - "financial_need_level:str"
      - "enrollment_status:str"
      - "created_at:datetime"
  - name: "Scholarship"
    fields:
      - "id:uuid"
      - "name:str"
      - "description:str"
      - "amount:decimal"
      - "currency:str"
      - "funding_source:str"
      - "eligibility_criteria:str"
      - "min_gpa:decimal"
      - "max_recipients:int"
      - "application_deadline:date"
      - "disbursement_date:date"
      - "is_active:bool"
      - "created_at:datetime"
  - name: "Application"
    fields:
      - "id:uuid"
      - "applicant_id:uuid"
      - "scholarship_id:uuid"
      - "status:str"
      - "submitted_at:datetime"
      - "personal_statement:str"
      - "gpa_at_application:decimal"
      - "financial_aid_requested:decimal"
      - "reviewer_notes:str"
      - "priority_score:float"
      - "updated_at:datetime"
  - name: "Review"
    fields:
      - "id:uuid"
      - "application_id:uuid"
      - "reviewer_id:uuid"
      - "score:decimal"
      - "max_score:decimal"
      - "criteria_scores:str"
      - "comments:str"
      - "recommendation:str"
      - "reviewed_at:datetime"
      - "status:str"
  - name: "Award"
    fields:
      - "id:uuid"
      - "application_id:uuid"
      - "scholarship_id:uuid"
      - "applicant_id:uuid"
      - "amount_awarded:decimal"
      - "disbursement_schedule:str"
      - "conditions:str"
      - "awarded_at:datetime"
      - "status:str"
      - "expires_at:datetime"
  - name: "Document"
    fields:
      - "id:uuid"
      - "application_id:uuid"
      - "applicant_id:uuid"
      - "document_type:str"
      - "file_name:str"
      - "file_url:str"
      - "file_size:int"
      - "mime_type:str"
      - "is_verified:bool"
      - "uploaded_at:datetime"
      - "verified_by:uuid"
  - name: "Committee"
    fields:
      - "id:uuid"
      - "name:str"
      - "scholarship_id:uuid"
      - "chair_id:uuid"
      - "members:str"
      - "review_guidelines:str"
      - "scoring_criteria:str"
      - "meeting_date:datetime"
      - "status:str"
      - "created_at:datetime"

workflow:
  typical_paths:
    - "Solicitante explora becas disponibles, verifica elegibilidad, envía aplicación con documentos de soporte"
    - "Comité revisa aplicaciones, evalúa criterios, emite puntuaciones y selecciona beneficiarios"
    - "Administrador adjudica becas, notifica a beneficiarios, programa desembolsos y genera reportes"
  triggers:
    - "application_submitted:Notificar al comité sobre nueva aplicación y confirmar recepción al solicitante"
    - "review_completed:Calcular puntuación promedio, actualizar estado de aplicación y notificar al solicitante"
    - "award_granted:Enviar notificación de adjudicación al beneficiario con condiciones y cronograma de desembolso"
    - "deadline_approaching:Alertar a solicitantes interesados sobre fechas límite próximas a vencer"
    - "document_uploaded:Confirmar recepción de documento al solicitante y notificar al revisor"

features:
  core:
    - "Catálogo de becas con criterios de elegibilidad y búsqueda avanzada"
    - "Sistema de aplicaciones con carga de documentos y declaración personal"
    - "Proceso de revisión por comité con puntuación por criterios y recomendaciones"
    - "Adjudicación de becas con cronograma de desembolsos y condiciones"
    - "Generación de cartas de adjudicación y contratos en PDF"
  advanced:
    - "Reportes estadísticos de adjudicaciones, demografía de solicitantes y distribución de fondos"
    - "Sistema de notificaciones por correo para actualizaciones de estado y recordatorios"
    - "Control de acceso basado en roles (solicitante, revisor, administrador, comité)"
    - "Respaldo y restauración de datos con protección de documentos sensibles"
  optional:
    - "Integración con sistemas financieros institucionales para desembolso automático"
    - "Portal de seguimiento de mantenimiento de beca para beneficiarios activos"
    - "Módulo de encuestas de impacto para evaluación post-adjudicación"
    - "Soporte para becas renovables con evaluación de elegibilidad anual"

risk_assessment:
  data_sensitivity: "high"
  compliance:
    - FERPA
    - GDPR
  backup_frequency: "daily"
  access_control: "rbac"
  audit_trail: true
