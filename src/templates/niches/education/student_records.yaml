niche:
  name: "student_records"
  domain: "education"
  subdomain: "academic_records"
  description: "Sistema de gestión de registros académicos estudiantiles que administra expedientes, historiales, asistencias y disciplinas de alumnos"
  scale: "medium"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - rbac
    - pdf_generator
    - report_generator
    - crud_service
    - backup_restore
    - email_smtp
  variables:
    project_name: "student_records"
    app_name: "StudentRecords"
    template_type: "education"
    db_name: "student_records.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Student"
    fields:
      - "id:uuid"
      - "first_name:str"
      - "last_name:str"
      - "student_id:str"
      - "email:str"
      - "date_of_birth:date"
      - "gender:str"
      - "address:str"
      - "phone:str"
      - "enrollment_date:date"
      - "status:str"
      - "grade_level:str"
  - name: "AcademicRecord"
    fields:
      - "id:uuid"
      - "student_id:uuid"
      - "academic_year:str"
      - "semester:str"
      - "gpa:decimal"
      - "credits_earned:int"
      - "credits_attempted:int"
      - "standing:str"
      - "honors:str"
      - "updated_at:datetime"
  - name: "Transcript"
    fields:
      - "id:uuid"
      - "student_id:uuid"
      - "academic_year:str"
      - "semester:str"
      - "course_code:str"
      - "course_name:str"
      - "credits:int"
      - "grade:str"
      - "grade_points:decimal"
      - "created_at:datetime"
  - name: "Attendance"
    fields:
      - "id:uuid"
      - "student_id:uuid"
      - "course_id:uuid"
      - "date:date"
      - "status:str"
      - "arrival_time:time"
      - "departure_time:time"
      - "notes:str"
      - "recorded_by:uuid"
  - name: "Discipline"
    fields:
      - "id:uuid"
      - "student_id:uuid"
      - "incident_date:date"
      - "incident_type:str"
      - "description:str"
      - "severity:str"
      - "action_taken:str"
      - "reported_by:uuid"
      - "parent_notified:bool"
      - "resolution_date:date"
      - "status:str"
  - name: "Guardian"
    fields:
      - "id:uuid"
      - "student_id:uuid"
      - "first_name:str"
      - "last_name:str"
      - "relationship:str"
      - "email:str"
      - "phone:str"
      - "address:str"
      - "is_primary:bool"
      - "emergency_contact:bool"

workflow:
  typical_paths:
    - "Registro de nuevo estudiante con datos del tutor, generación de expediente académico inicial"
    - "Actualización de registros académicos al finalizar período, generación de historial de calificaciones y certificados"
    - "Consulta de expediente completo incluyendo asistencias, disciplinas y progreso académico"
  triggers:
    - "student_enrolled:Crear expediente académico vacío y notificar al tutor por correo"
    - "semester_ended:Generar historial académico del período y calcular GPA acumulado"
    - "discipline_incident:Registrar incidencia disciplinaria y notificar automáticamente al tutor"
    - "attendance_threshold:Alertar cuando estudiante excede ausencias permitidas en un curso"

features:
  core:
    - "Gestión completa de expedientes académicos estudiantiles"
    - "Generación de historiales de calificaciones oficiales en PDF"
    - "Registro y seguimiento de asistencias por curso y período"
    - "Sistema de incidencias disciplinarias con notificación a tutores"
    - "Administración de datos de tutores y contactos de emergencia"
  advanced:
    - "Generación automática de certificados y documentos académicos oficiales"
    - "Reportes estadísticos de rendimiento y asistencia por grupo y período"
    - "Respaldo y restauración de registros académicos con historial de cambios"
    - "Control de acceso basado en roles con auditoría de consultas"
  optional:
    - "Integración con sistemas de inscripción y matrícula externos"
    - "Portal de padres para consulta de expedientes y calificaciones"
    - "Exportación de datos en formatos estándar para migraciones"
    - "Alertas tempranas de riesgo académico basadas en patrones"

risk_assessment:
  data_sensitivity: "high"
  compliance:
    - FERPA
  backup_frequency: "daily"
  access_control: "rbac"
  audit_trail: true
