niche:
  name: "tutoring"
  domain: "education"
  subdomain: "private_tutoring"
  description: "Plataforma de tutorías privadas que conecta estudiantes con tutores, gestiona sesiones, reservas, pagos y evaluaciones del servicio educativo"
  scale: "medium"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - email_smtp
    - notification_manager
    - stripe_payments
    - crud_service
    - pdf_generator
    - task_scheduler
  variables:
    project_name: "tutoring"
    app_name: "Tutoring"
    template_type: "education"
    db_name: "tutoring.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Student"
    fields:
      - "id:uuid"
      - "first_name:str"
      - "last_name:str"
      - "email:str"
      - "phone:str"
      - "grade_level:str"
      - "timezone:str"
      - "avatar_url:str"
      - "learning_goals:str"
      - "registered_at:datetime"
      - "status:str"
  - name: "Tutor"
    fields:
      - "id:uuid"
      - "first_name:str"
      - "last_name:str"
      - "email:str"
      - "phone:str"
      - "bio:str"
      - "specialization:str"
      - "hourly_rate:decimal"
      - "rating:float"
      - "total_sessions:int"
      - "avatar_url:str"
      - "availability:str"
      - "verified:bool"
  - name: "Session"
    fields:
      - "id:uuid"
      - "tutor_id:uuid"
      - "student_id:uuid"
      - "subject_id:uuid"
      - "scheduled_at:datetime"
      - "duration_minutes:int"
      - "status:str"
      - "meeting_url:str"
      - "notes:str"
      - "recording_url:str"
      - "completed_at:datetime"
  - name: "Subject"
    fields:
      - "id:uuid"
      - "name:str"
      - "category:str"
      - "description:str"
      - "level:str"
      - "icon_url:str"
      - "is_active:bool"
      - "created_at:datetime"
  - name: "Booking"
    fields:
      - "id:uuid"
      - "student_id:uuid"
      - "tutor_id:uuid"
      - "session_id:uuid"
      - "requested_date:date"
      - "requested_time:time"
      - "duration_minutes:int"
      - "status:str"
      - "notes:str"
      - "created_at:datetime"
      - "confirmed_at:datetime"
  - name: "Review"
    fields:
      - "id:uuid"
      - "student_id:uuid"
      - "tutor_id:uuid"
      - "session_id:uuid"
      - "rating:int"
      - "comment:str"
      - "created_at:datetime"
      - "is_published:bool"
  - name: "Payment"
    fields:
      - "id:uuid"
      - "student_id:uuid"
      - "tutor_id:uuid"
      - "session_id:uuid"
      - "amount:decimal"
      - "currency:str"
      - "stripe_charge_id:str"
      - "status:str"
      - "tutor_payout:decimal"
      - "platform_fee:decimal"
      - "paid_at:datetime"

workflow:
  typical_paths:
    - "Estudiante busca tutores por materia, selecciona disponibilidad, reserva sesión y completa el pago"
    - "Tutor recibe solicitud de reserva, confirma sesión, imparte clase y recibe pago"
    - "Estudiante califica la sesión, el tutor actualiza notas y la plataforma procesa pagos y comisiones"
  triggers:
    - "booking_created:Notificar al tutor sobre nueva solicitud de reserva con detalles de la sesión"
    - "booking_confirmed:Enviar confirmación al estudiante con enlace de reunión y recordatorio programado"
    - "session_completed:Procesar pago al tutor, solicitar reseña del estudiante y generar recibo PDF"
    - "booking_cancelled:Reembolsar al estudiante y liberar horario del tutor"
    - "session_reminder:Enviar recordatorio 24 horas y 1 hora antes de la sesión programada"

features:
  core:
    - "Búsqueda y filtrado de tutores por materia, disponibilidad y calificación"
    - "Sistema de reservas con gestión de disponibilidad en tiempo real"
    - "Procesamiento de pagos con distribución automática de comisiones"
    - "Sistema de reseñas y calificaciones para tutores"
    - "Generación de recibos y comprobantes de pago en PDF"
  advanced:
    - "Programación automática de recordatorios y notificaciones por correo"
    - "Dashboard de métricas para tutores con ingresos y reseñas"
    - "Gestión de zonas horarias para sesiones internacionales"
    - "Verificación de identidad y credenciales de tutores"
  optional:
    - "Integración con plataformas de videoconferencia externas"
    - "Programa de fidelidad y descuentos para estudiantes frecuentes"
    - "Soporte para sesiones grupales con precio compartido"
    - "Portal de administración con reportes financieros"

risk_assessment:
  data_sensitivity: "medium"
  compliance:
    - GDPR
  backup_frequency: "daily"
  access_control: "basic"
  audit_trail: true
