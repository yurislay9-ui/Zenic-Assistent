niche:
  name: "banking"
  domain: "finance"
  subdomain: "banking"
  description: "Sistema bancario integral para gestión de cuentas, transacciones, préstamos y servicios financieros con cumplimiento normativo estricto y trazabilidad completa"
  scale: "enterprise"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - rbac
    - pdf_generator
    - notification_manager
    - email_smtp
    - crud_service
    - backup_restore
    - report_generator
    - data_analyzer
  variables:
    project_name: "banking"
    app_name: "Banking"
    template_type: "niche"
    db_name: "banking.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Account"
    fields:
      - "account_id:uuid"
      - "account_number:str"
      - "account_type:str"
      - "balance:decimal"
      - "currency:str"
      - "status:str"
      - "opened_at:datetime"
      - "closed_at:datetime"
      - "interest_rate:decimal"
      - "overdraft_limit:decimal"
      - "customer_id:uuid"
      - "branch_id:uuid"

  - name: "Customer"
    fields:
      - "customer_id:uuid"
      - "first_name:str"
      - "last_name:str"
      - "email:str"
      - "phone:str"
      - "date_of_birth:date"
      - "national_id:str"
      - "address:str"
      - "kyc_status:str"
      - "risk_profile:str"
      - "created_at:datetime"
      - "updated_at:datetime"

  - name: "Transaction"
    fields:
      - "transaction_id:uuid"
      - "account_id:uuid"
      - "transaction_type:str"
      - "amount:decimal"
      - "currency:str"
      - "description:str"
      - "reference:str"
      - "status:str"
      - "posted_at:datetime"
      - "created_at:datetime"
      - "counterparty:str"
      - "category:str"

  - name: "Transfer"
    fields:
      - "transfer_id:uuid"
      - "source_account_id:uuid"
      - "destination_account_id:uuid"
      - "amount:decimal"
      - "currency:str"
      - "fee:decimal"
      - "status:str"
      - "transfer_type:str"
      - "reference:str"
      - "scheduled_at:datetime"
      - "completed_at:datetime"
      - "created_at:datetime"

  - name: "Loan"
    fields:
      - "loan_id:uuid"
      - "customer_id:uuid"
      - "loan_type:str"
      - "principal:decimal"
      - "interest_rate:decimal"
      - "term_months:int"
      - "status:str"
      - "disbursed_at:datetime"
      - "maturity_date:date"
      - "outstanding_balance:decimal"
      - "monthly_payment:decimal"
      - "collateral_id:uuid"

  - name: "Card"
    fields:
      - "card_id:uuid"
      - "account_id:uuid"
      - "card_number_encrypted:str"
      - "card_type:str"
      - "expiry_date:date"
      - "cvv_hash:str"
      - "status:str"
      - "credit_limit:decimal"
      - "current_balance:decimal"
      - "pin_hash:str"
      - "issued_at:datetime"
      - "last_used_at:datetime"

  - name: "Branch"
    fields:
      - "branch_id:uuid"
      - "name:str"
      - "code:str"
      - "address:str"
      - "city:str"
      - "country:str"
      - "phone:str"
      - "manager_name:str"
      - "operating_hours:str"
      - "is_active:bool"
      - "latitude:float"
      - "longitude:float"

workflow:
  typical_paths:
    - "Cliente abre cuenta → Realiza depósito → Ejecuta transacciones → Solicita préstamo → Gestiona pagos"
    - "Solicitud de tarjeta → Aprobación crediticia → Emisión de tarjeta → Activación → Uso y seguimiento"
    - "Transferencia iniciada → Validación de saldo → Verificación de seguridad → Procesamiento → Confirmación"
  triggers:
    - "transaction_created:Detectar y registrar nueva transacción con validación antifraude"
    - "loan_payment_due:Notificar al cliente sobre pago próximo a vencer"
    - "suspicious_activity:Activar protocolo de seguridad ante comportamiento inusual en cuenta"
    - "kyc_review_required:Iniciar revisión periódica de conocimiento del cliente"
    - "account_balance_threshold:Alertar cuando el saldo cae por debajo del mínimo requerido"

features:
  core:
    - "Gestión completa de cuentas bancarias con soporte multi-moneda"
    - "Procesamiento de transacciones en tiempo real con validación antifraude"
    - "Administración de préstamos con cálculo de amortización automático"
    - "Emisión y gestión de tarjetas de débito y crédito"
    - "Sistema de transferencias nacionales e internacionales"
    - "Portal de cumplimiento normativo con auditoría integrada"
  advanced:
    - "Motor de detección de fraude basado en análisis de patrones"
    - "Scoring crediticio automatizado con modelos predictivos"
    - "Dashboard analítico con métricas de rendimiento financiero"
    - "Integración con sistemas de compensación interbancaria"
    - "Gestión de límites de crédito dinámicos según perfil de riesgo"
  optional:
    - "Banca móvil con notificaciones push"
    - "Asistente virtual para consultas de saldo y movimientos"
    - "Programa de fidelización y recompensas"
    - "Integración con billeteras digitales"
    - "Módulo de inversiones integrado"

risk_assessment:
  data_sensitivity: "critical"
  compliance:
    - "PCI-DSS"
    - "SOX"
    - "GDPR"
  backup_frequency: "realtime"
  access_control: "rbac"
  audit_trail: true
