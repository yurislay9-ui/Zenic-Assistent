niche:
  name: "insurance"
  domain: "finance"
  subdomain: "insurance"
  description: "Sistema de gestión aseguradora integral para administración de pólizas, reclamaciones, primas, coberturas y agentes con documentación automatizada y cumplimiento normativo"
  scale: "large"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - rbac
    - pdf_generator
    - email_smtp
    - notification_manager
    - invoice_calculator
    - crud_service
    - report_generator
    - backup_restore
  variables:
    project_name: "insurance"
    app_name: "Insurance"
    template_type: "niche"
    db_name: "insurance.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Policy"
    fields:
      - "policy_id:uuid"
      - "policy_number:str"
      - "policy_type:str"
      - "status:str"
      - "start_date:date"
      - "end_date:date"
      - "premium_amount:decimal"
      - "deductible:decimal"
      - "coverage_limit:decimal"
      - "customer_id:uuid"
      - "agent_id:uuid"
      - "renewal_date:date"

  - name: "Claim"
    fields:
      - "claim_id:uuid"
      - "policy_id:uuid"
      - "claim_number:str"
      - "claim_type:str"
      - "description:str"
      - "amount_claimed:decimal"
      - "amount_approved:decimal"
      - "status:str"
      - "filed_at:datetime"
      - "resolved_at:datetime"
      - "adjuster_id:uuid"
      - "evidence_documents:list"

  - name: "Customer"
    fields:
      - "customer_id:uuid"
      - "first_name:str"
      - "last_name:str"
      - "email:str"
      - "phone:str"
      - "date_of_birth:date"
      - "address:str"
      - "national_id:str"
      - "risk_category:str"
      - "kyc_verified:bool"
      - "created_at:datetime"
      - "updated_at:datetime"

  - name: "Premium"
    fields:
      - "premium_id:uuid"
      - "policy_id:uuid"
      - "amount:decimal"
      - "currency:str"
      - "frequency:str"
      - "due_date:date"
      - "paid_date:date"
      - "status:str"
      - "payment_method:str"
      - "late_fee:decimal"
      - "discount:decimal"
      - "total_paid:decimal"

  - name: "Coverage"
    fields:
      - "coverage_id:uuid"
      - "policy_id:uuid"
      - "coverage_type:str"
      - "description:str"
      - "limit_amount:decimal"
      - "deductible:decimal"
      - "co_insurance_pct:decimal"
      - "exclusions:list"
      - "conditions:list"
      - "is_active:bool"
      - "created_at:datetime"
      - "updated_at:datetime"

  - name: "Agent"
    fields:
      - "agent_id:uuid"
      - "first_name:str"
      - "last_name:str"
      - "email:str"
      - "phone:str"
      - "license_number:str"
      - "region:str"
      - "commission_rate:decimal"
      - "total_policies:int"
      - "total_premium:decimal"
      - "rating:decimal"
      - "joined_at:datetime"
      - "is_active:bool"

  - name: "Document"
    fields:
      - "document_id:uuid"
      - "policy_id:uuid"
      - "document_type:str"
      - "title:str"
      - "file_path:str"
      - "file_size:int"
      - "mime_type:str"
      - "uploaded_at:datetime"
      - "uploaded_by:uuid"
      - "version:int"
      - "is_signed:bool"
      - "digital_hash:str"

  - name: "Payment"
    fields:
      - "payment_id:uuid"
      - "policy_id:uuid"
      - "customer_id:uuid"
      - "amount:decimal"
      - "currency:str"
      - "payment_method:str"
      - "reference:str"
      - "status:str"
      - "processed_at:datetime"
      - "gateway_response:json"
      - "refund_amount:decimal"
      - "created_at:datetime"

workflow:
  typical_paths:
    - "Solicitar cotización → Evaluar riesgo → Emitir póliza → Cobrar prima → Renovar anualmente"
    - "Reportar siniestro → Documentar reclamación → Evaluar cobertura → Ajustar monto → Liquidar pago"
    - "Asignar agente → Gestionar clientes → Vender pólizas → Comisionar → Evaluar rendimiento"
  triggers:
    - "claim_filed:Iniciar proceso de evaluación y asignación de ajustador ante nueva reclamación"
    - "premium_due:Notificar al cliente sobre prima próxima a vencer y generar recordatorio de pago"
    - "policy_renewal_approaching:Iniciar proceso de renovación de póliza con revisión de términos"
    - "payment_received:Actualizar estado de póliza y generar recibo de pago confirmado"
    - "claim_status_changed:Notificar al cliente y agente sobre cambios en el estado de reclamación"

features:
  core:
    - "Gestión completa del ciclo de vida de pólizas con renovación automática"
    - "Procesamiento de reclamaciones con flujo de aprobación multi-nivel"
    - "Cálculo y cobro de primas con soporte para múltiples frecuencias de pago"
    - "Administración de coberturas con exclusiones y condiciones personalizables"
    - "Portal de agentes con seguimiento de comisiones y métricas de rendimiento"
  advanced:
    - "Motor de evaluación de riesgo con scoring automatizado"
    - "Detección de fraudes en reclamaciones con análisis de patrones"
    - "Dashboard analítico con métricas de siniestralidad y rentabilidad"
    - "Gestión documental con firma digital y almacenamiento seguro"
    - "Integración con pasarelas de pago para cobro automático de primas"
  optional:
    - "Portal de autoservicio para clientes con consulta de pólizas y reclamaciones"
    - "Módulo de reaseguro con gestión de contratos y participaciones"
    - "Integración con sistemas de telemática para seguros de vehículos"
    - "Asistente virtual para consultas sobre coberturas y deducibles"
    - "Reportes regulatorios automatizados por jurisdicción"

risk_assessment:
  data_sensitivity: "high"
  compliance:
    - "GDPR"
    - "SOX"
  backup_frequency: "daily"
  access_control: "rbac"
  audit_trail: true
