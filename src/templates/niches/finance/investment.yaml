niche:
  name: "investment"
  domain: "finance"
  subdomain: "investment"
  description: "Plataforma de gestión de inversiones para administración de portafolios, activos financieros, estrategias de mercado y alertas con análisis avanzado en tiempo real"
  scale: "large"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - rbac
    - data_analyzer
    - notification_manager
    - email_smtp
    - pdf_generator
    - crud_service
    - report_generator
  variables:
    project_name: "investment"
    app_name: "Investment"
    template_type: "niche"
    db_name: "investment.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Portfolio"
    fields:
      - "portfolio_id:uuid"
      - "name:str"
      - "description:str"
      - "owner_id:uuid"
      - "strategy:str"
      - "total_value:decimal"
      - "currency:str"
      - "risk_level:str"
      - "created_at:datetime"
      - "updated_at:datetime"
      - "benchmark:str"
      - "performance_ytd:decimal"

  - name: "Asset"
    fields:
      - "asset_id:uuid"
      - "symbol:str"
      - "name:str"
      - "asset_type:str"
      - "exchange:str"
      - "sector:str"
      - "currency:str"
      - "current_price:decimal"
      - "previous_close:decimal"
      - "market_cap:decimal"
      - "volume:int"
      - "last_updated:datetime"

  - name: "Transaction"
    fields:
      - "transaction_id:uuid"
      - "portfolio_id:uuid"
      - "asset_id:uuid"
      - "transaction_type:str"
      - "quantity:decimal"
      - "price_per_unit:decimal"
      - "total_amount:decimal"
      - "fee:decimal"
      - "currency:str"
      - "executed_at:datetime"
      - "settlement_date:date"
      - "status:str"

  - name: "MarketData"
    fields:
      - "data_id:uuid"
      - "asset_id:uuid"
      - "timestamp:datetime"
      - "open:decimal"
      - "high:decimal"
      - "low:decimal"
      - "close:decimal"
      - "volume:int"
      - "source:str"
      - "interval:str"
      - "adj_close:decimal"
      - "vwap:decimal"

  - name: "Strategy"
    fields:
      - "strategy_id:uuid"
      - "name:str"
      - "description:str"
      - "strategy_type:str"
      - "parameters:json"
      - "risk_tolerance:decimal"
      - "target_return:decimal"
      - "max_drawdown:decimal"
      - "time_horizon:str"
      - "is_active:bool"
      - "backtest_results:json"
      - "created_at:datetime"

  - name: "Alert"
    fields:
      - "alert_id:uuid"
      - "portfolio_id:uuid"
      - "asset_id:uuid"
      - "alert_type:str"
      - "condition:str"
      - "threshold:decimal"
      - "is_active:bool"
      - "triggered_at:datetime"
      - "notification_method:str"
      - "message:str"
      - "priority:str"
      - "created_at:datetime"

  - name: "Broker"
    fields:
      - "broker_id:uuid"
      - "name:str"
      - "code:str"
      - "api_endpoint:str"
      - "commission_rate:decimal"
      - "supported_markets:list"
      - "settlement_cycle:str"
      - "min_trade_amount:decimal"
      - "is_active:bool"
      - "credentials_encrypted:str"
      - "last_sync_at:datetime"
      - "rating:decimal"

workflow:
  typical_paths:
    - "Crear portafolio → Definir estrategia → Asignar activos → Monitorear rendimiento → Rebalancear"
    - "Análisis de mercado → Identificar oportunidad → Ejecutar transacción → Registrar en portafolio → Evaluar resultado"
    - "Configurar alerta → Detectar condición → Notificar inversor → Tomar decisión → Ejecutar acción"
  triggers:
    - "market_price_change:Evaluar impacto de cambio de precio en portafolios y activar alertas"
    - "portfolio_rebalance_needed:Notificar cuando la desviación del portafolio excede el umbral configurado"
    - "trade_execution_confirmed:Actualizar posiciones del portafolio tras confirmación de corretaje"
    - "stop_loss_triggered:Ejecutar venta automática cuando el precio alcanza el nivel de stop-loss"
    - "dividend_payment_received:Registrar pago de dividendos y actualizar valor del portafolio"

features:
  core:
    - "Gestión integral de portafolios con seguimiento de rendimiento en tiempo real"
    - "Registro y seguimiento de transacciones de compra y venta de activos"
    - "Sistema de alertas configurables por precio, volumen y métricas técnicas"
    - "Integración con múltiples brokers y fuentes de datos de mercado"
    - "Motor de análisis técnico y fundamental con indicadores personalizables"
  advanced:
    - "Backtesting de estrategias de inversión con datos históricos"
    - "Optimización de portafolios con modelo de Markowitz y variaciones"
    - "Dashboard analítico con métricas de Sharpe, Sortino y Alpha"
    - "Rebalanceo automático basado en reglas y umbrales configurados"
    - "Simulación Monte Carlo para proyecciones de rendimiento"
  optional:
    - "Trading algorítmico con ejecución automatizada"
    - "Integración con APIs de noticias financieras y sentimiento de mercado"
    - "Módulo de inversión social y copy-trading"
    - "Reportes fiscales automatizados por jurisdicción"
    - "Soporte para activos alternativos y criptomonedas"

risk_assessment:
  data_sensitivity: "critical"
  compliance:
    - "SEC"
    - "FINRA"
  backup_frequency: "hourly"
  access_control: "rbac"
  audit_trail: true
