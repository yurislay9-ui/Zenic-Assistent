niche:
  name: "lending"
  domain: "finance"
  subdomain: "lending"
  description: "Plataforma de préstamos y crédito para gestión de prestatarios, préstamos, pagos, evaluación crediticia y amortización con cumplimiento normativo financiero estricto"
  scale: "large"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - rbac
    - invoice_calculator
    - pdf_generator
    - email_smtp
    - notification_manager
    - crud_service
    - report_generator
    - backup_restore
  variables:
    project_name: "lending"
    app_name: "Lending"
    template_type: "niche"
    db_name: "lending.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Borrower"
    fields:
      - "borrower_id:uuid"
      - "first_name:str"
      - "last_name:str"
      - "email:str"
      - "phone:str"
      - "date_of_birth:date"
      - "national_id:str"
      - "address:str"
      - "employment_status:str"
      - "annual_income:decimal"
      - "debt_to_income_ratio:decimal"
      - "created_at:datetime"

  - name: "Loan"
    fields:
      - "loan_id:uuid"
      - "borrower_id:uuid"
      - "loan_type:str"
      - "principal:decimal"
      - "interest_rate:decimal"
      - "term_months:int"
      - "monthly_payment:decimal"
      - "status:str"
      - "origination_fee:decimal"
      - "disbursed_at:datetime"
      - "maturity_date:date"
      - "outstanding_balance:decimal"

  - name: "Payment"
    fields:
      - "payment_id:uuid"
      - "loan_id:uuid"
      - "borrower_id:uuid"
      - "amount:decimal"
      - "principal_portion:decimal"
      - "interest_portion:decimal"
      - "late_fee:decimal"
      - "payment_date:date"
      - "payment_method:str"
      - "status:str"
      - "reference:str"
      - "processed_at:datetime"

  - name: "CreditScore"
    fields:
      - "score_id:uuid"
      - "borrower_id:uuid"
      - "score:int"
      - "score_model:str"
      - "risk_category:str"
      - "factors:json"
      - "credit_utilization:decimal"
      - "payment_history_pct:decimal"
      - "credit_age_months:int"
      - "inquiries_count:int"
      - "evaluated_at:datetime"
      - "next_evaluation:date"

  - name: "Collateral"
    fields:
      - "collateral_id:uuid"
      - "loan_id:uuid"
      - "borrower_id:uuid"
      - "collateral_type:str"
      - "description:str"
      - "appraised_value:decimal"
      - "lien_position:int"
      - "insurance_policy:str"
      - "document_number:str"
      - "status:str"
      - "registered_at:datetime"
      - "last_appraisal:date"

  - name: "Document"
    fields:
      - "document_id:uuid"
      - "loan_id:uuid"
      - "borrower_id:uuid"
      - "document_type:str"
      - "title:str"
      - "file_path:str"
      - "file_size:int"
      - "mime_type:str"
      - "uploaded_at:datetime"
      - "verified:bool"
      - "verified_by:uuid"
      - "expires_at:datetime"

  - name: "Amortization"
    fields:
      - "amortization_id:uuid"
      - "loan_id:uuid"
      - "period_number:int"
      - "payment_date:date"
      - "beginning_balance:decimal"
      - "scheduled_payment:decimal"
      - "principal_amount:decimal"
      - "interest_amount:decimal"
      - "ending_balance:decimal"
      - "cumulative_interest:decimal"
      - "status:str"
      - "actual_payment:decimal"

workflow:
  typical_paths:
    - "Solicitud de préstamo → Evaluación crediticia → Aprobación → Formalización → Desembolso → Gestión de pagos"
    - "Registrar pago → Calcular distribución capital/interés → Actualizar balance → Generar estado de cuenta"
    - "Evaluar colateral → Registrar garantía → Monitorear valor → Gestionar liberación al cierre del préstamo"
  triggers:
    - "loan_application_submitted:Iniciar evaluación crediticia y verificación de documentos del prestatario"
    - "payment_due_approaching:Notificar al prestatario sobre pago próximo a vencer con monto y fecha"
    - "payment_overdue:Activar proceso de cobranza y aplicar cargos por mora automáticamente"
    - "credit_score_updated:Reevaluar condiciones de préstamos activos ante cambio en score crediticio"
    - "collateral_value_declined:Alertar cuando el valor de la garantía cae por debajo del umbral requerido"

features:
  core:
    - "Gestión completa del ciclo de vida de préstamos con múltiples tipos y modalidades"
    - "Evaluación crediticia automatizada con scoring y análisis de capacidad de pago"
    - "Cálculo de amortización con tablas de pago detalladas y distribución capital/interés"
    - "Registro y seguimiento de pagos con cálculo automático de mora e intereses"
    - "Administración de colaterales con seguimiento de valor y estado de garantías"
  advanced:
    - "Motor de decisión crediticia con reglas configurables y modelos de riesgo"
    - "Detección temprana de incumplimiento con análisis de patrones de pago"
    - "Dashboard analítico con métricas de cartera, morosidad y rentabilidad"
    - "Gestión documental con verificación y trazabilidad completa"
    - "Cálculo dinámico de tasas basado en perfil de riesgo y condiciones de mercado"
  optional:
    - "Portal de autoservicio para prestatarios con consulta de estado de cuenta"
    - "Integración con burós de crédito para consulta y reporte automático"
    - "Módulo de reestructuración de deuda con simulación de escenarios"
    - "Notificaciones multicanal vía email, SMS y push"
    - "Reportes regulatorios automatizados para cumplimiento FCRA y TILA"

risk_assessment:
  data_sensitivity: "critical"
  compliance:
    - "FCRA"
    - "TILA"
    - "GDPR"
  backup_frequency: "hourly"
  access_control: "rbac"
  audit_trail: true
