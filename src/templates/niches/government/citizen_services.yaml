niche:
  name: "citizen_services"
  domain: "government"
  subdomain: "public_services"
  description: "Plataforma integral de servicios al ciudadano para gestión de solicitudes, citas, documentos, pagos y seguimiento de trámites a través de los departamentos gubernamentales."
  scale: "enterprise"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - rbac
    - email_smtp
    - notification_manager
    - pdf_generator
    - invoice_calculator
    - crud_service
    - report_generator
    - backup_restore
  variables:
    project_name: "citizen_services"
    app_name: "CitizenServices"
    template_type: "niche"
    db_name: "citizen_services.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Citizen"
    fields:
      - "citizen_id:uuid"
      - "national_id:str"
      - "first_name:str"
      - "last_name:str"
      - "email:str"
      - "phone:str"
      - "address:str"
      - "city:str"
      - "postal_code:str"
      - "date_of_birth:date"
      - "registration_date:date"
      - "status:str"

  - name: "Service"
    fields:
      - "service_id:uuid"
      - "name:str"
      - "description:str"
      - "category:str"
      - "department_id:uuid"
      - "requirements:str"
      - "processing_time_days:int"
      - "fee:float"
      - "online_eligible:bool"
      - "documentation_required:str"
      - "status:str"

  - name: "Request"
    fields:
      - "request_id:uuid"
      - "citizen_id:uuid"
      - "service_id:uuid"
      - "submission_date:datetime"
      - "status:str"
      - "priority:str"
      - "assigned_to:str"
      - "notes:str"
      - "estimated_completion:date"
      - "completion_date:date"
      - "tracking_code:str"

  - name: "Document"
    fields:
      - "document_id:uuid"
      - "request_id:uuid"
      - "citizen_id:uuid"
      - "document_type:str"
      - "file_path:str"
      - "uploaded_date:datetime"
      - "verified:bool"
      - "verified_by:str"
      - "verification_date:datetime"
      - "expiry_date:date"
      - "status:str"

  - name: "Appointment"
    fields:
      - "appointment_id:uuid"
      - "citizen_id:uuid"
      - "service_id:uuid"
      - "department_id:uuid"
      - "date:date"
      - "time_slot:str"
      - "location:str"
      - "status:str"
      - "attended:bool"
      - "notes:str"
      - "created_date:datetime"

  - name: "Payment"
    fields:
      - "payment_id:uuid"
      - "request_id:uuid"
      - "citizen_id:uuid"
      - "amount:float"
      - "currency:str"
      - "payment_method:str"
      - "payment_date:datetime"
      - "reference:str"
      - "status:str"
      - "receipt_number:str"

  - name: "Status"
    fields:
      - "status_id:uuid"
      - "request_id:uuid"
      - "status_value:str"
      - "changed_by:str"
      - "changed_date:datetime"
      - "comments:str"
      - "notify_citizen:bool"
      - "department_id:uuid"

  - name: "Department"
    fields:
      - "department_id:uuid"
      - "name:str"
      - "code:str"
      - "head:str"
      - "email:str"
      - "phone:str"
      - "address:str"
      - "services_count:int"
      - "status:str"
      - "operating_hours:str"

workflow:
  typical_paths:
    - "Registro del ciudadano → Solicitud de servicio → Carga de documentos → Verificación → Cita presencial → Procesamiento → Emisión de documento → Notificación"
    - "Solicitud online → Pago de tasa → Asignación a departamento → Seguimiento de estado → Completado → Descarga de documento"
    - "Consulta de estado → Actualización de solicitud → Notificación al ciudadano → Recopilación de documentos adicionales → Resolución"
  triggers:
    - "request_submitted:Notificación al departamento cuando un ciudadano presenta una nueva solicitud"
    - "document_verification_required:Aviso al ciudadano cuando se requiere verificación adicional de documentos"
    - "appointment_reminder:Recordatorio automático al ciudadano antes de la cita programada"
    - "status_change:Notificación al ciudadano ante cualquier cambio en el estado de su solicitud"
    - "payment_received:Confirmación automática al ciudadano tras recibir un pago"

features:
  core:
    - "Portal de autoservicio para que los ciudadanos presenten y rastreen solicitudes en línea"
    - "Gestión de citas con disponibilidad en tiempo real por departamento y servicio"
    - "Sistema de verificación y validación de documentos con seguimiento de estado"
    - "Procesamiento de pagos y emisión de recibos para tasas y servicios"
    - "Panel de control departamental con gestión de carga de trabajo y asignación"
    - "Sistema de notificaciones multicanal para mantener informados a los ciudadanos"
  advanced:
    - "Predicción de tiempos de procesamiento basada en historial y carga actual del departamento"
    - "Verificación automática de identidad mediante integración con bases de datos nacionales"
    - "Enrutamiento inteligente de solicitudes al departamento y funcionario más adecuado"
    - "Análisis de satisfacción del ciudadano y métricas de rendimiento por departamento"
  optional:
    - "Integración con firma digital y certificados electrónicos"
    - "Portal multilingüe con soporte para idiomas minoritarios"
    - "Chatbot de asistencia virtual para consultas frecuentes"
    - "Módulo de participación ciudadana con consultas y encuestas"
    - "Integración con sistemas de identidad federada gubernamental"

risk_assessment:
  data_sensitivity: "critical"
  compliance:
    - "GDPR"
    - "FOIA"
  backup_frequency: "hourly"
  access_control: "rbac"
  audit_trail: true
