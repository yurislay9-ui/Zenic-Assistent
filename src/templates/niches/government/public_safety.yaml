niche:
  name: "public_safety"
  domain: "government"
  subdomain: "emergency_services"
  description: "Plataforma de seguridad pública para gestión de incidentes, despacho de recursos, seguimiento de oficiales, gestión de evidencia y coordinación de respuestas ante emergencias."
  scale: "large"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - rbac
    - notification_manager
    - email_smtp
    - pdf_generator
    - task_scheduler
    - crud_service
    - report_generator
    - backup_restore
    - data_analyzer
  variables:
    project_name: "public_safety"
    app_name: "PublicSafety"
    template_type: "niche"
    db_name: "public_safety.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Incident"
    fields:
      - "incident_id:uuid"
      - "type:str"
      - "severity:str"
      - "description:str"
      - "location_lat:float"
      - "location_lon:float"
      - "address:str"
      - "reported_at:datetime"
      - "reported_by:str"
      - "status:str"
      - "assigned_unit:str"
      - "resolved_at:datetime"
      - "resolution:str"

  - name: "Officer"
    fields:
      - "officer_id:uuid"
      - "badge_number:str"
      - "first_name:str"
      - "last_name:str"
      - "rank:str"
      - "department:str"
      - "status:str"
      - "current_location_lat:float"
      - "current_location_lon:float"
      - "contact_phone:str"
      - "on_duty:bool"
      - "shift:str"

  - name: "Report"
    fields:
      - "report_id:uuid"
      - "incident_id:uuid"
      - "officer_id:uuid"
      - "report_type:str"
      - "narrative:str"
      - "created_at:datetime"
      - "updated_at:datetime"
      - "status:str"
      - "approved_by:str"
      - "approved_at:datetime"
      - "classification:str"

  - name: "Location"
    fields:
      - "location_id:uuid"
      - "name:str"
      - "type:str"
      - "address:str"
      - "location_lat:float"
      - "location_lon:float"
      - "jurisdiction:str"
      - "zone:str"
      - "risk_level:str"
      - "notes:str"

  - name: "Alert"
    fields:
      - "alert_id:uuid"
      - "type:str"
      - "severity:str"
      - "message:str"
      - "target_zone:str"
      - "issued_at:datetime"
      - "expires_at:datetime"
      - "issued_by:str"
      - "status:str"
      - "acknowledged_count:int"

  - name: "Resource"
    fields:
      - "resource_id:uuid"
      - "name:str"
      - "type:str"
      - "category:str"
      - "status:str"
      - "location_lat:float"
      - "location_lon:float"
      - "capacity:int"
      - "current_assignment:uuid"
      - "availability:bool"
      - "last_maintenance:date"

  - name: "Dispatch"
    fields:
      - "dispatch_id:uuid"
      - "incident_id:uuid"
      - "resource_id:uuid"
      - "officer_id:uuid"
      - "dispatched_at:datetime"
      - "arrived_at:datetime"
      - "cleared_at:datetime"
      - "status:str"
      - "priority:str"
      - "estimated_arrival:int"
      - "notes:str"

  - name: "Evidence"
    fields:
      - "evidence_id:uuid"
      - "incident_id:uuid"
      - "evidence_type:str"
      - "description:str"
      - "collected_by:str"
      - "collected_at:datetime"
      - "storage_location:str"
      - "chain_of_custody:str"
      - "status:str"
      - "category:str"
      - "file_path:str"

workflow:
  typical_paths:
    - "Recepción de llamada → Creación de incidente → Evaluación de severidad → Despacho de recursos y oficiales → Llegada al lugar → Acción → Informe → Cierre"
    - "Detección de alerta → Evaluación de amenaza → Activación de protocolo → Notificación a oficiales → Despliegue → Seguimiento → Desactivación"
    - "Recolección de evidencia → Registro en cadena de custodia → Almacenamiento seguro → Asignación a caso → Análisis → Presentación judicial"
  triggers:
    - "emergency_call:Creación inmediata de incidente y activación del protocolo de despacho ante llamada de emergencia"
    - "officer_unavailable:Reasignación automática cuando un oficial marca estado no disponible durante incidente activo"
    - "evidence_tampering:Alerta crítica cuando se detecta acceso no autorizado a evidencia almacenada"
    - "shift_change:Transición programada de turnos con reasignación de incidentes activos"
    - "resource_low:Notificación cuando los recursos disponibles caen por debajo del umbral mínimo para una zona"

features:
  core:
    - "Gestión completa del ciclo de vida de incidentes con despacho coordinado de recursos"
    - "Seguimiento en tiempo real de ubicación y estado de oficiales y unidades"
    - "Sistema de alertas con clasificación por severidad y alcance geográfico"
    - "Gestión de evidencia con cadena de custodia verificable e inmutable"
    - "Generación de informes oficiales con aprobación jerárquica y clasificación"
    - "Panel de operaciones con mapa interactivo y estado de recursos por zona"
  advanced:
    - "Análisis predictivo de delincuencia para despliegue preventivo de recursos"
    - "Despacho inteligente basado en proximidad, capacidad y tipo de incidente"
    - "Reconocimiento de patrones para identificar series de incidentes relacionados"
    - "Integración con sistemas CAD/911 para recepción y procesamiento de llamadas"
  optional:
    - "Módulo de gestión de crisis con protocolos de coordinación multiagencia"
    - "Integración con sistemas de videovigilancia y análisis de imágenes"
    - "Portal comunitario para reporte de incidentes no urgentes"
    - "Sistema de acreditación y gestión de credenciales de oficiales"

risk_assessment:
  data_sensitivity: "critical"
  compliance:
    - "CJIS"
    - "GDPR"
  backup_frequency: "hourly"
  access_control: "rbac"
  audit_trail: true
