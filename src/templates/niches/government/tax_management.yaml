niche:
  name: "tax_management"
  domain: "government"
  subdomain: "taxation"
  description: "Sistema integral de gestión tributaria para administración de contribuyentes, declaraciones, pagos, auditorías, deducciones y cumplimiento del código fiscal."
  scale: "enterprise"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - rbac
    - invoice_calculator
    - pdf_generator
    - email_smtp
    - notification_manager
    - crud_service
    - report_generator
    - backup_restore
    - data_analyzer
  variables:
    project_name: "tax_management"
    app_name: "TaxManagement"
    template_type: "niche"
    db_name: "tax_management.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Taxpayer"
    fields:
      - "taxpayer_id:uuid"
      - "tax_id:str"
      - "first_name:str"
      - "last_name:str"
      - "email:str"
      - "phone:str"
      - "address:str"
      - "city:str"
      - "taxpayer_type:str"
      - "registration_date:date"
      - "status:str"
      - "filing_frequency:str"

  - name: "Return"
    fields:
      - "return_id:uuid"
      - "taxpayer_id:uuid"
      - "tax_year:int"
      - "filing_type:str"
      - "filing_date:date"
      - "gross_income:float"
      - "total_deductions:float"
      - "taxable_income:float"
      - "tax_owed:float"
      - "tax_paid:float"
      - "refund:float"
      - "status:str"

  - name: "Payment"
    fields:
      - "payment_id:uuid"
      - "taxpayer_id:uuid"
      - "return_id:uuid"
      - "amount:float"
      - "currency:str"
      - "payment_method:str"
      - "payment_date:datetime"
      - "reference:str"
      - "status:str"
      - "penalty_included:bool"
      - "interest_included:bool"

  - name: "Assessment"
    fields:
      - "assessment_id:uuid"
      - "taxpayer_id:uuid"
      - "return_id:uuid"
      - "assessment_type:str"
      - "original_amount:float"
      - "assessed_amount:float"
      - "difference:float"
      - "assessment_date:date"
      - "assessed_by:str"
      - "status:str"
      - "appeal_deadline:date"

  - name: "Audit"
    fields:
      - "audit_id:uuid"
      - "taxpayer_id:uuid"
      - "return_id:uuid"
      - "audit_type:str"
      - "start_date:date"
      - "end_date:date"
      - "assigned_auditor:str"
      - "scope:str"
      - "findings:str"
      - "adjustment_amount:float"
      - "status:str"
      - "priority:str"

  - name: "Deduction"
    fields:
      - "deduction_id:uuid"
      - "return_id:uuid"
      - "taxpayer_id:uuid"
      - "deduction_type:str"
      - "category:str"
      - "amount:float"
      - "description:str"
      - "supporting_document:str"
      - "verified:bool"
      - "verification_date:date"

  - name: "Filing"
    fields:
      - "filing_id:uuid"
      - "taxpayer_id:uuid"
      - "tax_year:int"
      - "filing_period:str"
      - "filing_type:str"
      - "deadline:date"
      - "submission_date:date"
      - "status:str"
      - "extensions_requested:int"
      - "estimated_tax:float"
      - "withholding:float"

  - name: "Penalty"
    fields:
      - "penalty_id:uuid"
      - "taxpayer_id:uuid"
      - "return_id:uuid"
      - "penalty_type:str"
      - "base_amount:float"
      - "penalty_rate:float"
      - "penalty_amount:float"
      - "interest_amount:float"
      - "total_amount:float"
      - "assessment_date:date"
      - "status:str"
      - "waiver_requested:bool"

workflow:
  typical_paths:
    - "Registro de contribuyente → Presentación de declaración → Evaluación automática → Determinación de impuesto → Pago o reembolso → Cierre del periodo fiscal"
    - "Selección para auditoría → Notificación al contribuyente → Recopilación de documentación → Ejecución de auditoría → Hallazgos → Ajuste → Resolución"
    - "Detección de incumplimiento → Generación de penalización → Notificación → Opción de apelación → Resolución → Pago o condonación"
  triggers:
    - "filing_deadline_approaching:Recordatorio automático al contribuyente cuando se acerca la fecha límite de presentación"
    - "payment_overdue:Generación automática de penalización e intereses tras fecha de vencimiento sin pago"
    - "audit_selection:Selección automatizada de declaraciones para auditoría basada en análisis de riesgo"
    - "assessment_discrepancy:Alerta cuando la evaluación automática detecta discrepancias significativas"
    - "return_processed:Notificación al contribuyente cuando su declaración ha sido procesada"

features:
  core:
    - "Portal de autoservicio para presentación electrónica de declaraciones tributarias"
    - "Cálculo automático de impuestos con aplicación de tablas, deducciones y créditos vigentes"
    - "Gestión completa del ciclo de auditoría con seguimiento de hallazgos y ajustes"
    - "Procesamiento de pagos y reembolsos con conciliación automática"
    - "Evaluación automática de declaraciones con detección de inconsistencias"
    - "Sistema de penalizaciones e intereses con cálculo automático y gestión de apelaciones"
  advanced:
    - "Análisis predictivo de riesgo fiscal para selección inteligente de auditorías"
    - "Cruce automático de información con terceros para validación de declaraciones"
    - "Modelo de scoring de cumplimiento tributario por contribuyente"
    - "Detección de patrones de evasión fiscal mediante análisis de datos"
  optional:
    - "Integración con sistemas bancarios para pagos directos y devoluciones"
    - "Módulo de planificación fiscal con simulador de escenarios para contribuyentes"
    - "Interoperabilidad con administraciones tributarias de otras jurisdicciones"
    - "Dashboard analítico de recaudación con proyecciones y comparativas"

risk_assessment:
  data_sensitivity: "critical"
  compliance:
    - "SOX"
    - "GDPR"
    - "Tax Code"
  backup_frequency: "hourly"
  access_control: "rbac"
  audit_trail: true
