niche:
  name: "urban_planning"
  domain: "government"
  subdomain: "city_planning"
  description: "Sistema de planificación urbana para gestión de proyectos de desarrollo, zonificación, permisos de construcción, inspecciones, presupuestos y seguimiento de planos y timelines."
  scale: "large"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - rbac
    - email_smtp
    - notification_manager
    - task_scheduler
    - pdf_generator
    - crud_service
    - report_generator
    - backup_restore
  variables:
    project_name: "urban_planning"
    app_name: "UrbanPlanning"
    template_type: "niche"
    db_name: "urban_planning.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Project"
    fields:
      - "project_id:uuid"
      - "name:str"
      - "description:str"
      - "type:str"
      - "category:str"
      - "zone_id:uuid"
      - "applicant_id:uuid"
      - "start_date:date"
      - "end_date:date"
      - "status:str"
      - "estimated_cost:float"
      - "priority:str"

  - name: "Zone"
    fields:
      - "zone_id:uuid"
      - "name:str"
      - "zone_type:str"
      - "code:str"
      - "allowed_uses:str"
      - "restricted_uses:str"
      - "max_height_m:float"
      - "max_density:float"
      - "area_sqkm:float"
      - "boundary_geojson:str"
      - "status:str"

  - name: "Permit"
    fields:
      - "permit_id:uuid"
      - "project_id:uuid"
      - "applicant_id:uuid"
      - "permit_type:str"
      - "application_date:date"
      - "approval_date:date"
      - "expiry_date:date"
      - "conditions:str"
      - "status:str"
      - "reviewer:str"
      - "fee:float"

  - name: "Applicant"
    fields:
      - "applicant_id:uuid"
      - "first_name:str"
      - "last_name:str"
      - "email:str"
      - "phone:str"
      - "organization:str"
      - "address:str"
      - "applicant_type:str"
      - "registration_date:date"
      - "status:str"

  - name: "Inspection"
    fields:
      - "inspection_id:uuid"
      - "project_id:uuid"
      - "permit_id:uuid"
      - "inspector:str"
      - "scheduled_date:date"
      - "completed_date:date"
      - "type:str"
      - "result:str"
      - "findings:str"
      - "status:str"
      - "follow_up_required:bool"

  - name: "Plan"
    fields:
      - "plan_id:uuid"
      - "project_id:uuid"
      - "name:str"
      - "plan_type:str"
      - "version:int"
      - "file_path:str"
      - "submitted_date:date"
      - "approved_date:date"
      - "approved_by:str"
      - "status:str"
      - "review_notes:str"

  - name: "Budget"
    fields:
      - "budget_id:uuid"
      - "project_id:uuid"
      - "fiscal_year:int"
      - "allocated_amount:float"
      - "spent_amount:float"
      - "remaining_amount:float"
      - "funding_source:str"
      - "category:str"
      - "status:str"
      - "approved_by:str"
      - "approval_date:date"

  - name: "Timeline"
    fields:
      - "timeline_id:uuid"
      - "project_id:uuid"
      - "phase:str"
      - "milestone:str"
      - "planned_start:date"
      - "planned_end:date"
      - "actual_start:date"
      - "actual_end:date"
      - "progress_pct:float"
      - "status:str"
      - "dependencies:str"

workflow:
  typical_paths:
    - "Solicitud de proyecto → Verificación de zonificación → Solicitud de permiso → Revisión técnica → Aprobación o rechazo → Inspecciones de seguimiento → Cierre del proyecto"
    - "Presentación de planos → Revisión por comité → Solicitudes de modificación → Aprobación final → Emisión de permisos → Inspecciones de cumplimiento"
    - "Asignación de presupuesto → Planificación de fases → Ejecución → Control de gastos → Inspección de avance → Liquidación"
  triggers:
    - "permit_deadline:Alerta cuando se acerca la fecha de vencimiento de un permiso sin actividad"
    - "inspection_due:Programación automática de inspecciones basada en hitos del proyecto"
    - "budget_threshold:Notificación cuando el gasto de un proyecto supera el umbral configurado"
    - "plan_revision_required:Aviso cuando se detectan inconsistencias entre planos y regulaciones de zonificación"
    - "milestone_overdue:Alerta cuando un hito del timeline se retrasa respecto a la fecha planificada"

features:
  core:
    - "Gestión completa del ciclo de vida de proyectos de desarrollo urbano"
    - "Sistema de zonificación con reglas de uso permitido, restricciones y parámetros de construcción"
    - "Portal de permisos con solicitud, revisión, aprobación y seguimiento en línea"
    - "Programación y gestión de inspecciones con registro de hallazgos y seguimiento"
    - "Control presupuestario con seguimiento de asignaciones, gastos y fuentes de financiamiento"
    - "Timeline de proyecto con fases, hitos, dependencias y seguimiento de progreso"
  advanced:
    - "Visualización GIS de proyectos con capas de zonificación e infraestructura"
    - "Análisis de impacto urbano con simulación de tráfico y servicios públicos"
    - "Motor de reglas automatizado para verificación de cumplimiento normativo de planos"
    - "Dashboard de métricas de planificación con indicadores de desarrollo por zona"
  optional:
    - "Portal de participación ciudadana con consultas públicas sobre proyectos"
    - "Integración con sistemas BIM para revisión colaborativa de planos"
    - "Módulo de gestión de terrenos y catastro con información de propiedad"
    - "Soporte para análisis ambiental y evaluación de impacto"

risk_assessment:
  data_sensitivity: "medium"
  compliance:
    - "FOIA"
    - "GDPR"
  backup_frequency: "daily"
  access_control: "rbac"
  audit_trail: true
