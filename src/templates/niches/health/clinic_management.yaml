niche:
  name: "clinic_management"
  domain: "health"
  subdomain: "clinical_operations"
  description: "Sistema integral de gestión clínica para administración de pacientes, citas, médicos, recetas e historiales médicos con cumplimiento normativo HIPAA y GDPR."
  scale: "large"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - rbac
    - email_smtp
    - pdf_generator
    - notification_manager
    - crud_service
    - backup_restore
  variables:
    project_name: "clinic_management"
    app_name: "ClinicManagement"
    template_type: "health"
    db_name: "clinic_management.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Patient"
    fields:
      - "id:uuid"
      - "first_name:str"
      - "last_name:str"
      - "date_of_birth:date"
      - "gender:str"
      - "phone:str"
      - "email:str"
      - "address:str"
      - "emergency_contact:str"
      - "insurance_provider:str"
      - "insurance_policy_number:str"
      - "created_at:datetime"

  - name: "Appointment"
    fields:
      - "id:uuid"
      - "patient_id:uuid"
      - "doctor_id:uuid"
      - "appointment_date:datetime"
      - "duration_minutes:int"
      - "status:str"
      - "reason:str"
      - "notes:str"
      - "room_number:str"
      - "created_at:datetime"
      - "updated_at:datetime"

  - name: "Doctor"
    fields:
      - "id:uuid"
      - "first_name:str"
      - "last_name:str"
      - "specialty:str"
      - "license_number:str"
      - "phone:str"
      - "email:str"
      - "schedule:str"
      - "department:str"
      - "active:bool"
      - "created_at:datetime"

  - name: "Prescription"
    fields:
      - "id:uuid"
      - "patient_id:uuid"
      - "doctor_id:uuid"
      - "appointment_id:uuid"
      - "medication_name:str"
      - "dosage:str"
      - "frequency:str"
      - "duration:str"
      - "instructions:str"
      - "refills_allowed:int"
      - "issued_date:datetime"
      - "status:str"

  - name: "MedicalRecord"
    fields:
      - "id:uuid"
      - "patient_id:uuid"
      - "doctor_id:uuid"
      - "appointment_id:uuid"
      - "diagnosis:str"
      - "symptoms:str"
      - "treatment_plan:str"
      - "lab_orders:str"
      - "allergies:str"
      - "vitals:str"
      - "record_date:datetime"
      - "created_at:datetime"

workflow:
  typical_paths:
    - "Paciente solicita cita -> Verificación de seguro -> Asignación de médico -> Consulta -> Receta médica -> Actualización de historial"
    - "Médico revisa historial del paciente -> Diagnóstico -> Emisión de receta -> Programación de seguimiento"
    - "Recepcionista registra paciente nuevo -> Verificación de datos -> Asignación a especialista -> Notificación al paciente"
  triggers:
    - "appointment_created:Envía notificación por correo y recordatorio al paciente y al médico"
    - "prescription_issued:Genera PDF de receta y envía copia a la farmacia del paciente"
    - "medical_record_updated:Registra auditoría de acceso y notifica al médico tratante"
    - "appointment_cancelled:Libera horario del médico y notifica al paciente con opciones de reprogramación"

features:
  core:
    - "Registro y gestión completa de pacientes con datos demográficos y de seguro médico"
    - "Agendamiento de citas con verificación de disponibilidad de médicos en tiempo real"
    - "Gestión de recetas médicas con control de refacciones y validación de medicamentos"
    - "Historial clínico electrónico con registro de diagnósticos, síntomas y planes de tratamiento"
    - "Control de acceso basado en roles para médicos, enfermeras y personal administrativo"
    - "Generación de documentos PDF para recetas, informes y constancias médicas"
  advanced:
    - "Cifrado de datos sensibles en reposo y en tránsito con cumplimiento HIPAA"
    - "Auditoría completa de acceso a registros médicos con trazabilidad de usuarios"
    - "Dashboard analítico con métricas de atención, tiempos de espera y productividad médica"
    - "Integración con sistemas de laboratorio para recepción automatizada de resultados"
    - "Backup automático cifrado con recuperación point-in-time"
  optional:
    - "Portal de paciente para consulta de citas, resultados y recetas en línea"
    - "Integración con sistemas de facturación y seguros médicos vía EDI"
    - "Telemedicina integrada para consultas virtuales dentro de la plataforma"
    - "Módulo de recordatorios automáticos por SMS y correo electrónico"
    - "Reportes epidemiológicos y estadísticas de salud pública"

risk_assessment:
  data_sensitivity: "critical"
  compliance:
    - "HIPAA"
    - "GDPR"
  backup_frequency: "hourly"
  access_control: "rbac"
  audit_trail: true
