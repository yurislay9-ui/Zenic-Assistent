niche:
  name: "dental"
  domain: "health"
  subdomain: "dental_care"
  description: "Sistema de gestión odontológica para administración de pacientes, dentistas, citas, tratamientos, historiales dentales y facturación con cumplimiento normativo HIPAA."
  scale: "medium"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - rbac
    - invoice_calculator
    - pdf_generator
    - email_smtp
    - notification_manager
    - crud_service
    - backup_restore
  variables:
    project_name: "dental"
    app_name: "Dental"
    template_type: "health"
    db_name: "dental.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Patient"
    fields:
      - "id:uuid"
      - "first_name:str"
      - "last_name:str"
      - "date_of_birth:date"
      - "gender:str"
      - "phone:str"
      - "email:str"
      - "address:str"
      - "emergency_contact:str"
      - "insurance_provider:str"
      - "insurance_policy:str"
      - "created_at:datetime"

  - name: "Dentist"
    fields:
      - "id:uuid"
      - "first_name:str"
      - "last_name:str"
      - "specialty:str"
      - "license_number:str"
      - "email:str"
      - "phone:str"
      - "schedule:str"
      - "consultation_fee:float"
      - "room_assignment:str"
      - "active:bool"
      - "created_at:datetime"

  - name: "Appointment"
    fields:
      - "id:uuid"
      - "patient_id:uuid"
      - "dentist_id:uuid"
      - "appointment_date:datetime"
      - "duration_minutes:int"
      - "appointment_type:str"
      - "status:str"
      - "reason:str"
      - "treatment_planned:str"
      - "room_number:str"
      - "notes:str"
      - "created_at:datetime"

  - name: "Treatment"
    fields:
      - "id:uuid"
      - "patient_id:uuid"
      - "dentist_id:uuid"
      - "appointment_id:uuid"
      - "treatment_code:str"
      - "treatment_name:str"
      - "tooth_number:str"
      - "surface:str"
      - "cost:float"
      - "status:str"
      - "completion_date:date"
      - "notes:str"

  - name: "DentalRecord"
    fields:
      - "id:uuid"
      - "patient_id:uuid"
      - "dentist_id:uuid"
      - "record_date:date"
      - "tooth_chart:str"
      - "periodontal_status:str"
      - "xray_references:str"
      - "diagnoses:str"
      - "treatment_plan:str"
      - "allergies:str"
      - "medications:str"
      - "created_at:datetime"

  - name: "Invoice"
    fields:
      - "id:uuid"
      - "patient_id:uuid"
      - "appointment_id:uuid"
      - "subtotal:float"
      - "tax:float"
      - "discount:float"
      - "total:float"
      - "insurance_coverage:float"
      - "patient_responsibility:float"
      - "payment_status:str"
      - "payment_method:str"
      - "created_at:datetime"

workflow:
  typical_paths:
    - "Paciente agenda cita -> Verificación de seguro -> Consulta inicial -> Diagnóstico y plan de tratamiento -> Procedimiento -> Facturación"
    - "Dentista revisa historial dental -> Realiza examen -> Registra hallazgos en odontograma -> Programa tratamiento -> Genera factura"
    - "Recepción registra pago -> Actualiza estado de factura -> Envía comprobante por correo -> Programa cita de seguimiento"
  triggers:
    - "appointment_created:Envía confirmación al paciente y notifica al dentista con detalles de la cita"
    - "treatment_completed:Actualiza historial dental, genera factura y programa seguimiento si es necesario"
    - "invoice_overdue:Notifica al paciente sobre saldo pendiente y ofrece opciones de pago"
    - "xray_ready:Notifica al dentista sobre radiografías disponibles para revisión"

features:
  core:
    - "Gestión de citas con odontograma interactivo y seguimiento por pieza dental"
    - "Historial dental completo con registro de diagnósticos, tratamientos y radiografías"
    - "Sistema de tratamientos con códigos dentales, superficies y números de pieza"
    - "Facturación automática con cálculo de cobertura de seguro y responsabilidad del paciente"
    - "Control de acceso basado en roles para dentistas, higienistas y personal administrativo"
    - "Generación de informes clínicos y facturas en formato PDF"
  advanced:
    - "Odontograma digital con representación visual del estado de cada pieza dental"
    - "Cálculo automático de costos por tratamiento con códigos CDT y precios configurables"
    - "Dashboard analítico con métricas de productividad, citas completadas y ingresos por dentista"
    - "Integración con proveedores de seguros para verificación de elegibilidad en tiempo real"
    - "Backup cifrado con cumplimiento HIPAA y restauración selectiva de registros"
  optional:
    - "Portal de paciente para consulta de citas, tratamientos y facturas en línea"
    - "Recordatorios automáticos por SMS y correo para citas y seguimientos pendientes"
    - "Módulo de ortodoncia con seguimiento de progresión y ajustes de brackets"
    - "Integración con equipos de radiografía digital para importación automática de imágenes"
    - "Programa de fidelización con descuentos para tratamientos recurrentes"

risk_assessment:
  data_sensitivity: "critical"
  compliance:
    - "HIPAA"
  backup_frequency: "hourly"
  access_control: "rbac"
  audit_trail: true
