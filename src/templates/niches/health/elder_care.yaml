niche:
  name: "elder_care"
  domain: "health"
  subdomain: "geriatric_care"
  description: "Sistema de gestión de cuidado geriátrico para residentes, cuidadores, planes de cuidado, horarios de medicación, lecturas vitales e informes de incidentes con cumplimiento normativo HIPAA."
  scale: "medium"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - rbac
    - notification_manager
    - email_smtp
    - pdf_generator
    - crud_service
    - backup_restore
    - task_scheduler
  variables:
    project_name: "elder_care"
    app_name: "ElderCare"
    template_type: "health"
    db_name: "elder_care.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Resident"
    fields:
      - "id:uuid"
      - "first_name:str"
      - "last_name:str"
      - "date_of_birth:date"
      - "gender:str"
      - "room_number:str"
      - "admission_date:date"
      - "primary_diagnosis:str"
      - "mobility_level:str"
      - "dietary_requirements:str"
      - "emergency_contact:str"
      - "family_contact:str"
      - "created_at:datetime"

  - name: "Caregiver"
    fields:
      - "id:uuid"
      - "first_name:str"
      - "last_name:str"
      - "role:str"
      - "certification:str"
      - "email:str"
      - "phone:str"
      - "shift:str"
      - "assigned_residents:str"
      - "special_training:str"
      - "active:bool"
      - "created_at:datetime"

  - name: "CarePlan"
    fields:
      - "id:uuid"
      - "resident_id:uuid"
      - "created_by:uuid"
      - "plan_type:str"
      - "goals:str"
      - "daily_routine:str"
      - "physical_therapy:str"
      - "cognitive_activities:str"
      - "dietary_plan:str"
      - "review_frequency:str"
      - "status:str"
      - "created_at:datetime"

  - name: "MedicationSchedule"
    fields:
      - "id:uuid"
      - "resident_id:uuid"
      - "medication_name:str"
      - "dosage:str"
      - "route:str"
      - "frequency:str"
      - "scheduled_times:str"
      - "start_date:date"
      - "end_date:date"
      - "prescribing_doctor:str"
      - "special_instructions:str"
      - "created_at:datetime"

  - name: "VitalReading"
    fields:
      - "id:uuid"
      - "resident_id:uuid"
      - "recorded_by:uuid"
      - "heart_rate:int"
      - "blood_pressure_systolic:int"
      - "blood_pressure_diastolic:int"
      - "temperature:float"
      - "oxygen_saturation:float"
      - "blood_glucose:float"
      - "weight:float"
      - "pain_level:int"
      - "recorded_at:datetime"

  - name: "IncidentReport"
    fields:
      - "id:uuid"
      - "resident_id:uuid"
      - "reported_by:uuid"
      - "incident_type:str"
      - "severity:str"
      - "location:str"
      - "description:str"
      - "immediate_action_taken:str"
      - "witnesses:str"
      - "family_notified:bool"
      - "status:str"
      - "incident_datetime:datetime"

workflow:
  typical_paths:
    - "Ingreso de residente -> Evaluación inicial -> Creación de plan de cuidado -> Configuración de horarios de medicación -> Monitoreo continuo"
    - "Cuidador registra signos vitales -> Detección de anomalía -> Alerta al equipo médico -> Ajuste de plan de cuidado -> Notificación a familia"
    - "Ocurre incidente -> Reporte inmediato -> Acción correctiva -> Notificación a familia y supervisores -> Seguimiento post-incidente"
  triggers:
    - "vital_reading_abnormal:Envía alerta al equipo médico y cuidador asignado sobre valores fuera de rango"
    - "medication_missed:Notifica al cuidador y supervisor sobre dosis omitida y solicita acción correctiva"
    - "incident_reported:Alerta al supervisor, notifica a la familia y genera documentación para cumplimiento normativo"
    - "care_plan_review_due:Recordatorio al equipo de cuidado para revisar y actualizar plan del residente"
    - "scheduled_medication_reminder:Notifica al cuidador sobre medicación pendiente de administrar"

features:
  core:
    - "Gestión integral de residentes con datos demográficos, diagnósticos y contactos de emergencia"
    - "Planes de cuidado personalizados con rutinas diarias, terapia y actividades cognitivas"
    - "Horarios de medicación con recordatorios automáticos y confirmación de administración"
    - "Registro de signos vitales con evaluación automática contra rangos normales y críticos"
    - "Sistema de reporte de incidentes con flujo de notificación y seguimiento correctivo"
    - "Control de acceso basado en roles para cuidadores, enfermeras, médicos y administradores"
  advanced:
    - "Dashboard de monitoreo en tiempo real con estado de todos los residentes y alertas activas"
    - "Programación automatizada de tareas con recordatorios para medicación, terapia y actividades"
    - "Análisis de tendencias de signos vitales con detección temprana de deterioro de salud"
    - "Reportes de cumplimiento normativo para inspecciones y auditorías de calidad"
    - "Backup cifrado con cumplimiento HIPAA y recuperación ante desastres"
  optional:
    - "Portal de familia para consulta de estado del residente, fotos y comunicados del equipo"
    - "Integración con dispositivos de monitoreo wearable para lectura continua de signos vitales"
    - "Módulo de actividades recreativas con programación y seguimiento de participación"
    - "Sistema de comunicación entre cuidadores con mensajería segura interna"
    - "Reportes estadísticos de incidencias, cumplimiento de medicación y calidad de cuidado"

risk_assessment:
  data_sensitivity: "critical"
  compliance:
    - "HIPAA"
  backup_frequency: "hourly"
  access_control: "rbac"
  audit_trail: true
