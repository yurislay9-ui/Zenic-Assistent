niche:
  name: "fitness_tracker"
  domain: "health"
  subdomain: "personal_wellness"
  description: "Aplicación de seguimiento fitness para registro de entrenamientos, ejercicios, nutrición, metas personales y progreso físico con análisis de datos integrado."
  scale: "small"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - data_analyzer
    - notification_manager
    - crud_service
    - google_sheets
  variables:
    project_name: "fitness_tracker"
    app_name: "FitnessTracker"
    template_type: "health"
    db_name: "fitness_tracker.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "User"
    fields:
      - "id:uuid"
      - "username:str"
      - "email:str"
      - "first_name:str"
      - "last_name:str"
      - "date_of_birth:date"
      - "gender:str"
      - "height:float"
      - "weight:float"
      - "activity_level:str"
      - "avatar_url:str"
      - "created_at:datetime"

  - name: "Workout"
    fields:
      - "id:uuid"
      - "user_id:uuid"
      - "workout_type:str"
      - "start_time:datetime"
      - "end_time:datetime"
      - "duration_minutes:int"
      - "calories_burned:int"
      - "intensity:str"
      - "notes:str"
      - "location:str"
      - "rating:int"
      - "created_at:datetime"

  - name: "Exercise"
    fields:
      - "id:uuid"
      - "workout_id:uuid"
      - "name:str"
      - "muscle_group:str"
      - "sets:int"
      - "reps:int"
      - "weight_kg:float"
      - "rest_seconds:int"
      - "order:int"
      - "notes:str"
      - "personal_record:bool"
      - "created_at:datetime"

  - name: "NutritionLog"
    fields:
      - "id:uuid"
      - "user_id:uuid"
      - "meal_type:str"
      - "food_name:str"
      - "calories:int"
      - "protein_g:float"
      - "carbs_g:float"
      - "fat_g:float"
      - "fiber_g:float"
      - "water_ml:int"
      - "logged_at:datetime"
      - "created_at:datetime"

  - name: "Goal"
    fields:
      - "id:uuid"
      - "user_id:uuid"
      - "goal_type:str"
      - "target_value:float"
      - "current_value:float"
      - "unit:str"
      - "start_date:date"
      - "target_date:date"
      - "status:str"
      - "priority:int"
      - "notes:str"
      - "created_at:datetime"

  - name: "Progress"
    fields:
      - "id:uuid"
      - "user_id:uuid"
      - "goal_id:uuid"
      - "measurement_type:str"
      - "value:float"
      - "unit:str"
      - "change_from_previous:float"
      - "photo_url:str"
      - "notes:str"
      - "recorded_date:date"
      - "milestone:bool"
      - "created_at:datetime"

workflow:
  typical_paths:
    - "Usuario registra entrenamiento -> Agrega ejercicios con series y repeticiones -> Calcula calorías quemadas -> Actualiza progreso de metas"
    - "Usuario define meta fitness -> Establece valor objetivo y fecha -> Registra progreso periódico -> Recibe notificaciones de avance"
    - "Usuario registra alimentación -> Calcula macronutrientes -> Compara con objetivos nutricionales -> Genera recomendaciones de ajuste"
  triggers:
    - "goal_milestone_reached:Envía notificación de logro al usuario y sugiere nuevas metas basadas en progreso"
    - "workout_streak_broken:Notifica al usuario sobre racha interrumpida y motiva a retomar actividad"
    - "personal_record_achieved:Registra nuevo récord personal y envía felicitación con estadísticas comparativas"
    - "weekly_summary_due:Genera resumen semanal de entrenamientos, nutrición y progreso, exporta a Google Sheets"

features:
  core:
    - "Registro detallado de entrenamientos con ejercicios, series, repeticiones y peso levantado"
    - "Seguimiento de nutrición con conteo de calorías y macronutrientes por comida"
    - "Sistema de metas personalizables con seguimiento de progreso y fechas objetivo"
    - "Cálculo automático de calorías quemadas basado en tipo de ejercicio e intensidad"
    - "Historial de récords personales con comparativas de evolución"
    - "Notificaciones motivacionales basadas en actividad y racha de entrenamiento"
  advanced:
    - "Análisis de tendencias de rendimiento con gráficos de evolución y predicciones de progreso"
    - "Integración con Google Sheets para exportación de datos y análisis personalizado"
    - "Dashboard interactivo con resumen de actividad semanal, distribución de macronutrientes y progreso de metas"
    - "Detección de mesetas de entrenamiento con sugerencias de variación de rutina"
    - "Análisis de correlación entre nutrición, sueño y rendimiento deportivo"
  optional:
    - "Integración con dispositivos wearable para importación automática de datos de actividad"
    - "Biblioteca de rutinas de entrenamiento predefinidas por nivel y objetivo"
    - "Comunidad social para compartir logros y retos con otros usuarios"
    - "Planificador de comidas con recetas y lista de compras automática"
    - "Modo competición con rankings y desafíos grupales"

risk_assessment:
  data_sensitivity: "medium"
  compliance:
    - "GDPR"
  backup_frequency: "daily"
  access_control: "basic"
  audit_trail: false
