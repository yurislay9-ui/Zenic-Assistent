niche:
  name: "hospital_erp"
  domain: "health"
  subdomain: "hospital_management"
  description: "Sistema ERP hospitalario integral para gestión de pacientes, médicos, enfermeras, habitaciones, camas, departamentos, admisiones y facturación con cumplimiento normativo HIPAA, GDPR y SOC2."
  scale: "enterprise"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - rbac
    - invoice_calculator
    - inventory_tracker
    - report_generator
    - notification_manager
    - crud_service
    - pdf_generator
    - email_smtp
    - backup_restore
  variables:
    project_name: "hospital_erp"
    app_name: "HospitalERP"
    template_type: "health"
    db_name: "hospital_erp.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Patient"
    fields:
      - "id:uuid"
      - "first_name:str"
      - "last_name:str"
      - "date_of_birth:date"
      - "gender:str"
      - "phone:str"
      - "email:str"
      - "address:str"
      - "emergency_contact:str"
      - "blood_type:str"
      - "insurance_provider:str"
      - "insurance_policy:str"
      - "created_at:datetime"

  - name: "Doctor"
    fields:
      - "id:uuid"
      - "first_name:str"
      - "last_name:str"
      - "specialty:str"
      - "license_number:str"
      - "department_id:uuid"
      - "email:str"
      - "phone:str"
      - "schedule:str"
      - "consultation_fee:float"
      - "active:bool"
      - "created_at:datetime"

  - name: "Nurse"
    fields:
      - "id:uuid"
      - "first_name:str"
      - "last_name:str"
      - "license_number:str"
      - "department_id:uuid"
      - "ward_id:uuid"
      - "email:str"
      - "phone:str"
      - "shift:str"
      - "specialty:str"
      - "active:bool"
      - "created_at:datetime"

  - name: "Ward"
    fields:
      - "id:uuid"
      - "name:str"
      - "ward_type:str"
      - "department_id:uuid"
      - "floor:int"
      - "total_beds:int"
      - "occupied_beds:int"
      - "nurse_station_phone:str"
      - "status:str"
      - "notes:str"
      - "created_at:datetime"

  - name: "Bed"
    fields:
      - "id:uuid"
      - "ward_id:uuid"
      - "bed_number:str"
      - "bed_type:str"
      - "status:str"
      - "patient_id:uuid"
      - "assigned_nurse_id:uuid"
      - "admission_date:datetime"
      - "expected_discharge:date"
      - "equipment:str"
      - "maintenance_required:bool"

  - name: "Department"
    fields:
      - "id:uuid"
      - "name:str"
      - "department_code:str"
      - "head_doctor_id:uuid"
      - "location:str"
      - "phone:str"
      - "email:str"
      - "operating_hours:str"
      - "budget:float"
      - "status:str"
      - "created_at:datetime"

  - name: "Admission"
    fields:
      - "id:uuid"
      - "patient_id:uuid"
      - "doctor_id:uuid"
      - "ward_id:uuid"
      - "bed_id:uuid"
      - "admission_type:str"
      - "admission_date:datetime"
      - "expected_discharge_date:date"
      - "actual_discharge_date:date"
      - "diagnosis:str"
      - "treatment_plan:str"
      - "status:str"
      - "created_at:datetime"

  - name: "Billing"
    fields:
      - "id:uuid"
      - "patient_id:uuid"
      - "admission_id:uuid"
      - "room_charges:float"
      - "doctor_fees:float"
      - "medication_charges:float"
      - "lab_charges:float"
      - "procedure_charges:float"
      - "other_charges:float"
      - "total_amount:float"
      - "insurance_coverage:float"
      - "payment_status:str"
      - "created_at:datetime"

workflow:
  typical_paths:
    - "Paciente llega a admisión -> Registro -> Asignación de cama -> Evaluación médica -> Plan de tratamiento -> Seguimiento -> Alta -> Facturación"
    - "Médico solicita admisión -> Verificación de disponibilidad de cama -> Traslado -> Atención por especialidad -> Procedimientos -> Evolución -> Alta médica"
    - "Alta médica -> Cálculo de cargos -> Verificación de seguro -> Generación de factura -> Cobro -> Liberación de cama -> Limpieza y preparación"
  triggers:
    - "patient_admitted:Asigna cama disponible, notifica al equipo médico y enfermería, inicia registro de cargos"
    - "bed_available:Actualiza disponibilidad, notifica a admisiones sobre camas libres para pacientes en espera"
    - "discharge_ordered:Calcula factura final, programa limpieza de cama, notifica al departamento de facturación"
    - "critical_inventory_low:Alerta al departamento de suministros sobre medicamentos o equipamiento con stock bajo"
    - "insurance_preauth_required:Genera solicitud de preautorización y envía a la aseguradora automáticamente"

features:
  core:
    - "Gestión integral de admisiones con asignación automática de camas por prioridad y especialidad"
    - "Módulo de recursos humanos para médicos, enfermeras y personal con control de turnos y especialidades"
    - "Sistema de gestión de habitaciones y camas con estado en tiempo real y mantenimiento"
    - "Facturación detallada con desglose por servicios, medicamentos, procedimientos y cargos de habitación"
    - "Gestión de departamentos con presupuestos, horarios de operación y personal asignado"
    - "Control de acceso basado en roles con permisos granulares por departamento y función"
  advanced:
    - "Dashboard ejecutivo en tiempo real con ocupación, ingresos, eficiencia y métricas de calidad"
    - "Sistema de reportes avanzados con análisis de tendencias, productividad y cumplimiento normativo"
    - "Gestión de inventario hospitalario con seguimiento de medicamentos, suministros y equipamiento médico"
    - "Cifrado de datos con cumplimiento SOC2, auditoría de acceso y gestión de incidentes de seguridad"
    - "Backup cifrado distribuido con recuperación ante desastres y continuidad operativa"
  optional:
    - "Portal de paciente para consulta de estado de admisión, resultados y facturación en línea"
    - "Integración con sistemas de imageneología (PACS) para acceso a radiografías y estudios"
    - "Módulo de quirófano con programación de cirugías y gestión de recursos quirúrgicos"
    - "Sistema de comunicación interna entre departamentos con mensajería segura"
    - "Analítica predictiva para pronóstico de ocupación y optimización de recursos"

risk_assessment:
  data_sensitivity: "critical"
  compliance:
    - "HIPAA"
    - "GDPR"
    - "SOC2"
  backup_frequency: "realtime"
  access_control: "rbac"
  audit_trail: true
