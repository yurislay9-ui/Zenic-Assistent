niche:
  name: "lab_results"
  domain: "health"
  subdomain: "laboratory_diagnostics"
  description: "Sistema de gestión de resultados de laboratorio para órdenes de prueba, resultados, especímenes, técnicos y reportes con cumplimiento normativo HIPAA y CLIA."
  scale: "large"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - rbac
    - pdf_generator
    - notification_manager
    - crud_service
    - data_analyzer
    - backup_restore
  variables:
    project_name: "lab_results"
    app_name: "LabResults"
    template_type: "health"
    db_name: "lab_results.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Patient"
    fields:
      - "id:uuid"
      - "first_name:str"
      - "last_name:str"
      - "date_of_birth:date"
      - "gender:str"
      - "phone:str"
      - "email:str"
      - "medical_record_number:str"
      - "insurance_provider:str"
      - "address:str"
      - "primary_doctor:str"
      - "created_at:datetime"

  - name: "LabOrder"
    fields:
      - "id:uuid"
      - "patient_id:uuid"
      - "ordering_doctor:str"
      - "order_date:datetime"
      - "priority:str"
      - "tests_requested:str"
      - "clinical_notes:str"
      - "fasting_required:bool"
      - "status:str"
      - "specimen_collected:bool"
      - "insurance_authorization:str"
      - "created_at:datetime"

  - name: "TestResult"
    fields:
      - "id:uuid"
      - "lab_order_id:uuid"
      - "patient_id:uuid"
      - "test_name:str"
      - "test_code:str"
      - "result_value:str"
      - "unit:str"
      - "reference_range:str"
      - "flag:str"
      - "status:str"
      - "verified_by:str"
      - "result_datetime:datetime"

  - name: "Specimen"
    fields:
      - "id:uuid"
      - "lab_order_id:uuid"
      - "patient_id:uuid"
      - "specimen_type:str"
      - "collection_method:str"
      - "collected_by:str"
      - "collection_datetime:datetime"
      - "received_datetime:datetime"
      - "volume_ml:float"
      - "condition:str"
      - "storage_requirements:str"
      - "status:str"

  - name: "Technician"
    fields:
      - "id:uuid"
      - "first_name:str"
      - "last_name:str"
      - "certification_number:str"
      - "specialty:str"
      - "email:str"
      - "phone:str"
      - "shift:str"
      - "active:bool"
      - "cla_certified:bool"
      - "created_at:datetime"

  - name: "Report"
    fields:
      - "id:uuid"
      - "lab_order_id:uuid"
      - "patient_id:uuid"
      - "report_type:str"
      - "summary:str"
      - "interpretation:str"
      - "critical_values:str"
      - "generated_by:str"
      - "verified_by:str"
      - "status:str"
      - "generated_at:datetime"
      - "delivered_at:datetime"

workflow:
  typical_paths:
    - "Médico emite orden de laboratorio -> Recepción de espécimen -> Procesamiento de pruebas -> Verificación de resultados -> Generación de reporte -> Entrega al médico"
    - "Espécimen recibido -> Asignación a técnico -> Análisis -> Resultados preliminares -> Verificación por supervisor -> Reporte final"
    - "Detección de valor crítico -> Alerta inmediata al médico ordenante -> Confirmación de recepción -> Documentación de notificación"
  triggers:
    - "critical_value_detected:Envía alerta inmediata al médico ordenante y genera notificación de urgencia"
    - "specimen_received:Actualiza estado de orden, asigna técnico y programa procesamiento"
    - "result_verified:Genera reporte final, notifica al médico y actualiza historial del paciente"
    - "order_overdue:Alerta sobre órdenes con resultados pendientes más allá del tiempo esperado"

features:
  core:
    - "Gestión completa de órdenes de laboratorio con seguimiento de estado y priorización"
    - "Registro y seguimiento de especímenes con control de cadena de custodia"
    - "Captura de resultados con comparación automática contra rangos de referencia"
    - "Sistema de verificación de resultados con flujo de aprobación por supervisor"
    - "Detección y notificación inmediata de valores críticos con confirmación de lectura"
    - "Generación de reportes de laboratorio en formato PDF con interpretación clínica"
  advanced:
    - "Análisis estadístico de resultados con tendencias, correlaciones y flags de anomalías"
    - "Dashboard en tiempo real con métricas de volumen, tiempos de procesamiento y tasa de críticos"
    - "Control de calidad automatizado con reglas de Westgard y seguimiento de desviaciones"
    - "Auditoría completa conforme CLIA con trazabilidad de cada paso del proceso"
    - "Backup cifrado con cumplimiento HIPAA y capacidad de restauración point-in-time"
  optional:
    - "Portal de médicos para consulta de resultados en tiempo real y seguimiento de órdenes"
    - "Integración con sistemas EHR vía HL7/FHIR para intercambio automatizado de resultados"
    - "Módulo de patología con gestión de muestras histológicas e informes anatomopatológicos"
    - "Notificación automática al paciente sobre resultados disponibles vía portal seguro"
    - "Reportes epidemiológicos anonimizados para vigilancia de salud pública"

risk_assessment:
  data_sensitivity: "critical"
  compliance:
    - "HIPAA"
    - "CLIA"
  backup_frequency: "hourly"
  access_control: "rbac"
  audit_trail: true
