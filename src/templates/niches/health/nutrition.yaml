niche:
  name: "nutrition"
  domain: "health"
  subdomain: "nutritional_wellness"
  description: "Plataforma de nutrición para gestión de planes alimentarios, recetas, ingredientes, perfiles nutricionales y listas de compras con análisis de datos dietéticos."
  scale: "small"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - data_analyzer
    - pdf_generator
    - crud_service
    - email_smtp
  variables:
    project_name: "nutrition"
    app_name: "Nutrition"
    template_type: "health"
    db_name: "nutrition.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Client"
    fields:
      - "id:uuid"
      - "first_name:str"
      - "last_name:str"
      - "email:str"
      - "phone:str"
      - "date_of_birth:date"
      - "gender:str"
      - "height:float"
      - "weight:float"
      - "health_conditions:str"
      - "dietary_preferences:str"
      - "created_at:datetime"

  - name: "MealPlan"
    fields:
      - "id:uuid"
      - "client_id:uuid"
      - "name:str"
      - "plan_type:str"
      - "daily_calories:int"
      - "protein_percentage:float"
      - "carbs_percentage:float"
      - "fat_percentage:float"
      - "duration_weeks:int"
      - "start_date:date"
      - "status:str"
      - "created_at:datetime"

  - name: "Recipe"
    fields:
      - "id:uuid"
      - "name:str"
      - "category:str"
      - "prep_time_minutes:int"
      - "cook_time_minutes:int"
      - "servings:int"
      - "calories_per_serving:int"
      - "protein_g:float"
      - "carbs_g:float"
      - "fat_g:float"
      - "instructions:str"
      - "created_at:datetime"

  - name: "Ingredient"
    fields:
      - "id:uuid"
      - "name:str"
      - "category:str"
      - "unit:str"
      - "calories_per_unit:float"
      - "protein_g_per_unit:float"
      - "carbs_g_per_unit:float"
      - "fat_g_per_unit:float"
      - "fiber_g_per_unit:float"
      - "sugar_g_per_unit:float"
      - "sodium_mg_per_unit:float"
      - "allergens:str"

  - name: "NutrientProfile"
    fields:
      - "id:uuid"
      - "client_id:uuid"
      - "meal_plan_id:uuid"
      - "date:date"
      - "total_calories:int"
      - "total_protein_g:float"
      - "total_carbs_g:float"
      - "total_fat_g:float"
      - "total_fiber_g:float"
      - "total_sugar_g:float"
      - "total_sodium_mg:float"
      - "water_intake_ml:int"
      - "target_adherence:float"

  - name: "ShoppingList"
    fields:
      - "id:uuid"
      - "meal_plan_id:uuid"
      - "client_id:uuid"
      - "name:str"
      - "items:str"
      - "estimated_cost:float"
      - "store_preference:str"
      - "week_start_date:date"
      - "status:str"
      - "purchased:bool"
      - "notes:str"
      - "created_at:datetime"

workflow:
  typical_paths:
    - "Registro de cliente -> Evaluación nutricional -> Creación de plan alimentario -> Generación de recetas -> Lista de compras semanal"
    - "Nutricionista ajusta plan -> Recálculo de perfiles nutricionales -> Actualización de recetas y porciones -> Notificación al cliente"
    - "Cliente registra consumo diario -> Análisis de adherencia al plan -> Alertas de desviación -> Sugerencias de ajuste"
  triggers:
    - "meal_plan_created:Genera perfil nutricional base, lista de compras y envía plan al cliente por correo"
    - "nutrient_deficiency_detected:Analiza ingesta y alerta sobre déficits nutricionales con recomendaciones de alimentos"
    - "shopping_list_generated:Envía lista de compras al cliente con estimación de costos y alternativas por tienda"
    - "adherence_below_threshold:Notifica al nutricionista sobre baja adherencia del cliente y sugiere intervención"

features:
  core:
    - "Creación de planes alimentarios personalizados con distribución calórica y de macronutrientes"
    - "Catálogo de recetas con información nutricional detallada por porción e instrucciones de preparación"
    - "Base de datos de ingredientes con perfiles nutricionales completos y alérgenos asociados"
    - "Generación automática de listas de compras a partir de planes alimentarios semanales"
    - "Análisis de adherencia al plan con comparación entre ingesta real y objetivos establecidos"
    - "Exportación de planes nutricionales y reportes en formato PDF"
  advanced:
    - "Análisis de patrones alimentarios con detección de déficits nutricionales y excesos"
    - "Dashboard interactivo con gráficos de distribución de macronutrientes y tendencias de ingesta"
    - "Cálculo automático de necesidades calóricas basado en datos del cliente y nivel de actividad"
    - "Sustitución inteligente de ingredientes respetando alérgenos y preferencias alimentarias"
    - "Estimación de costos de lista de compras con comparación entre tiendas"
  optional:
    - "Integración con aplicaciones de registro de alimentos vía API externa"
    - "Planificador de comidas semanal con arrastrar y soltar para personalización rápida"
    - "Módulo de recetas compartidas para comunidad de clientes"
    - "Seguimiento de suplementos vitamínicos y minerales adicionales"
    - "Reportes de progreso con comparativas antes/después para motivación del cliente"

risk_assessment:
  data_sensitivity: "medium"
  compliance:
    - "GDPR"
  backup_frequency: "daily"
  access_control: "basic"
  audit_trail: false
