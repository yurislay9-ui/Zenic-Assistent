niche:
  name: "patient_records"
  domain: "health"
  subdomain: "medical_records"
  description: "Sistema de gestión de historiales médicos de pacientes con control de alergias, medicamentos, resultados de laboratorio y signos vitales, cumpliendo con normativas HIPAA y GDPR."
  scale: "large"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - rbac
    - pdf_generator
    - crud_service
    - backup_restore
    - migration
    - seed_data
  variables:
    project_name: "patient_records"
    app_name: "PatientRecords"
    template_type: "health"
    db_name: "patient_records.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Patient"
    fields:
      - "id:uuid"
      - "first_name:str"
      - "last_name:str"
      - "date_of_birth:date"
      - "gender:str"
      - "blood_type:str"
      - "phone:str"
      - "email:str"
      - "address:str"
      - "emergency_contact:str"
      - "insurance_number:str"
      - "created_at:datetime"

  - name: "MedicalHistory"
    fields:
      - "id:uuid"
      - "patient_id:uuid"
      - "condition_name:str"
      - "diagnosis_date:date"
      - "status:str"
      - "severity:str"
      - "treating_doctor:str"
      - "notes:str"
      - "icd_code:str"
      - "resolved_date:date"
      - "created_at:datetime"

  - name: "LabResult"
    fields:
      - "id:uuid"
      - "patient_id:uuid"
      - "test_name:str"
      - "test_category:str"
      - "result_value:str"
      - "unit:str"
      - "reference_range:str"
      - "status:str"
      - "abnormal_flag:bool"
      - "ordered_by:str"
      - "collected_date:datetime"
      - "result_date:datetime"

  - name: "VitalSign"
    fields:
      - "id:uuid"
      - "patient_id:uuid"
      - "heart_rate:int"
      - "blood_pressure_systolic:int"
      - "blood_pressure_diastolic:int"
      - "temperature:float"
      - "respiratory_rate:int"
      - "oxygen_saturation:float"
      - "weight:float"
      - "height:float"
      - "recorded_by:str"
      - "recorded_at:datetime"

  - name: "Allergy"
    fields:
      - "id:uuid"
      - "patient_id:uuid"
      - "allergen:str"
      - "allergy_type:str"
      - "severity:str"
      - "reaction:str"
      - "onset_date:date"
      - "verified_by:str"
      - "status:str"
      - "notes:str"
      - "created_at:datetime"

  - name: "Medication"
    fields:
      - "id:uuid"
      - "patient_id:uuid"
      - "medication_name:str"
      - "dosage:str"
      - "route:str"
      - "frequency:str"
      - "start_date:date"
      - "end_date:date"
      - "prescribing_doctor:str"
      - "active:bool"
      - "notes:str"
      - "created_at:datetime"

workflow:
  typical_paths:
    - "Registro de paciente nuevo -> Ingreso de historial médico -> Carga de alergias y medicamentos -> Registro de signos vitales -> Revisión médica"
    - "Recepción de resultados de laboratorio -> Validación de valores anormales -> Alerta al médico tratante -> Actualización del historial"
    - "Actualización de medicamento -> Verificación de interacciones con alergias -> Confirmación del médico -> Registro en historial"
  triggers:
    - "lab_result_abnormal:Envía alerta inmediata al médico tratante y marca resultado como anormal en el historial"
    - "allergy_detected:Verifica interacciones con medicamentos activos y notifica al médico prescriptor"
    - "medication_interaction:Genera alerta de contraindicación y solicita revisión del médico antes de confirmar"
    - "vital_sign_critical:Notifica al equipo médico sobre signos vitales fuera de rango normal"
    - "patient_record_accessed:Registra auditoría de acceso con identidad del usuario y motivo de consulta"

features:
  core:
    - "Historial clínico electrónico completo con registro cronológico de diagnósticos y tratamientos"
    - "Gestión de alergias con verificación automática de interacciones medicamentosas"
    - "Registro y seguimiento de medicamentos activos con control de dosis y frecuencia"
    - "Captura de signos vitales con evaluación automática de rangos normales y críticos"
    - "Recepción y clasificación de resultados de laboratorio con flags de anormalidad"
    - "Generación de reportes PDF de historial médico completo para pacientes y médicos"
  advanced:
    - "Cifrado de datos médicos con gestión granular de permisos por registro individual"
    - "Migraciones automáticas de base de datos con integridad referencial asegurada"
    - "Dashboard analítico con tendencias de signos vitales, resultados de laboratorio y evolución"
    - "Backup cifrado incremental con capacidad de restauración point-in-time"
    - "Datos semilla para configuración inicial de rangos de referencia y catálogos médicos"
  optional:
    - "Portal de paciente para consulta de resultados de laboratorio y medicamentos activos"
    - "Integración con sistemas de laboratorio externos vía HL7/FHIR"
    - "Exportación de historial médico en formato CDA para interoperabilidad"
    - "Módulo de consentimiento informado digital con firma electrónica"
    - "Estadísticas epidemiológicas anonimizadas para investigación clínica"

risk_assessment:
  data_sensitivity: "critical"
  compliance:
    - "HIPAA"
    - "GDPR"
  backup_frequency: "realtime"
  access_control: "rbac"
  audit_trail: true
