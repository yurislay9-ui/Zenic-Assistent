niche:
  name: "pharmacy"
  domain: "health"
  subdomain: "pharmaceutical_operations"
  description: "Sistema de gestión farmacéutica para control de inventario de medicamentos, prescripciones, proveedores, ventas y cumplimiento normativo HIPAA y FDA."
  scale: "medium"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - inventory_tracker
    - invoice_calculator
    - crud_service
    - pdf_generator
    - email_smtp
    - backup_restore
  variables:
    project_name: "pharmacy"
    app_name: "Pharmacy"
    template_type: "health"
    db_name: "pharmacy.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Medication"
    fields:
      - "id:uuid"
      - "name:str"
      - "generic_name:str"
      - "brand:str"
      - "ndc_code:str"
      - "category:str"
      - "dosage_form:str"
      - "strength:str"
      - "unit_price:float"
      - "requires_prescription:bool"
      - "controlled_substance:bool"
      - "expiration_date:date"

  - name: "Prescription"
    fields:
      - "id:uuid"
      - "patient_id:uuid"
      - "doctor_id:uuid"
      - "medication_id:uuid"
      - "dosage:str"
      - "frequency:str"
      - "duration:str"
      - "refills_remaining:int"
      - "status:str"
      - "issued_date:datetime"
      - "filled_date:datetime"
      - "notes:str"

  - name: "Supplier"
    fields:
      - "id:uuid"
      - "company_name:str"
      - "contact_name:str"
      - "phone:str"
      - "email:str"
      - "address:str"
      - "license_number:str"
      - "dea_number:str"
      - "payment_terms:str"
      - "active:bool"
      - "rating:float"
      - "created_at:datetime"

  - name: "Inventory"
    fields:
      - "id:uuid"
      - "medication_id:uuid"
      - "batch_number:str"
      - "quantity_on_hand:int"
      - "reorder_level:int"
      - "reorder_quantity:int"
      - "cost_price:float"
      - "selling_price:float"
      - "supplier_id:uuid"
      - "expiry_date:date"
      - "location:str"
      - "last_counted:date"

  - name: "Sale"
    fields:
      - "id:uuid"
      - "prescription_id:uuid"
      - "customer_id:uuid"
      - "medication_id:uuid"
      - "quantity:int"
      - "unit_price:float"
      - "total_amount:float"
      - "discount:float"
      - "tax:float"
      - "payment_method:str"
      - "sale_date:datetime"
      - "pharmacist_id:uuid"

  - name: "Customer"
    fields:
      - "id:uuid"
      - "first_name:str"
      - "last_name:str"
      - "date_of_birth:date"
      - "phone:str"
      - "email:str"
      - "address:str"
      - "insurance_provider:str"
      - "insurance_policy:str"
      - "allergies:str"
      - "loyalty_points:int"
      - "created_at:datetime"

workflow:
  typical_paths:
    - "Recepción de receta médica -> Validación de prescripción -> Verificación de interacciones -> Dispensación -> Registro de venta"
    - "Alerta de inventario bajo -> Generación de orden de compra -> Recepción de proveedor -> Actualización de inventario"
    - "Cliente solicita medicamento -> Verificación de receta -> Consulta de disponibilidad -> Venta o pedido especial"
  triggers:
    - "inventory_below_reorder:Genera orden de compra automática al proveedor y notifica al farmacéutico"
    - "prescription_received:Valida receta médica contra historial del paciente y verifica interacciones medicamentosas"
    - "medication_expiring_soon:Envía alerta de caducidad próxima y genera reporte de medicamentos a retirar"
    - "sale_completed:Actualiza inventario, genera factura PDF y envía comprobante al cliente por correo"

features:
  core:
    - "Gestión completa de inventario de medicamentos con seguimiento por lote y fecha de caducidad"
    - "Validación de recetas médicas con verificación de interacciones y alergias del paciente"
    - "Sistema de ventas con cálculo automático de impuestos, descuentos y facturación"
    - "Catálogo de medicamentos con códigos NDC, formas farmacéuticas y clasificación de sustancias controladas"
    - "Gestión de proveedores con evaluación de desempeño y términos de pago"
    - "Generación de etiquetas, facturas y reportes en formato PDF"
  advanced:
    - "Seguimiento de sustancias controladas con registro detallado conforme normativas DEA y FDA"
    - "Análisis predictivo de demanda para optimización de inventario y reducción de mermas"
    - "Dashboard analítico con métricas de ventas, rotación de inventario y margen de ganancia"
    - "Sistema de alertas automatizadas para caducidades, reorden y retiro de lotes"
    - "Backup cifrado con cumplimiento normativo para datos de pacientes y transacciones"
  optional:
    - "Integración con sistemas de aseguradoras para verificación de cobertura en tiempo real"
    - "Programa de fidelización con acumulación de puntos y descuentos para clientes frecuentes"
    - "Módulo de entrega a domicilio con seguimiento de envíos"
    - "Portal de médicos para envío electrónico de recetas (e-prescribing)"
    - "Reportes regulatorios automatizados para auditorías FDA y DEA"

risk_assessment:
  data_sensitivity: "high"
  compliance:
    - "HIPAA"
    - "FDA"
  backup_frequency: "daily"
  access_control: "rbac"
  audit_trail: true
