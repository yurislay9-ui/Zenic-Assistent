niche:
  name: "veterinary"
  domain: "health"
  subdomain: "animal_health"
  description: "Sistema de gestión veterinaria para administración de mascotas, propietarios, citas, vacunaciones, tratamientos e inventario con cumplimiento normativo GDPR."
  scale: "small"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - email_smtp
    - pdf_generator
    - notification_manager
    - crud_service
    - inventory_tracker
    - backup_restore
  variables:
    project_name: "veterinary"
    app_name: "Veterinary"
    template_type: "health"
    db_name: "veterinary.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Pet"
    fields:
      - "id:uuid"
      - "name:str"
      - "species:str"
      - "breed:str"
      - "date_of_birth:date"
      - "gender:str"
      - "color:str"
      - "weight:float"
      - "microchip_number:str"
      - "owner_id:uuid"
      - "neutered:bool"
      - "created_at:datetime"

  - name: "Owner"
    fields:
      - "id:uuid"
      - "first_name:str"
      - "last_name:str"
      - "email:str"
      - "phone:str"
      - "address:str"
      - "emergency_phone:str"
      - "preferred_contact_method:str"
      - "insurance_provider:str"
      - "notes:str"
      - "active:bool"
      - "created_at:datetime"

  - name: "Veterinarian"
    fields:
      - "id:uuid"
      - "first_name:str"
      - "last_name:str"
      - "license_number:str"
      - "specialty:str"
      - "email:str"
      - "phone:str"
      - "schedule:str"
      - "consultation_fee:float"
      - "active:bool"
      - "created_at:datetime"

  - name: "Appointment"
    fields:
      - "id:uuid"
      - "pet_id:uuid"
      - "owner_id:uuid"
      - "veterinarian_id:uuid"
      - "appointment_date:datetime"
      - "duration_minutes:int"
      - "appointment_type:str"
      - "status:str"
      - "reason:str"
      - "weight_at_visit:float"
      - "temperature:float"
      - "notes:str"

  - name: "Vaccination"
    fields:
      - "id:uuid"
      - "pet_id:uuid"
      - "veterinarian_id:uuid"
      - "vaccine_name:str"
      - "manufacturer:str"
      - "batch_number:str"
      - "administration_date:date"
      - "next_due_date:date"
      - "site:str"
      - "reaction:str"
      - "status:str"
      - "created_at:datetime"

  - name: "Treatment"
    fields:
      - "id:uuid"
      - "pet_id:uuid"
      - "appointment_id:uuid"
      - "veterinarian_id:uuid"
      - "treatment_type:str"
      - "diagnosis:str"
      - "medication:str"
      - "dosage:str"
      - "duration:str"
      - "cost:float"
      - "status:str"
      - "follow_up_date:date"

workflow:
  typical_paths:
    - "Propietario agenda cita -> Recepción confirma -> Consulta veterinaria -> Diagnóstico y tratamiento -> Facturación y seguimiento"
    - "Vacunación programada -> Verificación de historial -> Administración de vacuna -> Registro de lote -> Programación de refuerzo"
    - "Mascota llega a urgencia -> Evaluación inicial -> Estabilización -> Tratamiento de emergencia -> Hospitalización o alta"
  triggers:
    - "vaccination_due:Envía recordatorio al propietario sobre vacunas próximas a vencer"
    - "appointment_reminder:Notifica al propietario 24 horas antes de la cita programada"
    - "medication_inventory_low:Alerta al personal sobre medicamentos con stock bajo para reorden"
    - "treatment_follow_up_due:Recordatorio al veterinario y propietario sobre seguimiento de tratamiento pendiente"

features:
  core:
    - "Ficha clínica veterinaria con historial completo de consultas, vacunas y tratamientos por mascota"
    - "Calendario de vacunaciones con alertas automáticas de refuerzos y vencimientos"
    - "Gestión de citas con disponibilidad por veterinario y tipo de consulta"
    - "Registro de propietarios con datos de contacto y preferencias de comunicación"
    - "Seguimiento de inventario de medicamentos y suministros veterinarios"
    - "Generación de certificados de vacunación e informes clínicos en PDF"
  advanced:
    - "Historial de peso y signos vitales con gráficos de evolución por mascota"
    - "Dashboard con métricas de consultas, vacunaciones aplicadas e ingresos por servicio"
    - "Integración de microchip para identificación rápida y recuperación de mascotas perdidas"
    - "Módulo de hospitalización con seguimiento de pacientes internados y evolución diaria"
    - "Backup cifrado con restauración selectiva y protección de datos de propietarios"
  optional:
    - "Portal del propietario para consulta de historial, citas y recordatorios de vacunación"
    - "Módulo de grooming y peluquería canina con agendamiento independiente"
    - "Programa de bienestar con planes preventivos personalizados por especie y raza"
    - "Integración con laboratorios externos para recepción automatizada de resultados"
    - "Tienda en línea para alimentos, medicamentos y accesorios con entrega a domicilio"

risk_assessment:
  data_sensitivity: "medium"
  compliance:
    - "GDPR"
  backup_frequency: "daily"
  access_control: "basic"
  audit_trail: false
