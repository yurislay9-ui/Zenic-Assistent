niche:
  name: "event_planning"
  domain: "hospitality"
  subdomain: "event_services"
  description: "Plataforma de planificación de eventos con gestión de venues, clientes, proveedores, presupuestos, líneas temporales, tareas y listas de invitados."
  scale: "medium"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - email_smtp
    - invoice_calculator
    - task_scheduler
    - notification_manager
    - pdf_generator
    - crud_service
    - report_generator
    - backup_restore
  variables:
    project_name: "event_planning"
    app_name: "EventPlanning"
    template_type: "niche"
    db_name: "event_planning.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Event"
    fields:
      - "name:str"
      - "description:text"
      - "event_type:str"
      - "venue_id:int"
      - "client_id:int"
      - "event_date:datetime"
      - "end_date:datetime"
      - "expected_attendees:int"
      - "status:str"
      - "theme:str"
      - "created_at:datetime"
  - name: "Venue"
    fields:
      - "name:str"
      - "address:str"
      - "city:str"
      - "capacity:int"
      - "facilities:json"
      - "contact_name:str"
      - "contact_email:str"
      - "base_price:float"
      - "is_available:bool"
      - "images:json"
      - "created_at:datetime"
  - name: "Client"
    fields:
      - "first_name:str"
      - "last_name:str"
      - "email:str"
      - "phone:str"
      - "company:str"
      - "event_preferences:json"
      - "budget_range:str"
      - "notes:text"
      - "is_active:bool"
      - "created_at:datetime"
  - name: "Vendor"
    fields:
      - "company_name:str"
      - "contact_name:str"
      - "email:str"
      - "phone:str"
      - "service_type:str"
      - "rating:float"
      - "price_range:str"
      - "is_verified:bool"
      - "contract_terms:text"
      - "created_at:datetime"
  - name: "Budget"
    fields:
      - "event_id:int"
      - "category:str"
      - "allocated:float"
      - "spent:float"
      - "remaining:float"
      - "items:json"
      - "notes:text"
      - "status:str"
      - "created_at:datetime"
  - name: "Timeline"
    fields:
      - "event_id:int"
      - "milestone:str"
      - "description:text"
      - "start_date:datetime"
      - "end_date:datetime"
      - "responsible:str"
      - "status:str"
      - "order_index:int"
      - "created_at:datetime"
  - name: "Task"
    fields:
      - "event_id:int"
      - "title:str"
      - "description:text"
      - "assigned_to:int"
      - "due_date:datetime"
      - "priority:str"
      - "status:str"
      - "completed_at:datetime"
      - "created_at:datetime"
  - name: "Guest"
    fields:
      - "event_id:int"
      - "first_name:str"
      - "last_name:str"
      - "email:str"
      - "phone:str"
      - "rsvp_status:str"
      - "dietary_requirements:str"
      - "plus_one:bool"
      - "seat_assignment:str"
      - "checked_in:bool"
      - "created_at:datetime"

workflow:
  typical_paths:
    - "Cliente solicita evento → Planificador define alcance → Presupuesto inicial → Búsqueda de venue y proveedores → Contratación → Ejecución"
    - "Planificador crea timeline → Asigna tareas al equipo → Seguimiento de progreso → Ajustes → Evento ejecutado"
    - "Invitación enviada → RSVP recibido → Asignación de asientos → Check-in el día del evento → Reporte post-evento"
  triggers:
    - "event_confirmed:Notificar a todos los proveedores y equipo sobre confirmación del evento"
    - "task_overdue:Alertar al planificador y responsable sobre tarea vencida sin completar"
    - "rsvp_received:Actualizar conteo de invitados confirmados y notificar cambios significativos"
    - "budget_threshold:Alertar cuando el gasto de una categoría supera el 80% del presupuesto asignado"
    - "event_approaching:Recordar al equipo 7 días y 24 horas antes del evento con checklist de pendientes"

features:
  core:
    - "Gestión de eventos con calendario y vista de timeline interactivo"
    - "Sistema de presupuestos por categoría con seguimiento de gastos en tiempo real"
    - "Administración de proveedores con evaluación y contratos"
    - "Gestión de invitados con RSVP, requisitos dietéticos y asignación de asientos"
    - "Sistema de tareas con asignación, prioridades y fechas límite"
  advanced:
    - "Planificador de timeline con diagrama de Gantt para visualización de hitos"
    - "Generación de contratos y cotizaciones en PDF con branding de la empresa"
    - "Dashboard de reportes con rentabilidad por evento y satisfacción del cliente"
    - "Sistema de notificaciones multi-canal para coordinación del equipo y proveedores"
    - "Backup automático con restauración completa de datos del evento"
  optional:
    - "Portal del cliente con seguimiento del evento, presupuesto y comunicaciones"
    - "Integración con plataformas de envío de invitaciones digitales"
    - "Sistema de check-in con código QR para control de acceso el día del evento"
    - "Encuestas post-evento para evaluación de satisfacción y mejora continua"

risk_assessment:
  data_sensitivity: "medium"
  compliance:
    - GDPR
  backup_frequency: "daily"
  access_control: "basic"
  audit_trail: true
