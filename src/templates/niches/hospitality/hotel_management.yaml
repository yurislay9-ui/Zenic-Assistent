niche:
  name: "hotel_management"
  domain: "hospitality"
  subdomain: "lodging"
  description: "Sistema integral de gestión hotelera con administración de habitaciones, reservas, check-in/check-out, servicios, facturación, personal y amenidades del establecimiento."
  scale: "large"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - rbac
    - email_smtp
    - stripe_payments
    - invoice_calculator
    - notification_manager
    - pdf_generator
    - crud_service
    - report_generator
    - backup_restore
  variables:
    project_name: "hotel_management"
    app_name: "HotelManagement"
    template_type: "niche"
    db_name: "hotel_management.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Room"
    fields:
      - "number:str"
      - "room_type:str"
      - "floor:int"
      - "capacity:int"
      - "base_rate:float"
      - "amenities:json"
      - "status:str"
      - "description:text"
      - "image_urls:json"
      - "is_available:bool"
      - "created_at:datetime"
  - name: "Guest"
    fields:
      - "first_name:str"
      - "last_name:str"
      - "email:str"
      - "phone:str"
      - "id_type:str"
      - "id_number:str"
      - "nationality:str"
      - "address:str"
      - "preferences:json"
      - "vip_status:str"
      - "created_at:datetime"
  - name: "Reservation"
    fields:
      - "guest_id:int"
      - "room_id:int"
      - "check_in:date"
      - "check_out:date"
      - "adults:int"
      - "children:int"
      - "total_amount:float"
      - "status:str"
      - "special_requests:text"
      - "source:str"
      - "created_at:datetime"
  - name: "CheckIn"
    fields:
      - "reservation_id:int"
      - "guest_id:int"
      - "room_id:int"
      - "checked_in_at:datetime"
      - "checked_out_at:datetime"
      - "id_verified:bool"
      - "deposit_collected:float"
      - "keys_issued:int"
      - "status:str"
      - "notes:text"
  - name: "Service"
    fields:
      - "name:str"
      - "category:str"
      - "description:text"
      - "price:float"
      - "is_available:bool"
      - "schedule:str"
      - "location:str"
      - "requires_reservation:bool"
      - "created_at:datetime"
  - name: "Invoice"
    fields:
      - "reservation_id:int"
      - "guest_id:int"
      - "room_charges:float"
      - "service_charges:float"
      - "tax:float"
      - "total:float"
      - "payment_method:str"
      - "payment_status:str"
      - "issued_at:datetime"
      - "paid_at:datetime"
  - name: "Staff"
    fields:
      - "first_name:str"
      - "last_name:str"
      - "email:str"
      - "role:str"
      - "department:str"
      - "shift:str"
      - "is_active:bool"
      - "hired_at:datetime"
      - "created_at:datetime"
  - name: "Amenity"
    fields:
      - "name:str"
      - "description:text"
      - "category:str"
      - "is_complimentary:bool"
      - "price:float"
      - "operating_hours:str"
      - "is_available:bool"
      - "icon:str"
      - "created_at:datetime"

workflow:
  typical_paths:
    - "Huésped realiza reserva → Confirmación por email → Check-in → Disfruta servicios → Check-out → Facturación"
    - "Recepción verifica disponibilidad → Asigna habitación → Registra check-in → Actualiza estado de habitación"
    - "Huésped solicita servicio → Personal atiende → Cargo registrado → Incluido en factura final"
  triggers:
    - "reservation_created:Enviar confirmación de reserva al huésped con detalles de la estadía"
    - "check_in_completed:Actualizar estado de habitación a ocupada y activar servicios del huésped"
    - "check_out_completed:Liberar habitación, generar factura final y procesar pago pendiente"
    - "service_requested:Notificar al departamento correspondiente sobre solicitud de servicio del huésped"
    - "invoice_overdue:Alertar al huésped y recepción sobre cargos pendientes de pago"

features:
  core:
    - "Gestión de habitaciones con disponibilidad en tiempo real y tarifas dinámicas"
    - "Sistema de reservas con calendario visual y gestión de disponibilidad"
    - "Proceso completo de check-in y check-out con verificación de identidad"
    - "Administración de servicios del hotel con cargos automáticos a la cuenta"
    - "Facturación integrada con cálculo de impuestos y procesamiento de pagos"
  advanced:
    - "Dashboard de ocupación con métricas de revenue management y ADR"
    - "Generación de facturas en PDF con desglose detallado de cargos"
    - "Sistema RBAC con roles para recepción, conserjería, mantenimiento y gerencia"
    - "Reportes de rendimiento con RevPAR, tasa de ocupación y comparativas periódicas"
    - "Backup automático con restauración completa de datos operacionales"
  optional:
    - "Integración con canales de distribución (Booking, Expedia) vía channel manager"
    - "Programa de fidelización con puntos y beneficios para huéspedes frecuentes"
    - "App móvil para check-in digital y acceso a servicios desde el teléfono"
    - "Sistema de housekeeping con asignación de limpieza y mantenimiento por habitación"

risk_assessment:
  data_sensitivity: "high"
  compliance:
    - PCI-DSS
    - GDPR
  backup_frequency: "hourly"
  access_control: "rbac"
  audit_trail: true
