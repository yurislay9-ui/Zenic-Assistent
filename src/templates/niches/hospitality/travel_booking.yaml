niche:
  name: "travel_booking"
  domain: "hospitality"
  subdomain: "travel_services"
  description: "Plataforma de reservas de viajes con gestión de itinerarios, vuelos, hoteles, actividades, viajeros, pagos y planificación completa de viajes personalizados."
  scale: "medium"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - stripe_payments
    - email_smtp
    - notification_manager
    - pdf_generator
    - invoice_calculator
    - crud_service
    - report_generator
  variables:
    project_name: "travel_booking"
    app_name: "TravelBooking"
    template_type: "niche"
    db_name: "travel_booking.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Trip"
    fields:
      - "name:str"
      - "description:text"
      - "destination:str"
      - "start_date:date"
      - "end_date:date"
      - "traveler_id:int"
      - "total_budget:float"
      - "status:str"
      - "travel_type:str"
      - "is_custom:bool"
      - "created_at:datetime"
  - name: "Flight"
    fields:
      - "trip_id:int"
      - "airline:str"
      - "flight_number:str"
      - "departure_airport:str"
      - "arrival_airport:str"
      - "departure_at:datetime"
      - "arrival_at:datetime"
      - "class:str"
      - "price:float"
      - "booking_reference:str"
      - "status:str"
  - name: "Hotel"
    fields:
      - "trip_id:int"
      - "name:str"
      - "address:str"
      - "city:str"
      - "stars:int"
      - "room_type:str"
      - "check_in:date"
      - "check_out:date"
      - "price_per_night:float"
      - "booking_reference:str"
      - "amenities:json"
  - name: "Activity"
    fields:
      - "trip_id:int"
      - "name:str"
      - "description:text"
      - "location:str"
      - "scheduled_at:datetime"
      - "duration:int"
      - "price:float"
      - "category:str"
      - "booking_reference:str"
      - "status:str"
      - "created_at:datetime"
  - name: "Traveler"
    fields:
      - "first_name:str"
      - "last_name:str"
      - "email:str"
      - "phone:str"
      - "passport_number:str"
      - "nationality:str"
      - "date_of_birth:date"
      - "preferences:json"
      - "is_active:bool"
      - "created_at:datetime"
  - name: "Booking"
    fields:
      - "trip_id:int"
      - "booking_type:str"
      - "reference_id:int"
      - "provider:str"
      - "confirmation_code:str"
      - "amount:float"
      - "status:str"
      - "booked_at:datetime"
      - "cancellable_until:datetime"
  - name: "Payment"
    fields:
      - "trip_id:int"
      - "traveler_id:int"
      - "amount:float"
      - "currency:str"
      - "payment_method:str"
      - "stripe_charge_id:str"
      - "status:str"
      - "description:str"
      - "created_at:datetime"
  - name: "Itinerary"
    fields:
      - "trip_id:int"
      - "day_number:int"
      - "date:date"
      - "items:json"
      - "notes:text"
      - "weather_forecast:str"
      - "created_at:datetime"

workflow:
  typical_paths:
    - "Viajero solicita viaje → Agente define itinerario → Reserva vuelos y hoteles → Agrega actividades → Confirmación → Pago"
    - "Itinerario creado → Viajero revisa → Modificaciones → Aprobación → Todas las reservas confirmadas → Documentos enviados"
    - "Viaje completado → Se genera factura final → Se procesa pago → Se solicita evaluación → Reporte de viaje"
  triggers:
    - "booking_confirmed:Enviar confirmación de reserva al viajero con detalles y documentos de viaje"
    - "flight_change:Notificar al viajero inmediatamente sobre cambios en vuelos (horario, puerta, cancelación)"
    - "payment_processed:Enviar recibo de pago y actualizar estado de confirmación de reservas"
    - "trip_approaching:Enviar recordatorio 7 días antes con itinerario, clima y documentos necesarios"

features:
  core:
    - "Constructor de itinerarios con arrastrar y soltar por día de viaje"
    - "Reserva de vuelos, hoteles y actividades con confirmación en tiempo real"
    - "Gestión de viajeros con documentos, preferencias y datos de pasaporte"
    - "Procesamiento de pagos con Stripe y facturación automatizada"
    - "Generación de itinerarios en PDF con todos los detalles del viaje"
  advanced:
    - "Cálculo automático de costos con desglose por categoría y conversión de divisas"
    - "Dashboard de reportes con ventas por destino, margen y satisfacción del viajero"
    - "Sistema de notificaciones para cambios de vuelo y alertas de viaje en tiempo real"
    - "Facturación detallada con impuestos, comisiones y cargos por servicio"
  optional:
    - "Integración con APIs de aerolíneas y hoteles para disponibilidad en tiempo real"
    - "App móvil con itinerario offline y notificaciones push"
    - "Sistema de seguros de viaje con cotización y contratación integrada"
    - "Recomendaciones personalizadas basadas en preferencias del viajero e historial"

risk_assessment:
  data_sensitivity: "high"
  compliance:
    - PCI-DSS
    - GDPR
  backup_frequency: "hourly"
  access_control: "rbac"
  audit_trail: true
