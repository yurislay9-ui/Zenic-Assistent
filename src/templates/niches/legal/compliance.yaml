niche:
  name: "compliance"
  domain: "legal"
  subdomain: "compliance"
  description: "Sistema de gestión de cumplimiento normativo para organizaciones con seguimiento de regulaciones, auditorías, hallazgos, planes de acción y gestión de plazos con trazabilidad completa"
  scale: "enterprise"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - rbac
    - pdf_generator
    - report_generator
    - email_smtp
    - notification_manager
    - crud_service
    - backup_restore
    - task_scheduler
  variables:
    project_name: "compliance"
    app_name: "Compliance"
    template_type: "niche"
    db_name: "compliance.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Regulation"
    fields:
      - "regulation_id:uuid"
      - "name:str"
      - "code:str"
      - "jurisdiction:str"
      - "regulation_type:str"
      - "description:str"
      - "effective_date:date"
      - "last_amended:date"
      - "authority:str"
      - "source_url:str"
      - "is_active:bool"
      - "applicability:json"

  - name: "Requirement"
    fields:
      - "requirement_id:uuid"
      - "regulation_id:uuid"
      - "title:str"
      - "description:str"
      - "requirement_type:str"
      - "severity:str"
      - "category:str"
      - "evidence_required:list"
      - "frequency:str"
      - "status:str"
      - "responsible_role:str"
      - "last_assessed:date"

  - name: "Audit"
    fields:
      - "audit_id:uuid"
      - "title:str"
      - "audit_type:str"
      - "scope:str"
      - "auditor:str"
      - "auditor_organization:str"
      - "scheduled_start:date"
      - "scheduled_end:date"
      - "status:str"
      - "regulation_id:uuid"
      - "findings_count:int"
      - "report_path:str"

  - name: "Finding"
    fields:
      - "finding_id:uuid"
      - "audit_id:uuid"
      - "requirement_id:uuid"
      - "title:str"
      - "description:str"
      - "severity:str"
      - "finding_type:str"
      - "evidence:str"
      - "recommendation:str"
      - "status:str"
      - "identified_at:datetime"
      - "remediation_deadline:date"
      - "assigned_to:uuid"

  - name: "Action"
    fields:
      - "action_id:uuid"
      - "finding_id:uuid"
      - "title:str"
      - "description:str"
      - "action_type:str"
      - "priority:str"
      - "assigned_to:uuid"
      - "due_date:date"
      - "status:str"
      - "progress_pct:int"
      - "started_at:datetime"
      - "completed_at:datetime"
      - "evidence_provided:str"

  - name: "Deadline"
    fields:
      - "deadline_id:uuid"
      - "regulation_id:uuid"
      - "requirement_id:uuid"
      - "title:str"
      - "description:str"
      - "due_date:datetime"
      - "deadline_type:str"
      - "is_statutory:bool"
      - "status:str"
      - "responsible_id:uuid"
      - "completed_at:datetime"
      - "escalation_path:list"
      - "consequences:str"

  - name: "Responsible"
    fields:
      - "responsible_id:uuid"
      - "name:str"
      - "email:str"
      - "role:str"
      - "department:str"
      - "responsibilities:list"
      - "delegated_from:uuid"
      - "is_active:bool"
      - "certifications:list"
      - "training_completed:bool"
      - "last_review:date"
      - "access_level:str"

workflow:
  typical_paths:
    - "Identificar regulación → Mapear requisitos → Evaluar cumplimiento → Generar hallazgos → Crear plan de acción → Verificar remediación"
    - "Programar auditoría → Ejecutar evaluación → Documentar hallazgos → Asignar acciones correctivas → Dar seguimiento → Cerrar hallazgo"
    - "Detectar nuevo requisito → Asignar responsable → Evaluar brecha → Implementar cambio → Documentar evidencia → Reportar cumplimiento"
  triggers:
    - "regulation_updated:Reevaluar requisitos de cumplimiento ante cambios en regulaciones aplicables"
    - "audit_finding_created:Iniciar proceso de remediación y asignar acciones correctivas con plazos"
    - "action_overdue:Escalar automáticamente acciones correctivas que exceden su fecha límite"
    - "compliance_deadline_approaching:Notificar al responsable sobre plazos regulatorios próximos a vencer"
    - "evidence_submitted:Verificar evidencia de remediación y actualizar estado del hallazgo"

features:
  core:
    - "Mapeo de regulaciones con requisitos detallados y evaluación de aplicabilidad"
    - "Gestión de auditorías con programación, ejecución y documentación de hallazgos"
    - "Planes de acción correctiva con asignación, seguimiento y verificación de evidencia"
    - "Sistema de plazos regulatorios con alertas y escalamiento automático"
    - "Dashboard de cumplimiento con indicadores de estado por regulación y departamento"
  advanced:
    - "Motor de evaluación de brechas con análisis de riesgo residual"
    - "Gestión de evidencia documental con cadena de custodia y control de versiones"
    - "Reportes de cumplimiento automatizados para diferentes marcos normativos"
    - "Matriz RACI para asignación de responsabilidades por requisito y regulación"
    - "Análisis de tendencias de cumplimiento con predicción de riesgos futuros"
  optional:
    - "Integración con sistemas de gobierno para consulta de regulaciones actualizadas"
    - "Portal de auditores externos con acceso controlado a documentación"
    - "Módulo de capacitación en cumplimiento con seguimiento de formación"
    - "Notificaciones regulatorias automatizadas por jurisdicción y sector"
    - "Benchmarking de cumplimiento contra estándares de la industria"

risk_assessment:
  data_sensitivity: "critical"
  compliance:
    - "SOX"
    - "GDPR"
    - "ISO27001"
  backup_frequency: "hourly"
  access_control: "abac"
  audit_trail: true
