niche:
  name: "ip_management"
  domain: "legal"
  subdomain: "ip_management"
  description: "Sistema de gestión de propiedad intelectual para administración de patentes, marcas, derechos de autor, solicitudes, licencias y vigilancia de infracciones con protección global"
  scale: "large"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - rbac
    - pdf_generator
    - email_smtp
    - notification_manager
    - task_scheduler
    - crud_service
    - backup_restore
    - report_generator
  variables:
    project_name: "ip_management"
    app_name: "IPManagement"
    template_type: "niche"
    db_name: "ip_management.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Patent"
    fields:
      - "patent_id:uuid"
      - "patent_number:str"
      - "title:str"
      - "abstract:str"
      - "patent_type:str"
      - "status:str"
      - "filing_date:date"
      - "grant_date:date"
      - "expiration_date:date"
      - "jurisdiction:str"
      - "inventors:list"
      - "owner_id:uuid"

  - name: "Trademark"
    fields:
      - "trademark_id:uuid"
      - "trademark_name:str"
      - "registration_number:str"
      - "mark_type:str"
      - "nice_classification:list"
      - "status:str"
      - "filing_date:date"
      - "registration_date:date"
      - "renewal_date:date"
      - "jurisdiction:str"
      - "owner_id:uuid"
      - "logo_url:str"

  - name: "Copyright"
    fields:
      - "copyright_id:uuid"
      - "work_title:str"
      - "work_type:str"
      - "registration_number:str"
      - "author:str"
      - "creation_date:date"
      - "publication_date:date"
      - "status:str"
      - "jurisdiction:str"
      - "owner_id:uuid"
      - "license_terms:str"
      - "duration_years:int"

  - name: "Filing"
    fields:
      - "filing_id:uuid"
      - "ip_type:str"
      - "ip_id:uuid"
      - "filing_type:str"
      - "office:str"
      - "filing_number:str"
      - "filing_date:date"
      - "status:str"
      - "examiner:str"
      - "next_action:str"
      - "next_action_date:date"
      - "attorney_id:uuid"

  - name: "Deadline"
    fields:
      - "deadline_id:uuid"
      - "ip_type:str"
      - "ip_id:uuid"
      - "title:str"
      - "description:str"
      - "due_date:datetime"
      - "deadline_type:str"
      - "jurisdiction:str"
      - "is_statutory:bool"
      - "status:str"
      - "responsible_id:uuid"
      - "consequences:str"

  - name: "Owner"
    fields:
      - "owner_id:uuid"
      - "name:str"
      - "owner_type:str"
      - "email:str"
      - "phone:str"
      - "address:str"
      - "nationality:str"
      - "tax_id:str"
      - "portfolio_size:int"
      - "primary_contact:str"
      - "created_at:datetime"
      - "is_active:bool"

  - name: "License"
    fields:
      - "license_id:uuid"
      - "ip_type:str"
      - "ip_id:uuid"
      - "licensee_name:str"
      - "license_type:str"
      - "scope:str"
      - "territory:str"
      - "start_date:date"
      - "end_date:date"
      - "royalty_rate:decimal"
      - "minimum_guarantee:decimal"
      - "status:str"

  - name: "Infringement"
    fields:
      - "infringement_id:uuid"
      - "ip_type:str"
      - "ip_id:uuid"
      - "infringing_party:str"
      - "description:str"
      - "evidence:json"
      - "severity:str"
      - "status:str"
      - "detected_at:datetime"
      - "jurisdiction:str"
      - "remediation_action:str"
      - "resolved_at:datetime"

workflow:
  typical_paths:
    - "Evaluar invención → Preparar solicitud → Presentar ante oficina → Responder objeciones → Obtener concesión → Mantener vigencia"
    - "Detectar infracción → Documentar evidencia → Evaluar severidad → Enviar cesación → Negociar acuerdo → Litigar si necesario"
    - "Recibir solicitud de licencia → Evaluar términos → Negociar condiciones → Firmar acuerdo → Monitorear cumplimiento → Cobrar regalías"
  triggers:
    - "filing_deadline_approaching:Notificar sobre plazos de presentación de solicitudes y respuestas a acciones de oficina"
    - "renewal_deadline_approaching:Alertar sobre fechas de renovación de marcas y mantenimiento de patentes"
    - "infringement_detected:Iniciar protocolo de investigación y documentación ante posible violación de derechos"
    - "office_action_received:Notificar al abogado sobre requerimientos de la oficina de propiedad intelectual"
    - "license_royalty_due:Generar recordatorio de pago de regalías y verificar cumplimiento de términos de licencia"

features:
  core:
    - "Gestión integral de patentes, marcas y derechos de autor con seguimiento de ciclo de vida completo"
    - "Sistema de solicitudes con seguimiento de estado ante oficinas de propiedad intelectual"
    - "Gestión de plazos legales con alertas tempranas para renovaciones y respuestas"
    - "Administración de licencias con seguimiento de regalías y cumplimiento de términos"
    - "Detección y gestión de infracciones con documentación de evidencia"
  advanced:
    - "Vigilancia automatizada de marcas con búsqueda en bases de datos globales"
    - "Dashboard de portafolio IP con valoración y métricas de rendimiento por tipo"
    - "Motor de análisis de patentabilidad con búsqueda de estado de la técnica"
    - "Gestión de conflictos con seguimiento de litigios y resoluciones"
    - "Reportes de cumplimiento de licencias con cálculo de regalías"
  optional:
    - "Integración con bases de datos WIPO, EPO y USPTO para consulta automática"
    - "Portal de licenciatarios con acceso a términos y documentación de licencia"
    - "Módulo de valoración de propiedad intelectual con metodologías estándar"
    - "Notificaciones multicanal para alertas críticas de plazos y renovaciones"
    - "Análisis de cartera IP con recomendaciones de optimización y racionalización"

risk_assessment:
  data_sensitivity: "high"
  compliance:
    - "WIPO"
    - "GDPR"
  backup_frequency: "daily"
  access_control: "rbac"
  audit_trail: true
