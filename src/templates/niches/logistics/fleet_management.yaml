niche:
  name: "fleet_management"
  domain: "logistics"
  subdomain: "fleet_management"
  description: "Sistema integral de gestión de flotas para el seguimiento, mantenimiento y optimización de vehículos y conductores en operaciones logísticas"
  scale: "large"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - notification_manager
    - email_smtp
    - task_scheduler
    - crud_service
    - report_generator
    - pdf_generator
    - backup_restore
  variables:
    project_name: "fleet_management"
    app_name: "FleetManagement"
    template_type: "niche"
    db_name: "fleet_management.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Vehicle"
    fields:
      - "id:uuid"
      - "license_plate:str"
      - "vin:str"
      - "make:str"
      - "model:str"
      - "year:int"
      - "type:str"
      - "status:str"
      - "mileage:float"
      - "fuel_type:str"
      - "capacity:float"
      - "acquisition_date:date"

  - name: "Driver"
    fields:
      - "id:uuid"
      - "first_name:str"
      - "last_name:str"
      - "license_number:str"
      - "license_expiry:date"
      - "phone:str"
      - "email:str"
      - "status:str"
      - "hire_date:date"
      - "rating:float"

  - name: "Route"
    fields:
      - "id:uuid"
      - "name:str"
      - "origin:str"
      - "destination:str"
      - "distance_km:float"
      - "estimated_duration:float"
      - "waypoints:json"
      - "toll_cost:float"
      - "status:str"

  - name: "Trip"
    fields:
      - "id:uuid"
      - "vehicle_id:uuid"
      - "driver_id:uuid"
      - "route_id:uuid"
      - "start_time:datetime"
      - "end_time:datetime"
      - "status:str"
      - "actual_distance:float"
      - "fuel_consumed:float"
      - "notes:str"

  - name: "Maintenance"
    fields:
      - "id:uuid"
      - "vehicle_id:uuid"
      - "type:str"
      - "description:str"
      - "scheduled_date:date"
      - "completed_date:date"
      - "cost:float"
      - "vendor:str"
      - "status:str"
      - "odometer:float"

  - name: "FuelLog"
    fields:
      - "id:uuid"
      - "vehicle_id:uuid"
      - "date:datetime"
      - "liters:float"
      - "cost:float"
      - "odometer:float"
      - "station:str"
      - "fuel_type:str"

  - name: "GPSLocation"
    fields:
      - "id:uuid"
      - "vehicle_id:uuid"
      - "latitude:float"
      - "longitude:float"
      - "speed:float"
      - "heading:float"
      - "timestamp:datetime"
      - "ignition:bool"

  - name: "Document"
    fields:
      - "id:uuid"
      - "entity_type:str"
      - "entity_id:uuid"
      - "doc_type:str"
      - "file_path:str"
      - "upload_date:datetime"
      - "expiry_date:date"
      - "status:str"

workflow:
  typical_paths:
    - "Asignación de vehículo-conductor → Planificación de ruta → Ejecución de viaje → Registro GPS en tiempo real → Completar viaje → Registrar consumo de combustible"
    - "Alerta de mantenimiento → Crear orden de mantenimiento → Programar fecha → Ejecutar mantenimiento → Registrar costo → Actualizar estado del vehículo"
    - "Registro de documento → Verificar vigencia → Notificación de vencimiento próximo → Renovación → Actualización de registro"
  triggers:
    - "vehicle_maintenance_due:Notificación cuando el mantenimiento programado está próximo"
    - "driver_license_expiring:Alerta cuando la licencia del conductor está por vencer"
    - "gps_geofence_alert:Aviso cuando un vehículo entra o sale de una zona geográfica definida"
    - "fuel_anomaly_detected:Alerta ante consumo de combustible anómalo respecto al promedio"
    - "document_expiry_warning:Aviso de documentos próximos a expirar"

features:
  core:
    - "Seguimiento GPS en tiempo real de vehículos"
    - "Gestión de mantenimiento preventivo y correctivo"
    - "Registro y control de consumo de combustible"
    - "Asignación de conductores a vehículos"
    - "Planificación y optimización de rutas"
    - "Gestión documental de vehículos y conductores"
  advanced:
    - "Análisis de eficiencia de combustible por vehículo y ruta"
    - "Geocercas y alertas de desviación de ruta"
    - "Predicción de mantenimiento basada en kilometraje y uso"
    - "Dashboard de KPIs de flota en tiempo real"
    - "Integración con sistemas de navegación externos"
  optional:
    - "Seguimiento de temperatura para vehículos refrigerados"
    - "Módulo de telemetría avanzada y diagnóstico remoto"
    - "Integración con sistemas ERP de terceros"
    - "Reportes regulatorios automatizados DOT"
    - "Aplicación móvil para conductores"

risk_assessment:
  data_sensitivity: "medium"
  compliance: [DOT, GDPR]
  backup_frequency: "daily"
  access_control: "rbac"
  audit_trail: true
