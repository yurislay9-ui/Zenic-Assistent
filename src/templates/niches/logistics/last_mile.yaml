niche:
  name: "last_mile"
  domain: "logistics"
  subdomain: "last_mile_delivery"
  description: "Sistema de gestión de entregas de última milla para la planificación de rutas, asignación de conductores, seguimiento de entregas y prueba de entrega digital"
  scale: "medium"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - notification_manager
    - email_smtp
    - task_scheduler
    - crud_service
    - report_generator
    - pdf_generator
  variables:
    project_name: "last_mile"
    app_name: "LastMile"
    template_type: "niche"
    db_name: "last_mile.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Delivery"
    fields:
      - "id:uuid"
      - "tracking_code:str"
      - "driver_id:uuid"
      - "route_id:uuid"
      - "customer_id:uuid"
      - "address:str"
      - "time_window_start:datetime"
      - "time_window_end:datetime"
      - "status:str"
      - "priority:str"
      - "attempts:int"
      - "created_at:datetime"

  - name: "Driver"
    fields:
      - "id:uuid"
      - "first_name:str"
      - "last_name:str"
      - "phone:str"
      - "vehicle_type:str"
      - "license_plate:str"
      - "zone_id:uuid"
      - "status:str"
      - "current_location:json"
      - "shift_start:datetime"
      - "shift_end:datetime"

  - name: "Route"
    fields:
      - "id:uuid"
      - "driver_id:uuid"
      - "date:date"
      - "zone_id:uuid"
      - "stops:json"
      - "total_distance_km:float"
      - "estimated_duration_min:float"
      - "status:str"
      - "optimized:bool"

  - name: "Stop"
    fields:
      - "id:uuid"
      - "route_id:uuid"
      - "delivery_id:uuid"
      - "sequence:int"
      - "address:str"
      - "latitude:float"
      - "longitude:float"
      - "estimated_arrival:datetime"
      - "actual_arrival:datetime"
      - "status:str"
      - "notes:str"

  - name: "Customer"
    fields:
      - "id:uuid"
      - "first_name:str"
      - "last_name:str"
      - "email:str"
      - "phone:str"
      - "address:str"
      - "preferences:json"
      - "delivery_instructions:str"
      - "status:str"

  - name: "ProofOfDelivery"
    fields:
      - "id:uuid"
      - "delivery_id:uuid"
      - "type:str"
      - "recipient_name:str"
      - "signature_image:str"
      - "photo_url:str"
      - "gps_location:json"
      - "timestamp:datetime"
      - "notes:str"

  - name: "Schedule"
    fields:
      - "id:uuid"
      - "driver_id:uuid"
      - "date:date"
      - "shift_start:datetime"
      - "shift_end:datetime"
      - "zone_id:uuid"
      - "max_deliveries:int"
      - "assigned_deliveries:int"
      - "status:str"

  - name: "Zone"
    fields:
      - "id:uuid"
      - "name:str"
      - "code:str"
      - "boundary:json"
      - "center_latitude:float"
      - "center_longitude:float"
      - "active_drivers:int"
      - "avg_delivery_time_min:float"
      - "status:str"

workflow:
  typical_paths:
    - "Recepción de pedidos → Agrupación por zona → Optimización de rutas → Asignación a conductor → Ejecución de entregas → Registro de prueba de entrega → Notificación al cliente"
    - "Planificación de turno → Asignación de zona → Distribución de entregas → Monitoreo en tiempo real → Completar ruta → Generación de informe"
    - "Intento de entrega fallido → Reprogramación → Notificación al cliente → Nuevo intento → Confirmación de entrega"
  triggers:
    - "delivery_assigned:Notificación al conductor cuando se le asigna una nueva entrega"
    - "out_for_delivery:Aviso al cliente de que su entrega está en camino"
    - "delivery_completed:Confirmación automática al cliente con prueba de entrega"
    - "delivery_failed:Alerta de intento fallido con motivo y reprogramación automática"
    - "route_optimization_ready:Aviso cuando la optimización de ruta está completa para el día"

features:
  core:
    - "Planificación y optimización de rutas de entrega"
    - "Asignación de entregas a conductores por zona"
    - "Seguimiento en tiempo real de entregas y conductores"
    - "Prueba de entrega digital con firma y fotografía"
    - "Notificaciones proactivas al cliente por estado de entrega"
  advanced:
    - "Optimización dinámica de rutas con tráfico en tiempo real"
    - "Ventanas de tiempo flexibles para entregas"
    - "Dashboard de rendimiento de conductores y zonas"
    - "Gestión de intentos fallidos y reprogramación automática"
    - "Predicción de tiempos de entrega basada en histórico"
  optional:
    - "Integración con asistentes de navegación (Google Maps, Waze)"
    - "Módulo de entregas en puntos de recogida (lockers)"
    - "Aplicación móvil para conductores con seguimiento GPS"
    - "Chat en tiempo real entre conductor y cliente"
    - "Sistema de calificación de experiencia de entrega"

risk_assessment:
  data_sensitivity: "medium"
  compliance: [GDPR]
  backup_frequency: "daily"
  access_control: "rbac"
  audit_trail: true
