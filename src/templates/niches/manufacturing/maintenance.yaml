niche:
  name: "maintenance"
  domain: "manufacturing"
  subdomain: "maintenance_management"
  description: "Sistema de gestión de mantenimiento industrial para el control de equipos, órdenes de mantenimiento preventivo y correctivo, programación, repuestos y análisis de costos y tiempos de inactividad"
  scale: "medium"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - task_scheduler
    - notification_manager
    - email_smtp
    - inventory_tracker
    - crud_service
    - report_generator
    - pdf_generator
    - backup_restore
  variables:
    project_name: "maintenance"
    app_name: "Maintenance"
    template_type: "niche"
    db_name: "maintenance.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Equipment"
    fields:
      - "id:uuid"
      - "name:str"
      - "code:str"
      - "type:str"
      - "manufacturer:str"
      - "model:str"
      - "serial_number:str"
      - "location:str"
      - "installation_date:date"
      - "warranty_expiry:date"
      - "status:str"
      - "criticality:str"

  - name: "MaintenanceOrder"
    fields:
      - "id:uuid"
      - "order_number:str"
      - "equipment_id:uuid"
      - "type:str"
      - "priority:str"
      - "description:str"
      - "technician_id:uuid"
      - "scheduled_date:datetime"
      - "completed_date:datetime"
      - "status:str"
      - "estimated_hours:float"
      - "actual_hours:float"

  - name: "Technician"
    fields:
      - "id:uuid"
      - "first_name:str"
      - "last_name:str"
      - "employee_id:str"
      - "specialization:json"
      - "certification:json"
      - "shift:str"
      - "availability:str"
      - "phone:str"
      - "status:str"

  - name: "Schedule"
    fields:
      - "id:uuid"
      - "equipment_id:uuid"
      - "maintenance_type:str"
      - "frequency:str"
      - "interval_days:int"
      - "next_due_date:date"
      - "last_performed:date"
      - "assigned_technician_id:uuid"
      - "estimated_duration_hours:float"
      - "status:str"

  - name: "SparePart"
    fields:
      - "id:uuid"
      - "part_number:str"
      - "name:str"
      - "description:str"
      - "equipment_compatibility:json"
      - "quantity_in_stock:int"
      - "min_stock_level:int"
      - "unit_cost:float"
      - "supplier:str"
      - "lead_time_days:int"
      - "location:str"

  - name: "DowntimeLog"
    fields:
      - "id:uuid"
      - "equipment_id:uuid"
      - "start_time:datetime"
      - "end_time:datetime"
      - "duration_hours:float"
      - "reason:str"
      - "category:str"
      - "production_impact:str"
      - "resolved_by:uuid"
      - "notes:str"

  - name: "Alert"
    fields:
      - "id:uuid"
      - "equipment_id:uuid"
      - "type:str"
      - "severity:str"
      - "message:str"
      - "triggered_at:datetime"
      - "acknowledged_by:uuid"
      - "acknowledged_at:datetime"
      - "status:str"
      - "maintenance_order_id:uuid"

  - name: "Cost"
    fields:
      - "id:uuid"
      - "maintenance_order_id:uuid"
      - "category:str"
      - "description:str"
      - "labor_cost:float"
      - "parts_cost:float"
      - "other_cost:float"
      - "total_cost:float"
      - "currency:str"
      - "recorded_date:date"
      - "approved_by:uuid"

workflow:
  typical_paths:
    - "Programa de mantenimiento → Generación de orden → Asignación de técnico → Ejecución → Registro de repuestos utilizados → Cierre de orden → Actualización de costos"
    - "Alerta de equipo → Creación de orden correctiva → Diagnóstico → Reparación → Prueba de funcionamiento → Cierre → Actualización de programa"
    - "Solicitud de repuesto → Verificación de inventario → Orden de compra → Recepción → Actualización de stock → Asignación a orden de mantenimiento"
  triggers:
    - "maintenance_schedule_due:Notificación automática cuando el mantenimiento programado está próximo"
    - "equipment_alert_triggered:Alerta inmediata ante condición anómala detectada en equipo"
    - "spare_part_below_minimum:Aviso cuando el stock de un repuesto cae por debajo del mínimo"
    - "downtime_exceeded:Alerta cuando el tiempo de inactividad supera el umbral definido"
    - "warranty_expiring_soon:Recordatorio de garantía de equipo próxima a expirar"

features:
  core:
    - "Gestión de órdenes de mantenimiento preventivo y correctivo"
    - "Programación automática de mantenimientos por frecuencia y uso"
    - "Control de inventario de repuestos con puntos de reorden"
    - "Registro de tiempos de inactividad y análisis de impacto"
    - "Asignación de técnicos por especialidad y disponibilidad"
  advanced:
    - "Análisis de costo total de mantenimiento por equipo"
    - "Dashboard de disponibilidad y confiabilidad de equipos (MTBF/MTTR)"
    - "Mantenimiento predictivo basado en patrones de fallo"
    - "Gestión de alertas con escalamiento automático por severidad"
    - "Integración con sistemas de producción para priorización"
  optional:
    - "Integración con sensores IoT para monitoreo de condición"
    - "Módulo de gestión de garantías y contratos de servicio"
    - "Aplicación móvil para técnicos con acceso offline"
    - "Análisis de vida útil restante de equipos"
    - "Reportes regulatorios OSHA automatizados"

risk_assessment:
  data_sensitivity: "medium"
  compliance: [OSHA]
  backup_frequency: "daily"
  access_control: "rbac"
  audit_trail: true
