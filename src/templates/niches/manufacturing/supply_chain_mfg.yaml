niche:
  name: "supply_chain_mfg"
  domain: "manufacturing"
  subdomain: "supply_chain_manufacturing"
  description: "Sistema de gestión de cadena de suministro para manufactura que integra proveedores de materias primas, control de calidad de insumos, contratos, pronóstico de demanda y gestión de inventario de producción"
  scale: "enterprise"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - rbac
    - inventory_tracker
    - data_analyzer
    - report_generator
    - email_smtp
    - crud_service
    - pdf_generator
    - backup_restore
  variables:
    project_name: "supply_chain_mfg"
    app_name: "SupplyChainMfg"
    template_type: "niche"
    db_name: "supply_chain_mfg.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Supplier"
    fields:
      - "id:uuid"
      - "name:str"
      - "tax_id:str"
      - "country:str"
      - "material_categories:json"
      - "quality_rating:float"
      - "delivery_rating:float"
      - "lead_time_days:int"
      - "payment_terms:str"
      - "contact_email:str"
      - "status:str"

  - name: "RawMaterial"
    fields:
      - "id:uuid"
      - "sku:str"
      - "name:str"
      - "category:str"
      - "unit:str"
      - "specification:json"
      - "safety_stock:int"
      - "reorder_point:int"
      - "standard_cost:float"
      - "preferred_supplier_id:uuid"
      - "shelf_life_days:int"
      - "hazard_class:str"

  - name: "PurchaseOrder"
    fields:
      - "id:uuid"
      - "po_number:str"
      - "supplier_id:uuid"
      - "items:json"
      - "total_amount:float"
      - "currency:str"
      - "status:str"
      - "order_date:date"
      - "expected_delivery:date"
      - "quality_hold:bool"
      - "approved_by:uuid"

  - name: "Delivery"
    fields:
      - "id:uuid"
      - "po_id:uuid"
      - "supplier_id:uuid"
      - "tracking_number:str"
      - "carrier:str"
      - "origin:str"
      - "destination:str"
      - "shipped_date:date"
      - "eta:date"
      - "status:str"
      - "received_date:date"

  - name: "QualityCheck"
    fields:
      - "id:uuid"
      - "delivery_id:uuid"
      - "material_id:uuid"
      - "inspector_id:uuid"
      - "check_type:str"
      - "parameters:json"
      - "results:json"
      - "verdict:str"
      - "checked_at:datetime"
      - "non_conformities:json"
      - "status:str"

  - name: "Contract"
    fields:
      - "id:uuid"
      - "supplier_id:uuid"
      - "title:str"
      - "type:str"
      - "value:float"
      - "currency:str"
      - "start_date:date"
      - "end_date:date"
      - "terms:json"
      - "volume_commitment:float"
      - "status:str"
      - "auto_renew:bool"

  - name: "Forecast"
    fields:
      - "id:uuid"
      - "material_id:uuid"
      - "period_start:date"
      - "period_end:date"
      - "predicted_demand:float"
      - "model_type:str"
      - "confidence:float"
      - "parameters:json"
      - "variance:float"
      - "created_at:datetime"

  - name: "Inventory"
    fields:
      - "id:uuid"
      - "material_id:uuid"
      - "warehouse_id:uuid"
      - "quantity:int"
      - "reserved:int"
      - "available:int"
      - "in_transit:int"
      - "unit_cost:float"
      - "lot_number:str"
      - "received_date:date"
      - "expiry_date:date"
      - "status:str"

workflow:
  typical_paths:
    - "Pronóstico de demanda → Verificación de inventario → Generación de orden de compra → Aprobación → Envío a proveedor → Seguimiento de entrega → Inspección de calidad → Liberación a inventario de producción"
    - "Recepción de material → Inspección de calidad → Aprobación/Rechazo → Ingreso a inventario → Disponibilidad para producción → Consumo → Actualización de stock"
    - "Evaluación de proveedor → Negociación de contrato → Firma → Monitoreo de cumplimiento → Renovación o cambio de proveedor"
  triggers:
    - "material_below_reorder_point:Alerta automática cuando una materia prima alcanza el punto de reorden"
    - "quality_check_failed:Notificación inmediata ante rechazo de material por calidad"
    - "delivery_delayed:Aviso cuando una entrega de proveedor se retrasa más de lo estimado"
    - "contract_expiring:Aviso de contrato próximo a expirar para renegociación"
    - "forecast_variance_high:Alerta cuando la varianza del pronóstico supera el umbral aceptable"

features:
  core:
    - "Gestión de proveedores con evaluación de desempeño integral"
    - "Control de inventario de materias primas con reservas y stock de seguridad"
    - "Órdenes de compra con flujo de aprobación y seguimiento"
    - "Inspección de calidad de insumos recibidos"
    - "Pronóstico de demanda de materiales para producción"
  advanced:
    - "Análisis de riesgo de suministro y diversificación de proveedores"
    - "Optimización de costos de adquisición con análisis de tendencias"
    - "Trazabilidad completa de materias primas desde proveedor hasta producto final"
    - "Dashboard de desempeño de cadena de suministro con métricas clave"
    - "Simulación de escenarios de interrupción de suministro"
  optional:
    - "Integración con sistemas MRP/ERP corporativos"
    - "Módulo de compras internacionales con gestión aduanera"
    - "Blockchain para certificación de origen de materias primas"
    - "Análisis de sostenibilidad y cumplimiento ESG en cadena de suministro"
    - "Reportes regulatorios SOX e ISO 9001 automatizados"

risk_assessment:
  data_sensitivity: "high"
  compliance: [ISO9001, SOX]
  backup_frequency: "hourly"
  access_control: "abac"
  audit_trail: true
