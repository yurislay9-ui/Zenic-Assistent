niche:
  name: "content_management"
  domain: "media"
  subdomain: "publishing"
  description: "Sistema de gestión de contenidos para creación, edición, organización y publicación de artículos y medios digitales con flujo de trabajo editorial completo."
  scale: "medium"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - rbac
    - email_smtp
    - notification_manager
    - pdf_generator
    - crud_service
    - report_generator
    - backup_restore
  variables:
    project_name: "content_management"
    app_name: "ContentManagement"
    template_type: "niche"
    db_name: "content_management.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Article"
    fields:
      - "title:str"
      - "slug:str"
      - "body:text"
      - "excerpt:str"
      - "featured_image:str"
      - "status:str"
      - "published_at:datetime"
      - "author_id:int"
      - "category_id:int"
      - "seo_title:str"
      - "seo_description:str"
      - "view_count:int"
  - name: "Author"
    fields:
      - "name:str"
      - "email:str"
      - "bio:text"
      - "avatar:str"
      - "role:str"
      - "social_links:json"
      - "is_active:bool"
      - "joined_at:datetime"
  - name: "Category"
    fields:
      - "name:str"
      - "slug:str"
      - "description:str"
      - "parent_id:int"
      - "sort_order:int"
      - "is_visible:bool"
      - "created_at:datetime"
  - name: "Tag"
    fields:
      - "name:str"
      - "slug:str"
      - "color:str"
      - "usage_count:int"
      - "is_trending:bool"
      - "category:str"
      - "created_at:datetime"
  - name: "Media"
    fields:
      - "filename:str"
      - "filepath:str"
      - "mime_type:str"
      - "file_size:int"
      - "alt_text:str"
      - "width:int"
      - "height:int"
      - "uploaded_by:int"
      - "created_at:datetime"
  - name: "Comment"
    fields:
      - "article_id:int"
      - "author_name:str"
      - "author_email:str"
      - "body:text"
      - "status:str"
      - "parent_id:int"
      - "ip_address:str"
      - "created_at:datetime"
  - name: "Draft"
    fields:
      - "title:str"
      - "body:text"
      - "author_id:int"
      - "version:int"
      - "auto_saved:bool"
      - "last_saved_at:datetime"
      - "created_at:datetime"
  - name: "Schedule"
    fields:
      - "article_id:int"
      - "scheduled_at:datetime"
      - "timezone:str"
      - "status:str"
      - "recurring:bool"
      - "recurrence_rule:str"
      - "created_at:datetime"

workflow:
  typical_paths:
    - "Autor crea borrador → Editor revisa → Aprobación → Programación de publicación → Publicación automática"
    - "Carga de medios → Asociación con artículo → Optimización SEO → Publicación"
    - "Lector comenta → Moderación → Aprobación/Rechazo → Notificación al autor"
  triggers:
    - "article_published:Notificar por email a suscriptores cuando un artículo es publicado"
    - "comment_received:Enviar notificación al autor del artículo sobre nuevo comentario"
    - "draft_auto_save:Guardar automáticamente borradores cada 30 segundos de inactividad"
    - "schedule_due:Publicar artículo programado cuando llega la fecha y hora configurada"
    - "backup_daily:Realizar respaldo completo de contenido y medios cada 24 horas"

features:
  core:
    - "Editor de texto enriquecido con soporte Markdown y HTML"
    - "Gestión de medios con biblioteca centralizada y búsqueda"
    - "Sistema de categorización y etiquetado jerárquico"
    - "Flujo de trabajo editorial con roles y permisos"
    - "Programación de publicaciones con zona horaria"
  advanced:
    - "Optimización SEO automática con análisis de palabras clave"
    - "Versionado de artículos con historial de cambios y restauración"
    - "Sistema de moderación de comentarios con filtro de spam"
    - "Generación de reportes de rendimiento de contenido en PDF"
  optional:
    - "Integración con redes sociales para distribución automática"
    - "Soporte multiidioma con traducción asistida"
    - "API RESTful para integración con aplicaciones externas"
    - "Sistema de notificaciones push para lectores suscritos"

risk_assessment:
  data_sensitivity: "medium"
  compliance:
    - GDPR
    - DMCA
  backup_frequency: "daily"
  access_control: "rbac"
  audit_trail: true
