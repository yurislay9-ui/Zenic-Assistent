niche:
  name: "news"
  domain: "media"
  subdomain: "journalism"
  description: "Sistema de gestión de noticias con flujo editorial periodístico, gestión de fuentes, alertas de última hora, archivo documental y suscripciones de lectores."
  scale: "medium"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - rbac
    - email_smtp
    - notification_manager
    - pdf_generator
    - crud_service
    - report_generator
    - backup_restore
  variables:
    project_name: "news"
    app_name: "News"
    template_type: "niche"
    db_name: "news.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Article"
    fields:
      - "headline:str"
      - "slug:str"
      - "body:text"
      - "summary:str"
      - "featured_image:str"
      - "category_id:int"
      - "journalist_id:int"
      - "source_id:int"
      - "status:str"
      - "priority:str"
      - "published_at:datetime"
      - "updated_at:datetime"
  - name: "Journalist"
    fields:
      - "name:str"
      - "email:str"
      - "bio:text"
      - "avatar:str"
      - "specialization:str"
      - "press_card:str"
      - "is_active:bool"
      - "article_count:int"
      - "joined_at:datetime"
  - name: "Source"
    fields:
      - "name:str"
      - "type:str"
      - "contact_info:str"
      - "reliability_score:float"
      - "is_verified:bool"
      - "last_contacted_at:datetime"
      - "notes:text"
      - "created_at:datetime"
  - name: "Category"
    fields:
      - "name:str"
      - "slug:str"
      - "description:str"
      - "parent_id:int"
      - "icon:str"
      - "sort_order:int"
      - "is_visible:bool"
      - "created_at:datetime"
  - name: "Breaking"
    fields:
      - "title:str"
      - "description:text"
      - "article_id:int"
      - "severity:str"
      - "is_active:bool"
      - "activated_at:datetime"
      - "deactivated_at:datetime"
      - "created_by:int"
  - name: "Archive"
    fields:
      - "article_id:int"
      - "archived_at:datetime"
      - "archived_by:int"
      - "reason:str"
      - "original_url:str"
      - "snapshot:json"
      - "is_searchable:bool"
  - name: "Comment"
    fields:
      - "article_id:int"
      - "author_name:str"
      - "author_email:str"
      - "content:text"
      - "status:str"
      - "parent_id:int"
      - "is_flagged:bool"
      - "created_at:datetime"
  - name: "Subscription"
    fields:
      - "user_id:int"
      - "plan:str"
      - "categories:json"
      - "frequency:str"
      - "is_active:bool"
      - "started_at:datetime"
      - "expires_at:datetime"

workflow:
  typical_paths:
    - "Periodista redacta artículo → Editor revisa y verifica fuentes → Aprobación → Publicación con categoría"
    - "Fuente reporta noticia de última hora → Alerta breaking → Periodista asignado → Cobertura en vivo"
    - "Lector se suscribe → Selecciona categorías de interés → Recibe newsletter personalizado"
  triggers:
    - "breaking_news:Activar alerta global y notificar a todos los suscriptores sobre noticia de última hora"
    - "article_submitted:Notificar al editor responsable sobre nuevo artículo pendiente de revisión"
    - "comment_flagged:Alertar al moderador cuando un comentario es reportado por la comunidad"
    - "subscription_renewal:Renovar suscripción y enviar confirmación al lector"

features:
  core:
    - "Editor de noticias con formato periodístico y validación de fuentes"
    - "Sistema de alertas breaking news con notificación push inmediata"
    - "Archivo digital con búsqueda avanzada y preservación de contenido"
    - "Gestión de periodistas con asignación de beats y especialización"
    - "Sistema de suscripciones con newsletter personalizado por categorías"
  advanced:
    - "Verificación de fuentes con scoring de confiabilidad y trazabilidad"
    - "Generación de reportes PDF de cobertura noticiosa por período"
    - "Sistema de moderación de comentarios con filtro de toxicidad"
    - "Backup automático con restauración granular por artículo"
  optional:
    - "Integración con agencias de noticias vía API para contenido sindicado"
    - "Soporte para contenido multimedia interactivo y gráficos de datos"
    - "Muro de pago con modelo freemium para monetización de contenido premium"
    - "API pública para distribuir contenido a terceros con rate limiting"

risk_assessment:
  data_sensitivity: "medium"
  compliance:
    - GDPR
  backup_frequency: "daily"
  access_control: "rbac"
  audit_trail: true
