niche:
  name: "podcast"
  domain: "media"
  subdomain: "audio_broadcasting"
  description: "Plataforma de gestión y distribución de podcasts con producción de episodios, gestión de hosts e invitados, transcripciones, análisis de audiencia y monetización mediante patrocinios."
  scale: "medium"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - email_smtp
    - notification_manager
    - pdf_generator
    - crud_service
    - report_generator
    - data_analyzer
  variables:
    project_name: "podcast"
    app_name: "Podcast"
    template_type: "niche"
    db_name: "podcast.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Episode"
    fields:
      - "title:str"
      - "description:text"
      - "audio_url:str"
      - "duration:int"
      - "episode_number:int"
      - "season:int"
      - "podcast_id:int"
      - "transcript_id:int"
      - "publish_date:datetime"
      - "status:str"
      - "show_notes:text"
      - "created_at:datetime"
  - name: "Podcast"
    fields:
      - "name:str"
      - "description:text"
      - "cover_image:str"
      - "language:str"
      - "category:str"
      - "explicit:bool"
      - "website_url:str"
      - "rss_feed_url:str"
      - "is_active:bool"
      - "created_at:datetime"
  - name: "Host"
    fields:
      - "name:str"
      - "email:str"
      - "bio:text"
      - "avatar:str"
      - "social_links:json"
      - "podcast_id:int"
      - "is_active:bool"
      - "joined_at:datetime"
  - name: "Guest"
    fields:
      - "name:str"
      - "email:str"
      - "bio:text"
      - "avatar:str"
      - "organization:str"
      - "social_links:json"
      - "appearances:int"
      - "created_at:datetime"
  - name: "Transcript"
    fields:
      - "episode_id:int"
      - "language:str"
      - "content:text"
      - "word_count:int"
      - "generated_automatically:bool"
      - "reviewed:bool"
      - "created_at:datetime"
      - "updated_at:datetime"
  - name: "Analytics"
    fields:
      - "episode_id:int"
      - "date:date"
      - "downloads:int"
      - "streams:int"
      - "unique_listeners:int"
      - "avg_listen_duration:int"
      - "completion_rate:float"
      - "source:str"
  - name: "Sponsor"
    fields:
      - "name:str"
      - "logo:str"
      - "website_url:str"
      - "contact_email:str"
      - "contract_start:date"
      - "contract_end:date"
      - "fee:float"
      - "is_active:bool"
      - "created_at:datetime"
  - name: "RSSFeed"
    fields:
      - "podcast_id:int"
      - "feed_url:str"
      - "last_build_date:datetime"
      - "subscriber_count:int"
      - "platform:str"
      - "is_valid:bool"
      - "sync_status:str"
      - "updated_at:datetime"

workflow:
  typical_paths:
    - "Host planifica episodio → Invita invitado → Graba → Genera transcripción → Programa publicación → Distribuye vía RSS"
    - "Patrocinador contacta → Negocia contrato → Asigna episodios → Mide impacto → Genera reporte"
    - "Escucha descarga episodio → Reproduce → Analytics registra → Reporte de rendimiento generado"
  triggers:
    - "episode_published:Actualizar feed RSS y notificar a suscriptores sobre nuevo episodio disponible"
    - "transcript_generated:Notificar al host que la transcripción automática está lista para revisión"
    - "sponsorship_expired:Alertar cuando un contrato de patrocinio está próximo a expirar"
    - "analytics_daily:Compilar métricas diarias de descargas y reproducciones por episodio"

features:
  core:
    - "Gestión de episodios con programación y publicación automática"
    - "Generación y distribución automática de feeds RSS para principales plataformas"
    - "Transcripción automática de audio con edición manual"
    - "Dashboard de analytics con métricas de audiencia y engagement"
    - "Gestión de hosts e invitados con perfiles y historial de apariciones"
  advanced:
    - "Monetización mediante integración de patrocinios con inserción de anuncios dinámica"
    - "Análisis de sentimiento de reseñas y comentarios de oyentes"
    - "Generación de reportes PDF de rendimiento para patrocinadores"
    - "Optimización de metadatos para descubrimiento en directorios de podcasts"
  optional:
    - "Integración con plataformas de distribución como Spotify y Apple Podcasts"
    - "Soporte para capítulos marcados con timestamps en episodios"
    - "Sistema de comentarios y comunidad por episodio"
    - "Grabación remota con invitados mediante enlace de sesión"

risk_assessment:
  data_sensitivity: "low"
  compliance:
    - GDPR
  backup_frequency: "daily"
  access_control: "basic"
  audit_trail: false
