niche:
  name: "social_media"
  domain: "media"
  subdomain: "social_networking"
  description: "Plataforma de red social con publicación de contenidos, interacciones sociales, mensajería directa, historias efímeras y análisis de tendencias con gestión de hashtag."
  scale: "large"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - email_smtp
    - notification_manager
    - data_analyzer
    - crud_service
    - report_generator
    - webhook_server
  variables:
    project_name: "social_media"
    app_name: "SocialMedia"
    template_type: "niche"
    db_name: "social_media.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Post"
    fields:
      - "author_id:int"
      - "content:text"
      - "media_urls:json"
      - "post_type:str"
      - "visibility:str"
      - "like_count:int"
      - "comment_count:int"
      - "share_count:int"
      - "is_pinned:bool"
      - "edited_at:datetime"
      - "created_at:datetime"
  - name: "User"
    fields:
      - "username:str"
      - "display_name:str"
      - "email:str"
      - "password_hash:str"
      - "avatar:str"
      - "bio:text"
      - "is_verified:bool"
      - "is_private:bool"
      - "follower_count:int"
      - "following_count:int"
      - "created_at:datetime"
  - name: "Comment"
    fields:
      - "post_id:int"
      - "author_id:int"
      - "content:text"
      - "parent_id:int"
      - "like_count:int"
      - "is_hidden:bool"
      - "created_at:datetime"
  - name: "Like"
    fields:
      - "user_id:int"
      - "target_id:int"
      - "target_type:str"
      - "reaction_type:str"
      - "is_active:bool"
      - "ip_address:str"
      - "created_at:datetime"
  - name: "Follow"
    fields:
      - "follower_id:int"
      - "followed_id:int"
      - "status:str"
      - "is_muted:bool"
      - "is_close_friend:bool"
      - "created_at:datetime"
  - name: "Message"
    fields:
      - "sender_id:int"
      - "recipient_id:int"
      - "content:text"
      - "media_url:str"
      - "is_read:bool"
      - "read_at:datetime"
      - "created_at:datetime"
  - name: "Hashtag"
    fields:
      - "name:str"
      - "usage_count:int"
      - "trending_score:float"
      - "category:str"
      - "is_trending:bool"
      - "first_used_at:datetime"
      - "updated_at:datetime"
  - name: "Story"
    fields:
      - "author_id:int"
      - "media_url:str"
      - "media_type:str"
      - "caption:str"
      - "view_count:int"
      - "expires_at:datetime"
      - "is_highlighted:bool"
      - "created_at:datetime"

workflow:
  typical_paths:
    - "Usuario crea publicación → Adjunta medios → Establece visibilidad → Publica → Seguidores ven en feed"
    - "Usuario envía solicitud de seguimiento → Destinatario acepta/rechaza → Conexión establecida"
    - "Usuario crea historia → Se publica con expiración de 24 horas → Los seguidores la visualizan"
  triggers:
    - "new_follower:Notificar al usuario sobre nueva solicitud de seguimiento o nuevo seguidor"
    - "post_liked:Enviar notificación al autor cuando su publicación recibe un like"
    - "message_received:Notificar al destinatario sobre nuevo mensaje directo no leído"
    - "story_expiring:Alertar al autor cuando una historia está próxima a expirar para destacar"
    - "trending_hashtag:Webhook a sistemas externos cuando un hashtag supera el umbral de tendencia"

features:
  core:
    - "Feed personalizado con algoritmo de relevancia y cronología"
    - "Sistema de publicaciones con soporte multimedia (imágenes, video, enlaces)"
    - "Mensajería directa en tiempo real con indicadores de lectura"
    - "Historias efímeras con expiración automática de 24 horas"
    - "Sistema de seguimiento con perfiles públicos y privados"
  advanced:
    - "Análisis de tendencias con detección de hashtags virales en tiempo real"
    - "Sistema de moderación automática de contenido con filtros configurables"
    - "Webhooks para integración con herramientas externas de análisis y monitoreo"
    - "Dashboard de analytics con métricas de engagement y crecimiento de audiencia"
  optional:
    - "Verificación de cuentas con proceso de solicitud y validación"
    - "Transmisión en vivo integrada con chat en tiempo real"
    - "Sistema de espacios/comunidades temáticas con moderación propia"
    - "Soporte para publicaciones patrocinadas y segmentación de audiencia"
    - "Exportación de datos personales conforme a regulaciones de privacidad"

risk_assessment:
  data_sensitivity: "high"
  compliance:
    - GDPR
    - COPPA
  backup_frequency: "hourly"
  access_control: "rbac"
  audit_trail: true
