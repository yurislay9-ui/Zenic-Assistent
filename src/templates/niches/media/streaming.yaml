niche:
  name: "streaming"
  domain: "media"
  subdomain: "entertainment"
  description: "Plataforma de streaming de contenidos audiovisuales con gestión de suscripciones, reproducción adaptativa, catálogo de canales y sistema de pagos integrado."
  scale: "large"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - stripe_payments
    - email_smtp
    - notification_manager
    - crud_service
    - report_generator
    - data_analyzer
  variables:
    project_name: "streaming"
    app_name: "Streaming"
    template_type: "niche"
    db_name: "streaming.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Content"
    fields:
      - "title:str"
      - "description:text"
      - "thumbnail:str"
      - "video_url:str"
      - "duration:int"
      - "genre:str"
      - "rating:str"
      - "release_date:date"
      - "is_featured:bool"
      - "view_count:int"
      - "channel_id:int"
      - "created_at:datetime"
  - name: "User"
    fields:
      - "username:str"
      - "email:str"
      - "password_hash:str"
      - "avatar:str"
      - "subscription_tier:str"
      - "is_active:bool"
      - "last_login:datetime"
      - "preferences:json"
      - "created_at:datetime"
  - name: "Subscription"
    fields:
      - "user_id:int"
      - "plan:str"
      - "price:float"
      - "billing_cycle:str"
      - "status:str"
      - "started_at:datetime"
      - "expires_at:datetime"
      - "auto_renew:bool"
      - "payment_method_id:str"
  - name: "Playback"
    fields:
      - "user_id:int"
      - "content_id:int"
      - "progress:int"
      - "duration:int"
      - "completed:bool"
      - "device:str"
      - "ip_address:str"
      - "started_at:datetime"
      - "updated_at:datetime"
  - name: "Playlist"
    fields:
      - "name:str"
      - "user_id:int"
      - "description:str"
      - "is_public:bool"
      - "cover_image:str"
      - "sort_order:json"
      - "created_at:datetime"
  - name: "Rating"
    fields:
      - "user_id:int"
      - "content_id:int"
      - "score:int"
      - "review:text"
      - "is_spoiler:bool"
      - "helpful_count:int"
      - "created_at:datetime"
  - name: "Channel"
    fields:
      - "name:str"
      - "description:text"
      - "logo:str"
      - "banner:str"
      - "owner_id:int"
      - "is_verified:bool"
      - "subscriber_count:int"
      - "created_at:datetime"
  - name: "Payment"
    fields:
      - "user_id:int"
      - "subscription_id:int"
      - "amount:float"
      - "currency:str"
      - "status:str"
      - "stripe_charge_id:str"
      - "billing_period_start:date"
      - "billing_period_end:date"
      - "created_at:datetime"

workflow:
  typical_paths:
    - "Usuario se registra → Selecciona plan de suscripción → Realiza pago → Accede al catálogo → Reproduce contenido"
    - "Administrador carga contenido → Asigna canal y categoría → Publica → Usuarios descubren y reproducen"
    - "Usuario crea lista de reproducción → Agrega contenidos → Comparte o mantiene privada"
  triggers:
    - "subscription_expired:Suspender acceso premium cuando la suscripción expira y notificar al usuario"
    - "payment_failed:Notificar al usuario sobre fallo en el pago e intentar reintento automático"
    - "content_published:Enviar notificación a suscriptores del canal sobre nuevo contenido disponible"
    - "playback_progress:Guardar progreso de reproducción cada 10 segundos para reanudar después"
    - "subscription_renewal:Renovar automáticamente suscripciones con pago recurrente"

features:
  core:
    - "Reproductor de video adaptativo con soporte multi-resolución"
    - "Gestión de catálogo de contenidos con categorización y búsqueda avanzada"
    - "Sistema de suscripciones con planes escalonados y pagos recurrentes"
    - "Perfiles de usuario con preferencias y historial de reproducción"
    - "Sistema de canales con suscripción y notificaciones"
  advanced:
    - "Algoritmo de recomendación basado en historial de visualización"
    - "Dashboard analítico con métricas de engagement y retención"
    - "Gestión de DRM para protección de contenido con licencias"
    - "Sistema de valoraciones y reseñas de contenidos"
  optional:
    - "Descarga offline de contenidos para visualización sin conexión"
    - "Transmisión en vivo con chat en tiempo real"
    - "Soporte para múltiples perfiles por cuenta familiar"
    - "Integración con redes sociales para compartir contenido"
    - "Sistema de códigos promocionales y cupones de descuento"

risk_assessment:
  data_sensitivity: "high"
  compliance:
    - GDPR
    - PCI-DSS
    - DMCA
  backup_frequency: "hourly"
  access_control: "rbac"
  audit_trail: true
