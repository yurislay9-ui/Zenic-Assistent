niche:
  name: "fundraising"
  domain: "nonprofit"
  subdomain: "fundraising_events"
  description: "Plataforma de recaudación de fondos para organizaciones sin ánimo de lucro que gestiona campañas, eventos, subastas, equipos de recaudadores, metas y comunicaciones con donantes."
  scale: "medium"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - stripe_payments
    - email_smtp
    - notification_manager
    - pdf_generator
    - data_analyzer
    - crud_service
    - report_generator
    - backup_restore
  variables:
    project_name: "fundraising"
    app_name: "Fundraising"
    template_type: "niche"
    db_name: "fundraising.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Campaign"
    fields:
      - "campaign_id:uuid"
      - "name:str"
      - "description:str"
      - "campaign_type:str"
      - "goal_amount:float"
      - "raised_amount:float"
      - "currency:str"
      - "start_date:date"
      - "end_date:date"
      - "status:str"
      - "visibility:str"
      - "cover_image:str"

  - name: "Donor"
    fields:
      - "donor_id:uuid"
      - "first_name:str"
      - "last_name:str"
      - "email:str"
      - "phone:str"
      - "address:str"
      - "city:str"
      - "country:str"
      - "donor_type:str"
      - "total_donated:float"
      - "last_donation_date:date"
      - "status:str"

  - name: "Donation"
    fields:
      - "donation_id:uuid"
      - "donor_id:uuid"
      - "campaign_id:uuid"
      - "amount:float"
      - "currency:str"
      - "payment_method:str"
      - "transaction_id:str"
      - "donation_date:datetime"
      - "anonymous:bool"
      - "recurring:bool"
      - "status:str"
      - "dedication:str"

  - name: "Event"
    fields:
      - "event_id:uuid"
      - "name:str"
      - "description:str"
      - "event_type:str"
      - "venue:str"
      - "start_datetime:datetime"
      - "end_datetime:datetime"
      - "capacity:int"
      - "registered_count:int"
      - "ticket_price:float"
      - "status:str"
      - "campaign_id:uuid"

  - name: "Auction"
    fields:
      - "auction_id:uuid"
      - "event_id:uuid"
      - "item_name:str"
      - "description:str"
      - "starting_bid:float"
      - "current_bid:float"
      - "buy_now_price:float"
      - "bid_increment:float"
      - "opening_time:datetime"
      - "closing_time:datetime"
      - "winner_id:uuid"
      - "status:str"

  - name: "Team"
    fields:
      - "team_id:uuid"
      - "name:str"
      - "campaign_id:uuid"
      - "captain:str"
      - "members_count:int"
      - "goal_amount:float"
      - "raised_amount:float"
      - "status:str"
      - "created_date:date"

  - name: "Goal"
    fields:
      - "goal_id:uuid"
      - "campaign_id:uuid"
      - "name:str"
      - "target_amount:float"
      - "current_amount:float"
      - "deadline:date"
      - "priority:str"
      - "status:str"
      - "description:str"
      - "progress_pct:float"

  - name: "Communication"
    fields:
      - "communication_id:uuid"
      - "campaign_id:uuid"
      - "type:str"
      - "subject:str"
      - "content:str"
      - "target_segment:str"
      - "sent_date:datetime"
      - "recipient_count:int"
      - "open_rate:float"
      - "click_rate:float"
      - "status:str"

workflow:
  typical_paths:
    - "Creación de campaña → Definición de metas → Composición de equipos → Lanzamiento → Recepción de donaciones → Seguimiento de progreso → Cierre → Informe de resultados"
    - "Planificación de evento → Creación de subastas → Registro de asistentes → Ejecución del evento → Pujas y ventas → Facturación → Agradecimientos → Liquidación"
    - "Segmentación de donantes → Diseño de comunicación → Envío masivo → Seguimiento de respuestas → Donaciones resultantes → Análisis de efectividad"
  triggers:
    - "donation_received:Notificación al equipo y agradecimiento automático al donante tras recibir una donación"
    - "goal_reached:Celebración y comunicación cuando una meta de campaña se alcanza"
    - "auction_outbid:Notificación al puja anterior cuando su oferta ha sido superada en una subasta"
    - "event_reminder:Recordatorio a asistentes registrados antes del evento"
    - "campaign_ending_soon:Alerta cuando una campaña se acerca a su fecha de cierre sin alcanzar la meta"

features:
  core:
    - "Gestión de campañas de recaudación con seguimiento en tiempo real de progreso hacia la meta"
    - "Procesamiento de donaciones con integración Stripe para pagos seguros y recurrentes"
    - "Organización de eventos benéficos con registro de asistentes y gestión de entradas"
    - "Sistema de subastas con pujas en tiempo real, ofertas automáticas y cierre programado"
    - "Equipos de recaudadores con páginas personalizadas y competencias internas"
    - "Comunicaciones masivas con segmentación y métricas de apertura y respuesta"
  advanced:
    - "Análisis de efectividad de campañas con ROI por canal y tipo de comunicación"
    - "Predicción de recaudación basada en datos históricos y patrones de donación"
    - "Matching de donaciones corporativas con verificación automática de elegibilidad"
    - "Optimización de momento de envío de comunicaciones basada en comportamiento histórico"
  optional:
    - "Integración con redes sociales para campañas virales y sharing de donaciones"
    - "Módulo de crowdfunding con recompensas por nivel de contribución"
    - "Páginas de tributo y memoriales para donaciones en honor a personas"
    - "Dashboard de impacto con visualización del uso de fondos y resultados del programa"

risk_assessment:
  data_sensitivity: "high"
  compliance:
    - "PCI-DSS"
    - "GDPR"
    - "IRS"
  backup_frequency: "daily"
  access_control: "basic"
  audit_trail: true
