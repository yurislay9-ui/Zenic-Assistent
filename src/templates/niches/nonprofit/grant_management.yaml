niche:
  name: "grant_management"
  domain: "nonprofit"
  subdomain: "grants"
  description: "Sistema de gestión de subvenciones para organizaciones sin ánimo de lucro que administra el ciclo completo de becas y donaciones institucionales, desde la solicitud hasta la rendición de cuentas y cumplimiento normativo."
  scale: "medium"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - rbac
    - email_smtp
    - notification_manager
    - task_scheduler
    - pdf_generator
    - crud_service
    - report_generator
    - backup_restore
  variables:
    project_name: "grant_management"
    app_name: "GrantManagement"
    template_type: "niche"
    db_name: "grant_management.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Grant"
    fields:
      - "grant_id:uuid"
      - "title:str"
      - "description:str"
      - "funder_id:uuid"
      - "amount:float"
      - "currency:str"
      - "start_date:date"
      - "end_date:date"
      - "status:str"
      - "category:str"
      - "restrictions:str"
      - "reporting_frequency:str"

  - name: "Application"
    fields:
      - "application_id:uuid"
      - "grant_id:uuid"
      - "applicant:str"
      - "title:str"
      - "requested_amount:float"
      - "submission_date:date"
      - "status:str"
      - "reviewer:str"
      - "score:float"
      - "decision_date:date"
      - "decision:str"
      - "feedback:str"

  - name: "Funder"
    fields:
      - "funder_id:uuid"
      - "name:str"
      - "type:str"
      - "contact_person:str"
      - "email:str"
      - "phone:str"
      - "address:str"
      - "country:str"
      - "funding_priorities:str"
      - "average_grant_size:float"
      - "status:str"

  - name: "Budget"
    fields:
      - "budget_id:uuid"
      - "grant_id:uuid"
      - "category:str"
      - "allocated_amount:float"
      - "spent_amount:float"
      - "remaining_amount:float"
      - "period:str"
      - "description:str"
      - "status:str"
      - "approved:bool"

  - name: "Milestone"
    fields:
      - "milestone_id:uuid"
      - "grant_id:uuid"
      - "name:str"
      - "description:str"
      - "target_date:date"
      - "completed_date:date"
      - "deliverables:str"
      - "status:str"
      - "progress_pct:float"
      - "disbursement_amount:float"

  - name: "Report"
    fields:
      - "report_id:uuid"
      - "grant_id:uuid"
      - "report_type:str"
      - "period_start:date"
      - "period_end:date"
      - "submitted_date:date"
      - "author:str"
      - "status:str"
      - "funder_approval:bool"
      - "file_path:str"
      - "notes:str"

  - name: "Deadline"
    fields:
      - "deadline_id:uuid"
      - "grant_id:uuid"
      - "type:str"
      - "due_date:date"
      - "description:str"
      - "notify_days_before:int"
      - "status:str"
      - "completed:bool"
      - "completed_date:date"

  - name: "Compliance"
    fields:
      - "compliance_id:uuid"
      - "grant_id:uuid"
      - "requirement:str"
      - "category:str"
      - "frequency:str"
      - "responsible:str"
      - "last_review:date"
      - "next_review:date"
      - "status:str"
      - "evidence_path:str"
      - "notes:str"

workflow:
  typical_paths:
    - "Identificación de financiador → Preparación de solicitud → Presentación → Revisión → Aprobación → Firma de acuerdo → Desembolso → Ejecución → Informes → Cierre"
    - "Recepción de subvención → Planificación de presupuesto → Definición de hitos → Ejecución → Seguimiento de gastos → Informes de progreso → Rendición final"
    - "Registro de requisito de cumplimiento → Asignación de responsable → Recopilación de evidencia → Revisión → Documentación → Próxima revisión programada"
  triggers:
    - "deadline_approaching:Notificación automática cuando se acerca una fecha límite de informe o entrega"
    - "milestone_due:Aviso al equipo responsable cuando un hito del proyecto está próximo a vencer"
    - "budget_threshold:Alerta cuando el gasto en una categoría presupuestaria supera el umbral configurado"
    - "report_due:Recordatorio para la preparación y envío de informes periódicos al financiador"
    - "compliance_review:Notificación cuando se acerca la fecha de revisión de un requisito de cumplimiento"

features:
  core:
    - "Gestión completa del ciclo de vida de subvenciones desde solicitud hasta cierre y rendición"
    - "Portal de financiadores con perfil, prioridades y seguimiento de relaciones"
    - "Presupuesto por categorías con control de gastos y alertas de sobrepasamiento"
    - "Sistema de hitos con seguimiento de progreso y desembolsos asociados"
    - "Gestión de plazos y fechas límite con notificaciones escalonadas"
    - "Módulo de cumplimiento normativo con verificación y evidencia documental"
  advanced:
    - "Análisis de probabilidad de aprobación basado en historial de solicitudes y perfil del financiador"
    - "Dashboard de rendimiento de subvenciones con KPIs de ejecución presupuestaria y cumplimiento"
    - "Motor de plantillas para generación automatizada de informes en formato exigido por financiadores"
    - "Análisis de diversificación de fuentes de financiación y riesgo de dependencia"
  optional:
    - "Integración con sistemas contables para conciliación automática de gastos"
    - "Portal colaborativo para co-solicitud con múltiples organizaciones"
    - "Módulo de evaluación de impacto con indicadores personalizados por programa"
    - "Integración con bases de datos de convocatorias públicas y privadas"

risk_assessment:
  data_sensitivity: "high"
  compliance:
    - "GDPR"
    - "OMB"
  backup_frequency: "daily"
  access_control: "rbac"
  audit_trail: true
