niche:
  name: "volunteer"
  domain: "nonprofit"
  subdomain: "volunteer_management"
  description: "Sistema de gestión de voluntarios para organizaciones sin ánimo de lucro que permite la coordinación de oportunidades, turnos, habilidades, seguimiento de horas, eventos y retroalimentación."
  scale: "medium"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - email_smtp
    - notification_manager
    - task_scheduler
    - crud_service
    - report_generator
    - pdf_generator
    - backup_restore
  variables:
    project_name: "volunteer"
    app_name: "Volunteer"
    template_type: "niche"
    db_name: "volunteer.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Volunteer"
    fields:
      - "volunteer_id:uuid"
      - "first_name:str"
      - "last_name:str"
      - "email:str"
      - "phone:str"
      - "address:str"
      - "city:str"
      - "date_of_birth:date"
      - "emergency_contact:str"
      - "registration_date:date"
      - "status:str"
      - "total_hours:float"

  - name: "Opportunity"
    fields:
      - "opportunity_id:uuid"
      - "title:str"
      - "description:str"
      - "category:str"
      - "location:str"
      - "start_date:date"
      - "end_date:date"
      - "required_skills:str"
      - "min_volunteers:int"
      - "max_volunteers:int"
      - "status:str"
      - "coordinator_id:uuid"

  - name: "Shift"
    fields:
      - "shift_id:uuid"
      - "opportunity_id:uuid"
      - "date:date"
      - "start_time:time"
      - "end_time:time"
      - "volunteers_needed:int"
      - "volunteers_registered:int"
      - "location:str"
      - "status:str"
      - "notes:str"

  - name: "Skill"
    fields:
      - "skill_id:uuid"
      - "name:str"
      - "category:str"
      - "description:str"
      - "certification_required:bool"
      - "level:str"
      - "status:str"

  - name: "Hour"
    fields:
      - "hour_id:uuid"
      - "volunteer_id:uuid"
      - "opportunity_id:uuid"
      - "shift_id:uuid"
      - "date:date"
      - "hours_worked:float"
      - "verified:bool"
      - "verified_by:str"
      - "notes:str"
      - "status:str"

  - name: "Event"
    fields:
      - "event_id:uuid"
      - "name:str"
      - "description:str"
      - "event_type:str"
      - "location:str"
      - "start_date:datetime"
      - "end_date:datetime"
      - "expected_attendees:int"
      - "actual_attendees:int"
      - "status:str"
      - "coordinator_id:uuid"
      - "budget:float"

  - name: "Coordinator"
    fields:
      - "coordinator_id:uuid"
      - "first_name:str"
      - "last_name:str"
      - "email:str"
      - "phone:str"
      - "department:str"
      - "role:str"
      - "active:bool"
      - "volunteers_managed:int"
      - "registration_date:date"

  - name: "Feedback"
    fields:
      - "feedback_id:uuid"
      - "volunteer_id:uuid"
      - "opportunity_id:uuid"
      - "event_id:uuid"
      - "rating:int"
      - "comment:str"
      - "submitted_date:date"
      - "category:str"
      - "follow_up_required:bool"
      - "status:str"

workflow:
  typical_paths:
    - "Registro de voluntario → Evaluación de habilidades → Asignación a oportunidad → Registro en turnos → Registro de horas → Verificación → Certificado de participación"
    - "Creación de oportunidad → Definición de turnos y requisitos → Publicación → Inscripciones de voluntarios → Asignación → Ejecución → Retroalimentación"
    - "Planificación de evento → Coordinación de oportunidades → Asignación de coordinadores → Ejecución → Registro de asistencia → Evaluación"
  triggers:
    - "shift_reminder:Recordatorio automático al voluntario antes de su turno asignado"
    - "hours_unverified:Notificación al coordinador cuando hay horas de voluntario pendientes de verificación"
    - "volunteer_shortage:Alerta cuando una oportunidad no tiene suficientes voluntarios inscritos cerca de la fecha"
    - "skill_gap:Aviso cuando una oportunidad requiere habilidades no cubiertas por los voluntarios registrados"
    - "feedback_request:Envío automático de solicitud de retroalimentación tras completar un turno o evento"

features:
  core:
    - "Portal de voluntarios con registro, búsqueda de oportunidades y autogestión de turnos"
    - "Gestión de oportunidades con definición de requisitos, turnos y cupos disponibles"
    - "Sistema de registro y verificación de horas de voluntariado con aprobación por coordinador"
    - "Catálogo de habilidades con matching automático entre perfiles y oportunidades"
    - "Gestión de eventos con coordinación de voluntarios y seguimiento de asistencia"
    - "Generación de certificados y reportes de participación en PDF"
  advanced:
    - "Matching inteligente de voluntarios basado en habilidades, disponibilidad y preferencias"
    - "Análisis de retención de voluntarios con identificación de factores de abandono"
    - "Dashboard de métricas de impacto con horas por categoría, evento y voluntario"
    - "Gamificación con insignias, niveles y reconocimientos por acumulación de horas"
  optional:
    - "Integración con plataformas de verificación de antecedentes penales"
    - "Módulo de formación en línea con cursos obligatorios previos al voluntariado"
    - "App móvil con check-in geolocalizado para registro de asistencia"
    - "Integración con calendarios externos y herramientas de comunicación por equipos"

risk_assessment:
  data_sensitivity: "medium"
  compliance:
    - "GDPR"
  backup_frequency: "daily"
  access_control: "basic"
  audit_trail: true
