niche:
  name: "construction"
  domain: "real_estate"
  subdomain: "construction"
  description: "Sistema de gestión de construcción para administración de proyectos, fases, tareas, trabajadores, materiales, equipos, permisos, presupuestos y seguridad laboral"
  scale: "large"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - rbac
    - task_scheduler
    - inventory_tracker
    - email_smtp
    - notification_manager
    - pdf_generator
    - crud_service
    - report_generator
    - backup_restore
  variables:
    project_name: "construction"
    app_name: "Construction"
    template_type: "project"
    db_name: "construction.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Project"
    fields:
      - "name:str"
      - "client:str"
      - "location:str"
      - "type:str"
      - "status:str"
      - "budget:float"
      - "spent:float"
      - "start_date:date"
      - "end_date:date"
      - "progress_pct:float"
      - "manager:str"
      - "description:text"

  - name: "Phase"
    fields:
      - "project_id:int"
      - "name:str"
      - "order:int"
      - "status:str"
      - "start_date:date"
      - "end_date:date"
      - "budget:float"
      - "spent:float"
      - "progress_pct:float"
      - "dependencies:json"
      - "deliverables:json"

  - name: "Task"
    fields:
      - "phase_id:int"
      - "project_id:int"
      - "name:str"
      - "description:text"
      - "assigned_to:str"
      - "status:str"
      - "priority:str"
      - "estimated_hours:float"
      - "actual_hours:float"
      - "start_date:date"
      - "due_date:date"
      - "completed_at:datetime"

  - name: "Worker"
    fields:
      - "first_name:str"
      - "last_name:str"
      - "role:str"
      - "specialty:str"
      - "phone:str"
      - "email:str"
      - "hourly_rate:float"
      - "certifications:json"
      - "status:str"
      - "hire_date:date"
      - "emergency_contact:str"

  - name: "Material"
    fields:
      - "name:str"
      - "category:str"
      - "unit:str"
      - "quantity_on_hand:float"
      - "quantity_allocated:float"
      - "unit_cost:float"
      - "supplier:str"
      - "reorder_level:float"
      - "lead_time_days:int"
      - "location:str"
      - "specs:json"

  - name: "Equipment"
    fields:
      - "name:str"
      - "type:str"
      - "model:str"
      - "serial_number:str"
      - "status:str"
      - "daily_rate:float"
      - "location:str"
      - "last_maintenance:date"
      - "next_maintenance:date"
      - "operator:str"
      - "certification_required:str"

  - name: "Permit"
    fields:
      - "project_id:int"
      - "type:str"
      - "authority:str"
      - "number:str"
      - "status:str"
      - "applied_date:date"
      - "issued_date:date"
      - "expiry_date:date"
      - "conditions:text"
      - "document_path:str"

  - name: "Budget"
    fields:
      - "project_id:int"
      - "category:str"
      - "allocated:float"
      - "committed:float"
      - "spent:float"
      - "remaining:float"
      - "forecast:float"
      - "variance:float"
      - "period:str"
      - "approved_by:str"

  - name: "Timeline"
    fields:
      - "project_id:int"
      - "milestone:str"
      - "planned_start:date"
      - "planned_end:date"
      - "actual_start:date"
      - "actual_end:date"
      - "variance_days:int"
      - "critical_path:bool"
      - "status:str"
      - "notes:text"

  - name: "SafetyIncident"
    fields:
      - "project_id:int"
      - "type:str"
      - "severity:str"
      - "description:text"
      - "location:str"
      - "reported_by:str"
      - "involved_workers:json"
      - "root_cause:text"
      - "corrective_action:text"
      - "reported_at:datetime"
      - "resolved_at:datetime"
      - "osha_reportable:bool"

workflow:
  typical_paths:
    - "Crear proyecto → Definir fases → Asignar presupuesto → Obtener permisos → Programar tareas → Asignar trabajadores → Monitorear progreso → Cerrar proyecto"
    - "Solicitar material → Verificar inventario → Generar orden de compra → Recibir material → Actualizar stock → Asignar a tarea"
    - "Reportar incidente de seguridad → Investigar causa raíz → Implementar acciones correctivas → Documentar → Reportar a OSHA si aplica"
  triggers:
    - "phase_completed:Notificar al gerente y desbloquear la siguiente fase cuando se completan todos los entregables"
    - "budget_threshold:Alertar cuando el gasto de una categoría supera el 80% del presupuesto asignado"
    - "permit_expiring:Notificar al equipo 30 días antes del vencimiento de un permiso para renovación"
    - "material_low:Generar orden de reorden cuando el stock de un material cae por debajo del nivel mínimo"
    - "safety_incident_reported:Escalar incidentes graves al gerente de proyecto y al oficial de seguridad inmediatamente"

features:
  core:
    - "Gestión de proyectos con fases, tareas y línea de tiempo crítica con diagrama de Gantt"
    - "Seguimiento de presupuesto por categoría con alertas de sobrecosto y forecast automático"
    - "Administración de inventario de materiales con seguimiento de stock y reorden automático"
    - "Gestión de equipos con programación de mantenimiento y certificaciones de operadores"
    - "Sistema de permisos con seguimiento de estado y alertas de vencimiento"
    - "Reportes de seguridad con documentación de incidentes y acciones correctivas"
  advanced:
    - "Análisis de ruta crítica con optimización automática de la programación del proyecto"
    - "Forecasting de costos con detección temprana de desviaciones presupuestarias"
    - "Gestión de subcontratistas con seguimiento de cumplimiento y evaluación de desempeño"
    - "Dashboard de seguridad en tiempo real con métricas de incidentes y días sin accidentes"
    - "Integración con BIM para visualización del progreso de construcción en 3D"
  optional:
    - "App móvil para trabajadores con check-in de sitio y reporte de incidentes"
    - "Integración con drones para inspección visual y medición de progreso"
    - "Sistema de calidad con inspecciones y checklist de verificación por fase"
    - "Módulo de sostenibilidad con seguimiento de residuos y huella de carbono"
    - "Reportes regulatorios automatizados para OSHA y autoridades locales"

risk_assessment:
  data_sensitivity: "medium"
  compliance: [OSHA, Building Code]
  backup_frequency: "daily"
  access_control: "rbac"
  audit_trail: true
