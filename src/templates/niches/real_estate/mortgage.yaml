niche:
  name: "mortgage"
  domain: "real_estate"
  subdomain: "finance"
  description: "Sistema de gestión hipotecaria para procesamiento de solicitudes, evaluación de solicitantes, propiedades, tasas de interés, pagos, documentos, aprobaciones y tablas de amortización"
  scale: "medium"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - rbac
    - invoice_calculator
    - pdf_generator
    - email_smtp
    - notification_manager
    - crud_service
    - report_generator
    - backup_restore
  variables:
    project_name: "mortgage"
    app_name: "Mortgage"
    template_type: "finance"
    db_name: "mortgage.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Applicant"
    fields:
      - "first_name:str"
      - "last_name:str"
      - "email:str"
      - "phone:str"
      - "ssn_encrypted:str"
      - "date_of_birth:date"
      - "annual_income:float"
      - "employment_status:str"
      - "employer:str"
      - "years_employed:float"
      - "credit_score:int"
      - "debt_to_income_ratio:float"

  - name: "Application"
    fields:
      - "applicant_id:int"
      - "property_id:int"
      - "loan_amount:float"
      - "loan_term_months:int"
      - "loan_type:str"
      - "purpose:str"
      - "status:str"
      - "originator:str"
      - "submitted_at:datetime"
      - "underwriter:str"
      - "decision_at:datetime"
      - "documents:json"

  - name: "Property"
    fields:
      - "address:str"
      - "city:str"
      - "state:str"
      - "zip_code:str"
      - "type:str"
      - "year_built:int"
      - "square_feet:float"
      - "appraised_value:float"
      - "purchase_price:float"
      - "lot_size:float"
      - "appraisal_date:date"
      - "appraiser:str"

  - name: "Rate"
    fields:
      - "loan_type:str"
      - "term_months:int"
      - "interest_rate:float"
      - "apr:float"
      - "points:float"
      - "lock_period_days:int"
      - "effective_date:date"
      - "expiry_date:date"
      - "min_credit_score:int"
      - "max_ltv:float"
      - "source:str"

  - name: "Payment"
    fields:
      - "application_id:int"
      - "amount:float"
      - "principal:float"
      - "interest:float"
      - "escrow:float"
      - "payment_number:int"
      - "due_date:date"
      - "paid_date:date"
      - "status:str"
      - "late_fee:float"
      - "extra_payment:float"

  - name: "Document"
    fields:
      - "application_id:int"
      - "name:str"
      - "type:str"
      - "category:str"
      - "file_path:str"
      - "file_size:int"
      - "mime_type:str"
      - "uploaded_by:str"
      - "verified:bool"
      - "verified_by:str"
      - "uploaded_at:datetime"

  - name: "Approval"
    fields:
      - "application_id:int"
      - "decision:str"
      - "conditions:json"
      - "approved_amount:float"
      - "approved_rate:float"
      - "approved_term:int"
      - "reviewer:str"
      - "review_notes:text"
      - "decision_at:datetime"
      - "expires_at:datetime"

  - name: "Amortization"
    fields:
      - "application_id:int"
      - "payment_number:int"
      - "payment_date:date"
      - "payment_amount:float"
      - "principal:float"
      - "interest:float"
      - "balance:float"
      - "cumulative_interest:float"
      - "cumulative_principal:float"
      - "ltv_ratio:float"

workflow:
  typical_paths:
    - "Recibir solicitud → Verificar identidad → Evaluar crédito → Tasar propiedad → Calcular LTV → Decidir aprobación → Generar tabla de amortización → Cierre"
    - "Solicitante aplica → Recopilar documentos → Verificar ingresos → Verificar empleo → Revisión de subscripción → Condiciones → Aprobación final → Fondos"
    - "Calcular cuota mensual → Programar pagos → Procesar pago → Distribuir principal/interés/escrow → Actualizar balance → Generar estado de cuenta"
  triggers:
    - "application_submitted:Iniciar flujo de verificación y notificar al originador al recibir nueva solicitud"
    - "credit_check_complete:Actualizar estado de la aplicación con los resultados de la verificación crediticia"
    - "appraisal_completed:Calcular LTV y notificar al subscripcor cuando la tasación de la propiedad finaliza"
    - "payment_due:Enviar recordatorio de pago al solicitante 10 días antes de la fecha de vencimiento"
    - "document_requested:Notificar al solicitante cuando se requieren documentos adicionales para el proceso"

features:
  core:
    - "Procesamiento de solicitudes hipotecarias con flujo de trabajo configurable por etapa"
    - "Evaluación automática de crédito con cálculo de DTI y verificación de score"
    - "Generación de tablas de amortización con cálculo de principal, interés y balance"
    - "Gestión documental con verificación y categorización de documentos requeridos"
    - "Cálculo de LTV y ratios de préstamo con validación de límites por tipo de producto"
  advanced:
    - "Motor de subscripción automatizado con reglas de decisión basadas en políticas del prestamista"
    - "Análisis comparativo de tasas con optimización de producto para el solicitante"
    - "Gestión de escrow con cálculo de impuestos y seguros proyectados"
    - "Dashboard de pipeline con métricas de conversión, tiempo de ciclo y pull-through rate"
    - "Integración con servicios de verificación de empleo e ingresos (VOE/VOI)"
  optional:
    - "Portal del solicitante con carga de documentos y seguimiento del estado de la aplicación"
    - "Integración con sistemas de servicio de títulos y seguros de título"
    - "Calculadoras interactivas de capacidad de préstamo y estimación de cuotas"
    - "Reportes regulatorios automatizados para HMDA y TRID"
    - "API para integración con sistemas de originación de terceros"

risk_assessment:
  data_sensitivity: "critical"
  compliance: [TILA, RESPA, GDPR]
  backup_frequency: "hourly"
  access_control: "rbac"
  audit_trail: true
