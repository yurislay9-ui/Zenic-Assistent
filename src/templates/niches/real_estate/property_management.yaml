niche:
  name: "property_management"
  domain: "real_estate"
  subdomain: "management"
  description: "Sistema integral de gestión inmobiliaria para administración de propiedades, unidades, inquilinos, arrendamientos, pagos, mantenimiento y gastos con reportes detallados"
  scale: "large"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - rbac
    - email_smtp
    - stripe_payments
    - invoice_calculator
    - notification_manager
    - task_scheduler
    - crud_service
    - report_generator
    - pdf_generator
    - backup_restore
  variables:
    project_name: "property_management"
    app_name: "PropertyManagement"
    template_type: "management"
    db_name: "property_management.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Property"
    fields:
      - "name:str"
      - "address:str"
      - "city:str"
      - "state:str"
      - "zip_code:str"
      - "type:str"
      - "total_units:int"
      - "square_feet:float"
      - "year_built:int"
      - "owner_id:int"
      - "purchase_price:float"
      - "current_value:float"
      - "tax_id:str"

  - name: "Unit"
    fields:
      - "property_id:int"
      - "unit_number:str"
      - "type:str"
      - "bedrooms:int"
      - "bathrooms:float"
      - "square_feet:float"
      - "rent_amount:float"
      - "deposit_amount:float"
      - "status:str"
      - "floor_plan:str"
      - "amenities:json"

  - name: "Tenant"
    fields:
      - "first_name:str"
      - "last_name:str"
      - "email:str"
      - "phone:str"
      - "ssn_encrypted:str"
      - "date_of_birth:date"
      - "emergency_contact:str"
      - "employment_info:json"
      - "status:str"
      - "move_in_date:date"
      - "created_at:datetime"

  - name: "Lease"
    fields:
      - "unit_id:int"
      - "tenant_id:int"
      - "start_date:date"
      - "end_date:date"
      - "monthly_rent:float"
      - "deposit:float"
      - "status:str"
      - "terms:text"
      - "renewal_option:bool"
      - "notice_period_days:int"
      - "signed_at:datetime"
      - "document_path:str"

  - name: "Payment"
    fields:
      - "lease_id:int"
      - "tenant_id:int"
      - "amount:float"
      - "type:str"
      - "method:str"
      - "status:str"
      - "due_date:date"
      - "paid_date:date"
      - "late_fee:float"
      - "stripe_transaction_id:str"
      - "reference:str"

  - name: "Maintenance"
    fields:
      - "property_id:int"
      - "unit_id:int"
      - "tenant_id:int"
      - "category:str"
      - "priority:str"
      - "description:text"
      - "status:str"
      - "assigned_to:str"
      - "estimated_cost:float"
      - "actual_cost:float"
      - "requested_at:datetime"
      - "completed_at:datetime"

  - name: "Owner"
    fields:
      - "name:str"
      - "email:str"
      - "phone:str"
      - "tax_id:str"
      - "address:str"
      - "ownership_pct:float"
      - "bank_account_encrypted:str"
      - "preferred_contact:str"
      - "notes:text"
      - "created_at:datetime"

  - name: "Expense"
    fields:
      - "property_id:int"
      - "category:str"
      - "amount:float"
      - "vendor:str"
      - "invoice_number:str"
      - "date:date"
      - "recurring:bool"
      - "frequency:str"
      - "description:text"
      - "receipt_path:str"
      - "approved_by:str"

workflow:
  typical_paths:
    - "Registrar propiedad → Crear unidades → Asignar propietario → Publicar disponibilidad → Recibir solicitud → Firmar arrendamiento → Registrar inquilino"
    - "Inquilino reporta mantenimiento → Crear orden → Asignar técnico → Programar visita → Completar reparación → Facturar gasto → Actualizar estado"
    - "Generar factura mensual → Enviar al inquilino → Recibir pago → Registrar en sistema → Distribuir al propietario → Generar reporte financiero"
  triggers:
    - "lease_expiring:Notificar al inquilino y administrador 60 días antes del vencimiento del arrendamiento"
    - "payment_overdue:Generar cargo por mora y notificar al inquilino cuando un pago está vencido"
    - "maintenance_urgent:Escalar automáticamente solicitudes de mantenimiento de alta prioridad al equipo de emergencia"
    - "payment_received:Enviar recibo al inquilino y actualizar balance del arrendamiento al recibir un pago"
    - "expense_approved:Programar pago al proveedor y actualizar reportes financieros del propietario"

features:
  core:
    - "Gestión completa de propiedades con seguimiento de unidades, ocupación y valores de mercado"
    - "Administración de arrendamientos con generación automática de contratos y renovaciones"
    - "Procesamiento de pagos integrado con Stripe con recordatorios automáticos y cargos por mora"
    - "Sistema de solicitudes de mantenimiento con asignación y seguimiento en tiempo real"
    - "Portal de inquilinos para pagos online, solicitudes y comunicación con administración"
    - "Gestión financiera con seguimiento de ingresos, gastos y distribuciones a propietarios"
  advanced:
    - "Cálculo automático de rentabilidad por propiedad con ROI y flujo de caja proyectado"
    - "Verificación de antecedentes de inquilinos con integración a servicios de screening"
    - "Programación de mantenimiento preventivo con calendario y asignación automatizada"
    - "Análisis de mercado con comparables de renta y sugerencias de ajuste de precios"
    - "Dashboard financiero con P&L por propiedad, vacancia y métricas de rendimiento"
  optional:
    - "Portal de propietarios con acceso a reportes financieros y documentos fiscales"
    - "Integración con plataformas de listado para publicidad automática de unidades disponibles"
    - "Sistema de inspecciones con checklist digital y documentación fotográfica"
    - "Módulo de contabilidad con integración a QuickBooks y Xero"
    - "Notificaciones por SMS además de email para comunicaciones críticas"

risk_assessment:
  data_sensitivity: "high"
  compliance: [GDPR, Fair Housing]
  backup_frequency: "daily"
  access_control: "rbac"
  audit_trail: true
