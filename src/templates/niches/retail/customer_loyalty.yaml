niche:
  name: "customer_loyalty"
  domain: "retail"
  subdomain: "customer_loyalty"
  description: "Programa de fidelización de clientes que gestiona acumulación de puntos, niveles de membresía, recompensas, cupones y beneficios exclusivos para incrementar la retención y el valor del ciclo de vida del cliente."
  scale: "medium"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - email_smtp
    - notification_manager
    - data_analyzer
    - crud_service
    - report_generator
    - pdf_generator
  variables:
    project_name: "customer_loyalty"
    app_name: "CustomerLoyalty"
    template_type: "retail"
    db_name: "customer_loyalty.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Customer"
    fields:
      - "id:uuid"
      - "full_name:str"
      - "email:str"
      - "phone:str"
      - "tier_id:uuid"
      - "total_points:int"
      - "available_points:int"
      - "lifetime_value:decimal"
      - "total_transactions:int"
      - "enrolled_at:datetime"
      - "status:str"
      - "created_at:datetime"
  - name: "Points"
    fields:
      - "id:uuid"
      - "customer_id:uuid"
      - "transaction_id:uuid"
      - "amount:int"
      - "balance:int"
      - "type:str"
      - "source:str"
      - "expires_at:datetime"
      - "created_at:datetime"
  - name: "Reward"
    fields:
      - "id:uuid"
      - "name:str"
      - "description:text"
      - "points_cost:int"
      - "type:str"
      - "value:json"
      - "min_tier_id:uuid"
      - "stock:int"
      - "active:bool"
      - "image_url:str"
      - "created_at:datetime"
  - name: "Tier"
    fields:
      - "id:uuid"
      - "name:str"
      - "description:text"
      - "min_points:int"
      - "max_points:int"
      - "benefits:json"
      - "points_multiplier:decimal"
      - "color:str"
      - "icon:str"
      - "sort_order:int"
      - "active:bool"
  - name: "Transaction"
    fields:
      - "id:uuid"
      - "customer_id:uuid"
      - "amount:decimal"
      - "points_earned:int"
      - "store_id:uuid"
      - "channel:str"
      - "reference:str"
      - "type:str"
      - "created_at:datetime"
  - name: "Coupon"
    fields:
      - "id:uuid"
      - "code:str"
      - "description:text"
      - "discount_type:str"
      - "discount_value:decimal"
      - "min_purchase:decimal"
      - "max_uses:int"
      - "current_uses:int"
      - "valid_from:datetime"
      - "valid_until:datetime"
      - "active:bool"
  - name: "Redemption"
    fields:
      - "id:uuid"
      - "customer_id:uuid"
      - "reward_id:uuid"
      - "points_spent:int"
      - "status:str"
      - "redemption_code:str"
      - "redeemed_at:datetime"
      - "expires_at:datetime"
      - "created_at:datetime"
  - name: "Benefit"
    fields:
      - "id:uuid"
      - "tier_id:uuid"
      - "name:str"
      - "description:text"
      - "type:str"
      - "value:json"
      - "active:bool"
      - "sort_order:int"
      - "created_at:datetime"

workflow:
  typical_paths:
    - "Cliente se registra en el programa → Realiza compras → Acumula puntos → Alcanza nuevo nivel → Desbloquea beneficios exclusivos → Canjea puntos por recompensas"
    - "Administrador define niveles y beneficios → Configura reglas de acumulación → Crea recompensas → Asigna cupones a segmentos → Monitorea engagement"
    - "Cliente recibe cupón → Realiza compra elegible → Descuento aplicado → Puntos acumulados → Notificación de progreso de nivel"
  triggers:
    - "purchase_completed:se activa cuando un cliente realiza una compra que genera puntos"
    - "tier_upgrade:se activa cuando un cliente alcanza un nuevo nivel de membresía"
    - "points_expiring:se activa cuando los puntos de un cliente están próximos a expirar"
    - "reward_redeemed:se activa cuando un cliente canjea puntos por una recompensa"
    - "coupon_assigned:se activa cuando se asigna un cupón a un cliente o segmento"

features:
  core:
    - "Sistema de acumulación y gestión de puntos por compras realizadas"
    - "Niveles de membresía escalonados con beneficios progresivos"
    - "Catálogo de recompensas canjeables por puntos acumulados"
    - "Gestión de cupones con reglas de uso, vigencia y límites"
    - "Seguimiento de transacciones y puntos por cliente con historial completo"
    - "Notificaciones automáticas por cambio de nivel y puntos por expirar"
  advanced:
    - "Análisis de comportamiento del cliente con segmentación avanzada"
    - "Reglas de acumulación dinámicas con multiplicadores por nivel y evento"
    - "Reportes de ROI del programa, retención y valor del ciclo de vida"
    - "Generación de certificados y credenciales de membresía en PDF"
    - "Expiración automática de puntos con notificación previa al cliente"
  optional:
    - "Integración con redes sociales para ganar puntos por interacciones"
    - "Programa de referidos con bonificación por invitación exitosa"
    - "Gamificación con insignias, retos y metas de compra"
    - "Dashboard de autoservicio para clientes con estado de puntos y beneficios"
    - "API de integración con sistemas POS y e-commerce externos"

risk_assessment:
  data_sensitivity: "medium"
  compliance:
    - "GDPR"
  backup_frequency: "daily"
  access_control: "rbac"
  audit_trail: true
