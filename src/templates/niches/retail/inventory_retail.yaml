niche:
  name: "inventory_retail"
  domain: "retail"
  subdomain: "inventory_retail"
  description: "Sistema de gestión de inventario para retail que controla stock en múltiples almacenes, órdenes de compra a proveedores, ajustes de inventario y categorización de productos con reportes detallados."
  scale: "medium"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - inventory_tracker
    - email_smtp
    - notification_manager
    - crud_service
    - report_generator
    - pdf_generator
    - backup_restore
  variables:
    project_name: "inventory_retail"
    app_name: "InventoryRetail"
    template_type: "retail"
    db_name: "inventory_retail.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Product"
    fields:
      - "id:uuid"
      - "name:str"
      - "description:text"
      - "sku:str"
      - "barcode:str"
      - "category_id:uuid"
      - "unit:str"
      - "cost_price:decimal"
      - "retail_price:decimal"
      - "min_stock:int"
      - "max_stock:int"
      - "status:str"
  - name: "Stock"
    fields:
      - "id:uuid"
      - "product_id:uuid"
      - "warehouse_id:uuid"
      - "quantity:int"
      - "reserved:int"
      - "available:int"
      - "batch_number:str"
      - "expiry_date:date"
      - "last_counted_at:datetime"
      - "created_at:datetime"
  - name: "Supplier"
    fields:
      - "id:uuid"
      - "name:str"
      - "contact_name:str"
      - "email:str"
      - "phone:str"
      - "address:json"
      - "lead_time_days:int"
      - "payment_terms:str"
      - "rating:float"
      - "status:str"
      - "created_at:datetime"
  - name: "PurchaseOrder"
    fields:
      - "id:uuid"
      - "supplier_id:uuid"
      - "warehouse_id:uuid"
      - "order_number:str"
      - "items:json"
      - "subtotal:decimal"
      - "tax:decimal"
      - "total:decimal"
      - "status:str"
      - "expected_delivery:date"
      - "received_at:datetime"
      - "created_at:datetime"
  - name: "Adjustment"
    fields:
      - "id:uuid"
      - "product_id:uuid"
      - "warehouse_id:uuid"
      - "quantity_change:int"
      - "reason:str"
      - "type:str"
      - "reference:str"
      - "user_id:uuid"
      - "previous_quantity:int"
      - "new_quantity:int"
      - "created_at:datetime"
  - name: "Warehouse"
    fields:
      - "id:uuid"
      - "name:str"
      - "code:str"
      - "address:json"
      - "manager_id:uuid"
      - "capacity:int"
      - "current_usage:int"
      - "status:str"
      - "created_at:datetime"
  - name: "Category"
    fields:
      - "id:uuid"
      - "name:str"
      - "slug:str"
      - "description:text"
      - "parent_id:uuid"
      - "icon:str"
      - "sort_order:int"
      - "active:bool"
      - "created_at:datetime"

workflow:
  typical_paths:
    - "Producto con stock bajo detectado → Se genera orden de compra → Proveedor confirma → Mercancía recibida → Inventario actualizado → Productos disponibles para venta"
    - "Empleado realiza conteo físico → Identifica diferencias → Registra ajuste de inventario → Stock actualizado → Reporte de discrepancias generado"
    - "Administrador consulta inventario multi-almacén → Transfiere stock entre ubicaciones → Actualiza registros → Genera reporte consolidado"
  triggers:
    - "low_stock_alert:se activa cuando el stock de un producto baja del mínimo configurado"
    - "purchase_order_received:se activa al recibir mercancía de una orden de compra"
    - "adjustment_created:se activa cuando se registra un ajuste de inventario"
    - "expiry_warning:se activa cuando productos están próximos a vencer"
    - "stock_transfer_requested:se activa al solicitar transferencia entre almacenes"

features:
  core:
    - "Gestión de inventario en tiempo real con múltiples almacenes"
    - "Sistema de órdenes de compra con seguimiento de estado y recepción"
    - "Registro de ajustes de inventario con auditoría completa de cambios"
    - "Alertas automáticas de stock bajo y productos próximos a agotarse"
    - "Categorización jerárquica de productos con búsqueda y filtrado"
    - "Control de lotes y fechas de vencimiento de productos"
  advanced:
    - "Seguimiento de stock reservado vs disponible por almacén"
    - "Reportes de valoración de inventario con costos promedio y FIFO"
    - "Transferencias de stock entre almacenes con trazabilidad"
    - "Gestión de conteos cíclicos y auditorías de inventario físico"
    - "Generación de reportes en PDF con detalle de movimientos y existencias"
  optional:
    - "Integración con lectores de código de barras y escáneres"
    - "Predicción de demanda basada en historial de ventas"
    - "Soporte para múltiples monedas en órdenes de compra internacionales"
    - "Dashboard visual de ocupación de almacenes"
    - "API de integración con sistemas de contabilidad y ERP"

risk_assessment:
  data_sensitivity: "medium"
  compliance:
    - "GDPR"
  backup_frequency: "daily"
  access_control: "rbac"
  audit_trail: true
