niche:
  name: "fitness_coaching"
  domain: "sports"
  subdomain: "personal_training"
  description: "Plataforma de coaching fitness personalizado con gestión de clientes, programas de entrenamiento, seguimiento de progreso, mediciones corporales y planificación de objetivos deportivos."
  scale: "small"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - email_smtp
    - notification_manager
    - data_analyzer
    - crud_service
    - pdf_generator
    - report_generator
  variables:
    project_name: "fitness_coaching"
    app_name: "FitnessCoaching"
    template_type: "niche"
    db_name: "fitness_coaching.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Client"
    fields:
      - "first_name:str"
      - "last_name:str"
      - "email:str"
      - "phone:str"
      - "date_of_birth:date"
      - "gender:str"
      - "emergency_contact:str"
      - "medical_notes:text"
      - "is_active:bool"
      - "joined_at:datetime"
  - name: "Program"
    fields:
      - "name:str"
      - "description:text"
      - "goal:str"
      - "difficulty:str"
      - "duration_weeks:int"
      - "frequency_per_week:int"
      - "created_by:int"
      - "is_template:bool"
      - "is_active:bool"
      - "created_at:datetime"
  - name: "Workout"
    fields:
      - "program_id:int"
      - "client_id:int"
      - "name:str"
      - "day_of_week:str"
      - "estimated_duration:int"
      - "calories_target:int"
      - "notes:text"
      - "status:str"
      - "scheduled_date:date"
      - "completed_at:datetime"
  - name: "Exercise"
    fields:
      - "workout_id:int"
      - "name:str"
      - "muscle_group:str"
      - "sets:int"
      - "reps:int"
      - "weight:float"
      - "rest_seconds:int"
      - "order_index:int"
      - "instructions:text"
      - "alternative:str"
  - name: "Progress"
    fields:
      - "client_id:int"
      - "program_id:int"
      - "date:date"
      - "weight:float"
      - "body_fat:float"
      - "performance_score:float"
      - "compliance_rate:float"
      - "notes:text"
      - "created_at:datetime"
  - name: "Measurement"
    fields:
      - "client_id:int"
      - "date:date"
      - "chest:float"
      - "waist:float"
      - "hips:float"
      - "biceps:float"
      - "thigh:float"
      - "body_weight:float"
      - "notes:text"
  - name: "Goal"
    fields:
      - "client_id:int"
      - "title:str"
      - "target_value:float"
      - "current_value:float"
      - "unit:str"
      - "deadline:date"
      - "status:str"
      - "achieved_at:datetime"
      - "created_at:datetime"
  - name: "Schedule"
    fields:
      - "client_id:int"
      - "coach_id:int"
      - "session_type:str"
      - "scheduled_at:datetime"
      - "duration:int"
      - "location:str"
      - "status:str"
      - "notes:text"
      - "created_at:datetime"

workflow:
  typical_paths:
    - "Coach evalúa cliente → Define objetivos → Crea programa personalizado → Asigna entrenamientos → Cliente ejecuta"
    - "Cliente completa entrenamiento → Registra resultados → Coach revisa progreso → Ajusta programa"
    - "Cliente toma mediciones → Se comparan con objetivos → Se genera reporte de progreso → Se actualizan metas"
  triggers:
    - "workout_completed:Actualizar progreso del cliente y notificar al coach sobre la sesión completada"
    - "goal_deadline:Alertar al coach y cliente cuando un objetivo está próximo a su fecha límite"
    - "measurement_due:Recordar al cliente que es momento de tomar mediciones periódicas"
    - "schedule_reminder:Notificar al cliente sobre su próxima sesión programada"

features:
  core:
    - "Gestión de clientes con historial médico y perfil fitness completo"
    - "Creador de programas de entrenamiento con plantillas personalizables"
    - "Biblioteca de ejercicios con instrucciones y grupos musculares"
    - "Seguimiento de progreso con gráficos de evolución"
    - "Planificación de sesiones con calendario integrado"
  advanced:
    - "Análisis de datos de rendimiento con tendencias y predicciones"
    - "Generación de reportes PDF de progreso para clientes"
    - "Sistema de objetivos con tracking automático y celebración de logros"
    - "Dashboard analítico con métricas de retención y satisfacción de clientes"
  optional:
    - "Integración con wearables y apps de actividad para sincronización automática"
    - "Videollamadas integradas para sesiones de coaching remoto"
    - "Sistema de nutrición complementario con planes alimentarios"
    - "Comunidad entre clientes con desafíos grupales y rankings"

risk_assessment:
  data_sensitivity: "medium"
  compliance:
    - GDPR
  backup_frequency: "daily"
  access_control: "basic"
  audit_trail: true
