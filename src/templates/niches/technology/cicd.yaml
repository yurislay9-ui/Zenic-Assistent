niche:
  name: "cicd"
  domain: "technology"
  subdomain: "automation"
  description: "Plataforma de integración y despliegue continuo para gestión de pipelines, stages, builds, tests y artefactos con aprobaciones y rollback automatizado"
  scale: "medium"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - rbac
    - notification_manager
    - webhook_server
    - crud_service
    - report_generator
    - email_smtp
    - backup_restore
  variables:
    project_name: "cicd"
    app_name: "CICD"
    template_type: "automation"
    db_name: "cicd.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Pipeline"
    fields:
      - "name:str"
      - "repository:str"
      - "branch:str"
      - "trigger_type:str"
      - "cron_expression:str"
      - "status:str"
      - "stage_count:int"
      - "last_build_id:int"
      - "avg_duration_sec:float"
      - "success_rate:float"
      - "created_by:str"
      - "created_at:datetime"

  - name: "Stage"
    fields:
      - "name:str"
      - "pipeline_id:int"
      - "order:int"
      - "type:str"
      - "config:json"
      - "timeout_sec:int"
      - "on_failure:str"
      - "requires_approval:bool"
      - "environment:str"

  - name: "Build"
    fields:
      - "pipeline_id:int"
      - "stage_id:int"
      - "version:str"
      - "commit_hash:str"
      - "branch:str"
      - "status:str"
      - "triggered_by:str"
      - "started_at:datetime"
      - "completed_at:datetime"
      - "duration_sec:float"
      - "log_output:text"

  - name: "Test"
    fields:
      - "build_id:int"
      - "type:str"
      - "name:str"
      - "suite:str"
      - "status:str"
      - "total:int"
      - "passed:int"
      - "failed:int"
      - "skipped:int"
      - "coverage_pct:float"
      - "duration_sec:float"
      - "report_path:str"

  - name: "Artifact"
    fields:
      - "build_id:int"
      - "name:str"
      - "type:str"
      - "version:str"
      - "storage_path:str"
      - "size_bytes:int"
      - "checksum:str"
      - "metadata:json"
      - "retention_days:int"
      - "created_at:datetime"

  - name: "Deploy"
    fields:
      - "artifact_id:int"
      - "environment:str"
      - "status:str"
      - "strategy:str"
      - "deployed_by:str"
      - "approved_by:str"
      - "rollback_id:int"
      - "config_override:json"
      - "started_at:datetime"
      - "completed_at:datetime"

  - name: "Approval"
    fields:
      - "deploy_id:int"
      - "requested_by:str"
      - "approved_by:str"
      - "status:str"
      - "environment:str"
      - "reason:text"
      - "requested_at:datetime"
      - "responded_at:datetime"

  - name: "Rollback"
    fields:
      - "deploy_id:int"
      - "target_version:str"
      - "reason:text"
      - "status:str"
      - "triggered_by:str"
      - "artifact_id:int"
      - "started_at:datetime"
      - "completed_at:datetime"

workflow:
  typical_paths:
    - "Push al repositorio → Activar pipeline → Ejecutar stages secuenciales → Build → Test → Generar artifact → Solicitar aprobación → Deploy → Verificar"
    - "Crear pipeline → Configurar stages → Definir triggers → Establecer approvals → Activar → Monitorear ejecuciones"
    - "Detectar fallo en deploy → Crear rollback → Desplegar versión anterior → Verificar estabilidad → Notificar equipo"
  triggers:
    - "commit_pushed:Activar pipeline automáticamente al detectar un nuevo push en la rama configurada"
    - "approval_required:Notificar aprobadores cuando un deploy requiere autorización manual"
    - "build_failed:Alertar al equipo y detener pipeline cuando un build falla en cualquier stage"
    - "test_coverage_drop:Generar advertencia cuando la cobertura de tests baja del umbral mínimo"
    - "deploy_completed:Notificar equipo y actualizar métricas tras completar un despliegue exitoso"

features:
  core:
    - "Gestión de pipelines con configuración declarativa de stages y triggers"
    - "Sistema de builds automatizados con soporte para múltiples lenguajes y runtimes"
    - "Ejecución de tests unitarios, de integración y E2E con reportes de cobertura"
    - "Gestión de artefactos con almacenamiento versionado y retención configurable"
    - "Despliegues con múltiples estrategias: rolling, blue-green, canary"
  advanced:
    - "Aprobaciones manuales con gates de calidad automatizados antes de despliegues críticos"
    - "Rollback automatizado con detección de fallos post-despliegue y recuperación instantánea"
    - "Paralelización inteligente de stages independientes para optimizar tiempos de ejecución"
    - "Análisis de tendencias de builds con detección de flaky tests y degradación de rendimiento"
    - "Gestión de variables y secrets por ambiente con encriptación en reposo"
  optional:
    - "Integración con GitHub/GitLab/Bitbucket para webhooks bidireccionales"
    - "Cache distribuido de dependencias para acelerar builds"
    - "Notificaciones en Slack/Teams con acciones contextuales"
    - "Programación de pipelines con cron expressions y ventanas de mantenimiento"
    - "API REST completa para integración con herramientas externas de CI/CD"

risk_assessment:
  data_sensitivity: "high"
  compliance: [SOC2]
  backup_frequency: "hourly"
  access_control: "rbac"
  audit_trail: true
