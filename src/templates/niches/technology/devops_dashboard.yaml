niche:
  name: "devops_dashboard"
  domain: "technology"
  subdomain: "devops"
  description: "Panel centralizado de operaciones DevOps para monitoreo de servidores, despliegues, pipelines, alertas y métricas en tiempo real con gestión integral de incidentes"
  scale: "large"

composition:
  base_template: "apps/base"
  app_template: ""
  blocks:
    - jwt_auth
    - rbac
    - notification_manager
    - webhook_server
    - data_analyzer
    - crud_service
    - report_generator
    - email_smtp
  variables:
    project_name: "devops_dashboard"
    app_name: "DevOpsDashboard"
    template_type: "dashboard"
    db_name: "devops_dashboard.db"
    port: 8000
    debug: false
    version: "1.0.0"

entities:
  - name: "Server"
    fields:
      - "hostname:str"
      - "ip_address:str"
      - "status:str"
      - "os_type:str"
      - "cpu_cores:int"
      - "ram_gb:float"
      - "disk_gb:float"
      - "provider:str"
      - "region:str"
      - "tags:json"
      - "last_ping:datetime"
      - "created_at:datetime"

  - name: "Deployment"
    fields:
      - "version:str"
      - "environment:str"
      - "status:str"
      - "server_id:int"
      - "pipeline_id:int"
      - "deployed_by:str"
      - "rollback_version:str"
      - "config_snapshot:json"
      - "started_at:datetime"
      - "completed_at:datetime"
      - "duration_sec:float"

  - name: "Pipeline"
    fields:
      - "name:str"
      - "repository:str"
      - "branch:str"
      - "status:str"
      - "stages:json"
      - "trigger_type:str"
      - "cron_schedule:str"
      - "last_run:datetime"
      - "avg_duration_sec:float"
      - "success_rate:float"
      - "created_by:str"

  - name: "Alert"
    fields:
      - "title:str"
      - "severity:str"
      - "source:str"
      - "metric_name:str"
      - "threshold_value:float"
      - "current_value:float"
      - "status:str"
      - "acknowledged_by:str"
      - "incident_id:int"
      - "fired_at:datetime"
      - "resolved_at:datetime"
      - "description:text"

  - name: "Metric"
    fields:
      - "name:str"
      - "value:float"
      - "unit:str"
      - "source:str"
      - "server_id:int"
      - "timestamp:datetime"
      - "tags:json"
      - "aggregation_type:str"
      - "retention_days:int"

  - name: "Log"
    fields:
      - "level:str"
      - "message:text"
      - "source:str"
      - "server_id:int"
      - "service_name:str"
      - "trace_id:str"
      - "timestamp:datetime"
      - "metadata:json"

  - name: "Config"
    fields:
      - "key:str"
      - "value:text"
      - "environment:str"
      - "service_name:str"
      - "encrypted:bool"
      - "version:int"
      - "updated_by:str"
      - "updated_at:datetime"

  - name: "Incident"
    fields:
      - "title:str"
      - "severity:str"
      - "status:str"
      - "affected_services:json"
      - "assigned_to:str"
      - "root_cause:text"
      - "resolution:text"
      - "impact_level:str"
      - "started_at:datetime"
      - "resolved_at:datetime"
      - "postmortem_url:str"

workflow:
  typical_paths:
    - "Detectar anomalía en métricas → Generar alerta → Crear incidente → Asignar equipo → Diagnosticar → Resolver → Postmortem"
    - "Push a repositorio → Activar pipeline → Ejecutar stages → Generar artifact → Desplegar en environment → Verificar health check"
    - "Configurar umbrales de monitorización → Recopilar métricas → Analizar tendencias → Generar reporte de rendimiento"
  triggers:
    - "webhook_received:Activar pipeline al recibir push de repositorio externo"
    - "threshold_breach:Generar alerta cuando una métrica supera el umbral configurado"
    - "deployment_completed:Notificar equipo y actualizar estado del servidor tras despliegue"
    - "incident_escalated:Enviar notificación de escalamiento cuando un incidente no se resuelve en el tiempo esperado"
    - "config_changed:Auditar y notificar cambios en configuraciones críticas del sistema"

features:
  core:
    - "Monitoreo en tiempo real de servidores y servicios con dashboards interactivos"
    - "Gestión de pipelines CI/CD con visualización de estados y métricas de rendimiento"
    - "Sistema de alertas configurables con múltiples niveles de severidad y escalamiento"
    - "Registro centralizado de logs con búsqueda avanzada y filtrado por servicio"
    - "Gestión de incidentes con seguimiento completo del ciclo de vida"
    - "Control de configuraciones por ambiente con versionado y auditoría"
  advanced:
    - "Análisis predictivo de fallos basado en tendencias históricas de métricas"
    - "Auto-escalado inteligente basado en patrones de carga y métricas personalizadas"
    - "Integración con proveedores cloud multi-región con vista unificada"
    - "Runbooks automatizados para resolución de incidentes recurrentes"
    - "Dashboards personalizables por equipo con widgets configurables"
  optional:
    - "Integración con Slack y Microsoft Teams para notificaciones en tiempo real"
    - "ChatOps para ejecución de comandos operativos desde canales de chat"
    - "Mapa de dependencias de servicios con detección automática"
    - "Gestión de secrets integrada con bóveda externa"
    - "Exportación de métricas a herramientas de Business Intelligence"

risk_assessment:
  data_sensitivity: "high"
  compliance: [SOC2, GDPR]
  backup_frequency: "hourly"
  access_control: "rbac"
  audit_trail: true
